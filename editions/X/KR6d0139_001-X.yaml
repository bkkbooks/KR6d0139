body:
  text: 摩訶止觀者法華之妙行也止觀義例者妙行之輪輗也傳止觀之道而不明義例者則妙行傾覆也昔天台智者稟之於靈嶽悟之於道場說之於玉泉付之於章安自章安至荊谿師資道契德音莫違後以清涼僻見逆路論興背我天台朋他賢首抑根本之純妙以為漸圓揚枝末之兼麤名為頓頓紊瀆化源尤誤羣學故法華之妙行或幾乎隱矣噫道之未喪存乎哲匠是以荊谿尊者嘅茲詭亂乃作輔行傳弘決及義例等文息蕩僻見昭顯妙行於是迷津識濟佛乘載脂故摩訶止觀由荊谿而大振於世也人到于今咸受其賜然輔行則披其細目義例乃結其大科意令學者推此條例討論輔行研修止觀會通妙乘運眾寶之大車遊於四方直至道場耳故知傳止觀之道而不明義例者則妙行傾覆也余以元豐三年歲次庚申遷居安固寶積教院明年休夏將啟止觀而門人請曰夫金剛錍者點示有情之性徧不隔於艸木瓦石明無情之有性也而寓言記已解之十不二門者收攝法華之十妙顯一部之經旨令妙理以昭明也而圓通記已釋之止觀義例者總括止觀之文粹明所傳之心印皎在於目前也而未聞有記況數百年以來斯文存而不講今雖欲學止觀仍患關節靡通敢希指授用袪暗滯余聞此請遂無以辭於是乃詳究文勢出科一貼尋以講閱事煩未遑申剖逮七年甲子歲莫春月上巳日始暇纂集止觀輔行綱要之文隨科對顯至中秋下弦乃得畢功既而題曰纂要又復均成六卷因為訓於門人之請乃廣建立一家之道吾宗後學不可以輕視也永嘉沙門釋從義撰釋止觀義例文為二初總題又為二初所述題目具存應云摩訶止觀今文雖則但舉止觀亦兼摩訶故輔行云止觀二字無非摩訶即是一心三止三觀之止觀也故知總攬一部以為首題故始自大意終于旨歸無非摩訶之止觀也是則題名為總十章為別矣言義例者義謂止觀之所以也例謂比例類例條例也是故欲明摩訶止觀佛乘所以須知七例如下所列七義是也然此七義皆有其例非循胸臆輙自構立是則若迷七例之文將何以明止觀之行將何以袪邪僻之計次能撰人名天台即所棲之處沙門乃出家之號湛然是述者之名天台沙門釋義如常按梁肅撰荊谿云公諱湛然姓戚氏世居晉陵之荊谿人尊其教因以為號既居天台故今乃云天台沙門輔行云毗陵沙門者此從本郡為名也述者著述也亦循也作者謂之聖述者謂之明今荊谿但述先聖之道而不自作焉亦猶仲尼述而不作也次別文為二初列七例之名第者次也一者數之始也第二至第七皆是次第增前之數耳所傳部別者天台傳南嶽三種止觀一漸次二不定三圓頓今此摩訶止觀一部於三種中別在圓頓也又輔行云一一部中非無傍正如次第禪門正明次第傍亦具二文雖未終亦有其意非漏非無漏即頓文也修發不同一十六句即不定也一有漏即十善四禪等二無漏即九想八念等三亦有漏亦無漏即六妙門十六特勝等四非有漏非無漏即法華三昧等修發十六者一約止門明四修二約觀門明四修一事二理三事理四非事理一一修中各有四種發禪不定是故合有一十六種發禪不定云云六妙門中正明不定傍亦具二圓頓即頓相生即漸六妙門中開為十門第二謂之相生第九謂之圓觀今圓頓文亦兼餘二傍雖兼二今從正明圓頓而說是故謂之所傳部別耳既云天台傳於南嶽三種止觀故知人為能傳法為所傳所傳通三今則別在圓頓止觀耳又輔行釋別序中云師資所承三部不同頓對餘二故名為別故知三中別在圓頓名為所傳部別也所依正教者無教之行冥如夜遊是故妙行必依正教正教則簡邪教故也故輔行題下註云行何所弘非眾教不立所依既乃名為正教當知能依則是妙行也依正消釋者下文牒名乃云文義當知文義即是所依正教之文義也消者盡也釋者散也解也春秋左傳序云若江海之浸膏澤之潤渙然氷釋怡然理順然後為得也大章總別者止觀正說開為十章始自大意終至旨歸而輔行云於十章中大意為總餘八是別總別亦是廣略之義故止觀云大意略八章廣旨歸非廣非略故輔行第四云現行印本前分別中名為廣略亦云總別總別二文互相映顯故前文云生起五略顯於十廣故今下文解釋大章總別例中但云廣略即此意也心境釋疑者心乃對色而立境乃望觀得名以心而為所觀之境故云心境也又心名則局境名則通以陰入界色心等法通名所觀之境故也料簡問答袪滯達觀故云釋疑也解行相資者下文牒名乃云行解相資語雖翻轉意亦無他但是文體前後互舉耳故止觀云前六重依修多羅以開妙解今依妙解以立正行膏明相賴目足更資輔行云膏堪續明以譬觀行明能然膏以譬觀解目能導足以譬止解足能達目以譬止行雙舉兩譬同喻二法相之與更賴之與資綺文互異意必相通賴者藉也資者益也故知若無六章妙解行不能成喻疑顯正者曉訓名喻迷惑曰疑昭示為顯離邪為正註云有題云破迷者請改者謂有艸剏之本第七例題目云破迷者請改之云喻疑顯正也故知此文乃是重修潤色之本也次釋七例之義文為七初釋所傳部別例文為二初牒名次總指下釋義文為三初總明所傳唯在圓頓部謂部帙言圓頓者從本為名若從第三改治題目應云摩訶又復第三改治題目雖云摩訶至於標列三止觀名亦乃但云圓頓而已今從此意故云圓頓言佛乘者即是經云各賜諸子等一大車其車高廣眾寶莊校等也言正行者即此佛乘大白牛車名為正行簡異邪行壞驢之車也言大體者猶大綱也傍雖兼二正在圓頓清涼何得斥為漸圓輒於三外別立頓頓邪次大意下釋疑正示圓頓之相大綱體格雖是圓頓而僻解者尚多昏迷故須釋疑以示其相於中為二初釋疑又為二初正釋疑謂有疑云若乃總指一部以為圓頓佛乘何故大意文初有數處以三止觀結邪故茲釋云此但汎爾傍兼借名結義耳非謂今文誤作為字即為三種行相也是故當知正意但在圓頓而已大意有五一發大心二修大行三感大果四裂大網五歸大處初發心中文自有三初方言次簡非後顯是簡非中云又聖說多端或次說或不次說或具說或不具說乃至云如是等種種互相成顯還以三止觀結之可以意知又以一止觀結之云發菩提心即是觀邪僻心息即是止下文既云故用三一收束結撮故今乃引一止觀結之之文也於顯是中文復有三初約四諦中云上來所說既多今以三種止觀結之次約四弘中以一止觀結之云若解此心任運達於止觀無發無礙即是觀其性寂滅即是止後約六即中亦有以一止觀結文如下所辨次修大行中明四種三昧第四三昧中有四一約諸經二約諸善三約諸惡四約諸無記於四科文後乃用三種止觀結云復次但約最後善通相善惡展轉相望唯圓為善圓居最後故云最後善也明隨自意此是次第意若善惡俱明隨自意即是頓意若約襵牒之善襵牒善者非前兩收不出前兩起空屬空起有屬有明隨自意此則不定意大意有五今云文初者即指第一發大心第二修大行文也言數處者即三處也如向所引仲尼云加我數年學易則可以無大過矣數年即三年也故知數處即三處也輔行云感應文多須以三結文義若狹但以一結如下四弘六即或但以三結具如下文顯是四諦及四三昧應云第四三昧文末也或時三一並略如下三略或時三一俱用即如今文一則是通三則是別通謂通三別謂各一不見此意多生異端問何故須以止觀結之答此之三法通冠一切今此五略其文徧通故處處文以三一結又復此部通名止觀凡諸文義莫非止觀不可見此結止觀名咸謂並是修行之法如六即中理及名字皆止觀結應更加於觀行相似如下辨之及今文中但結感應豈更別判三外之一是知理教行果發心感應無非止觀故也又復此部雖通名止觀從釋名去文相區分不復更用三文結之雖云不用三止觀結亦有用於一止觀結如第三卷偏圓五科用一止觀以結權實又復妙境文末亦云歷一切法無非漸頓不定輔行云前大意中於一圓頓結示三種止觀之相今妙境中收三止觀同一圓頓云云又云故但結文成三止觀何得即以修行釋之又云況復結文非修行相不須更以圓漸為妨言汎爾者汎者浮也爾者語辭也浮汎通漫未為指的故也借者假借暫用也非謂即為三種行相者且對兼二通言之耳其實但非餘二行相以圓頓行相正是此部故也又復結文亦非便是圓頓行相何則以圓頓行相須具二十五方便及十境十乘正修故也豈但結文便以為足乎故云非謂即為三種行相也以大意下次明所以準上可知言文略者即五略也今正指前二略即發心修行也言意廣者意該九廣也故輔行云撮下九廣以為五略示九章旨故云大意又九章皆大略述彼意故云大意故此五略皆以大為名故止觀云初釋大意囊括始終冠戴初後故輔行云感應文多須以三結文義若狹但以一結撮者手取也次應知下正示圓頓之相文為二初總示是故當知文雖兼二借名結義部中正意獨在圓頓故序中下次引證文為三初引序文為二初正引文言序中云者誤也此文元出正說止觀料簡中耳故止觀正說料簡中問云略指大意同異云何答通則名異意同別則略指三門大意在一頓又此料簡既是章安將正說大意對序中辨差略釋三種止觀之門而為料簡是故亦可謂之序中云也委引輔行具如下文以略冠廣下次明廣略無異大意是略餘八是廣大意五略既在一頓以略冠廣豈可殊塗冠者首飾也謂以大意冠十章首故止觀云初釋大意囊括始終冠戴初後又云生起五略顯於十廣是故大意五略與下十廣皆是正明圓頓也次引示處文者此示處文正是章安序中文也故云次第禪門合三十卷今之十軸是大莊嚴寺法慎私記不定文者如六妙門以不定意歷十二禪等十二禪者謂四禪四空四無量乃至六度等此是陳尚書令毛喜請智者出此文也圓頓文者如今所引輔行云次示三文部別處所所傳之法不出此三凡欲修行為依何部是故應示部別處所圓頓文者即是今文章安自說所記也玉泉寺在荊州泉色如玉因以名焉三引下文為二初總示下文皆為顯實初序中文既在圓頓自從下去正說諸文莫不皆以三教次第思議相待顯於絕待圓頓一實是則序及正說皆正明圓頓也次別舉大車文義證成止觀明陰境十乘文畢乃引法華大車以譬十法故云大車文中也以思議相待等而為僕從者止觀云對治助道廣攝諸法攝法如下引之名又多僕從而侍衛之文句云譬方便波羅蜜能屈曲隨人給侍使令眾魔外道二乘小行皆隨方便智用故淨名云皆吾侍也實相妙理以為車體者止觀云觀念念心無非法性實相是名等一大車徹三諦源名之為高收十法界名之為廣無漏妙觀以為白牛者止觀云四念處慧破除八倒之黑名駕以白牛文句云譬無漏般若能導諦緣度一切萬行到薩婆若白是色本即與本淨無漏相應自餘諸法皆莊嚴具者止觀云無量道品名眾寶莊校文句云譬萬行修飾也周帀欄楯等今不具引故文句中章安私謂云諸法實相正是車體一切眾寶莊校皆莊嚴具耳又文句先分科云敘車體中先敘高廣次明白牛後明儐從文句記云準對三德應車體中分正及緣對牛為了此則義當修二性一一復具三高廣不二又輔行云理性車體具度資成白牛觀照又云其車高廣不思議境也車體幰蓋慈悲寶繩交絡即發心也安置丹枕枕有內外若車內枕休息眾行即安心也若車外枕或動或靜動靜只是通塞義也具度破塞存通即塞而通其疾如風即破無明是破徧義也始自白牛終至平正道品義也白牛又多僕從即正助也僕從遊於四方即次位也安忍離著在次位之初安忍只是忍於五品違順二境令入六根離愛只是離六根中相似法愛又次位者只是行之所階恐行者生濫故於次位中別出五品六根清淨勸勵行者令離障離愛故知前七正明車體及以具度亦兼白牛後三只是乘之所涉若無所涉運義不成是故十法通名大乘也三故知下結示部別如上舉例故知此部於三種止觀中別在圓頓佛乘妙行此外更無頓頓之他趣也趣謂旨趣更無別立頓頓旨趣故也第二所依正教例文為二初牒名次釋義文為二初明所依正教通乎一代散者分也布也徧也該者備也兼也代者年也更也雖義立三十年為一代今但取代更之說即釋迦五十年中說法自為一代異於過未諸佛故也謂今止觀一部徧散分布廣引諸文備該釋迦五十年中一代五時之教法也故輔行題下註云行何所弘非眾教不立次明文意唯在法華涅槃文為二初總明雖則散引該乎一代然而文體綱格正意唯歸二經一依法華本迹二門開顯實相故釋籤云本迹二門皆歸實相本地長壽且置未論二依涅槃重扶戒律助顯常住以此法華涅槃二經判味同時咸皆開顯無非醍醐一味故也故法華云大王之饍涅槃云醍醐之味法華開三教之權顯一乘之實名大王饍涅槃點劣淺之三修是勝常樂我名醍醐味王饍醍醐味無差別顯實勝修時無側影所以二經時味元同大綱雖爾細辨不然文句記云判味同時而部有異約理名別咸歸常住約機彼稱捃拾約法彼存三權論意彼帶律儀語證彼兼小果受益彼無廣記說時長短永殊談常過未不同論譬大陣殘黨現瑞表彰各別破執難易不同領解近遠迹乖述成被根不等用治生死不同付囑有下有此得茲十六餘略可知失斯同異講授殊難豈唯二經餘亦不易具如大部補注之中註解此之十六同異學者知之次所以下別示文為二初明始末皆依法華而為正行文為五初舉名體偏圓依法華名體文為二初明依法喻之名上文謂之一依法華本迹顯實其義如何故茲乃示其所以也故止觀十章中第二釋止觀名分為四科一相待二絕待三會異四通三德故云釋名論待論絕也此即止觀之行用於法華別題之中待絕二妙之法也輔行云判今法華唯具二妙所謂待絕所言待者唯有待麤成妙更無待妙成麤若以迹望本亦可互形若以部望部一向唯妙今約法華迹理復置互形所以玄文待絕俱稱為妙故以部教相望復有橫豎望前四時名為豎待圓望三教名為橫待此文既依法華經意而釋名等大槩準彼相待是麤義當待麤論妙絕待是妙義當開麤論妙此二亦名廢麤開麤故法華中唯論二妙更無非待非絕之名彼為判教故待之與絕同稱為妙今此相待則判為麤唯明絕觀無部可待則無豎待無教可望名無橫待故唯一絕以為能詮雖立相待以顯絕待尚無於絕何待之有為詮三德故假名絕借相待名判為思議故唯絕待方稱為妙所以思議境後佛界雖妙居九界末通名為麤故並判云非今所用次與不次意亦如是故次第意但云衍門用通用別但云似通似別雖云不用正約思議明不思議開於所待以成能絕即是今文妙觀意也釋名下去諸意皆然所以釋名論待論絕體相唯論次與不次攝法六義偏圓五門亦復如是雖無部會可以對論還借教味以顯圓妙境境十觀只應唯妙尚寄橫豎顯非橫豎故知一部之文共成圓乘開權妙觀豈指一句別謂高深若其然者何殊體踏云云言乃至偏圓文中者略於體相攝法也偏圓一科自分為五一大小二半滿三偏圓四漸頓五權實於權實中乃云權是權謀暫用還廢實是實錄究竟旨歸立權略為三意一為實施權二開權顯實三廢權顯實如法華中蓮華三譬諸佛即一大事出世元為圓頓一實止觀而施三權止觀權非本意意亦不在權外只開三權止觀而顯圓頓一實止觀為實施權實今已立開權顯實權即是實無權可論是故廢權顯實權廢實存暫用釋名其義為允故云具引蓮華三喻釋名也輔行云暫用法華釋名之文來此以釋權實之名問蓮華三喻喻於施開廢等三法為是同體為是異體若云異體何故不以麤華為喻而言非同體方便無以施開邪若云同體何故乃云為蓮故華華掩於實及開麤顯妙邪答若乃不曉如來權巧及以機情則於諸文任運壅滯將何以顯一家大旨今約如來權巧明之則是蓮華喻於妙法故施開等無非同體復約眾生機情辨之則於如來為實施權是華掩於實華開蓮現是開麤顯妙是則異體乃約眾生機情強覆若於如來方便本一何曾異實所以為蓮故華是即實之權華開蓮現是即權之實故昔施今開於佛無非體內由是乃云同體方便施開等也但昔機情覆悕慕近果判為體外故說施權名為異體然機熟須開開彼能覆祐彼近謂名之為開開何所開即彼能覆所以謂之開麤顯妙麤既開顯名之為妙故說開顯亦名同體施權乃是異體之義約機雖爾於佛不然所以施開唯一同體輪王解髻喻意可識故佛輪王見諸大士應破大惑獲大智勳乃於真寶法界之頂開解同體善巧權髻賜與實相明珠記莂若得斯旨諸文可知他不見之妄生建立誠堪悲矣顯體下次明用實相之體此即止觀十章之中第三體相一章故云顯體也彼體相文自分四科一教相二眼智三境界四得失次明用章意云法華疏用四一明實今以四科顯體可以相類輔行云前釋名中既用玄文待絕二妙故今顯體還用疏中四一顯實實不異彼是故用之此四一名本出光宅法華文句云舊云四一謂果一人一教一因一今家和舊亦作四一數同名異不全同舊舊云果一今云理一若無理印則同魔說舊云因一今云行一同語則單行通因果人教二一與舊不殊玄文復以十妙而為十一今且依四以對四章是故經云為令眾生開佛知見取所知見而為理一但教菩薩即是人一常為一事即是行一為眾生說即是教一疏釋理一約能知見又為四釋謂四智四門四位觀心能所相對四章義足智是眼智門是教相觀心只是稟教證智次位只是眼智所階以契於理云云今云具用光宅四一者此有二意一者為對上文蓮華三喻故今乃云光宅四一二者四一之言本出光宅今且從舊為語故云光宅四一耳其實今家所明四一與舊稍異也須知人既稟教修行以契於理是故理一即是實相今云四一者通舉能所耳其實但取所知見理為理一也為行正體者即前文云實相妙理以為車體也此體高廣眾寶莊校則異邪空故云正體耳故與前文正行大體不可一槩也況諸境下次舉正觀果報依法華大車文為二初明諸境十乘正觀以大車為喻又為二初正明陰等諸境皆明十乘乘乘皆以大車為喻廣如止觀今不煩錄略如上文引陰境中十乘大車自下九境準例可識何須具引邪故生起下次引證生起文末者止觀明觀陰境十乘自分為二初法次喻即大車也初法為六初列十法次生起三舉喻四稱歎五廣解六總結今此即是第四稱歎故是第二生起文末以隔第三舉譬之文故云末耳言生起者止觀云既自達妙境即起誓悲他次作行填願願行既巧破無不徧徧破之中精識通塞令道品進行又用助開道道中之位己他皆識安忍內外榮辱莫著中道法愛故得疾入菩薩位第三舉譬者譬如毗首羯磨造得勝堂不疎不密云云總稱歎者通歎十乘也輔行云十法既是法華所乘是故還用法華文歎若約迹說即指大通智勝佛時以為積劫寂滅道場以為妙悟若約本門指我本行菩薩道時以為積劫本成佛時以為妙悟本迹二門只是永悟此之十法身子等者寂場欲說物機未宜恐其墮苦更施方便四十餘年種種調熟至法華會初略開權動執生疑殷勤三請五千起去方無枝葉點示四一演五佛章被上根人名為法說中根未解猶希譬喻下根器劣復待因緣佛意聯緜在茲十法故十法文末皆譬大車今文所憑意在於此惑者未見尚指華嚴唯知華嚴圓頓之名而昧彼部兼帶之說全失法華絕待之意貶挫妙教獨顯之能驗迹本二文檢五時之說圓極不謬何須致疑是故結曰正在茲乎次是知下結示行成尅獲大果言是知者由是而知也常坐等四行儀雖異所依實相無有差別良以實相乃是所緣安樂之法四種三昧乃是能緣安樂之行故止觀云四行為緣觀心籍緣調直故名四種三昧妙行若成則證實相證實相已所獲依報名為大果故文句釋安樂行品題云夫安樂者即大涅槃從果立名也行者即涅槃道從因得名也絓七方便麤因麤果皆非安樂行獨此妙因妙果名安樂行也所獲依報名為大果者即是第八果報章也夏終闕緣雖即不說準望五略即感大果是也輔行云言果報者在實報土從報果為名故實報無障礙土必出方便有餘之外即是初住已上法身所居尚非初住生身得忍菩薩所居豈是住前生身及七方便人所居邪初住已上法身為正報實報土為依報故云所獲依報也三舉起教不出令他開示悟入大章起教即是五略裂大網耳輔行云對揚利物名為起教令他除疑名為裂網起教本為除他疑網是故同也故止觀裂網文云若欲外益眾生逗機設教者隨人堪任稱彼而說乃至成佛化物之時或為法王說漸頓法乃至或為十法界像對揚發起云云輔行釋化他不思議境云然此為他與後起教其義不同彼唯實報八相被物發起權實施開廢等云云既云外益眾生發起權實施開廢等當知只是為令眾生開示悟入佛之知見若約位說則以十住十行十向十地次第對於開示悟入文句云為令眾生開示悟入佛之知見不論佛果自知自見若偏語佛果即失眾生若語眾生則無佛知見故不可偏取前三教行人雖是眾生未有佛眼佛智故不能知見實相圓教四位亦是眾生又分得佛眼佛智則眾生義成知見義亦成云云四舉旨歸不出三法秘藏大章旨歸即是五略歸大處也言旨歸者文旨所趣也旨者自向三德也歸者引他同入三德也又自入名歸令他入名旨言三軌者真性觀照資成此三只是一大乘法耳經云十方諦求更無餘乘唯一佛乘一佛乘者即具三軌三一圓融不可思議名之為妙妙即是法法即是妙故云妙法也軌名軌範還是三法可軌範耳斯乃妙位所住之法也故妙經方便品云當知是妙法諸佛之秘要又神力品云如來一切秘要之藏故知妙法即是秘要之藏也釋籤云具含三千通攝三德故名為藏爾前非器不授斯要又涅槃經哀歎品云云何名為秘密之藏猶如伊字三點若並則不成伊縱亦不成如摩醯首羅面上三目乃得成伊三點若別亦不成伊我亦如是解脫之法亦非涅槃如來之身亦非涅槃摩訶般若亦非涅槃三法各異亦非涅槃我今安住如是三法為眾生故名入涅槃如世伊字章安釋云若約昔教隱故名秘覆故名藏謂無常等覆於常等令常等隱名秘密藏今經開敝如月處空清淨顯露不如昔教但以正法微妙不可思議絕名離相眾生不解名為秘密法界包含攝一切法用不可盡名之為藏今釋秘密藏文為三一譬三點二譬三目三合以三德此之三文一往而言是從事入理三點是文字此約言教三目是天眼此約修行三德是佛師此即約理又是佛印印於教行凡有言說與此相應即秘密教修習相應是秘密行證得相應是秘密理故約三釋稱教行理初三點中言伊字者外國有新舊兩伊舊伊橫豎斷絕相離借此況彼橫如列火豎如點水各不相續不橫不同列火不豎不同點水應如此方草下字相細畫相連是新伊相舊伊可譬昔教三德法身本有般若修成入無餘已方是解脫無復身智如豎點水縱而相離又約身約智分得有餘解脫橫一時有三法各異如橫列火各不相關新伊字者譬今教三德法身即照亦即自在名一為三三無別體故不是橫非前非後故是非縱一即三如大點三即一如細畫而三而一而一而三不可一三說不可一三思故名不可思議不可思議者即非三非一名秘密藏如世伊字云云次約三目釋者摩醯首羅居色界頂統領大千一面三目三目一面不可單言一三縱橫若並若別能嚴天顏作世界主徹照三千若不縱橫嚴主照世一切皆成三德亦爾縱橫並別祕藏不成不縱不橫祕藏乃成次約三德釋祕密藏者果地眾德但言三者蓋舉略兼諸法身之身非色非無色非色故不可以形相見非無色故不可以心想知雖非色而色充滿十方雖非非色亦可尋求即法身德般若德者非知非字亦非不知非不字云云解脫德者非縛非脫非縛而縛非脫而脫云云我今安住下結成祕密藏也安住三法此結三德入大涅槃結祕密藏如世伊字是結三點文略不結天目然佛常安住三法而言我今者蓋隨緣宜故云為眾生故名入涅槃也輔行云三軌妙故故云妙法華嚴法界淨名解脫不共般若與夫涅槃三德祕藏一體無殊若識此意今文可了十方佛法在一剎那五所以下總結始謂釋名末謂旨歸九廣既爾五略準知行通因果前七為因第八為果果滿教他他機我應自他同歸滅理真性濟行之教有宗顯教之行符理是故十章皆是法華之妙行也次明一部全用涅槃而為扶助文為三初明末代須用扶助扶者持也助者佐也佛說涅槃自有二意一為未熟者更說四教具談佛性令具真常入大涅槃故名捃拾教二為末代鈍根於佛法中起斷滅見夭傷慧命亡失法身設三種權扶一圓實故名扶律談常教今此即是第二意也故妙玄云涅槃為末代凡夫見思病重定執一實誹謗方便雖服甘露不能即事而真傷命早夭故扶戒定慧顯大涅槃釋籤云事戒事定前三教慧並為扶車之法具如止觀對治助開中說今時行者或一向尚理則謂己均聖及執實謗權或一向尚事則推功高位及謗實許權既處末代不思聖旨其誰不墮斯之二失如來滅後名為末代不悟圓常名為根鈍既於佛法起斷滅見遂捨毗尼訶棄戒律復謂如來定入涅槃夭傷慧命亡失法身若無三教之權寧助一乘之實故廣明持戒委示真常正助相須乘戒俱急則法身嚴顯慧命昭然故正行進趣而不傾覆者良由助道又多僕從而侍衛之故也是則正行及以助道相添資益方能乘此大白牛車遊於四方直至道場乘名運載斯之謂矣以在穢土須說贖命為捃拾故扶律說常令久住故兼權明實助發實故帶實用權顯權力故言贖命者準四念處乃是贖於藏通之命別圓自有常住之命故非所論故止觀明對治助開中云根利無遮根利有遮根鈍無遮皆不須助若根鈍遮重以根鈍故不能即開三解脫門以遮重故牽破觀心為是義故應須治道對破遮障則得安隱入解脫門然助道無量今約六度以治六蔽修三昧時慳貪忽起當用檀捨破戒心起當用尸羅云云所以須用助道治者如二萬億佛所繫珠中忘大乘即不以大化更六百劫以小起之令怖畏生死漸向父舍故知應借小助大六百劫如補註中示又佛初欲大化諸佛不印若思方便即稱善哉佛有本願令眾如我豈惜大乘事不獲已逗機對治助道開門且聲聞小行尚自珍敬木叉大士兼懷寧不精持戒品世以不持為大則大小俱亡信此土機緣咸迷大小具如止觀最初方便持戒清淨中事理雙美方堪向道豈入道者令事虧邪故五篇七聚菩薩重輕不可微犯方稱涅槃顧命之意何以故出家菩薩具足堅持毗尼篇聚大乘教意一切皆然故涅槃中五篇七聚並是出家菩薩律儀況受食受藥禁性重之由持鉢持衣杜譏嫌之本譏嫌性重等護無偏迹混聲聞真菩薩也但為元期出苦判屬小宗豈可背彼受持稱為大道世云大乘不須持戒者斯言謬矣涅槃經云如人七寶不出外用名之為藏其人所以藏積此寶為未來故所謂糓貴賊來侵國值遇惡王為用贖命財難得時乃當出用諸佛祕藏亦復如是為未來世諸惡比丘畜不淨物為四眾說如來畢竟入於涅槃讀誦外典不教佛經如是等惡出現世時為滅諸惡為說是經是經若滅佛法則滅若消此文應有單複兩義所言複者諸乘及戒若言不許畜八不淨此是戒門事門若說如來畢竟涅槃及遮外典此是乘門理門以彼經𫑟前後諸文並皆扶事以談常理若末代中諸惡比丘破戒說於如來無常及讀誦外典則並無乘戒失常住命賴由此經扶律說常則乘戒具足故號此經為贖常住命之重寶也所言單者唯約戒門彼經扶律律是贖常住命之重寶也是則法華雖已顯實而涅槃中復須施權扶其戒律以護圓常是故涅槃五支十戒事理具足乘戒無虧正助相須其若是也佛化下次舉佛化為況扶律談常慧命斯永佛化尚爾今何不然尚者庶幾也三故扶下總結同致實相之理不遷不變名之為常故涅槃中扶律談常以用助顯今經實相而推其功能在彼涅槃矣傍助之功既在於彼是故正用法華顯實妙行佛乘原其意趣蓋顯圓實常住不變二經齊致同一醍醐耳第三依正消釋例文為三初牒名分科詳者審也究者窮也文之所以故云文義體謂體式亦體格也勢謂形勢亦氣勢也又勢分也分別異同炳然可見名之為相次一者下隨科釋義文為二初詳究文義又為二初詳究文義為十初明引證通局者此即序中引證三種止觀之文也法華開顯部雖一實然而文中先敘昔教以為所開故所開為權能開為實若乃局定引證圓頓一實止觀則引實文故引文云正直捨方便但說無上道此證頓也通者通塗也方便者權也如引法華證漸不定者引經云如是之人應以此法漸入佛慧此證漸也又引經云若不信此法於餘深法中示教利喜此證不定也輔行云既非華嚴教人又非諸教入頓起自鹿苑中涉二味故名為漸不信等者若不信頓且用餘深圓教非餘而是深也別教是餘亦復是深藏通是餘而非深也若未被會於餘於深或信不信故名不定漸與不定並從昔說來至法華無復二名捨方便者約廢權邊故無上道即是立實也所引四味文之與部者部雖非妙文有權實引證通局準向思之其意可解故云亦然故引華嚴云譬如日出先照高山此證頓也次照幽谷此證漸也次照平地此證不定也乃至引大經云從牛出乳等此證漸也又引置毒乳中乳即殺人等此證不定也又引雪山有草名曰忍辱牛若食者即得醍醐此證頓也次明汎引流類者此亦序中引證之文又是汎引流類也即是通塗汎引漸頓不定教相之名類同漸頓不定止觀之義耳淨名云始坐佛樹力降魔者漸也佛以一音演說法眾生隨類各得解者不定也說法不有亦不無者頓也法華以異方便者即應以此法漸入佛慧也言借用者即汎引也輔行云皆是借教以證於觀義勢相似豈可全同若攬教成觀復非碩異又云此三止觀名字雖似八教中三其相永別彼八教中指華嚴為頓鹿苑已去為漸不定寄在四味之中下料簡中但是借名又云讀者至此應知頓等三觀與八教中頓等三異以彼八教但在乳等四時教故今此三文俱緣頓理故三止觀對三根性事雖差殊同緣頓理離圓教外無別根性當知此三並依圓理分此三行名三根性是故漸次不同於別有人云是別者都不見文旨須知頓人行解俱頓漸人解頓行漸不定解頓行或漸頓行相雖別何妨三同雖曰三同何妨行別故知此三知圓理同而行相小別當知南嶽唯授天台圓頓之理約行須以漸不定助三明借名申義者止觀第六從假入空破法徧文末明開權云若爾何用前來種種分別但凡情暗鈍不說不知先誘開之後入正道故法華云雖說種種道其實為一乘若得此意終日分別無所分別涅槃名為復有一行是如來行法華名為正直捨方便但說無上道大品名為一切種智知一切法淨名稱為入詹蔔林不嗅餘香華嚴稱為法界即是圓教四門意也輔行云若爾下開權也先徵起次正開三引證若爾只應引法華文以證顯實何須復引大品淨名答彼部中實不殊法華所顯實同故得為證既引法華開諸權已淨名大品何權不開故開彼權還入彼實即是法華權意本意也今謂約教顯實雖則是同約部乃成兼帶之異既引彼為證故知乃是借於權名申於實義以此正是開會引證之文故也引淨名文本是天女訶身子文故知乃是引於方等斥奪之名申今開權絕待之義也引餘三時類此可知者淨名既是斥奪之名當知大品即是融通之語華嚴乃是隔小之談文句記云華嚴法界隔彼聲聞斯之謂矣約圓教雖實約兼別仍權既引彼為證當知乃是借彼權名申今實義是故於彼即是兼但對帶於今即成開會廢等文中不引第二鹿苑而今言三時兼但等者乃是文勢相帶來耳又前序中引華嚴云娑伽羅龍車軸雨海引淨名云入詹蔔林不嗅餘香引大品云以一切種智知一切法當學般若以證圓頓止觀且圓頓止觀豈非開權絕待之義邪四明借喻轉譬者止觀第四卷現行印本正修之初云以觀觀昏即昏而朗以止止散即散而寂如豬揩金山眾流入海薪熾於火風益求羅耳輔行云如豬揩下為依解起行立譬譬向寂照之止觀也上二譬止下二譬觀謂動散倍增彌益止寂昏暗彌盛倍益觀明豬揩譬止行大論釋忍度中云若人加惡如豬揩金山金體益真今譬安忍三障四魔轉增其寂又第二卷體相中引盲人問乳等譬輔行云此中四譬譬執者迷名經文本譬外計邪常諸文引用並同經意此文借用其意稍異雖異彼文理亦無失依義不依語是故轉用何者貝聲雖虗體是實故可喻有門米粖柔輭可喻空門雪有非有是故可喻亦空亦有鶴飛在空而不住空是故可喻非空非有物類而以者以字誤也應作已字已者止也火譬瞋者如云瞋恚之火也譬智者如云智慧之火也用照則暗不生用燒則物不生形謂形相紅赤性謂自性熾熱體謂體質用謂燒照火既轉用為譬不定地水風等轉用亦然故淨名疏云但經論隨緣或時火譬貪欲水譬瞋恚風亦不定今一往從多故如前對之通則何所不譬云云言如前對之者疏前文云因中四分者一往分別三毒對三大疾三處等起故名等分生地大病貪欲對水經云愛河洄澓沒眾生無明所盲不能出愛能潤業如水潤生瞋恚對火瞋心一起燒滅善根愚癡對風以愚癡故則有四倒經云四倒暴風能偃山夷岩地具三分如水火風俱集一身故以對之又由四分感成報身即有生老病死故下文云有生死即有病此患亦由四分而生如瑞應云貪欲致老瞋恚致病愚癡致死義推應云等分致生云云五明傍引辨異中云若證漸初及偏小等則名義兼借者以此二論但是漸初偏小三藏空有二門故也如止觀第六破思假位中引成論明十六心正是初果位異部明十六心是修道位輔行云成論之外並屬異部諸阿毗曇並明見道在十五心如信法二行文初者止觀第五安心文中明凡師教他安心中明他機有二種一信行二法行引薩婆多明此二人位在見道因聞入者是為信行因思入者是為法行曇無德云位在方便自見法少憑聞力多後時要須聞法得悟名為信行憑聞力少自見法多後時要須思惟得悟名為法行若見道中無相心利一發即真那得判於信法之別然數據行成論據根性各有所以不得相非今師遠討源由久劫聽學久劫坐禪得為信法種子世世熏習則成根性各於聞思而得開悟輔行云汎引二論以出同異非用論意彼在小宗各依一門未為通方徧被之道如毗曇云鈍名信行利名法行云云數人即是薩婆多師是則止觀信法文初但引數人及成論耳而輔行中方引毗曇故也五陰王數同時異時者止觀第四現行印本下去第數準此思之觀陰入界文初云數人說五陰同時識是心王四陰是數約有門明義故王數相扶而起論人說識先了別次受領納想取相皃行起違從色由行感約空門明義故次第相生輔行云兼示二論不同之相云云此亦但舉數人成論耳但為辨異非借名義者即兼示二論不同之相及汎引二論以出同異非用論意也六明開總出別中言本文者四悉本文出乎大論五味本文出乎大經三假本文通於大小故止觀第五破見假中引瓔珞經及釋論成論等明三假之義二空本文出乎大品及大論等言義含者總含於別也言開合者即總別也言義徧者總既含別故派總明別則開合義徧也四悉五味三假二空所出本文其義總含意趣該攝故止觀中派總明別種種說之義徧一切如四悉檀或約一法或約諸法或約有無或約事理或指世界為第一義或指第一義為世界或約一人或約多人信法安心種種不同云云或約相生明五味或漸或頓及不定等云云或約心明三假或約色明三假及依正大小等云云或約理觀明性相本自二空或約事觀明性相推檢二空於二空中復論生法二空及十八空等云云一一皆有開合之義言諸門者即四門也言諸教者即四教也教教四門四四十六門門之中四悉五味三假二空一一皆有開合之義是故謂之莫不咸然此乃但可總知綱格不煩一一具舉止觀下去準此思之可知七明引用宗要中言如法華等者迹門開權顯實本本開迹顯本此即法華一部宗主要義也般若融通濤汰加被空生身子說共不共般若等即是般若宗主要義也方等淨名會中彈斥聲聞菩薩及以經云佛以一音演說法眾生隨類各得解皆謂世尊同其語斯則神力不共法等即是方等淨名宗主要義也故今止觀隨便或引一句兩句當知乃是得彼諸經一部文心是以破古立念皆不失於經部之旨也言文心者如妙玄序王去聲中章安釋云蓋序王者敘經玄意玄意述於文心文心莫過迹本仰觀斯旨眾義泠然釋籤云一部始終不出二門迹本是故二門以文心立號如止觀發心初云積聚精要名之為心今之法聚以本迹為要如釋妙字本迹各十本迹二體其理不殊云云故知經心不過本迹云云法華文心既爾方等般若凖知既得經文之心故不失部中之旨也八明引用儒道者即儒流道流也漢書九流如補注中道流之言攝於此方老莊并西方外道也若破若立等者明出世故須破順世俗故且立又暫借其言故云立不用其意故云破如此則引用不違於釋氏之本宗也故止觀第六明世間法藥中引周孔五常又云我遣三聖化彼真丹禮義前開大小乘經然後可信又止觀觀三攝法之中第六攝一切教中云若觀心僻越順無明流則有一切諸惡教起所謂僧佉衛世九十五種邪見教生亦有諸善教起五行六甲陰陽八卦五經子史世智無道名教皆從心起輔行釋已然後乃云今為略知世法同異不煩廣出意在總知悉從心起又如止觀安心文中輔行釋云說法之相隨有相應即便引用或儒或小又釋止觀云以一其意引老子云天得一以清地得一以寧侯王得一以為天下正老子之意但以陰陽之道以為天地得一合君臣之道以為候王得一今廢彼理但借彼名以詮今理苦集得一謂滅諦因緣得一謂無明滅則行滅等六蔽得一謂至彼岸凡引俗典例皆如此不以名似將為義同者豈可以彼天得一以清等名似今苦集得一等言便將以為其義是同乎深不可矣又止觀云今時多有誇談莊老以道可道非常道均齊佛法不可說示檢校道理邪正懸絕愚者所信智者所嗤又如止觀第十明諸見過失中云周弘政釋三玄云易判八卦陰陽吉凶此約有明玄老子虗融此約無明玄莊子自然約有無明玄自外枝派源祖出此今且約此明得失禮制仁義衛身安國若不行用滅族亡家但現世立德不言招後世報云云粗徂古切麤毗也存謂略辨異同略謂不在委細九明借名略義中云借名者借名示相也略義者不委釋義也止觀第三明攝法中有六謂理惑智行位教又止觀第六明從空入假破法徧中有三一知病二識藥三授藥識藥中略為三一世間法藥二出世間法藥三出世間上上法藥世間法藥即五戒十善出世法藥始自一道增數至十乃至無量等出世間上上法藥亦約增數從一至十乃至恒沙等此則但是借名示相而已若更委悉開釋如上法門義理紙數千萬尚不可盡是故謂之太成繁廣略指上下準例可知者如初攝一切理中云理是諦法如上開合偏圓不同指上體相四科中第三境界中諸境離合又攝一切智中云諸智離合如前所說亦指境界中諸離離合又攝一切行中明慧行行行乃至四弘十八不共及四無畏等輔行云十八不共法至下助道中說三三昧三解脫至第七卷說六度如隨自意及助道中說故云略指上下準例可知也十明準例用義中云如教證二道本在別教者如妙玄明一諦境中引地持明地相明義說相似法約行教道地實明義說真實法約行證道又教門方便即教道明義約說教道說所證法即證道明義約說證道釋籤云地相謂地前迴向位中道觀雙流地相現前登地已去明真實法稱為地實初地即是初住故也又教門等者依教道義以四悉檀說登地法名為教道故知初地已上仍存教道若說十地已證之法即證道也凡釋別義多用此意具如止觀第三記輔行云前之兩教教證俱權圓教教證俱皆是實此並易明但別教中教權證實意稍難曉人多迷之使此別教其義壅隔是故今家借用地論教證二道以消別門云云今則通用等者即準例用義也故止觀第二舊本在第三明體相四科中第四明得失中云若圓望別別教教道兩得兩得即是自行化他俱是思議何以故教門方便云云若證道者即不思議也若圓教教證俱不思議何故爾至理無說為緣四說但有假名假名之名名即無生是故教證俱不可思議也輔行解釋如向略引又輔行釋第五偏圓中明四教各有觀教行證中云前之二教四法俱權別教則三權證實圓教則四法俱實又云教證之名亦可通圓未入初住名為教道若破無明方云證道若判權實與別不同借於地義以釋圓義故四念處云別教唯斷教道說故圓具二意教道云斷證道不斷是故當知教證二道雖則本在別教今則通塗用之正通於圓傍通前二又復皆有約證約說證是行證說是說教行證必有行教說教豈無說證綺文互彰是故謂之約證約說耳準望三觀立三止者即準例用義也止觀體相四科中初明教相中明三止云一體真止二方便隨緣止三息二邊分別止此三止名雖未見經論映望三觀隨義立名釋論云菩薩依隨經教為作名字名為法施立名無咎若能尋經得名即懸合此義也言三觀者即瓔珞經次第三觀也故體真止望從假入空觀而立方便隨緣止望從空入假觀而立息二邊分別止望中道第一義觀而立所言等者如第四三昧中歷精進善引舊云精進無別體但督眾行義而推之應有別體例無明通入眾使更別有無明今且寄誦經勤䇿其心以擬精進此即準例無明通別而用精進通別之義也次詳究文相文為二初標科次一者下解釋文為十初明隨相開合言隨相者如文所列隨事隨理等是也言開合者開則廣說合則略示一家立義文相皆然者即三觀等皆如是也初約三觀明事理等者事謂小乘隨事而觀理謂大乘隨理而觀亦可謂之真如唯識事理二觀法謂觀法名謂觀名行謂觀行證謂親證自謂自行他謂化他隨此開合故云通用三觀既爾四教四悉等例之可知然須結撮勿使浮濫等者謂雖開拓寬廣無窮皆悉通用然而必須收束結撮莫令三觀及四教等文相汎濫而無所歸若不如此是則徵召三觀等文無所憑託建立妙行不能施設矣若得今意者即隨相開合之意也本文淺深者即三觀四教等本文有小大偏圓淺深也則者法也即淺深是法則也縱即容切廣去聲者南北曰縱東西曰廣涯五佳切者水際也又魚羈切水畔也卷居轉切合也收束也示一心則卷權歸實者開權顯實則融萬法不出於剎那也從被物則開實出權者為實施權則分一道而成於無量也此如文句釋方便品寄言歎中前實後權乃是從實而舒權絕言歎中前權後實乃是卷權歸實耳行謂十乘觀行儀謂四種三昧智謂一心三智導者引也若無智導引則不能前進故駕以白牛良由於此也蕩謂遣蕩也若作盪字即滌盪也相著之言必兼三惑纖者細也微也毫者毛也也遺者失也不遺即不失也諸教因果者圓教則有真似兩因分滿二果前之三教思之可知歷謂經歷次第也然者語助也言始終者在因名始至果為終因果理同故始終無二也次明結示處所者處即所也一往分之例餘陰入在破徧文末及豎破法徧有六處示妙即結示處所也妙境中明說教大體等即立本文意也究而詳之結示處所亦名立本文意也例餘陰入在破徧文末者止觀第七卷初現行印本破法徧文末云前來所說但觀識陰作如此說餘四陰亦如是十二入十八界亦如是是名觀陰界入破法徧竟輔行問云應在第七卷末明十乘竟例餘陰入皆修十乘何故於此即例餘邪答以義便故從初至此單約識心從此已去乃至離愛具約五陰方成法相故通塞中既檢校諦緣諦緣必須具足五陰道品念處不可獨明一識陰故正助只是助於道品下三只是明於觀陰次位耳故須於此例餘陰入將餘陰入共為觀境又輔行第八云欲融諸法示觀境徧是故下文例餘界入豎破法徧有六處示妙者止觀云次明破法徧為三一無生門從始至終盡其源底豎破法徧二歷諸法門當門從始至終盡其源底橫破法徧三橫豎不二從始至終盡其源底非橫非豎破法徧豎則論高橫則論廣橫豎不二則非橫非豎輔行云隨文見者奈何迷深故一家釋義前總次別後還結撮歸於元意故示讀者預於文前遙點六處結撮要意一破見位後止觀云體假入空結成止觀義者諸見輪息一受不退永寂然名為止達見無性性空相空名為觀乃至云是為無生門通於止觀亦是止觀成無生門從假入空破見惑徧竟輔行云體假下次以止觀結之見息入空名止達見二空名觀通結前來一切諸見悉達即空此是第一節示妙旨也二破思位後止觀云若就圓教破思假位者初破見假正是初信從第二信至第七信是破思假八信至十信斷習盡華嚴云初發心時正習一時俱盡無有餘界外正習未盡此乃界內正習盡耳華嚴云初發心已過於牟尼即此意也云何過正習俱盡八相作佛此則齊矣三觀圓修此則過勝也輔行云此是第二番示文圓旨也三四門料簡中止觀云上無生門破假若得其意者乃是圓教之門非方便門也所以稱為破法徧輔行云上無生下總結用門本意此言依無生門者即前大經圓無生門豎破見思即豎而非橫豎皆攝一切若只豎破未涉餘惑若得元意本在圓融故於此中具列諸門破見思位先簡後會故圓四門皆達見思即是法界並具三諦恐人迷旨故於此中即示門意若得意者終日次第意非次第故云非方便門此即第三示文旨歸也四出假利益位止觀云二明入假利益者菩薩本不貴空而修空本為眾生而修空不貴空故不住為益眾生故須出故有從真起應法眼稱機輔行云欲明出假真實利益必在別圓初地初住此是第四示文妙旨故知明益正示文意故此法眼必非地前以不思議假而為法眼耳五結破法徧文後止觀云前觀法重沓既多恐人迷故約二觀後結破法徧也輔行云前觀法下示結徧意結徧應在中道文後如何於此預明破徧但後文明徧理數而然只恐見前空假二觀觀法重杳迷於文旨言文旨者向之重沓不出一心故於此中且先略示見思尚乃即是法性豈有塵沙在見思外豈有無明在二觀後三惑既即三觀必融此是第五示文旨也六修中觀文初止觀云生不生即不生生亦即不生不生自即不自亦非自非不自不生生即生不生亦是不生不生他即非他亦非他非不他不生不生即生不生亦是不生生亦是不雙非亦是不雙照輔行云生不生更牒前從假入空即不生生等是述文意自即不自等者重述前文次第行意意本在於不次第也依文次第空是自行即此自行即是化他即非自他不生生更牒前出假不生不生引後八中假中二文比入空說可以意得故以三文展轉相即使空成妙空乃至假中成妙假中此即第六示文旨也頻此六文殷勤指的顯露彰灼讀者尚昏儻沈密隱映如何取解此仍不論標章指意等直指文內有此六重耳妙境中明說教大體者不思議境中有三若性德境乃真如觀理即本自二空也若修德境乃唯識歷事即推檢八空也事理二觀知之者寡此且總示淺識聞之不須驚心具如下文廣明淵旨是故自他共離性相俱不可得若化他境有因緣故亦可得作自他共離逗物而說故止觀云當知第一義中一法不可得況三千法世諦中一心尚具無量法況三千邪雖四句冥寂慈悲憐愍於無名相中假名相說佛旨盡淨不在因緣共離即世諦是第一義也若得此意俱不可說俱可說若隨便宜應言無明法法性生一切法如眠法法心則有一切夢事心與緣合則三種世間三千相性皆從心起輔行云若隨下教門大體逗物雖用適時之變佛出世意教門大體皆是因緣和合乃生諸法故今復依大體而說故云無明法法性無明是暗法來法於法性如丹是藥法來法於銅等因緣和合有成金用是則無明為緣法性為因明暗和合能生諸法云云故知說教大體即化他不思議境四性生法中第三共生耳以單真不立獨妄難成真妄和合方有所為故也發心中則約圓斥偏者止觀云若但拔苦因不拔苦果此誓雜毒故須觀空若偏觀空則不見眾生可度是名著空者諸佛所不化若偏見眾生可度即墮愛見大悲非解脫道今則非毒非偽故名為真非空邊非有邊故名為正故云真正發菩提心也輔行云重釋誓相兼斥偏小初斥三藏次若偏下斥於通教鈍根菩薩次若偏見下斥別教教道亦兼通教出假菩薩未得真應猶同見愛二觀猶為無明所縛名非解脫今則下正明中道故雙非毒偽安心中義開三種者於其圓頓一心止觀復更義開三種止觀故也故止觀云若就三番止觀則三百八十四又一心止觀復有六十四合五百一十二輔行云若就下更歷三種止觀以結前數言若就者別立之辭文雖唯頓若更別約次第三觀則一一各有百二十八故著若就之言次第三合故立一心依前重舉故云又耳人見三番之後更云一心便謂頓等三止觀外更立一心謂此一心不關前頓今安心者依前妙境及前妙願故前文云須行填願則願行相稱故向安心若總若別並是圓頓填圓頓願更開對於次第三觀一一觀中皆具前來一百二十八對本一心乃成四番一百二十八合五百一十二人不見之妄生穿鑿道品中不出念處者四種道品中即相生道品也故止觀云道品有四一當分二相攝三約位四相生第四相生正是調適如修念處能生正勤正勤發如意足如意足生五根五根生五正生七力七覺七覺入八正是為道品善巧調適又云深觀念處是坐道場勤觀念處名四正勤云云大論云四念處中四種精進名四正勤四種定心名四如意足五善根生名為五根五根增長名為五力分別四念處道用名為七覺四念處安隱道中行名為正道故知初心行道用三十七品調養止觀四種三昧入菩薩位輔行云大論下引證道品並在念處是故道品初心並修通塞中元治能執者止觀云若不執觀空智慧則能破不如所破但破塞存通若同外道愛著觀空智慧宜以四句徧破能破如所破令眾塞得通輔行云雖不愛著能破之觀而猶愛著所破之惑故云若不愛著觀空智慧則能破不如所破是故但用破徧破惑故前破徧但用能破破於所破猶未悟者必於能所心生塞著於能生著觀法雖正著心同邪是故須破故云愛著觀空智慧是故須以四句三假破能著心使無立處破能著智如所破惑故云能破如所破也次位中勸修五悔者止觀云圓教次位於菩薩境中應廣分別但彼證今修故須略辨若四種三昧修習方便通如上說唯法華別約六時五悔重作方便今就五悔明其位相先知逆順十心而繫緣實相是第一懺常懺悔無不懺時但心理微密觀用輕疎黑惡覆障卒難開曉重運身口助發意業使疾相應更加五悔耳懺名陳露先惡悔名改往修來勸請者名為祈求聲聞自度直懺己罪淨名疏云二乘為涅槃但急斷結不懺宿罪身子罪故不見淨土菩薩達煩惱性不怱怱斷結急取涅槃但以懺悔為先淨諸功德故螺髻見淨即此意也菩薩愍眾行道故須勸請隨喜者名為慶彼佛既三轉法輪利益眾生我助彼喜迴向者迴眾善向菩提發願者誓也若無誓願如牛無御若能勤行五悔方便助開觀門一心三諦豁爾開明正信堅固無能移動名隨喜心即初品弟子位也云云安忍無著但在進功者輔行云安忍只是忍於五品違順二境令入六根違即是惡順即是善故止觀云那得薄證片禪即以為喜纔見少惡便以為憂輔行云文舉片禪少惡為違順之端故知違順未堪不應領眾故名譽等外障是輭賊當用外三術一莫受莫著二縮德露玭三一舉萬里煩惱等內障是強賊當用內三術謂即空假中也離愛只是離六根中相似法愛又次位者只是行之所階恐行者生濫故於次位中別出五品六根清淨勸勵行者令離障離愛既云離障離愛故知只是進功故安忍違順進功六根離相似法愛進功初住入住已去今所不論故諸經論初住已去多明輔佛化他之相不復委悉論於自行搜者求也索也宗者本也源者水原也宗源即是處所及立本文意也識者知也大綱者網上之大繩也大綱即宗源網目即諸文整者正也齊也存者在也立也釋籤云網中之要莫若綱維維者繫也白虎通云大者為綱小者為紀綱者張也紀者理也張理上下整齊一倫若羅網之有綱紀而萬目齊張也三明事理傍正中云如四三昧正為顯理傍兼治重者四種三昧能緣雖異所緣無別是故乃名正為顯理故輔行云四種三昧所歷事別若能觀觀無非一心所顯之理無非三諦期心悟理名之為正重障自除名之為傍重障不出四重五逆故常坐三昧觀於三道觀業重者無出五逆又半行半坐三昧中方等懺云犯沙彌戒乃至大比丘戒若不還生無有是處即懺業道文也法華懺云七眾犯戒欲一彈指頃除滅罪者應當修習此法華經隨自意三昧諸經行法如請觀音及七佛神呪經虗空藏經等莫不皆為滅除重業如十法界正示理具傍識淺深者陰境十乘第一觀心是不思議境中先明思議十法界邐迆淺深即傍識淺深也次明不思議境於一念中理具三千即正示理具也如識次位正為簡濫傍為通經者止觀中明三藏次位竟乃云此教初淺尚有次位豈有凡夫造心即言上位此非上慢推與誰乎由是言之暗證叨濫非適今也輔行云此教下斥濫也此科次位正為簡濫故來是故須斥三藏既爾通別圓三豈不然乎故云正為簡濫也止觀又云今有十意融通佛法一明道理寂絕亡離不可思議二明教門綱格頓漸祕密不定藏通別圓三明經論矛盾以四悉意開結融滯四明巧破執著單複具足無言盡淨五明結正法門對當行位權實大小賢聖不濫六明於一法門縱橫無礙綸緒次第七明開章科段鈎鎻相承生起可愛八明帖釋經文婉轉繡媚總用如上方法隨語消釋義順而文當九明翻譯華梵十明一一句偈如聞而修入心成觀今言傍為通經者即十意中第八帖釋經文也又十意中第六結正法門權實大小賢聖不濫即正為簡濫也破古為傍者則顯立今為正也文不可廢者若不存於古師之謬將何以顯今家之正是以破古文不可廢必須存之蓋以非顯是也四明文偏意圓中言如以三止觀結於諸文等者如前備引言文偏者即漸次不定也言意圓者正意為明圓頓也故前文云以大意中文略意廣故用三一收束結撮應知部內意唯在頓也及五略中所用三教諸境陰等十境十乘縱橫偏小等者亦如前引故前文云下文雖有四教八教思議不思議相待絕待皆為顯於圓頓一實也三種止觀皆緣實相等者漸次不定既皆緣實相當知漸等其文雖偏厥意乃圓也又止觀第一發心中約四弘顯是引證三諦之後釋疑文云若爾云何復言遊心法界如虗空又言無明明者即畢竟空此舉空為言端空即不空亦即非空非不空云云輔行云若爾下釋疑疑云若具三諦華嚴云何但言如空及大品中云畢竟空此舉下釋疑也文偏意圓不應偏難空即具三故云空即不空等何但空爾假中亦然具如下文喻疑顯正例中辨之云云五明廣略有無中云如發心中顯數則廣而文相略者五略第一發大心中列於十種一推種種理二覩種種相三覩種種神通四聞種種法五遊種種土六覩種種眾七見修種種行八見種種法滅九見種種過十見他受種種苦此乃即是顯數則廣也於十科中但約四教粗釋前四故云而文相略也又於十科中但釋前四後六略無指例而已故云其淨土徒眾修行法滅受苦起過等發心例前可解不復委記故云而文相略也後十法中文相則廣而顯數略者即後第七正修十乘第二發心中委明依境發菩提心及以圓斥偏等故云文相則廣也不列十科故云而顯數略也修大行中事儀則廣而十法略等者輔行云所言常坐乃至非行非坐者約身儀為名也修大行中既委明此故云事儀則廣也然四種三昧若從法為名常坐名一行常行名佛立半行半坐名方等法華非行非坐名隨自意輔行釋常坐三昧中云此去乃至非行非坐並粗準本經示觀門之語縱有似於十觀之相而文並約略未可以辨觀法始終初發大心及下三略亦復如是故此五章但名大意此文謹依兩經粗列文殊問文殊說兩般若經語簡意遠不可謬判若欲消釋必善下文十乘觀法方可離謬若據下文無四行相則下文成略今據觀法十乘未周則此中成略是故五略從觀略邊不從於事後三大章大意中有等者後三即是第八果報第九起教第十旨歸也大意中有即是第三感大果第四裂大網第五歸大處也輔行問云大章起教五略裂網云何得同答對揚利物名為起教令他除疑名為裂網起教本為除他疑網是故同也起教既與裂網是同果報旨歸豈可異於感果歸處故知後三大章大意中則有也廣解中無者五略九廣止觀序云雖樂說不窮纔至見境法輪停轉後分弗宣輔行云時逼夏終雖闕餘文行門非要略中已具足表期心即大章第七開為十境至第七境餘不復宣後三大章及餘三境託緣不終餘文雖略準上可知增上慢境如禪境云無所知人得此謂為無生忍四禪比丘謂為四果後之兩境只是兩教二乘三教菩薩具在體相攝法偏圓等文及諸境中可思議內後三大章亦準五略後之三略其文雖闕於義已足故託夏末以為闕緣信行圓乘於茲罷唱故云法輪停轉被行略周餘止不說故云後分弗宣十種境界正觀中有等者大章第七正修止觀中先列十境以為所觀一陰界入二煩惱三病患四業相五魔事六禪定七諸見八上慢九二乘十菩薩雖互略無義必通具者輔行云常坐觀三道常行觀佛相好方等觀尊容道具法華觀六牙白象隨自意歷善惡無記並是所歷事別且所歷之事豈非陰入以凡夫無始未曾離陰故陰入現前餘九待發故四三昧義必通具十種境界又輔行釋常坐三昧云於此文中然以義推十乘略足法界等名即妙境也為化眾生即發心也繫緣一念即安心也觀於三道即破徧也歷一切法即通塞也而修佛道即道品也觀於業苦即助道也識觀不濫即次位也次位之中兼於餘二安忍離愛下三三昧意止觀文附事雖略若以義說準此可知又發心中文相雖略義必通具故須委明依境發心及以圓斥偏等又十法中顯數雖略義必通具亦須委顯十種之數也輔行問云應先起誓後觀妙境何故境後方云發心答境前非不發心具如五略中意今發重為成觀故須緣理益他也六明文行不同中云如十境十乘生起次第者止觀云陰境在初具於二義一者現前二者依經大品云聲聞依四念處行道菩薩初觀色乃至一切種智因觀陰果動煩惱因大分俱觀致有病患因觀三境則生諸業惡業欲滅魔懼出境則生魔事若過魔事則有功德故生禪定禪有觀支邪慧猛利故生諸見見心暫息未得謂得故生上慢見慢既靜小習忽起故生二乘若憶本願雖不墮小則生菩薩輔行云由觀陰入生下九境能所相扶次第出生而成十意然此生起且附文相一家著述凡立章門無不生起若依下文十境互發則無復次第止觀云既自達妙境即起誓悲他次作行填願願行既巧破無不徧徧破之中精識通塞令道品進行又用助開道道中之位己他皆識安忍內外榮辱莫著中道法愛故得疾入菩薩位輔行云生起次第今文可見四念處中以初四法皆共成於上求下化故彼文云上求不思議境觀於煩惱即是菩提於此煩惱上求菩提無別求也生死涅槃亦復如是為欲下化應須發心即發弘誓我以何法上求下化應須安心莊嚴上求以此定慧能度眾生名為下化若無上果下化不成故知果成由於破徧若破不徧須識通塞下去生起與今文同以此而觀前之四法用無前後通塞等三成就前四次位等三以判前七能善用者十如指掌今文但列十境十乘生起次第而不說其無復次第異同之相故今乃引輔行之文以顯今文耳十禪淺深者止觀禪境中列十種禪一根本四禪二十六特勝三通明四九想五八背捨六大不淨七慈心八因緣九念佛十神通又云次明深淺不同者四禪是根本暗證味禪凡聖通共薄修即得特勝少有觀慧不味不暗證橫對念處豎對根本故先味次淨通明觀慧證相深細細次於總此三同是根本實觀治惑力弱九想正是假想初門前鋒伏欲故次列之九想但厭患外境未治其心故次背捨背捨雖破內外貪欲總而未別緣中不得自在故次明大不淨破依正貪也雖總別治貪未修大福德故次慈心雖內治重貪外修福德不入因緣則非世間正見故次因緣三世輪轉無主無我成世正見雖世正見緣底下因人福力微弱次緣上果福力廣大雖前來諸定未有力用轉變自在故次神通輔行云次明深淺者即是十門生起次第初明根本何故特勝次根本來乃至神通次念佛來前淺後深故云深淺亦名十門各有來意豎破法徧文雖次第行必隨人者謂豎破法徧之文雖則先空次假後中若論其行必須隨人以寄次第顯不次第故也故下即云豎破元為顯於不二然則雖為顯於不二何妨約於文相次第所以又云或隨豎次入何障於理即不障於真俗中道三諦之理也此則雖有橫豎而非橫豎雖非橫豎而橫而豎故雖次第而不次第雖不次第而次第宛然也十禪何必自淺階深者重徵上文十禪淺深未必全爾亦是行必隨人前後無在也而止觀中乃云深淺者且附文相生起次第耳然雖前後無在不妨生起次第故下即云自淺階深妙觀斯在斯者此也在者存也階者級也梯也如梯之等差也七明待絕前後中云若約教相必先待後絕者先約相待判妙異麤次約絕待開麤是妙此二亦名廢麤開麤判今法華唯具二妙法華已前雖有圓實都無待絕問待絕俱絕方名為絕何故謂之待絕二邪答若明絕待故須俱絕若明經意故須雙明經意雖雙理無異趣以此俱絕對前稱待所待未會會方名絕是故法華得二妙名由待知妙妙體是絕絕亦無寄妙體無二若論道理待絕俱時者待絕既是廢麤開麤釋籤乃問開廢何別答約法乃開時即廢約喻必義須先開若爾法喻差違何成喻法答據理似與喻有違據事似先開後廢如先示方便即是真實既識實已永不用權若約理者開廢俱時開時已廢故也止觀既是法華妙行所以釋名論待論絕又輔行釋偏圓五科權實中云問玄文諸義並先開後廢如向所引何故先廢後開止觀之中先廢後開答玄文約喻如世蓮華必先開後落此從法便故先廢後開既廢權已實則可見義之如開又此廢文與彼稍異彼約法華廢前權部權教復須開前權部權教今約諸文展轉相廢猶似未開故在開前今具二義故廢在前又廢同於待開同於絕待前絕後未失常規故知若順蓮華三喻則須先施次開後廢若唯論妙法則先待次絕故開廢次第及待絕前後義在於此又釋籤云若不論待無以明絕若明待已即指所待是於能絕能絕亦絕方名為絕八明破會不同中云若依化儀必先破次會等者此文可解故今偏圓借彼釋名次第則別者即前所謂乃至偏圓文中具引蓮華三喻釋名也止觀輔行如前備引玄文判教凡有釋義破既居先今文借用三喻釋名破乃在後是故謂之次第則別何者以由先施次開後廢後廢即是破義故也故此與前待前絕後不可雷同矣故文句引光宅釋開方便門示真實相云昔鹿苑機雜盛說三藏未明一理爾時以權隱實一理為權教所閉今王城赴大機顯於真實真實既顯則廢除昔教昔教被廢故方便門開一理既彰則真實相顯章安斥云此解乃是破於方便非開方便以此證之廢權即是破權義也九明行解不同中云如五略生起者止觀云云何發大心眾生昏倒不自覺知勸令醒悟上求下化雖復發心望路不動永無達期勸牢強精進行四種三昧雖不求梵天梵天自應稱揚妙報慰悅其心種種經論開人眼目融通經論解結出籠若知法界無有始終豁然大朗無礙自在生起五略顯於十廣良以五十不出自行因果化他能所故也分別十章者止觀云分別者十章功德如囊中有寶不探示人人無見者今十章幾真幾俗幾非真非俗幾聖說默非說非默乃至云幾橫豎非橫豎如是等自在作問輔行云始從真俗終至橫豎略以十門分別十章引證破古問答料簡者料簡即是分別十章文後料簡一科也彼料簡中最初問云略指大意同異云何云云引證破古即是序中引證三種止觀及釋疑之文故疑者云諸法寂滅相不可以言宣云云破云但引一邊不見其二云云又引證破古問答料簡亦非一向局在序中應須徧該一部始終尋之可見不煩委示多為生解者以止觀云前六重依修多羅以開妙解故也若爾引證破古等且須約於開解之文云云若十法總別乃至專在於行者以止觀云今依妙解以立正行故也十法總別十境互發十境發相至下大章總別例中具引示之十禪離合者離者開也止觀禪境中云此十門十門即是十禪與五門十五門但有開合之異耳開五為十者開數息出特勝通明開不淨出背捨大不淨慈心因緣守本念佛門毗曇名界方便禪經名念佛此亦守本神通約九禪上發不專據一法輔行云五門即是五停門也十五門者於五停門各開為三故成十五止觀云合十五為十者數息不淨各有三則不合慈心有三但合為一即眾生慈也沒其二名者禪是門戶詮次事法法緣是二乘入理觀無緣是大乘入理觀沒理去二存事唯一若開者即屬二乘菩薩兩境攝因緣亦三門三世輪轉麤果報一念細細故附理麤故屬事沒細存麤但稱三世門也念佛亦三但取念應佛耳神通但取五通若但取五門有所不收若取十五義濫於理是故簡理開事雖開合不同各有其意十明舉例從略中云如道品攝法假中空例等者以一例字通結道品攝法假中空也又亦可云例破餘陰也今且從於初意消文止觀調道品中云諸道諦三十七品今不具記前三教道諦也但明無作道諦三十七品成於一心三觀之義又於無作三十七道品中但釋一界四念處餘九法界但云亦復如是輔行云先約一界次以九例此即舉例從略也止觀攝法中初攝一切理指前諸諦開合次攝一切智亦指前文諸智開合乃至攝一切教中但略舉其名數而已此即舉例從略也止觀破法徧文末料簡云問入假中有因緣入空何意無答入空亦有略故不說耳何者謂為解脫故為脫他故為慧命故為無漏故為法位故夫生死縛著勞我精神非空不解自既有縛能解他縛無有是處為脫他故應須入空賢聖以慧為命慧命非空不立諸神通中無漏通勝為勝神通故應須入空又法位非慧不入空慧能速入法位入空因緣甚多例後故說五耳輔行云自脫同大悲脫他同本誓慧命同利智無漏同方便法位同精進同謂同於入假一一細會令義相當假在空後故云例後欲以前後一例五緣故亦五耳故今謂之假中空例中字但是語助而已此即舉例從略也破餘陰餘使餘品以例初品者止觀破法徧文末云前來所說但觀識陰作如此說餘四陰亦如是十二入十八界亦如是所以不言例初陰者以五陰之次色陰在初故也又為止觀以十二入十八界例於五陰故也餘使餘品者若通而言之品亦無使故法界次第中以見思二惑名九十八使使以驅役為義以能驅役心神流轉三界故也品者類也眾庶也今從別說故分使品以對見思是故止觀破見假中但名八十八使破思假中乃云八十一品若破見惑例餘使者如破單四見中有見八十八使既乃如上次破其餘無見亦有亦無見非有非無見等八十八使亦例前可知今文不言以例初使者以單四見等皆具八十八使故也破思惑餘品言以例初品者止觀明破貪欲云初品既爾後八品亦然又云破貪欲九品既爾破瞋癡慢九品亦然例自可解不復委記輔行云初品下明餘品亦有三假例初品說破貪下餘使亦例若準此文使亦是品以例初品即是初使也相續相待以例因成者此亦是破思假中之文也初約因成假破竟次破相續相待文中但云例前可解又云相續相待亦如是則細尋廣意以申餘文等者總結舉例從略之意也謂雖舉例從略然則必須細尋上文廣意以申餘之略文為避煩文是故舉例不可專廣暗於略文故須以廣而申於略歷一一法須先思之是故臨文方乃不昧觀行妙旨若十法成觀者輔行云觀法非十對根有殊雖復根殊但是一不思議觀觀不思議境乃至離愛不離境故故此十觀文十義十根三意二分遠近故近期初住遠在極果又次位下三雖非觀法並由觀力相從名觀故名十觀又備此十令觀可成故名成觀亦名成乘思之可見但於陰入委識根由者觀陰入境明十乘妙觀始從第四卷中終至第八卷現行印本即是委悉識其根由也識謂別識根謂根本由謂端由餘九待發方可設觀者止觀云陰入一境常自現前若發不發恒得為觀餘九境發可為觀不發何所觀故九境中但分別境者謂止觀中但是委悉分別煩惱病患等九境相狀也境下十觀不細委分者謂止觀中觀下九境十乘妙觀若望觀陰十乘妙觀則下九境十乘妙觀稍是簡略也但隨境轉照非關廣說者即是辨於九境十乘簡略之意也所以九境十乘簡略者意明但是隨下九境發時便將上文陰境之中十乘妙觀轉用照了而已故不委示之非關廣說也舉例從略不其然乎
