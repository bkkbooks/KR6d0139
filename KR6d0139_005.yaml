body:
  text: 永嘉沙門釋從義撰內心若淨下次明內心觀成歷法䐇合者修觀次第既先內心是故內心妙觀若成方乃清淨故用內觀清淨之心歷於行想受等心數及以色等依正諸法任運䐇合皆同清淨以由初心發觀之時去丈就尺去尺就寸唯觀心王故今心王觀成乃歷心數及以色等依正諸法無不清淨也既是內心觀成歷法豈非從於五品已去故止觀明初隨喜品一心三諦豁爾開明如臨淨鏡遍了諸色於一念心圓解成就不加功力任運分明初品既爾後品已去節節勝前是故當知以此淨心歷一切法不得濫同唯識歷事又亦不可濫作外觀觀色而說往人未曉誠可悲哉次又亦下次示妙解修觀之人必先妙解次方用觀今先明觀次示解者但為問中問於立觀是故先答修觀次第必先內心故今方乃示其妙解既云又亦先了萬法唯心方可觀心豈非據義必須先解次方立行乎了者解也不二門云所言內者先了外色心一念無念唯內體三千即空假中即此意也能了諸法則見諸法唯心唯色者上句既云又亦先了萬法唯心故今應云則見諸法唯是心耳言唯色者蓋是文勢相帶來耳又恐文意以內例外四念處云非但唯識亦乃唯色即其義也言唯心者唯者獨也心外無境故曰唯心唯心既爾唯色準知當知一切由心分別諸法何曾自謂同異者即前所謂由心變故謂內心外色也而其諸法何曾自謂有同於心及異於心邪是知心若無所分別深造七到切根源則心非內外故色無內外矣金剛錍云故達唯心了體具者焉有異同即此意也次引占察經證文為二初正引文言占察者彼經中說滅後四衆於世出世因果之法未得決定信不能修學於三乘中皆無定向若有種種諸障礙事當用木輪占察善惡宿世之業現在苦樂吉凶等事善惡業報木輪相者先當剋木如小指許使長短減於一寸正中令其四面方平自餘向兩頭邪漸去之仰手傍擲令使易轉其輪有三差別不同如經廣說開皇三寶録云占察經二卷檢羣録無目而經首題云菩提登在外國譯似近代出今諸藏中並寫流傳大唐天后朝萬歲元年勑佛授記寺沙門明佺等刊定編入正經又今家所引乳光經像法決疑經初教經九十六道經淨度三昧經妙勝定經清淨法行經提謂經等羣録或謂是僞至天后朝勑明佺以淨度三昧經等入藏故知諸師撰集目録去取真僞一切依情觀有二種者標也一者唯識二者實相者列也實相觀理唯識歷事者釋也下文云從理則唯達法性更不餘塗即此所謂實相觀理也從事則專照起心四性叵得以問顯答須兼四運即此所謂唯識歷事也既引占察二觀為證故知前文修觀次第必先內心乃是總示事理二觀先觀內心故使下文料簡問答乃云觀心有事有理故不可云內觀屬理外觀屬事也次事理下點示不二達前二觀二而不二是故名為事理不二故下文云亦名本末本末相映事理不二也稍者說文云出物有漸也開者明也從初品已去漸漸開明故云稍開也是故若能了達此意方可與之論議觀道也然雖如是解者亦稀故須點示方堪進行言唯識歷事者占察經云唯心識觀於一切時及一切處隨身口意所有作業悉當觀察知唯是心勿令於心無記攀緣既言唯識何故經云從是當得色寂三昧須知觀察知唯是心則於色界及諸外境不起分別所以經云色寂三昧非謂事觀但觀外色不得觀心也唯心識觀既乃歷於一切時處三業所作一切之事觀察推檢方乃開悟是故唯識名為歷事須知歷事其名稍通今此乃是歷於四運四性之事故名歷事耳與夫託事觀等歷事稍異也何者輔行云然歷事觀法經論皆爾非獨今文如大經云頭為殿堂等法華云忍辱衣等淨名云法喜妻等大論中師子吼等槃特掃帚支佛華飛並是託事見理之明文也此豈非是託事觀之歷事邪況託事觀歷於王舍耆山等事最為顯著宜熟思之輔行又云常坐觀於三道常行觀佛三十二相方等觀於摩訶袒持尊容道具法華觀於六牙白象隨自意觀於善惡無記等並是約於所歷事說此豈非是從行觀之歷事亦兼託事觀之歷事乎兼於託事觀之歷事如向所引大經云頭為殿堂等是也況附法觀乃是歷於法相之事若不爾者釋籤那云隨聞一句攝事成理邪故知歷事其名稍通通於從行託事附法三種觀相亦通真如唯識二觀以四三昧皆歷事故四種三昧既皆歷事而輔行云又觀四運者是隨自意中隨自意三昧有四科一約諸經二約諸善三約諸惡四約諸無記從第二約諸善去乃以四運四性推檢故云隨自意中也從末從事而修觀法唯識歷事名末名事也如常坐等或唯觀理謂一切法無非法性真如觀理名本名理也豈非歷事通於四種三昧及真如唯識二觀邪歷事既通真如唯識今文那云實相觀理唯識歷事然須了知常坐三昧等於所歷之事直達真如實相之理便能開悟不巡四運四性推尋是故名為真如觀理既是歷事直達真理則非偏指清淨真如若乃於其所歷之事具以四運四性撿察然後開悟方乃名為唯識歷事故知唯識名為歷事與託事等名為歷事義必區分不應參濫也言實相觀理者占察經云真如實觀思惟心性不生不滅以能超過無色四空心及心所二俱寂滅是故經云心寂三昧非謂理觀但觀內心不得觀色也真如實觀既乃先知唯心所作不待檢後方始開悟所以真如名為觀理故利根人修真如觀鈍根之人習唯識觀以鈍根人不知心性不生不滅故染著情厚數起蓋纏若非一一推究研窮何由開悟利根反是心性寂然萬緣頓息便能通達由是而知事理二觀發軫雖異及其悟理則無差降也此約利鈍兩根各從一門而入作如是說若論本末相映事理不二須知止觀十法成乘問或云事觀定約第四三昧觀於四運理觀定約上三三昧不推四運此義云何答荊溪但將四種三昧約義斟酌會同占察經中真如唯識二觀耳不曾定判也故輔行云今文觀於十界四運義當占察一切唯心既云義當奚嘗局判以占察經中元無四運之名但云一切時處三業所作悉當觀察知唯是心今止觀中既約四運一一推窮方乃開悟豈非義當占察經中一切時處三業所作悉當觀察知唯是心故第四三昧觀於四運也輔行既云如常坐等或唯觀理或之一字豈非不定且常坐等或云諸法即是法性豈非占察經中思惟心性不生不滅故常坐等或唯觀理偏得理觀之名非謂理觀定判在於常坐等三三昧也問事觀若乃不局在於第四三昧中觀於四運莫是事觀亦通上三三昧乎又復理觀若乃不定屬常坐等莫是理觀亦通隨自意中乎答事理二觀其實通於四種三昧何者以今下文料簡問中既云諸法即是法性又云四運四性檢以問顯答不應差殊是故答中謂之從理則唯達法性更不餘塗即是問中云或云諸法即是法性也從事則專照起心四性叵得即是問中云或云四運四性推檢也是知事觀四性必須兼於四運俱是答中文體窄故略云四性耳事觀既兼四運四性豈非四種三昧皆通事理二觀乎美哉以常坐十乘中或云諸法即是法性或云四性推檢叵得故十乘中初觀心是不思議境此境有三第一理境一念三千非一異等豈可不是實相觀理次修德境四性推檢豈可不是唯識歷事三化他境但是化他三千赴物耳初乘既爾餘九準知文句記云若本自二空即是性德豈非從理則唯達法性更不餘塗是性德境邪若推檢入空即是修德豈非從事則專照起心四性叵得是修德境邪又云知者照也具如止觀不思議境一念三千非自他等須知理觀乃是直照陰心即理頓忘自他即止觀云非一非異非縱非橫以縱橫等不出自他四性故也人不見之乃云理境不亡自他良由未思真如觀理本自二空頓亡四性不待一一推檢四性然後方悟者也性相俱泯是故名為本自二空即是性德不思議境事觀乃是巡檢四性一一照察方破自他性相等執所以名為推檢入空即是修德不思議境是則文句記云知者照也具如止觀不思議境一念三千非自他等其實通於理事二觀性修兩境人不見之乃云專指修德境者謬之甚矣一念三千非自他者理觀則直了一念三千妙假非一非異即空即中是故名為非自他等事觀則歷於自他四性一一推檢一念三千妙假然後方悟即空即中是故名為非自他等況文句記云今家依於智論中論準理準義緣於心性立此二空準理豈非實相觀理本自二空即是性德準義豈非唯識歷事推檢入空即是修德若不爾者輔行那云今文準經以義開拓委作觀法故於四大各以四性推令如空故知準義委作觀法即是唯識歷事推檢準理乃是唯達法性實相觀理更不餘塗人不見之誠可悲矣況發心中云一苦一切苦一樂一切樂安心中云但信法性不信其諸豈非皆是實相觀理唯達法性更不餘塗若破遍中既委作觀法具推四性豈非唯識歷事專照起心四性叵得破遍中云如是四句即是觀門若離此四無修觀處此約事觀作如是說人不見之一向永執悲哉悲哉通塞已去隨文思之準例可解故止觀中明十乘畢乃云端坐觀陰入如上說輔行云所言端坐豈隔餘儀四三昧中常坐居首是故先明常行等三亦可通用常行等三既皆通用常坐十乘而十乘中或云諸法即是法性或云四性推檢叵得豈非四種三昧只一十乘妙觀而理事兼通乎且十乘妙觀既兼通理事則亦名本末故本末相映而理事不二其在於此矣然須了知約四性推檢則通四種三昧約四運窮研則但在於隨自意中耳雖分四運四性之殊莫不皆是唯識歷事也故止觀明第四三昧歷善惡中不獨檢於四運亦乃推於四性四性推檢通四三昧其義更明故止觀中云有無雙亦及以雙非內外中間常自有等即是自他共無因等四性故也況輔行云若其具出轉計之相至第五卷三假四句具足推之若爾豈非破法遍中推於三假四句叵得方悟二空乃是唯識歷事之觀若謂第四三昧但約四運為事觀者文中何故亦破自他內外性相輔行何故指破遍中三假四句以此觀之修德境中推檢四句性相叵得乃是唯識歷事明矣性德境中直達陰心無一異相乃是實相觀理明矣若不爾者止觀明於修德境中何故問云心起必託緣等邪輔行何故云今此正推一念起心邪此與下文專照起心名為事觀不亦同邪人不見之妄授他法此時人情雖則和合長劫受苦他孰代之又輔行釋歷諸善中云心無前思等者念念稱理無橫計思後方覺了故起信云覺知前念起惡能止後念令其不起雖復名覺即是不覺思即法界能覺者誰雖是不覺即名為覺此非理觀唯達法性更指何邪輔行又釋歷諸惡中云欲心才破妙境宛然事助尚須正助合行況此推窮寧不即理即理之時方見四運心性真如又推無記與記同異即見無記法性之理又云但觀貪欲即是法性又觀九界四運即是佛界四運仍觀佛界四運不出九界四運方乃名為不思議境仍須發心乃至離愛方成一家入道之相必須十法和合成乘故十乘妙觀不獨歷事推檢亦須唯達法性以四種三昧只一十乘故也是故十乘但於常坐陰境廣明而下之九境及常行等三亦皆通用是則但以十法成乘隨發隨義轉照而已非關委示也如是方見十乘妙觀本末相映理事兼通若不爾者何異驢車且夫圓觀不明尚以三教為助豈可實相觀理不假唯識相資安有唯識推尋不藉實相而顯是故但用十乘則無所不攝矣本末相映理事不二斯之謂與此義稍細不可粗心淺學未知勿生疑謗自杜觀門塞他正路斷佛種性為旃陀羅十一料簡安心中云體其實不起滅妄謂起滅文為二初問體者達也故止觀云體達既成也此約止而說也其者語辭也亦指召之辭也次答中云若單論理非起非性者理本寂滅一法叵存誰起誰滅何性何修若謂有性還成有待故前文云是諸法性本無名字即此意也理尚假立事豈存乎若約果德則性不妨起者果德即是果上之德全體起用普現色身依正融通也若約衆生唯起迷性者即是衆生以我執取故唯生無佛也若聖鑒凡聖字之上合有約字即起只是性者鑒者照也照於衆生所起迷性迷性乃是性分之性金光明云心識二性即此意也即是真如妙性也今從反迷歸悟以說令離起歸性見非起性等者正明於止總安心意體諸顛倒即是法性雖顛倒起滅不信顛倒起滅唯信此心但是法性即是反迷歸悟離起歸性也對所離之起說所歸之性能離能歸皆由止觀則有起有性今既離起性亦自亡是故名為見非起性故止觀云體達既成不得妄想亦不得法性亦如下文對華說空空無名字又復仍恐迷教之者離妄起外別求其性是故乃令體達妄起其實不起全是法性更無別性斯猶達冰其實無冰全是於水更無別水起既不起全是法性滅亦無滅全是法性不待滅後別有法性是故名為起既不起滅亦無滅也十二料簡安心行相六十四番文為二初問意者即是問於止觀中云又一心止觀復有六十四番也如前具引次答中云約根約行者根謂信法根性故止觀云今師遠討根源久劫聽學久劫坐禪得為信法種子世世熏習則成根性各於聞思開悟耳能生名根不改為性行謂信法二行從他聞法開悟即是信行內自觀法開悟即是法行故此兩種根性之行各有止觀四悉安心二八乃成一十六番言回轉者即回法行轉為信行又回信行轉為法行一十六番成三十二化他既爾自行亦然成六十四言相資者以聞資法以坐資信其間亦有轉不轉等三十二番亦有化他及以自行三十二番成六十四并前乃成一百二十八番之心今文但言六十四者義兼兩番六十四也行者何必盡具諸數者止觀云若心安於諦一句即足如其不安巧用方便令心得安一目之羅不能得鳥得鳥者羅之一目耳又論其體性只是約於法性寂照自在堪用故爾許耳者總安別安皆依前文法性妙境故開總出別隨事雖則不同論其體性依境安心只是約於止觀同依妙境之體法性圓具寂照定慧隨人根性自在堪任約四悉檀用於止觀故有爾許六十四番安心行相耳豈徒然哉良有以也是則不可專執一句而得心安便謂不須六十四也何哉止觀云衆生心行各各不同或多人同一心行或一人多種心行如為一人衆多亦然如為多人一人亦然故須廣施法網之目捕於心行之鳥耳故大經云是諸衆生非唯一性一行一根一種國土一善知識是故如來為彼種種宣說法要以是因緣十方三世諸佛如來為衆生故開示演說十二部經今人不知乃以自行一句入道斥於廣學多聞法要開示一切豈不誤哉十三料簡理觀唯達法性事觀應須推檢文為二初問即此文中或云諸法即是法性者如前文云破昔計故約對治說令於諸法純見法性又云體妄即是法性或云四運四性推檢者即前第二番料簡十界四運及第四番料簡中云心非內外故色無內外既無內外亦無中間及常自有豈非四性叵得之文邪又前文中但簡四運而自他等四性檢檢已在其中若不爾者何故止觀推四運中亦言自他內外等邪何者為要者恐人不知妄生去取故問此二何者以為的要之門次答意者此二皆是入道之門不可於中妄生去取故輔行云修三昧者於此二塗一不可廢但隨根性所尚不同或宜思惟心性之理不生不滅謂一切法無非法性而得開悟或宜觀察一切時處三業所作未欲等運自他等性並皆叵存而得開悟或思惟心性不生不滅未能通達而滯諸法必假四性推檢而明或觀四運不知心性本自寂然必籍唯達法性而顯如安心中信法回轉相資之例可以意得是則但舉十法成乘而理事二塗無所不攝矣本末相映不其然哉委如向說宜熟詳之問若云理事更互相映文中那云更不餘塗答此簡理觀異於事觀是故謂之更不餘塗故知理觀但觀心性本無生滅降斯已外則非實相觀理之觀是故謂之更不餘塗若更餘塗便同四運四性推檢人不見之往往異論十四料簡法華玄文境能照智文為二初問法華玄文境能照智雖引誠證理亦難明者玄文第三現行印本明智妙中初總明諸智有六第四明智照境云若由智照境由境發智四句皆墮性中如別記釋籤云如止觀第三及淨名玄等說若離性過皆不可說故云如別記也今謂此約第一義中一法不可得是故若云由智照境是他性境由境發智是他性智境不由智是自性境智不由境是自性智境智因緣故智境智因緣故境則是共性若謂不爾自然境智名無因性故此四句皆墮性計並有過失何者第一義中一法不可得何故乃作由智照境四句而得以有得心解於大乘圓頓法門無有是處宜熟思之不可謗法若四悉檀因緣立境智但有名字釋籤云次明為他隨機遍立四悉因緣可作四說如止觀第五記今謂此世間俗諦故無名相中假名相說無妨約於自他四句方便適時故下文中明不思議境智相照等皆是約於世諦而說即是隨順世間而論境智相照成不思議耳例如佛本無身無壽亦無數量但是隨順世間而論三身三壽三量耳此語虗玄亦無住著如病除已即可進食食則消化若不爾者根本見慢既乃未除更加新封豈不猶如長冰添水愈增凝結何由融散邪問智能照境境亦能照智不釋籤云先問中云智能照境如常所論境亦能照智不者為顯不可思議故有此問也答若作不思議釋更互相照義亦無妨仁王般若云說智及智處皆名為般若譬鏡面互相照亦大地一能生種種芽亦能生地一且置斯義釋籤云答中有三先正答次引證三舉譬初正答者還依不思議答故能相照何者智既是心境亦是心既俱是心俱是法界心心相照有何不可次引仁王證成相照智處是境當知境智俱名般若故得說境及境照俱名為實相三舉譬者鏡面如文地生芽如境生智芽生地如智照境此譬猶分未是境智體一而展轉相照相發故說不可盡恐妨後義是故且置今所問者問於玄文境能照智雖引仁王般若經云說智及智處皆名為般若以為誠實明證顯於更互相照且智能照境義稍易解而境能照智意甚難曉是故謂之雖引誠證理亦難明也問今此釋疑何故料簡法華玄文答以彼玄文境能照智與今止觀境即是觀其致一揆是故料簡法華玄文意實顯今摩訶止觀境即是觀也次答文為二初約方便圓極對辨別教教道名為方便既智境體別故理不可會不可會者不可融會也圓頓無上名為極說即境是智所以易融言易融者由體一也次以心下正約圓極解釋文為二初明境智體同故相照此如向引釋籤中云智既是心境亦是心既俱是心俱是法界心心相照有何不可是則若非境智體同安能相照以成融妙故不可下次引止觀之文證成文為二初正引文此即章安一十六番私料簡中第十一番料簡之文也彼文問云問五陰俱是境色心外別有觀邪輔行云問五陰下六番問答為成不思議意如前所明必先觀陰陰具色心為即四陰以為能觀為四陰外別有能觀若色心外別有能觀則所觀境攝法不盡若只四陰以為能觀如何以陰而為能觀答不思議境智即陰是觀輔行云次答中約不思議相即而說無始色心本是理性妙境妙智而隨妄轉不覺不知今既聞名知陰即是即四陰心而能成觀乃至云故不思議即陰是觀而境智宛然言不可思議境初云者即指智者大師正說十乘不思議境之初章安私云也故輔行釋修德境中亦有此語故輔行云故妙境初文章安料簡云法性自爾非作所成故知章安深領玄旨此指章安第十六番料簡尚得謂之初云豈今指於第十一番而不得謂之初云邪章安料簡既為成於不思議意何異大師正說十乘不思議境況輔行釋十乘初觀不思議境文中亦云是故今文妙觀觀之令成妙境境方稱理復以所觀顯於能觀妙境義成妙觀斯立為是義故復明於境以是下約四句分別文為四初標以此觀之既乃是於不可思議故得乃為四句分別不相妨礙也次境照下列然此四句第一句云境照於境者即玄文中七科諦境展轉相照相照即是諸境開合名異故開義同故合義同既合豈非相照故十如中初如是性合因緣境初無明支以無明支轉即為明明即了因是故乃成如是性也此則豈非初十如中如是性境照因緣中初無明境此一既爾餘可準知故此乃是境照於境若不爾者前文那云然義解者非消文時欲出文意必須出沒開合先令妙境周圓又如止觀十二因緣妙境文中亦以因緣之境對法華中十如又對陰入等境並在一念之中皆名不可思議豈非境照於境邪第二句云境照於智者即以佛界十如等境照於圓教五品等智二十智中圓教有四一五品智二六根智三分證智四究竟智境照於智既乃如此其第三句智照於境翻此可知但第二句境照於智即以妙境而為能照妙智為所其第三句即以妙智而為能照妙境為所能所雖分心體無別第四句云智照於智者即是圓教五品等智展轉相照初後不二因果無殊又復應知約相待妙作如是說約絶待妙還開三教粗境粗智以為圓教妙境妙智是則六道十如等境世間等智咸皆微妙並須圓論境智相照四句之義思之可知但今文中既以圓極簡於方便是故如前約相待妙而論境智相照四句耳三照者下明圓極說照非方便教之所窮了照者說者並是人也方者正也應者當也此中一一皆以圓極簡於方便思之可解若不爾者前文那云順方便教理不可會若從極說於理易融下文那云又亦不同偏小妄心以為所照邪四是故下簡異邪妄及偏小等僞上文既以圓極簡於方便所以今文乃云是故不同等也世謂頑境者下文喻疑顯正例云偏指文中一句兩句以為頑頓義同頑境體心踏心踏字他合切著地也恐非文意應作粗字止觀云又一種禪人不達他根性純教乳藥體心踏心和融覺覓若泯若了斯一轍之意障難萬途紛然不識輔行云又一種下明化他失密引慧文已前諸失顯得一往斥其不達障難尚失於小況復大邪於中先明人非以不能用化他安心六十四番是故成失況復九乘等邪輔行第一云若準九師相承所用第一諱明多用七方便故第二諱最多用融心性融相融諸法無礙第三諱嵩多用本心三世無來去真性不動第四諱就多用寂心第五諱監多用了心能觀一如第六諱慧多用踏心內外中間心不可得泯然清淨五處止心第七文師多用覺心重觀三昧滅盡三昧無間三昧於一切法心無分別第八諱思多用隨自意安樂行第九諱顗用次第觀如次第禪門用不定觀如六妙門用圓頓觀如大止觀以此觀之雖云相承法門改轉文師已來既依大論則知爾前非所承也體心等者明化他法非雖體達如空非體法實智此空既非體法實智則是頑境亦名頑空頑謂癡頑無有覺知以由此空不是中道第一義空佛性覺照是故斥之為頑境耳雖推他回切踏不受非無作捨覺雖調和融通非混同法界雖覺察求覓非反照心源雖泯然亡離非契理寂滅雖了本無生非智鑑妙境如此等用非不一途故云一轍轍者車行迹也故知此等永迷十觀及所觀境又亦不同偏小妄心者偏謂偏僻即別教教道已還也小謂小乘三藏也妄心之言即是陰等十境也釋籤云陰等十境唯在三教輔行云前之八境但在凡夫後二名為聖人方便若前三教差降不同別教乃於菩薩之境但觀二通教但觀一三藏全無但觀九境通二乘人觀八境半三藏二乘觀八境全又云前八在凡可見後二既是圓實方便故知十境位並在凡又亦不同假立真如者他宗之中有假立真如之說故今斥之耳又假立者猶別立也故輔行云今家用此十法為境不同常途別立清淨真如無生無漏如是觀者如離此空別更求空問既云用此十法為境何故簡於偏小妄心答此約圓極妙境而說是故須簡偏小妄心故止觀云此十重觀法橫豎收束微妙精巧初則簡境真僞云云輔行云攝諸法盡故云收束理幽為微絶待為妙不濫偏小名精安布次比名巧初則簡圓極境名真以偏小為僞文句記云簡境及心者境既簡於真僞心亦須辨偏圓以若非圓心不具三千若非三千攝法不遍故須簡於思議心生取不思議心具者也若通而言之心即是境故文句記云心境俱心也若別而言之心謂剎那不思議心境謂百界三千妙境文句記中從別而說是故謂之簡境及心也以圓妙境簡於粗境雖則不同偏小妄心然而圓妙不思議境其實觀前思議陰心以成圓妙不思議境故止觀云一觀心是不思議境又釋籤云今是圓人所觀境界觀已俱成不思議故即此意也又輔行云已聞思議十界歷別示此十界同在一心則一心中十界可識乃至云人見注云非今所用舊本止觀非今所用四字注於文下現行印本則改注文便棄思議別求不思議者遠矣如為實施權權是實權開權顯實實是權實相待絶待次與不次悉亦如是若棄思議當知是人二法俱失又下文云若無十境乘則無體所照既爾能照亦然者亦應簡云不同偏小世智等也率爾者輕率聊爾也論語云子路率爾而對云云十五料簡破法遍中智斷之說文為二初問破法遍中云須先用無生為首者止觀云今且置三門且依空無生門輔行云淨名大品並以無生為首故今亦然文列雖以有門居初依前諸意且用無生也問後料簡云何復云無生是智無滅是斷者即止觀中引佛藏示相涅槃釋義地持對教文後料簡云問若無生門攝一切法者則無復諸門答無生門亦攝諸門諸門亦攝無生門若依智德義便故言無生門此應四句生門無生門雙亦雙非若依斷德義便應有滅門不滅門雙亦雙非大經舉十五日月光增正喻智德十六日月光減正喻斷德輔行云既從智斷二德以立門名三十二門未嘗別異隨舉一門攝三十一智則是觀斷則是止觀異名如釋名中會異科說若其然者依無生門說破法遍則但有觀而無止邪次答中言破遍門意從事偏說者約理而論止觀同體約事而辨止觀隨宜故無生門屬於智德智德是觀既是隨宜是故從事偏說無妨則不可以止觀同體而為難也故文中云有定之慧而盡淨之者破遍文初云若未相應應用有定之慧而盡淨之故言破耳具如記中廣分別說者安心破遍並是絶待咸具定慧今據初心欲入未入隨事調熟用與不同或宜有慧之定如前安心或宜有定之慧如今破遍故從行立名名不虗設又前安心中先推法性義多從定是故云安今此破遍中先準教門義多從慧是故云破二文兼具法體無偏故前信法莫非法性止觀故也今此無生亦由同體止觀故也故會異中云止中有觀觀中有止云云十六料簡禪境初因緣妙境中云不同取著一念能具三千文為二初問止觀所觀開為十境第六即是禪定境也而禪定境自開為十初根本四禪十神通禪前七種禪但直明所發禪定之相至第八因緣禪中乃明發於十二因緣禪境約此十二因緣禪境以明十乘妙觀而初妙境中乃云不同世人取著一念能具三千故云禪境句初十二因緣觀不思議境初云不同等也然止觀中但云復次言一念不同世人取著一異定相一念乃是非一非異而論一耳止觀此文雖則不言百界三千而前文中乃云復次十二因緣十如十境在一念心中乃至云一人一念悉皆具足十界十如而又簡於不同世人取著一異定相一念文一念具足十界十如乃是非一非異而論一念之一十界十如之異故此乃簡不同世人取著一念能具三千也輔行解此具引如前以一例諸文中引之此不煩録為唯此中諸境皆然者今問取著一念不具三千為獨在此禪境之中因緣妙境為復通於陰入煩惱乃至菩薩諸妙境中皆如是邪次答中言一切皆爾者意云文雖在此義通上下故知始自觀陰入界成於妙境乃至觀於二乘菩薩以成妙境一念具於百界三千皆同於取著一念能具三千並是約於非一而論一念非異而論三千耳是故謂之一切皆爾故輔行云故知三千非三千具足三佛性三千既爾一念亦然故前文云以一例諸部內唯有一文說之以此一文而均上下使處處文義通徹照然若爾何但止觀如此以至妙玄文句亦然近來學者都迷此旨將何以明一念三千乃是終窮究竟極說章安云若定謂一念具含萬法是如來藏即同迦毗羅外道因中先有果計若定謂心無萬法修之方有即同優樓僧佉外道因中無果之計若定謂亦具亦不具即同勒娑婆外道因中亦有果亦無果之計以至六師各有計著並屬外道之所計耳所以若聞心具萬法是如來藏即謂如囊盛沙若聞心無萬法即謂猶如兔角斯並永執邪見之人何可論道故涅槃經喻以癡王求於斷弦之聲蓋由此也以此明之近代所傳止觀之道率爾發頭便謂一念具足三千豈不同彼迦毗羅哉若不爾者何故聞於一念三千泯絶叵得輒便難云打疊向於何方而去嗚呼哀哉此等師徒從無始來不知一念諸法寂然故使於今不解妄念無一異相達此無相空中之理方能具足三千妙假一多相即帝網重重且執權迷實則權實俱亡況執邪迷正其道何在尚非小乘入道之門豈能通於大乘妙性邪故知若迷此旨不請濫傳吾教自誤誤他非同小事幸希後德試為思之十七料簡以據理不隔難取著不具文為二初問言若爾者若者如也爾者詞之必然也謂若如上所說者應當取著之心凡情妄念不具三千之妙法邪此中所問既言應當取著心中不具三千則是據理不隔取著亦具三千以難修觀觀於妙境簡異妄念之不具耳故輔行云若據理論無非法界亦何隔於取著妄情須知據理不隔妄念亦具三千與輔行云故至止觀正明觀法並以三千而為指南不可雷同若不爾者前文那云又亦不同偏小妄念以為所照由是明之十乘初觀不思議境一念具於三千之法不可濫於取著妄情據理不隔亦具三千也若其然者近人競說三境之中初性德境一念三千於六即中是理即收於文句記四句立法乃是理則性德緣了殊乖文意甚失旨歸雖輔行云性德緣了本自有之斯乃約於真如觀理照於性德本自二空耳人不見之誠可悲哉次答中文為四初明取著不具異於據理不隔意言止觀中云一念不同世人取著一念能具三千者此乃準的用於妙觀觀於妙境而說一念具三千耳不可同於據埋而論不隔妄情任運本具也故輔行云此據初心習觀之人恐濫託於妄情觀境妄情觀境即向所謂頑境及偏小妄心也是故應須簡示入門簡示入門即止觀云不同世人取著一念能具三千乃是非一非異而論一念具三千耳故輔行云為是何等一心能具故簡示言不得同於妄計一念能了妄念無一異相達此無相具一切心三千具足方能照於一多相即辨別真僞故名簡示從茲入道故名為門次取著下明能了取著妄念成三諦之境取著之心本是諸法者據理雖則不隔望觀乃屬於事是故取著之心本是陰等諸法亦如前文云衆生久劫但著諸法也照此著心緣生虗假假中中字但是語助而已三千者即能了妄念陰入從賴緣生虗假無實非一異相方能具足三千之法故得名為假中三千也自體性空者達於性具三千俗假但有名字諸文所明圓教三諦而其俗諦乃是幻有幻有無實但存俗假名字而已名字叵得是故名為自體性空即真諦也即是心性者空假俱蕩二邊雙亡即是中道第一義諦故輔行云心性不動假立中名也不可思議圓妙三諦者總結上文也故三千妙假即空即中乃是不可思議圓妙之三諦矣三舉空華為喻者法華文句云比況名譬曉訓名喻即託此比彼寄淺訓深也空喻真如三諦妙理華喻諸法取著妄情華與空體無二無別喻於真妄其理本同此空不當華之與空喻於本性常自寂滅妄元叵得真亦無名對華說空喻於對治取著妄情乃說三諦真實之理空無名字喻於真理對妄立而今既照妄情叵得是故真理名字亦無故金剛錍四十六問中有空華一問故彼問云病眼見華華處空處同異存沒法譬如何今此與彼辭異意同何者太虗空中本自無華由病眼者遍空見華是故名存而虗空中華實不生病眼若除見空無華是故名沒而實無華於空中滅以病眼故於空見華空華處異若能體病知華即空空華處同無明本惑佛眼不明於法性空見於諸法故名為存而法性空妄情諸法實不曾生本惑若除佛眼圓照見法性空諸法叵得故名為沒然而諸法實不從於法性空滅以本惑故於法性空見於諸法是故諸法與法性空其處則異若達本惑則知諸法即是性空是故諸法與法性空其體本同是故當知空華處同即是今文華與空體無二無別此空不當華之與空及以下句空無名字也空華處異即是今文對華說空也四以此下例推諸法以此空華之喻委悉推尋真妄事理迷悟縛脫一切諸法莫不皆如空華之喻也十八料簡因緣妙境文中以三道對三德文為二初問束為三道者即是收束十二因緣不出三道也故無明愛取即煩惱道行有即業道識等五支及以生死即苦道以對三德者無明愛取轉變為明即般若德了因佛性也行有業縛變成解脫德即緣因佛性也苦道是生死變成法身德即正因佛性也此從別對而說故輔行云若別對者翻對義便若通論者觀十二因緣真如實理名正因佛性法身德觀十二因緣智慧是了因佛性般若德觀十二因緣心具足諸行是緣因佛性解脫德也故輔行云若通對者據理通故雖有通別皆是圓義也苦身質礙那對法身者即是問於別對三德以苦道對法身也識等七支苦道之身既是分段質礙之軀何得對於中道正因法身無相邪次答中言此約理說等者約於性德之理而說是故的相翻對以苦道之身對遮那之身是故作此翻對說耳故文句記釋三道即三德是相對論種云言相對者且從當體敵對相翻即事理因果迷悟縛脫等始終理一故名為性有生性故故名為種生時此種純變為修且從當體敵對相翻雖則如此其如三道三德之性本無二體故前文云華與空體無二無別故今謂之實論三德體更無前後若約迷悟當體敵對相翻而說則三道在前無始本迷故也三德在後今日方悟故也前後雖分體非隔異是故得云始終理一且論無始苦輪止觀明十二因緣亦名十二輪束縛不窮故名為輪輔行云展轉不窮猶如車輪今文且明苦道故云苦輪耳無際既是無窮故無際畔與業煩惱不並不一也不別不異也者未言今文不思議境是故且論無始三道且論無始三道尚然況今妙觀觀於妙境邪是故謂之況今文中等也故大經三十六云一切衆生身及煩惱俱無先後一時而有雖一時有要因煩惱而得有身終不因身而有煩惱荊溪私謂諸大乘經云無始者不獨云身不獨煩惱若一在先一則有始今經從於對治機說故云要因煩惱而得有身實而言之非但過去言無先後只於現在煩惱為身而作因時亦無先後何者因果無二色心體一三道三德一念無乖五陰五脫剎那理等貴在破執破執了已性同虗空空無先後內外誰施三十六軸唯從涅槃五十二衆咸成佛性故今謂之約於一念十界百界以論因緣止觀云十二因緣十如十境在一念心中約此因緣以論三道束十二因緣為三道約此三道以論三德即以三道別對三德既在一念是故三道及以三德並無前後故性德三因無時不具止觀云性德因中不縱不橫名三佛性修德果不縱不橫名為三德含生具足故云爾理體既同相亦無相豈得更問苦身質礙那對法身邪十九料簡一家所傳理事三觀文為二初問中引有人問云此土真詮稟承有緒者有人即是濫禪之人也彼濫禪人見今天台說於止觀修證之法乃設問云此土真詮稟承有緒緒者由也專也西域始自迦葉傳燈此土初則達磨持法而所傳之法是佛心印故曰真詮遞相分付是故名為稟承有緒雖教科開廣者科者條也品也謂教門科目條品為緣開之廣博即一代修多羅藏也而本味仍存者即真詮心印有在也但尋求此真詮宗源自然可得會於根本何須天台復更立於實相觀理一心之三觀唯識歷事四運等推檢溷胡困切濁於我心水清流邪所以濫禪之者亦有謂之若未頓超方便且於教法留心等以彼自謂所傳之法頓超方便乃是教外別傳故也遂斥依經立行之人乃是偏小漸次方便此蓋濫禪之者迷於圓頓修行方法偏計理性無說無示而廢修德解行二門端拱無為乃言我是頓機直入若諸經論乃被中下漸次之流一家所斥暗證之徒良由於此亦如圭峯禪源詮云達磨未到古來諸家所解皆是四禪八定南嶽天台依三諦理修三止觀教義雖圓終成次第唯達磨所傳最上乘禪亦名如來禪頓同佛體逈異諸門又云講者偏談漸義禪徒多示頓門又自謂之禪遇南宗教逢圓覺嗚呼圭峯濫附他禪謬斥衡嶽孔子所謂道聽塗說德之棄也具如大部補注中辨又清涼云賢首所立頓教訶教泯相即順禪宗悲哉清凉一至於此吾佛所說大小乘法教化衆生奚嘗少於訶泯遣蕩邪又有人謂崇法禪師昔日聽律乃歎云解脫之道天壤相隔遂棄之學經論洞明智者一宗偏說法華十妙後又歎云余以不退心慕常樂果當自初地至於十地豈為名相所縛邪乃捨之直造韶禪師道場韶公接之云自性清淨無一法可得者佛之理也百福莊嚴無一善可棄者佛之事也雖分二途皆強名耳吾是崇壽之子玄沙之孫建大法幢以金剛體全付於汝今問若爾將何以為教外別傳乎戒律是三學之初章入道之前陳何乖解脫之路邪況維摩云其知此者是名奉律若其然者何法非律乎佛所說經菩薩造論豈以名相束縛於人邪苟如韶公所說將何以高南嶽天台邪而崇法禪師云為名相所縛者自是汝學天台不得其門耳而十妙之法奚嘗束縛於汝哉諒是徒聞十妙之名不達一心三觀之旨妄生取捨真可哀哉孟子云吾聞出於幽谷遷于喬木者未聞下喬木而入於幽谷者斯言信矣次答文為二初責來問濬私閏切深也流本清撓玉篇云乃飽乃教二切訓亂也之未濁者先責所問云四運推撿溷我清流也是知深流本自清潔設使撓之亦未溷濁何得聞於唯識歷事推撿四運四性叵得自疑謂之亂於清淨之心邪次真源下責其所問云一心三觀未會宗源也是知真源其體本淨如或混胡本切也詎其呂切豈也亦去聲呼有妨去聲通乎礙乎何得聞於實相觀理更不餘塗便謂不能尋源會本邪此中既舉源流枝本若不約於實相觀理唯識歷事如何消之次設使下正明所傳文為二初斥天竺來儀未若兜率垂降言印度者此云日月良以彼方聖賢相繼開悟衆生猶如日月故以名焉舊云天竺身毒音篤賢豆也設者猶縱也亦猶假也謂縱使西域印度有於一聖來儀戾止傳佛心印未若若者如也兜率此云喜足亦云妙足補處慈尊二生垂降化身開導也言一聖者或謂此是假立耳其實無人也今尋文意恐指達磨耳謂縱使達磨乃是西域一聖來儀亦乃未如兜率慈氏二生垂降也良以補處其位超過一切菩薩之聖故也豈可以達磨西來便是傳佛心印而貶補處垂降名為教家偏漸邪言二生者淨名廣疏解世尊授彌勒菩薩一生記云言一生者但取未來更來閻浮提中生也大論云三生謂此生一也兜率天生二也未來更來閻浮提生三也今云二生垂降者即第二生也又慈恩基師上生疏云一者一生所繫二者最後之身三者坐道場身上生即一生所繫下生局後二身此非今文二生垂降之義也故東陽下次正明天台祖承心要文為三初明近承補處心要文為二初總敘祖承人法東陽大士者人也三觀四運而為心要者法也言東陽者古稱東陽郡今為東陽縣縣有東陽山屬婺州言大士者大論以菩薩為大士大者簡小也士者事也按大士實録及李華員外撰左溪行狀皆云東陽大士姓傅名翕時謂彌勒化身而左溪即大士六代之孫也位居等覺者一生補處也亦名無垢地過十地解入百千三昧照一相無相寂滅無為若望妙覺猶有一等故名等覺雖有一品微細無明亦乃如無故名無垢且一生補處彌勒大士尚以理事三觀四運而為心要豈有印度一聖來儀便廢此邪高僧傳云達磨禪師初到宋境北度至魏隨其所在誨以禪寂于時國中盛弘講授乍聞禪法多生譏謗乃有道育慧可二人年雖在後鋭志高遠初逢法將弘道有歸感其精誠誨以定法如是安心謂壁觀也如是發行謂四法也如是順物教護譏嫌如是方便教令不著入道多塗要唯二種謂理行也藉教悟宗深信含生同一真性以客塵故捨僞歸真凝住壁觀無自無他凡聖等一堅住不隨他教與道冥符寂然無為名理入也行入四行萬行同攝初報怨行當念往劫捨本逐末多起愛憎今雖無犯是我宿怨甘心受之二隨緣行衆生無我苦樂隨緣三無所求行世人長迷處處貪著名之為求道士古之釋子皆稱道士後為黃巾濫竊呼之悟真理與俗反四名稱法行即是性淨之理故也濫禪之人請讀斯文何得斥今立於理事三觀四運自疑謂之溷我清流不能復本邪況達磨以四卷楞伽授於慧可乃云吾觀漢地唯有此經仁者依行自可度世可附玄理如前所陳遭賊斫臂以法御心不覺痛苦火燒斫處血斷帛裹乞食如故況復又云藉教悟宗深信含生同一真性後人何得棄此法言自謂達磨西來乃是教外別傳心印邪何得輒云宗門之旨非教家所知邪嗚呼若苟執此見其猶捨五經而談堯舜之道耳哉高僧傳云南嶽禪師定慧凝遠性戒自然威德尊嚴道風遐扇幼感梵僧勸令出俗長蒙遍吉現形摩頂諷誦法華智通宿命翹勤方等靈相蒸九旬䇿修一時圓證法華三昧大乘法門朗然開發自是之後寂照幽深辨才無滯於是內求之士重繭雲集以所證法傳授學人並託靜山林宴居巖籔練微入寂弘益巨多昔江左佛法盛弘義門自思南度定慧雙舉矣天台智者幼冥禎感夙稟玄風蘊道天台尋師衡嶺雙弘定慧圓照一乘受四教於神僧稟三觀于上德入法華三昧證陀羅尼門照了法華若高輝之臨幽谷說摩訶衍似長風之遊太虗假令文字之師千羣萬衆尋其妙辨莫能窮也自發軫南嶽弘道金陵託業玉泉遁迹台嶺三十餘載盛演一乘止觀禪門利益唯遠義同指月不滯筌罤或於一法中演無量義攝無量義還入一心實觀玄微清辨無盡由是四方法侶請益如林若定若慧傳燈逾廣為大機感著述其文並理會無生宗歸一極禪門止觀及法華玄但約觀心為衆敷演灌頂法慎隨聽筆録顗自印可天下盛傳可謂行人之心鏡巨夜之明燈自古觀門未之加矣豈達磨西來別傳心印而勝於此邪是知圭峯云南嶽天台依三諦理修三止觀教義雖圓終成次第者斯言謬矣況復圭峯稟受清涼而清涼云撮台衡三觀之趣使教合忘言之旨心同諸佛之心不假更看他面謂別有忘機之門昔人不參善友但尚尋文年事稍衰便欲廢教求禪豈唯抑乎佛心亦乃翻誤後學況復清涼亦稟賢首而賢首起信論疏及心經疏凡明修行方法並指天台止觀圭峯何得背祖違師妄生形斥豈不懼於後之明哲考其虗實邪故獨自下次別引理事心要之詩此詩具在大士實録初引獨自精詩者證於今家一心三觀實相觀理謂一切法無非法性更不餘塗也言荊棘者唐章懷太子注後漢書云荊棘者榛仕銀切木叢生也梗之謂也亦名楚亦云荊也次引獨自作詩者證於今家四運四性唯識歷事推檢叵得也併早政切者並也皆也此中既引獨自作詩以證唯識歷事推檢而輔行中前文所引獨自作詩以證唯識四運推檢與今文同後文所引獨自精詩以證作受修唯識觀恐是誤也況復於其作受修觀合當引於獨自作詩故不可引獨自精詩也又復若以本末相映理事不二而消之者故雖唯識四運推檢亦可引於獨自精詩實相觀理以顯唯識歷事悟理也況復下次明遠稟佛瓔珞經今家所明三觀妙行非但近承東陽大士亦乃遠稟佛瓔珞經輔行云本業瓔珞經有兩處文明此三觀上卷明十回向中一一回向各各有十所緣境界第十回向中第十觀者名為無相第一義觀得入初地初地已上三觀一心言三觀者從假入空名二諦觀從空入假名平等觀二觀為方便因是二空觀得入中道第一義觀雙照二諦心心寂滅自然進入初地法流水中名摩訶薩此即別教次第三觀耳下卷云敬首菩薩白佛言如上所說若因若果若賢若聖一切功德今此會中十四億那由他人誰能不起此座受學修習從始至終入菩薩位時佛頂髮放一切光復集十方百億佛土諸菩薩衆即於衆中告文殊普賢法慧功德林金剛幢金剛藏善財童子等汝見是衆中敬首菩薩問三觀法界諸佛自性清淨道一切菩薩所修三觀法門不汝等各領百萬大衆皆應修學如是法門此即圓教一心三觀也今文所指正在於圓是故謂之本宗瓔珞輔行問云若爾唯應上地修此三觀何關凡下答經文既云各領百萬大衆皆應修學何獨上地又大瓔珞經云攝意入定分別三觀亦不見人入定意者游心十方無量世界承事供養觀一切法是則名為具足禪度是故當知三觀未圓禪度未滿三智具如大品三智品中止觀大意中注云三觀名義在大瓔珞等經三諦名義在仁王等經今謂此指舊仁王經耳而慈恩宗人不達於此却準新仁王經但明二諦以斥天台所明三諦況復又迷二諦三諦但是開合之不同耳故三觀智文理有憑非徒胸臆虗張無據也補處下三結遠近同歸一轍文為四初明大士金口親承一生補處彌勒大士釋迦如來紫磨金身口業所說瓔珞等經三觀妙行親於佛前稟承遵奉流通永永所以兜率二生垂降乃以三觀四運撿尋豈唯自照兼以利他故知下次明天台稟承符契以是故知一家教門所明三觀遠則承稟佛所說經近則復與大士符契東陽大士道王梁朝滅於陳代大建年中天台智者生於梁末法化陳隋故東陽大士與天台智者往往相遇矣邊下中高邊高中下名之為宛顯了可見名為宛然言符契者符亦契也漢書封功臣以竹長六寸分而合之為符故字從竹也契者約也即契券也釋名云券綣也相約束繾去善切綣口阮切玉篇云不離散也韻集云謹慎也為限也況所用下三明一家通宗諸教摩訶止觀正明觀法並以法華諸法實相即實之權百界三千而為妙境乃至離愛不離境故故諸境十乘皆以法華大車為喻是故名為所用義旨以法華為宗骨良以靈嶽親承道場契悟正在於此故也故智者臨終聽唱法華竟乃云法門父母慧解由生本迹曠大微妙難測止觀序云智者事南嶽南嶽事文師文師用心一依釋論諸文亦云智度論論云智度大道佛善來智度深海佛窮底智度相義佛無礙稽首智度無等佛亦云摩訶衍論亦云大論以摩訶衍翻為大故般若翻為智故故云大智度論亦云釋論睿公序云憲章智典作茲釋論論是龍樹所說付法藏中第十三師智者觀心論云歸命龍樹師驗知龍樹是高祖也論云因緣所生法我說即是空亦為是假名亦是中道義今止觀中既用智論因緣生法即空假中是故謂之以智論為指南也言指南者文選吳都賦云指南司方注云指南車也車上有木人常指其南故云司方也又古今注云指南車起於黃帝與尤戰于涿鹿之野尤作大霧以迷四方於是乃作指南車以示四方遂擒尤而即帝位問若以智論為指南者輔行那云以三千為指南邪答此亦無別但是隨文趣舉為況耳散引諸文該乎一代文體正意唯歸二經一依法華本迹顯實即向所謂以法華為宗骨也二依涅槃扶律談常良以法華雖則顯實末代根鈍若無扶助則正行傾覆故正助相添方能乘於大車遠運故云以大經為扶疏也扶字應從木從手乃是扶持字耳疏字平聲呼應從草文選讀山海經詩云孟夏草木長繞屋樹扶疏注云枝葉四布貌也今文之意乃取扶助之義以解扶蔬之名何以知之文句記釋藥草喻品文句中云言扶蔬者扶謂扶助爾雅云林有草木曰蔬記作此解扶蔬之名恐是誤也若爾今文應云以大經為扶助方乃允合扶律談常之義不須謂之以大經為扶蔬也妙玄中明別教斷伏高下依大品三觀引大品云菩薩欲具道慧當學般若即是十住習從假入空觀伏愛見論欲入十住位若得十住即斷界內見思也欲以道慧具足道種慧當學般若此即修從空入假觀入十行也欲以道種慧具足一切智當學般若此即修中道正觀入十回向也欲以一切智具足一切種智當學般若此即是證中道觀入十地也欲以一切種智斷煩惱習當學般若此即等覺也無明煩惱習盡此即妙覺也釋籤問云今此文中將此四義以對三觀與大論中釋因中總別果上總別何異答言異意同何者空假為因中道為果從假入空為因中總相從空入假為因中別相別人修中初但總相為果上總若入初地雙照二諦為果上別當四義與三不殊若以別顯圓則其義可見故止觀中明四智云四智者如大品明道慧道種慧一切智一切種智釋論解此有多種或言因中但有理體名道慧道種慧果上事理皆滿名一切智一切種智或言因中權實故言道慧道種慧入空為實慧入假為權慧或言果上權實故言一切智一切種智直緣中道名一切智雙照二諦名一切種智或言因中總別果上總別或言道慧道種慧是單明權實一切智一切種智是復明權實如是等種種釋四智四智只是照三諦耳輔行云四智亦是權實二智對因果等是故成四開合觀諦不出於三具如向說止觀又引大品云王三昧攝一切三昧首楞嚴定攝一切定大品云欲得道慧道種慧一切智一切種智當學般若問釋論云三智在一心中云何言欲得道慧等當學般若答實爾三智在一心中為向人說令易解故作如此說耳輔行云大品下引證佛智具三智故皆云學初問中言欲得者或是一人前後欲得或是多人各各欲得但云當學豈名一心次答意者法在一心說必次第豈說次第令法縱橫此則名為以大品為觀法也如引華嚴等經以證圓頓止觀竟然後結云如是引證寧不信乎故此即是引諸經以增信也如引地論中論及十住婆娑論等即是引諸論以助成也觀心下四明所傳與他永異止觀序云止觀明靜前代未聞又云此之止觀天台智者說己心中所行法門又止觀體相中云如此解釋本於觀心實非讀經安置次比為避人嫌疑為增長信幸與修多羅合故引為證耳妙玄云經者緯義如世絹經以緯織之龍鳳文章成緯者橫織絲也經者竪絲也佛以世界悉檀說菩薩以世界緯織經緯合故賢聖文章成又約行論經緯者慧行為經行行為緯經緯合故八正文章成又約理論經緯者詮真為經詮俗為緯經緯合故二諦文章成乃至云觀境為經觀智為緯觀察回轉織成一切文章今此止觀乃是天台智者觀心為經諸法即一代聖教中之諸法也為緯織成部袟正作袠亦作帙直一切書帙也亦云書衣也不與他宗行法同類故僧傳云自古觀門未之加矣自古觀門尚無以加而圭峯輒斥之其猶可濵之人捧土以塞孟津孟是地名在洛北都道所湊古今以為津今河陽津是也蓋不知其量也二十料簡大師禪門口訣現行印本文有六紙治病心要文為二初問可解次答文為二初明諸皆治病彼文初明安般守意次文方明病相不同今文謂之諸皆治病者且從次文而答之耳彼文明病乃有多種一身作病二鬼作病三魔作病四不調息成病五業障病治此諸病如彼具說如治第一身作病云坐時或倚壁或衣襟大衆未出而臥此心懈怠魔得其便入身成病使人身體背脊骨欲疼痛名為注病難治行者慎之治法者用息從頭流氣向背脊歷骨節邊注下須好用心方得差耳唯有下次明一偈心要文為二初引偈文此偈即是次文明病之初文耳故彼文云坐禪人問種種病師誡言但繫心在境不令他緣病自差耳用之者遠至三日無有不差問心亂橫見答攝念可愈問四大增損那得復差答心之動轉猶扇之有風住止理數然師教誡常言具引偈文即如今也實心者圓心也實境者妙境也繫者如止觀云繫緣法界一念法界也繫緣是止一念是觀輔行云雖繫雖念不出法界雖止雖觀寂照同時迭徒納切遞也更也注者記也專也亦猶水之灌注也釋曰下次釋所以心注於境境注於心等應以前文四句分別來此用之又復應以諸文大旨開拓此中使夫心境相注之義泠然可解細思細思今不委示第六行解相資例文為二初牒名次釋義文為二初判解行文為二初約前七正判解行如分別中等者十義亦名十門也故止觀第一約十義分別十章始自真俗終至橫竪其第六義即是自他而前八章名為自行起教一章名為化他旨歸乃是非自非他故云於中且約自行化他等也果報為果非今正意者以行解相資正在於因因成方乃剋獲大果所以果報非今正意也前五生解後二為行者次文顯矣次分別下釋疑文為二初釋疑明自行之解唯前五章言釋疑者止觀十義分別十章而第七義即是目足大意至起教是目方便至果報是足旨歸非目非足輔行云大意至起教是目者亦隨語便準理應云初五章及起教是目目譬於解前之五章即自行目起教一章令他生目方便至果報是足者足譬於行方便正觀有功用行果報位在初住已上無功用行自然作意雖小不同同屬於行若準第五卷現行印本文在第四初云前六重是解輔行云方便望五稍似行始若望正觀全未論行是故前六並屬於解是則方便亦屬解收今以方便得為行始且判屬行今文中云越次取文兼化他故者以初五章及後起教同譬於目乃是越於中間方便正觀果報三章次第故也起教既是化他之解故自行之解唯前五章是也故恐人疑目既譬解是則始從大意終至起教莫非是解何故向來但判七中前五屬解故茲釋云分別文中雖以等也是故須知解有自他今既論於自行之解故不須以化他之解而為妨也次大意下釋疑明五略行果非正修之相文為二初正明言釋疑者以輔行云問前五略中有行有解有因有果何故但云六重是解答言大意者冠於行解自他因果意既難顯還作行解因果等釋非謂己有行果等也故大意是總餘八是別別是別釋行解因果若復有人依前五略修行證果能利他等自是一途輔行釋常坐三昧意止觀中云此去乃至非行非坐並粗準本輕示觀門之語縱有似於十觀之相而文並約略未可以辨觀法始終初發大心及下三略亦復如是故此五略但名大意若欲消釋必善下文十乘觀法方可離謬云云若論文意但屬於解於屬解中恐解不周故須委明名體及以攝法等相方堪成下十境十乘如大意中雖云發心十種不同及四三昧明行差別但列頭數辨相未足是故都未涉於十境十乘故今謂之大意雖有行及果報等乃至云非謂即是修行相也次何者下舉方便正修以驗之文為二初正舉何以得知前五略中未是正修之相以由修行之相俱須用於二十五法以為方便十境十乘以為正修而五略中既未明此驗知但是解於始末而已未即便為修行之相也次所以下釋意然此但釋正修所以故云若無十境等也仍闕釋於方便所以是故應云若無方便正行難立若無十境乘則無體體者即當體之體也若所依之體即諸法實相耳故輔行云又此十境即是前文所顯之體前約所顯能攝故立體名今對能觀所發故立境名又前從理說故體唯一今從事邊故境有十事即理故故一一境皆不思議理即事故故一一境相別不同是知若無所觀十境則無能觀十乘之體以由理無所存遍在於事故須即事以顯於理方有十乘大車之體也不二門云故撮十妙為觀法大體者即所依之體也若望能觀是則十妙還成陰入等境當體之體以第一義雖理圓頓雖實本雖久遠望觀屬事事即當體之體故也故知今云若無十境乘則無體者即當體之體也而前文云諸法實相以為車體者即所依之體也雖分二塗理無異轍故全所依而為當體仍了當體即是所依即理而事即事而理不其然哉問若以十境為十乘體十境不出火宅煩惱而釋籤云以火宅為寶渚必為所焚以煩惱為能乘義須傾覆與今相反如何會之答今以十境為十乘體但是車體而此車體若無衆寶莊校白牛引駕僕從侍衛十乘之行緣了顯發但是禿乘灼然傾覆必為所焚矣故次句云若無十法名壞驢車良由此也若無十法名壞驢車者大經梵行品云乘壞驢車正南而游章安解云乘壞驢車譬惡法自運也正南而游自有三解一云南是離地北是坎地去坎就離譬失善起惡二云就諸方而說北是上方譬斷善人從上墜下三云天子南面殺活自在此人邪見判無因果其心自在亦復如是故止觀明觀陰十乘文畢乃云今人只謂捨惡取空是大乘此空尚不免六十二見單復之惡何得動出為乘設借為乘只一禿乘無法門具度正法大城金剛寶藏具足無缺何所而無豈容禿空而已若但爾者乘邪見乘入險惡道是壞驢車耳輔行云今人下斥邪也正法下顯正也如此妙乘豈同惡空與而言之但有車體既無具度故名為禿奪而言之體用俱非故名為禿故引大經乘壞驢車非但闕於白牛般若為驢所乘任運非正故非高廣又復言壞全無莊嚴況復起見入三惡道次故知下明相資文為三初明妙解導於方便行始文為二初明解有廣略如上所論是故當知必定須以前之五章以生自行不思議解於生解中大意則略解始終自他因果者輔行云大意為總餘八是別總別皆有自行因果化他能所何者於總釋中發心修行自行因也次感大果自行果也次裂大綱化他能也既有能化必有所被文略舉能以攝於所能所事畢同入旨歸又云行始為因行終為果豈非自行之始終邪次別釋中始從釋名終至正觀自行因也次果報章自行果也起教一章化他能也所被義當化他所也後三大章其文雖闕義同大意後之三略言始終者即是自他各有始終也自行之始者因也自行之終者果也化他之始者能也化他之終者所也例如十妙始終之意云云文略意寬者即前所謂以大意文略意廣也次四專在名體者四者總舉四章也名體者別舉初二章也雖別舉初二亦兼後兩故輔行云如釋名中先待次絶絶只是開通德會異共成絶義顯體四段並先偏後圓以為待絶體為所詮名既開顯體亦隨名用所開體偏攝諸法法相難明仍分六義遍於事理因果自他還以六義展轉相收復以五門判所攝法方曉體內所攝互融復了融中實權不濫更以權實四章互顯是故但舉名體二章則攝法偏圓從可知矣文理但廣者既開四章豈非文為能詮理為所詮故理亦廣也故以下次明導於行始但言廣解者文體承便耳其實須云五章妙解導於行始故輔行云圓解稍利復以此解導於方便又云亦歷二十五法約事生解方乃堪為正修方便方便之言通於偏圓故云使二十五法隨教甄分也施開廢會方可得名妙行之首思之可見是故下次明妙解資於正修之行文為二初正明言名宗者方便正觀果報三章於五重玄義既乃是宗故今正修十法名之為宗也言次第者生起不亂也於理自足者以前妙解之中備明已竟故也而今文中相猶廣者等者即正修文中觀法之相廣博乃是為於鈍根者耳若利根者得前妙解之旨於今正修文中則但釋十法名宗次第於其理趣自然具足矣今仍恐於鈍根之者不曉十乘觀法次第故特引於前文妙解入正觀中委論其相何者且如正修十法之中一心止觀豈非前文釋名之中絶待止觀乎法性妙理豈非前文止觀體相乎能破止觀所破之惑等豈非前文所攝之法乎大小權實粗妙炳然豈非前文偏圓之相乎是知正修十法之相乃是引前妙解入觀委論耳若不爾者解非行家之解行非解家之行安能相資而契於理邪然正修中陰等十境皆須委論十法妙行但恐繁文是故乃於陰境具明十乘觀法下之九境但將陰境十乘觀法比例可知故前文云十法成觀但於陰入委識根由餘九待發方可設觀故九境中但分別境境下十觀不細委論但隨境轉照非關廣說是故諸文不無傍正者此有二義一者約於解行而說則前五章妙解為正妙行為傍故五略中雖有行果非謂便是修行之相正修之中雖引前解入觀委論不可謂之但明妙解故正修中妙行為正妙解為傍二者陰境傍明境相正示十乘故陰境中十乘最委下之九境正示境相傍辨十乘故九境中但分別境境下十觀不細委論文雖傍正義必圓備且如下次明正修之行成道樹法身文為二初明道樹文為三初先明地種故止觀中章安私謂云譬如大地一能生種種芽輔行云法性如地種子如境又止觀云然界內外一切陰入皆由心起是惑本心攝一切輔行云若示境體觀心即足以心遍故攝餘法故故今謂之且如十境只一念心行之地也以由心體遍攝一切故得喻之猶如地也故輔行云法性如地此心既是觀家之境所以名為行之地也一一顯示境相不同者即陰入等十境差別不相混濫也行之種也者即輔行云種子如境也種者生義此種生時純變為修此修既乃全於法性大地而起故得修性皆是一如更無別體從外而來也若無十境乘則無體義在於斯問若爾種之與性如何分別答能生為種不變名性請以喻顯從穀生穀故名為種穀種不變故名為性從一念心法性地生是故如種無始至今其種不變是故名性種性雖別體元不二從用而辨二義宛然具如淨名疏云云一一起於下次正明道樹文為二初正明輔行但云觀行如雨發如抽芽仍略不言幹藥華果於法性地起十乘觀潤於境種令其發生故喻如雨也牙字誤也應作芽字即萌芽也陰等十境因觀行雨資潤發生轉成妙境猶如種子萌芽抽發也幹古案切者莖幹也發心上求是故喻如莖幹上聳安心既有六十四番是故喻如枝葉衆多破遍乃至對治既是正助兩行而行始為因故喻之如華也又行終為果故云次位以至離愛行之果也既離法愛即入初住名為分果此約離於似愛而說若離真愛乃至須論究竟滿果等賜大車游方至極即此義也次若無下總結若無第一觀行之雨乃至第六離愛之果是則道樹不能端嚴故須六事道樹方成以樹喻於因果之道故云道樹耳若輔行中乃云婆娑大論並以樹譬道品故名道樹云云三次第下明三根不同次第雖爾者指上六事至離愛已方乃成果此即約於十法觀行次第而明若從人說意則不然何者人有三根上根即於心地境種用微妙觀而生於果不必次第至於第十離法愛已方入初住以至妙覺故文云者故病患境十乘初觀妙境中文云也故止觀中明觀病患是妙境已引金光明除病品云直聞是言病即除愈即初觀意也輔行云直聞是言所患即除譬聞妙境得入初住言初觀者即是初觀不思議境也為中下根等者止觀又云復有深重難除差者至長者所為合衆藥病乃得差即後九觀意也輔行云譬觀妙境無明未除如是發心乃至離愛故云衆藥如是用觀亦得入於初住位也縱未入位得入五品名小除差是故當知至離愛已方乃名果則是約於中下根說若上根人即觀境種成不思議便登初住以至妙覺故輔行云十乘文十義十根三意二分遠近故近期初住遠在妙覺又大意云上根唯一法中根二或七下根方具十高麗四教以發心至第六道品名為中根從對治至離法愛名為下根次又於下明法身文為二初別明又為二初正約妙行明法身且約初乘觀於妙境明四事者一觀心是不思議境觀之一字豈非寂照之止觀邪又云既自達妙境即起慈悲豈非生起邪如引華嚴心如畫師造五陰等豈非引事邪又斥世人判前五如是屬權在凡後五如是屬實在聖豈非破古邪又問心起必託緣等豈非問答釋疑邪初乘既爾餘九準知次又釋下兼約妙解明法身且從廣解而說故云釋名等四也文是能顯故屬於膚義是所顯故屬於肉志在正修故意是骨正修本期滅理真性故意所詣名為髓也次若無下總詰即是總結行解各四以成法身也須知法身有全有碎諸方便教名之為碎法華一實名之為全故法華論明此法華有十七名其第十二名一切佛堅固舍利今此止觀既是法華妙解妙行當知乃是法身全也故妙經云若經卷所住處皆應起七寶塔不須復安舍利生身舍利耳所以者何此中已有如來全身即此意也三是故下斥非顯是文為二初斥當時學者讀文昧旨此文全是結斥清凉謬指偏僻一句兩句以立頓頓令今止觀十乘妙行而不周足委如上下文中所辨云云次修行下正顯所傳妙盡淵底文為二初明解行圓成同歸妙理言集解者集字恐誤當作習字今之下次結十章攝法周備意唯若是者指上修行之來等文也故前習解方便等文即是止觀十大章也故知十章無所不攝矣如此立例發揮輔行尚恐未明止觀之旨豈以搜要簡略之說能通行門斯蓋往代愚昧之者假託荊溪之名妄生率爾之見輒懷去取傷害尤多略如大部補注中辨云云第七喻疑顯正例文為二初牒名此即曉喻清涼觀師之迷惑顯明所傳止觀之正行也問何以得知此是曉喻清涼觀師答大宋高僧傳云清涼觀師大曆十年依荊溪湛然法師習天台止觀及法華維摩經疏等云云余亦嘗覽清涼觀師華嚴疏鈔見其固執涅槃權文瓦石非性又復謬立漸頓頓頓由是而知金錍之作義例之興皆為曉喻清涼觀師以至釋籤輔行記等諸文所斥莫不皆然故輔行述緣起十意第二意云曾師承者而棄根本隨末見故良由於此而近代諸師不深本宗未廣看習往往亦有背本宗之義附僻者之見悲哉悲哉此如金錍寓言記中委彈其謬學者尋之次此所下釋義文為三初明因由此所學宗等者今此一家自章安以來至于荊溪所學之宗皆共遵稟天台智者一師而已故金錍云天台大師靈山親承大蘇妙悟是余師也摩訶止觀所承法也故止觀之法文理相承代代傳授以為心要同歸一轍終無異解但由忽遇清凉觀師僻執之者因而問之乃生異答故事不得已而微召於止觀之法曉喻清涼觀師之迷惑耳然清涼觀師本學天台嘗講止觀裴休作於清涼行狀有此說也既生僻解遂被荊溪辭而關之乃背天台附於賢首依賢首五教造華嚴疏鈔言五教一者愚法小乘教二大乘始教三大乘終教四大乘頓教五大乘圓教又於疏鈔之中全用止觀之法雖用止觀之法又立兩頓之教嗚呼哀哉教宗賢首行稟天台教行殊塗師資無準既迷止觀濫用何疑故今曉喻其致照然或問曰義例輔行明所傳之法須有師承故荊溪述輔行緣起凡有十意第一為知有於師承非任𮌎臆而近代學者傳天台之道皆宗於四明今觀吾子所述凡至法門淵奧之處多排四明而衆人聞之咸生驚怪亦有笑於吾子學無師承僕雖無似彌積欽慕幸垂開示用息羣疑余對曰輔行義例明師承者乃是以智者為師止觀為所承之法蓋破清涼觀師違背於天台乖僻於止觀耳余今秉筆既袒述於智者又憲章於止觀而衆人笑余無師承者是為妄笑耳何傷於余哉謂排於四明是無師承者且四明稟受寶雲通師而通師亦頗有撰述何故四明不遵所稟之見而別自建立邪通師撰記解光明玄而四明反云寶雲講次第學徒隨録義或闕如通師又解十六觀經疏而四明斥云多談事相少示觀門又孤山稟受奉先清師亦多有改作清師解不二門曰示珠指孤山解不二門曰正義清師解十六觀疏曰顯要孤山解觀經疏曰刊正嗚呼世人只知笑余學無師承而不能笑孤山四明道無所稟悲哉悲哉問頓教下次正曉喻文為四十六段然金錍中開導野客情懷亦立四十六問既為斷於鈍根疑惑及對六即而今四十六段喻疑顯正豈不然乎初辨謬立二種頓教之失文為三初問次答三喻疑顯正應知初問即是荊溪問於清涼次答乃是清涼答於荊溪三喻乃是荊溪喻於清涼餘四十五段準此可知又下文中或無問辭但直引於清涼謬立便乃喻之然此喻疑四十六段文皆顯了不煩碎釋其間或有關涉之處則為示之言講貫者講者和解也貫者貫華也法華文句云天竺有散華貫華之說如此間序後之銘也故長行之說如散華偈頌之說如貫華又修多羅有翻之中第四翻線線能貫持如貫華也此乃通指諸經皆名貫華耳四分律云如種華散置案上風吹則散何以故無線貫穿故也是則別而言之除長行散說凡是偈頌皆名貫華通而言之長行偈頌皆名貫華故修多羅五種翻中第四翻線也若名體俱無修行何託者以不憑教修行皆是無依虗妄故也若以頓頓是圓如圓圓等此義可爾者縱而許之也故妙玄明宗中約四句料簡云自有漸圓此約七種方便同開佛知見始見圓理見圓理者良由理外七種方便漸入圓因故言漸圓也自有圓漸謂初住已上也自有漸漸謂七方便各自有因也自有圓圓謂唯妙覺也此約偏圓相對論四句也又單約圓論四句今不煩録又止觀第三明偏圓中亦四句文中仍指如法華玄然此圓圓即是四教最後之圓而清涼以天台四教最後之圓判為漸圓亦云漸頓於漸頓外又更別立頓頓之教故今斥云既分二頓漸頓為圓更加頓頓為何所擬又涅槃玄明經用中亦云頓頓仍指如前明經宗中復有一行是如來行及以常住大般涅槃故下文云正是四教最後之圓而清涼指不次第行十信斷惑名為漸頓不斷惑者謂之頓頓是故下文復更斥之云云次辨謬立二位斷惑之失文為三初問次答三喻言四住者見為一住思分三住更加無明即五住也圓教四念處者大師自有別行四卷四念處文即以四教四種念處各為一卷也冶羊者切銷也鐵作器等者彼文圓教四念處云五品名外凡十信名內凡皆圓伏無明而界內見思自然而盡如火燒鐵鐵雖未融垢在前去正慧觀無明無明未除見思前盡非關漸次者若據粗惑任運斷處亦與次第次位相齊而從初來三觀圓修與次第義永不相關故妙玄云三藏佛位斷見思盡望圓六根有齊有劣同除四住此處為齊若伏無明三藏則劣佛尚為劣二乘可知永嘉宿覺集中既用天台此文驗知永嘉本學天台而云認得曹溪路者豈非矛盾苟順永嘉宿覺集中明於修證將何超於天台止觀邪
