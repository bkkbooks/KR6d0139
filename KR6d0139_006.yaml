body:
  text: 永嘉沙門釋從義撰三辨謬立二頓修成有異之失文為三初問次答三喻又復不識見思先落似位之意等者釋伏疑也既破清涼空觀先成復恐清涼執於見思先落之說何者彼應救云空觀若乃不先成者冶鐵作器見思前去如何消之故今斥云不識見思先落意也若先成者何名似即既云似即豈非三觀圓觀三諦相似發現故知若云空觀先成但是證於真諦而已則無三諦相似發現與四念處正慧觀於無明之說敵體相反方成邪說者方猶乃也四辨謬據玄文八教立二頓之失文為三初問次答清涼雖背天台承於賢首而華嚴疏鈔猶尚執云大師判教指天台大師判教義也本意如是故知清涼執見仍存也三喻又為三初總斥次一者下別破文為七初破不識教名之妨即是破其不識化儀四教中頓教之名也別立一頓者此舉清涼所答之辭也乃是華嚴等者即是荊溪曉喻之語也言頓部者約化儀四教判華嚴即是第一頓教從部時味等立頓教之名也從部在初則佛先說天從時在初則日出先照從味在初則牛先出乳部是約法時味從喻今既明於從部約法則時味等約喻可知部仍兼別者約化法四教釋華嚴即是別圓兩教也圓為能兼別為所兼據義應云部中之圓仍兼於別圓既兼於別教一粗是故圓教獨顯不成不得妙名良由於此華嚴既爾方等般若準而思之然清涼以賢首五教和會天台四教云初愚法小乘教即三藏教次大乘始教即通教三大乘終教即別教孤山霅川明附賢首及以清涼具如金錍寓言記中委彈斯謬五大乘圓教即天台圓教天台所以不立頓教者以賢首五教中第四乃是大乘頓教故也以四教中皆有絶言故也今乃開者頓顯絶言別為一類即順禪宗也清涼亦是濫禪之流類耳又云五教大同天台但加頓教耳今問清涼既以賢首圓教會同天台圓教是則四教中圓教之外更無於圓矣何故又却別立頓頓邪既背天台復違賢首師資無歸稟承何在清涼又斥天台判於華嚴兼別圓融行布各得一邊失華嚴意今問清涼天台判於華嚴兼別其意非失汝自不解推過於師耳圓融行布二義元分經文炳然于何不見輒云善財參諸知識唯解一法未知諸行謂之謙己而推他勝若其然者普賢彌勒何不謙己而推他勝邪清涼又謂行布差別乃是圓融之行布耳今問清涼行布圓融一邪異邪一則圓融之外無復行布矣異則何謂圓融之行布邪既乃圓融何有行布夫圓融者融於何法而存行布邪若存行布豈成圓融邪所言天台四教之中皆有絶言故不立頓教者此又大錯何者四教之中絶言之理義該大小真中權實而賢首頓教自是大乘何得會同四教各有純言之理該於大小真中權實邪此且略辨餘如大部補注中明次破不識漸開之妨即是破其不識從化儀中之漸開出化法之四也準法華玄華嚴頓後等者即妙玄第一卷明顯露不定教中云雖高山頓說不動寂場而游化鹿苑釋籤云此指頓後漸初不動於頓而施漸化今云不動者約依報而說也故云不動寂場而游鹿苑也不降者約正報而言也即不降天宮而往樹王之下也身土並是即頓而漸故云不動不降也此約顯露不定之教作如是辨若約顯露定教而說亦可謂之動彼寂場游於鹿苑若不爾者何故謂之脫舍那之服著斃垢之衣故知若約顯露不定亦可謂之不脫舍那之服而著斃垢之衣綺文互彰是例非一漸教之初者漸有於三謂初中後鹿苑名漸初方等名漸中般若名漸終方等彈月具用四者即彈偏折小歎大褒圓也折小如維摩經弟子品彈偏如菩薩品歎大如觀衆生品褒圓如稱歎文殊及維摩等又弟子品用折不同有用三教如訶目連即歎大也有用圓教如訶身子即褒圓也般若洮汰洮土刀切汰他蓋切此二字體恐非文意其字正體應作濤汰說文云浙㶕也亦云澄洗也亦具用四者然般若中正說大乘通別圓耳若兼助道亦用三藏如仁王經四無常偈輔行十二具引云云故玄文中自鹿苑來等者妙玄第一卷明日照幽谷中云約法被緣名漸教相次照平地中云約法被緣猶是漸教相次明般若中云約法被緣猶是漸教相故知三時皆名為漸也又玄文第十漸頓判教等者玄文云一頓二漸三不定此三與舊名同義異今釋此三復有二解一約教二約觀初約教者華嚴七處八會之說譬如日出先照高山淨名之中唯嗅詹蔔大品中明不共般若法華中云但說無上道涅槃云雪山有草名為忍辱牛若食者即得醍醐諸大乘經如此流類皆名頓教非頓部也釋籤云始自華嚴終至法華皆有頓義故顯露中唯除鹿苑以餘部中皆有頓故名為頓教而非頓部七處八會委如釋籤然此處會所明位行不出別圓經意兼含義難分判次漸教者如涅槃云從佛出十二部經從十二部經出修多羅從修多羅出方等經從方等經出般若從般若出涅槃如此等意即漸教相又始自人天二乘菩薩佛道亦是漸義文中間次第入亦是於漸釋籤云漸教又三初約始終共名為漸次約人在教判之為漸三從方等之初至法華前皆名為漸前文多處及止觀等用中間之漸今用舊名通判一代且置藏等是故爾耳今先引大經通明一代漸教之相次約人在教以判為漸始自人天終至佛乘亦名為漸此是約人人雖在於諸味漸稟而得益深淺始自人天次第入實此如止觀初破三途後達常住此人不經華嚴但從鹿苑之前初稟人天後漸深入言中間者或復初從方等般若後漸漸深入皆如前說並名為漸以鹿苑後皆有人天乃至實相故也此等漸人初不在華嚴後不至法華教雖經漸或得頓益其未入者來至法華被開會竟又名漸頓自是別途非全名漸今文存略是故但云自華嚴來至般若會皆有漸頓其實應云始自華嚴終至涅槃皆有漸頓但須簡於法華乃是開漸之頓非全名漸耳清涼不曉輒生異論悲哉悲哉三破不識教體之妨前破不識漸開之妨即是破其不識漸開之名故今乃破其不識教體也若漸開出四如開拳為指等者拳喻漸也指喻四也法喻開合如文可解若存漸教乃沒藏通別圓之四更加頓及祕密不定是則教唯有化儀四故云存漸則教唯有四也若沒漸教乃存藏通別圓之四更加頓及祕密不定是則教唯有化儀三及化法四故云沒漸則教唯有七也若乃存漸又更存於藏通別圓是則俱存必定一邊而無體矣舉拳指喻思之可知故云俱存必一邊無體也若立化儀之四又立化法之四是則體狹局在化法名寬通於化儀化法故云立八則體狹名寬也以化儀四教教下義理只是藏通別圓是故名寬乃立於八體狹但局在四也故輔行云藏等四教遍收一切大小乘經因果顯了各立教主各被機緣始終備足不過此四頓等四教但是如來不思議力布措藏等盈縮調停成熟物機破邪立正引小歸大廢偏顯圓會權入實故有諸部五味相生利物無方適時出沒四破抑挫法華之妨抑者沒也挫者摧也即是破其用於華嚴兼別之粗抑挫法華純一之妙也近代判教等者隋末唐初嘉祥寺吉藏法師依法華經涌出品立三種法輪教一始見我身聞我所說即皆信入如來之慧為根本法輪教指華嚴經也二除先修習學小乘者為枝末法輪教即三乘等於後所說也三我今亦令得聞是經入如來慧為攝未歸本法輪教即法華經四十年後回三入一也嘉祥舊立此三法輪後歸天台是故須廢舊日所立若不然者何須歸命天台智者故嘉祥吉藏上天台書云常願伏膺甘露頂戴法橋自顧庸訥不堪指授餘如大部補注中引文句記云故知嘉祥身霑妙化義已灌神舊章先行理須委破識此大旨師資可成準此一條餘亦可了如其無失何以歸心其失乃是歸心之前破之則是光其後也文句之中破於嘉祥是故記中有此云爾亦如三種法輪殊乖承稟大師稱為頓乳其以根本為名大師以三味為枝條其亦以醍醐為歸本今問凡言根本即曰能生能生始成後攝歸本本却非始二言相乖枝末不立攝亦無當況根本兩分攝歸方一一為根本二則名枝是則根本本來是枝應須會初而從於後故開華嚴枝別以入法華本圓況華嚴別圓俱成近迹根義復壞法華本成又言三味是枝末者鹿苑可爾且約顯露定教故也二酥如何若二酥圓別是枝華嚴豈可成本若爾乃成會本歸本或即會枝歸枝若法華不關華嚴則令二本永異何得名為會末歸本況法華部內無入華嚴之文但有入佛知見之說況涅槃終極五味明文本師所師舊章須改若依舊立師資不成伏膺之說靡施頂戴之言奚寄清涼觀師朋附嘉祥舊立三輪乃釋法華於一佛乘分別說三云一佛乘者即華嚴經也會三歸一即攝末歸本也始見我身聞我所說即皆信受入如來慧即指華嚴為根本也除先修習學小乘者我今亦令得聞是經入如來慧即攝末歸本也是經即法華也法華攝於餘經歸華嚴也故天台指為乳教乳是酪等諸味之本故也請以文句記中斥嘉祥之文破清涼之謬今問清涼嘉祥舊立若乃無失何以歸心悲夫清涼拾失為得謬有阿附譬之皮尚不存毛將安立亦如攀枯求力以至人杭俱倒者也況天台但判教部在初喻之乳味何曾指初為根本邪是經之言既指法華何得歸本却指華嚴自言矛盾所立如何況將最後醍醐上味還歸最初華嚴之乳一何可笑哀哉清涼何其如是唯天台大師等者南嶽思大禪師居光州大蘇山天台智者大師初詣頂拜思曰昔共靈山同聽法華宿緣所追今復來矣即示普賢道場為說四安樂行於是昏曉苦到如教研心以至誦經至藥王品諸佛同讚是真精進是名真法身心豁然寂而入定持因靜發照了法華若高輝之臨幽谷達諸法相似長風之游太虗自著章疏者自是天台山門一家所立章疏不偏宗於南北諸師也以十義比之等者嘉祥不曉法華經中地涌品文輒立三種法輪之教故天台著立法華文句文句與疏如觀經疏往生記中委詳所以乃以十義比之也故文句云今略舉十意釋之一始見今見初成道名始見法華座席久後真實名今見二開合不開合日照高山即說於頓不開不合為不入者開頓說漸五味調伏令漸歸頓三豎廣橫略頓直豎入入於法界故言豎廣不歷方便故言橫略今歷五味即橫廣得入佛慧亦是豎廣四本一迹多迹共本獨一臺故本一千葉故迹多迹與衆經同故言共本與衆經異故言獨五加說不加說加四菩薩說四十位自說開示悟入不加於他六變土不變土華王世界故言不變三變土田故言變土七多處不多處七處八會是為多處耆闍崛山遠處虗空故不多處八斥奪不斥奪滅化城改客作故言斥奪無如此事故言不斥奪九直顯實開權顯實行大直道名直顯實決了聲聞法是諸經之王名開權顯實十利根先熟鈍根後熟根利緣熟始入佛慧根鈍後熟今入佛慧緣宜不同略為十異種智法界等無差別是故文云始見我身聞我所說即皆信受入如來慧除先修習學小乘者如是之人我今亦令得聞是經入於佛慧明文在茲不須疑惑諸師見其緣異逐緣異解迷不知反去道轉遠若識理同十車共轍佛慧則無殊也舊云華嚴了義滿字常住法華不了義非滿非常今以此文並之若始入是了義今入不了義者始入是佛慧今入非佛慧若佛慧既齊了義亦等滿字常住皆亦如是地人呼華嚴為圓宗法華為不真宗今亦用此文並之文句記中委釋十義今不具引迹門尚殊本門永異者釋籤第一引玄義下文云今經迹門與諸經有同有異異謂兼帶同邊不殊本門與諸經一向異所謂遠壽諸經永無今文且置同邊不殊同邊不殊者法華已前圓教與法華迹門圓妙無二無別即顯實是同也但舉兼帶異邊而說是故謂之迹門尚殊以法華前雖有圓教以兼帶故獨顯不成是故不得稱之為妙今經迹門純一無雜捨諸方便獨得妙名是則迹門與法華前顯實雖同純雜則異迹門尚自與前有殊本門安可與前參濫是故謂之本門永異也五破不識頓名之妨問此與初破不識教名如何區辨答初但破於不識化儀四教之中頓教之名今此所破不識頓名則兼教行及以化儀化法等別故云若將判味兼帶之頓以斥獨顯等也法華雖超八教之表然亦屬於四教最後之圓所攝故也是故舊題圓頓止觀者輔行云此之一部前後三本其第一本二十卷成并第二本十卷成者首並題為圓頓者是為異偏小及不定故其第三本題為摩訶即今所承若從味立稱則頓異於圓者即化儀初頓異於化法最後之圓也且化儀之頓尚不可濫諸部之中化法之圓而輒斥於法華獨顯純妙之圓豈不誤哉六破違拒本宗之妨贊贊有佐也助也字恐誤應作讚字讚者稱美也抑實等者抑於法華純妙之實揚於華嚴兼粗之權毀抑招愆有何利益七破違文背義之妨經云已說等者文句云初歎法者已今當說此經為最有師解已是般若當是涅槃法華之前小大相隔法華之後已得會同此經正是會三之始歸一之初故言第一經歎法華在已今當外此師闕一節今初言已者大品已上漸頓諸說也今者同一座席謂無量義經也當者謂涅槃也大品等漸頓皆帶方便取信為易今無量義一生無量無量未還一是亦易信今法華論法則一切差別融通歸一法論人則師弟本迹俱皆久遠二門悉與昔反難信難解當鋒難事法華已說涅槃在後則易可信也且已說既是漸頓而清涼將已說易信華嚴之頓名為頓頓超勝法華純妙第一難信難解是則已說易信却成第一難解何關法華最為第一難信解邪豈非固欲貶挫妙教乎荊溪今文作此斥已清涼又於華嚴疏鈔救云若依難信難解說將已設該於華嚴若比法華亦為易信始成正覺清涼於此既云始成後又說於華嚴久成豈非矛盾委如下文具引破之便說一極上根所受不對昔權故比法華成易信耳今問若爾易信非第一却得為頓頓難信最第一何得名漸圓對面違佛經是可大哀也三如此下反質清涼自衒頓頓之說唯我獨知今破獨知略有七妨是故識者聞於清涼獨知頓頓咸皆塞耳五辨謬解從漸開四之失文為三初問次答三喻言喻四者四字誤也應作曰字餘文可見六辨謬判法華為漸頓之失文為三初問次答三喻文為四初總斥不曉次玄文下正申玄文又為二初總敘玄文此中存略彼妙玄中明祕密後具云但可智知不可言辨雖復甚多亦不出漸頓不定祕密今法華是顯露非祕密是漸頓非漸漸妙玄前文明第五時云日光普照高下悉均小音微善皆成佛道具如今經若約法被緣名漸圓教若約說次第名醍醐味相乃至下文云會小歸大是漸頓泯合等釋籤云漸圓教者此文語略具足應云鹿苑漸後會漸歸圓故云漸圓人不見之便謂法華為漸圓華嚴為頓圓不知華嚴部中有別乃至般若中方便二教皆從法華一乘開出故云於一佛乘分別說三又上結云華嚴兼等此經無復兼但對帶此非難見如何固迷全不推求上下文意直指一語便謂法華劣於華嚴幾許誤哉幾許誤哉是合非不合是醍醐非四味是定非不定釋籤云今法華是顯露等者對非祕密故云顯露於顯露七中通奪而言之並非七也別與而言之但非前六何者七中雖有圓教以兼帶故是故不同此約部說也彼七中圓與法華圓其體不別故但簡六此約教說也次言是漸頓非漸漸者具如前判今法華經是漸後之頓謂開漸顯頓故云漸頓非法華前漸中之漸何者前判二酥同名為漸此二經中亦有圓頓今法華圓與彼二經圓頓不殊但不同後生酥中三熟酥中二故此三二名漸中漸法華異彼是故謂之非漸漸耳人不見之便謂法華為漸頓華嚴為頓頓深不可也故知若得玄籤之旨則今文可解是故漸頓之言自含三義一者法華與前二酥漸中之頓顯實是同故云漸頓二者法華開漸顯頓故云漸頓三者法華獨顯妙頓對前之漸故云漸頓故下文云頓居漸後對漸明頓故云漸頓即此意也言漸頓下次解釋文為二初正釋文為三初釋漸頓言漸中有頓者即二漸漸中漸終之中皆有圓頓也言頓中有漸者即華嚴頓部之中有別漸也故釋籤云若以別教當教之漸相對說者應云頓中兼漸漸不妨頓也今法華經迹門圓說與漸頓中其義不殊等者此文恐倒準釋籤中今文應云與漸中頓其義不殊也言漸漸下次釋漸漸其文可知頓中之漸下三釋頓中漸頓不簡所以頓中之漸既是別教頓中之頓豈非圓教頓中之漸與漸中漸其義不殊者以華嚴中別教與二酥中別教無異故也頓中之頓同漸中之頓亦同法華者以華嚴及二酥中圓與法華圓約教顯實是同故也問今文既云頓中之頓那破清涼立頓頓邪答今言頓中之頓是頓部中圓頓之頓既與二酥法華圓同豈與清涼所立一槩邪故玄後文下次引證文為二初正引玄文言後文者第一卷後第九卷中明經宗云衆經因果同異者迹因果或同或異本因果永異乃至云般若通對三教傍真因果此義則異別對菩薩復有利鈍為鈍明因此義亦異利人因者此義則同淨名佛國義兼若三種佛國因果此義則異一種佛國因果者則同華嚴亦對兩緣鈍異利同如前分別是為衆經因果與迹門同異也本門因果永異衆經云云次同者下且釋迹門同異準向可解若欲解釋本門因果永異衆經者謂今經本門談久遠因果而迹門及法華已前一向永無故也三不見下結斥謬判四文中下案文反難七重辨謬判法華為漸頓華嚴為頓頓之失文為三初問文中既云復何得知故知乃是重辨謬判也次答三喻文為三初單約法判今經為圓極頓足故法華云我法妙難思當知是妙法諸佛之祕要故知法華圓妙約法不從數千聲聞而判又輔行云漸與不定並從昔說來至法華無復二名若以人從漸教中來即以法華名漸頓者此人亦從不定中來法華何不名不定頓人自多途法華常頓各賜等一思之可知清涼又云華嚴是菩薩請說法華是聲聞請說佛為聲聞說法華耳嗚呼清涼謬之甚矣神力品云今為諸菩薩摩訶薩說大乘經名妙法蓮華而清凉不見悲哉悲哉所言法華是聲聞請者此見一邊耳豈法華中無菩薩請邪具如大部補注中辨學者尋之次況復下約人聞法判今經為頓頓文為二初正約佛世別判又為二初舉聲聞開顯不多以斥謬立若謂聲聞從於小來至法華會方始開顯即判法華名漸頓者且聲聞人不過五百千二百等是故今云況復等也又有菩薩下次舉本迹兩門菩薩得益無數正判今經文為五初舉迹門亦有菩薩開顯以斥偏計聲聞菩薩聞是法等即方便品偈中之文也又慈恩云疑通會別疑通三乘會但別在聲聞緣覺遂說法華但開會於二乘作佛此與天台大義相反廣破斯謬具在諸文亦如補注云云又下文下次舉本門菩薩得益甚多此即分別功德品中之文也況下方下三舉下方菩薩并妙音等衆言營從者營者衛也部也從者隨行也又亦應引普賢從東來與大菩薩衆并諸天龍等無邊不可數四如是下明前諸衆不從漸來五應當下結示頓頓又輔行云若復有人謂此法華偏被下根判為漸教若其然者法華玄文釋用中云迹門正為生身未入者入傍為生法兩身已入者進本門正為生法兩身已入者進傍為生身未入者入又本門中僧道損生文後復有八界塵數初始發心既未游漸此即頓人豈從數千二乘之人及鈍根菩薩而判妙教況兩門得益數倍餘經何不推尋經之本文正直捨方便但說無上道無二亦無三除佛方便說已今當說最為第一不聞此經不名善行菩薩之道開方便門示真實相各賜諸子等一大車草木皆依一地一雨如是等文不可具述何不憑茲判為頓教邪次況復下約現在滅後總判由是而知不可但約五百二千二乘之人判茲純妙之經名為漸頓者矣華嚴經衆下三判華嚴不及法華新華嚴經第八十卷普賢以偈頌佛德云佛智度大同虗空普遍一切衆生心隨衆生心種種行令其所見各不同或見釋迦成佛道已經不可思議劫或見今始為菩薩或見始生或見滅清涼準此遂救華嚴亦具二義云經云成道不思議劫舉此以遮天台之謬謂彼學者多云華嚴雖則玄妙而有二事不如法華一兼別義是故不說聲聞作佛二說如來始成正覺不說本師壽量久成故今疏中指此經文即是華嚴說久成處若以此後不該於前則法華壽量不能廢於我始坐道場於三七日中思惟如是事等迹也不說聲聞作佛者約不共義既無厭捨曾何棄之況一成一切成無一衆生不具佛智已上清涼華嚴鈔文今謂清凉雖學天台深不見於天台之道所以違背妄生譏毀以惑未學天台宗者誠可悲哉且如善財未見彌勒普賢之時是諸知識皆云我唯知此一法豈非歷別行布宛然況復經云二乘不聞何況受持故雖在座如聾如瞽何曾授記令其作佛若謂作佛今問作佛劫國等事如何指陳且法華前諸部中圓顯實是同何曾不明二乘作佛但未彰灼對於二乘而說之耳又復何曾不說一切衆生皆具佛智何得約此而立華嚴授記二乘邪且顯實是同開權局此何得引於諸佛菩薩不厭不捨二乘之人便謂此是授記二乘作佛之說佛雖不厭捨而二乘未悟故至法華中方授作佛記是則法華前佛意無所隔但說時未至故有兼帶耳一成一切成自約極果說準此為授記立二乘作佛無乃不可乎極果一切成若便是授記二乘作佛者是則諸衆生於佛成道時已皆得作佛何須更見佛聞法而修行清涼不達此妄破天台師是若可忍也孰不可忍哉普賢偈頌或見釋迦成於佛道已經不可思議劫者但是今日初成正覺有機自見經於多劫耳非謂便見久遠本成是故但言成道已經不思議劫亦無本行菩薩道言又無久遠實成之語安可便同法華本門久成長壽故知但是一機或見初成佛道即短而長是故已經不思議劫亦無拂迹之語仍存始成故也若不爾者至法華中何所云邪故法華中彌勒等四請如來四誡已方乃談於久遠因果豈華嚴中不請不誡而普賢因人輒便拂於如來近迹而顯本師久遠因果邪以此例斥清涼謬立華嚴輒記二乘作佛亦復如是又復經中皆言或見斯是如來不思議力令諸衆生各見不同耳且各見不同豈非密覩邪故法華前密論得見如來成道或已經於不思議劫有何不可但未彰灼顯露說耳法華已前密記二乘義亦準此故知顯露授記二乘拂迹顯本唯在法華是知密見自是一邊不可便濫通塗大體故天台解壽量品云下方菩薩本日所化皆不執迹若乃他方舊住菩薩俱有二種一從法身應生者往世先得無生或已發迹顯本設未得聞報盡受法性身於法身他自應得聞長遠之說故知應生菩薩不執近也二者今生始得無生及未得者咸有執近文句記云不同界內經歷五味跨涉本迹七請五誡方乃得聞以見一分法身理合得聞長遠由是而知今普賢云或見成道不思議劫有何不可況復華嚴後分奚嘗隔於法華設使或見成道久遠亦何乖爽故天台解金光明空品云若指般若則此經非方等攝若不指般若諸經不廣明空義此復云何答諸經前分結集人應作次第而其後分皆攝入前例且舉一以類諸如方等陀羅尼經次第在法華前而經中云先於靈山已為聲聞授記豈非方等至於涅槃以此推之言次第者是前分也互相指者是後分也結集者以後分明義氣類若同向前集之惑者不知言乖次第實不乖也此經是方等後分故指般若為已廣說空於義無妨矣又大佛頂首楞嚴經云波斯匿王年六十二又云是名妙蓮華又云定性二乘及諸一切皆獲一乘寂滅場地豈非亦是方等後分之所攝乎諸家競解首楞嚴經既迷此旨餘不足觀云云清涼不曉天台法門便乃違背輒生譏毀良用悲哉八辨謬據聲聞為多以判法華之失文為三初問次答三喻又為三初斥讀文未熟不辨多少言玄理者廣雅云玄黑色謂幽寂也所謂玄妙幽寂之理趣也又玄者通也次應知下正申法華開漸顯頓是知玄義謂此法華是漸頓者乃有三義前文已明今法華經迹門圓說與前二酥漸中之頓其義不殊名為漸頓故今乃明來至法華開漸顯頓名為漸頓漸頓二義如此炳然清涼不見便謂法華劣於華嚴既謂法華劣於華嚴又將賢首所立圓教會今圓教賢首既指華嚴為圓是則華嚴之圓何曾異於法華之圓況復賢首所立圓教不明圓理本具諸法是則賢首所立圓教尚自不可濫今圓妙況將法華判為終教豈非虗妄何得背於天台朋附賢首貶挫妙教傷如之何人不見下三結斥謬判九重徵謬判漸圓四住先落之失以前答中乃云漸頓初住已前四住先除故今又更重徵前謬於中為三初問次答三喻言前後者此約大師說法時節次第有前後耳非謂單指止觀上下之文為前後也故妙玄文句止觀三部之中皆引仁王十善菩薩發大心長別三界苦輪海以證法華六根清淨是圓教內凡十信之位也故釋籤云次引仁王云十善菩薩發大心者亦有人云六根清淨是頓義十善菩薩是漸義今文所引十善菩薩以證六根豈應引漸而證於頓故知二文俱頓明矣但仁王經語其初後發心為初別苦為後法華經意論其中間發心之後別苦之前六根清淨名為中間人不見之徒生異論又輔行云次明十信位者五品已能圓伏五住豈至此位別斷見思但是圓修粗惑先斷猶如冶鐵粗垢先除人不見之便謂法華六根為圓仁王長別三界為漸既云法華部是漸頓云何釋位即是頓頓況所引仁王本證法華如何離開分屬兩種又除圓位已一切諸位無有十信破見思者文句記云既云長別三界苦輪諸經信位有云長別三界苦海者不可將判住行向位當知須是斷惑十信自非今家準法華文判以法師功德六根互用準止觀輔行之意即八信已上入假位也何哉七信已前入空之位尚無一物豈有見聞十界之事乎既言六根互用知是入假之位照分十界也人不見之輒云空中本體自有三千者灼然誤矣為十信位而為內凡於十信前以分別功德末如來滅後已下文立五品位為外凡寧判十信斷三界苦仁王經意何由可消若不然者如何可判華嚴初住為聖位邪若判華嚴十梵行文以十信心功齊極位復成太過初住屬聖十信如何非內凡邪此與地前伏惑初地見道永不相關是故今以圓意消文各更引經而為證據故六即判位理不可亡法華云無漏意根乃至云且於界內得無漏名者此文恐誤也何者法華云雖未得無漏智慧者十信未得初住聖位無漏智慧也而其意根清淨如此者內凡意根通達義趣不違實相也意根既爾餘五亦然無漏既在登圓初住當知即是念不退位無於二邊之漏失耳故此無漏不從界內而得名也有漏業除故云長別者業能潤生集因既除則無苦果是故謂之長別苦海耳劈博厄切字正作擘謂分擘也十辨謬判圓頓止觀為漸頓之失文為三初問摩訶止觀章安序云天台傳南嶽三種止觀一漸次二不定三圓頓皆是大乘俱緣實相同名止觀故今問云三種止觀等也次答三喻文為二初與奪總斥次何者下別破文為四初破僻解兩處神通及依經更明圓頓之文自為二段初總斥謬將大師正說之文預破章安未生之序如破神通者且牒清涼云中即三觀破於神通神通被破耳其實須云如通者騰空及依經更明文在序中也又三觀下次別破不解文意又為二初斥不解兩處神通之文此自為三初約弟子破師斥三觀本傳南嶽者此文語略具足須云三種止觀本傳南嶽也如何弟子反破師宗師即南嶽宗即所傳者謂如何郤以智者說於十乘之中識通塞文中即三觀破於南嶽所傳三種止觀之中圓頓止觀邪況復止觀前後三本圓頓之名乃是初二如何郤將第三摩訶破於初二邪豈圓頓止觀十乘非摩訶止觀十乘邪乃成逆路伽邪論者法華安樂行品云路伽邪陀逆路伽邪陀文句云路伽邪陀此翻惡論亦云破論也逆路伽邪陀者逆君父之論也又路伽邪陀名善論亦名師破弟子逆路伽邪陀名惡論亦名弟子破師又南嶽稟承慧文龍樹者此語亦略具云南嶽稟承慧文慧文師於龍樹故章安止觀序云文師用心一依釋論論是龍樹所說付法藏中第十三師智者觀心論云歸命龍樹師驗知龍樹是高祖師也故知天台稟於南嶽三種止觀即是遵於文師及龍樹也故輔行云由是而知台衡慧文宗于龍樹二十三聖繼踵堅林實有由也良可信也又云致使龍樹之後妙觀斯在良由於此況兩處下次正明兩處神通其義各別言兩處者即是序中及識通塞中也序中云漸則初淺後深如彼梯隥不定前後更互如金剛寶置之日中圓頓初後不二如通者騰空為三根性說三法門引三譬喻輔行云圓頓者序中語略具如下文二十五法為前方便十法成觀而為正修如通者騰空者近地之空與萬仞同體故云不二通者譬頓行人騰譬修觀觀理空譬頓理不二今云履者履即騰也行雖階差仍名圓漸者圓中之漸故云圓漸即是圓頓止觀之行自論圓漸之義故也故止觀云圓中當體理極稱圓亦有初心乃至四十一地豈不是漸故釋籤云不異而異假立淺深設位簡濫又云圓頓雖俱實相因果灼然若有因果即有淺深如止觀中及此下文圓漸漸圓四句料簡則圓家之漸泠然可知矣理無深淺者即無階差之殊也不當偏圓者即不當圓漸之異也偏即漸也第七卷識通塞中約橫別論通塞引大品云有菩薩從初發心即與薩婆若相應者與空相應也有菩薩從初發心即能游戲神通淨佛國土者即出假也有菩薩從初發心即坐道場成佛者即是中也輔行云同初發心故名為橫分屬三人故名為別大論引三喻一則步涉大論但云或乘羊去輔行云今此文中以步替羊以羊遲故不異於步二則乘馬三則神通初觀喻步次觀喻馬後觀喻神通三義分張非今所用是故今云以步馬神通喻橫別三觀也若一心三觀法相即破豎中之通塞三觀一心破橫中之通塞空即三觀故破步涉假即三觀故破乘馬中即三觀故破神通是故今云神通即是別相之中故以中即三觀破橫別之中也輔行云豎通漸入雖屬一人前後次第三時各異以各異故故非一三今一心具三破次第之三故云一心三觀破豎通塞也三觀一心破橫者彼橫三觀雖屬三人並在初心故三不合一今以三只是一破彼分張之三故云三觀一心破橫通塞也應知一心三觀與三觀一心言互理同但為破於橫豎是故翻對而說耳故圓三觀觀觀具三以破橫別一一所破各別不同故云空即三觀乃至中即三觀也如何不見下三結斥謬解之失輔行云有人云破神通者破第一卷圓頓止觀通者騰空騰空被破知前非頓如此說者殊乖文義論文神通近在目前何須遠求序中之說又若破彼頓更何所傳師資不成付法安在祖乎龍樹其言徒施又彼頓譬文在序中說止觀時未有此序豈得將己正說預破弟子序邪又序中所述師資所傳若破所傳便成自壞矣次斥不解依經更明圓頓之文又為二初正申文意輔行云前已廣略二重解釋今復引證故曰更明第二本中從此乃至佛法之恩並屬商略今並回為引證文也舊商略名沒而不彰良由此也是故今云再治定文意在於此次如何下結斥謬解之失輔行云此引華嚴證三中頓如何郤謂為漸圓邪玄第十卷亦引華嚴方等般若圓證於頓者即前所引以明一代始終頓教非是頓部也華嚴既其非是漸圓者以清凉謂是頓頓故也若其然者方等般若寧非頓頓邪輔行云寧者豈也說文云願辭也次破僻解別則略指三門大意在一頓之文又為二初正申文意止觀云料簡者問略指大意同異云何答通則名異意同別則略指三門大意在一頓輔行云若以此文是大師料簡不應將商略為略指以此商略屬章安序以對大師章初大意為料簡者義甚不便況商略中文無不定故彼文云略引佛經粗彰圓意次引無量義以明漸次明漸次竟即云今置漸論頓與下答文云別則略指三門義復不便今謂文中雖無私謂之言此是章安私料簡也即指辨差略釋三門以為此問雖在序中義兼於正故第一本未有序文亦於文初列三止觀及大意中諸文多以三止觀結第二本初所以列者即是先序師資所傳章安著序合著序中故料簡中相對為問故問三略與此大意同異云何次答意者有通有別通則略名與大意一如分別中云大意略餘八廣別則不爾略則三種止觀不同大意唯明圓頓止觀三中之一故云一頓勿謂三外別立一也若別立者則有多妨一者成天台不稟南嶽二者大意與八章成別大意與八但有廣略不應別故三者當文自相違妨四諦四弘十種發心但約四教如何三外別立一邪若大意一頓於餘章何故釋名得有絶待圓伊三德顯體之中不次第教眼智境界不思議得偏圓五章章章立頓二十五法法法圓解正觀十境俱不思議無緣慈悲安心法性不次第破一心通塞無作道品正助合行離愛無著位登初住如此等文悉皆明頓如何卻謂以為漸邪若云大意唯一頓者如何文內復明四教具如四弘文後料簡云云今文謂之彼料簡文問略明三種止觀者即輔行云即指辨差略釋三門以此為問也故文云漸與不定置而不論者引此文證恐是誤也何者以此文是舊商略故引證大意恐不便也又恐引於舊本商略今本引證簡二之文既簡二已乃引證於圓頓止觀今引此文以證大意在一頓者以序中證圓頓止觀即是正中大意一頓故得引之也故序中云漸與不定置而不論今依經更明圓頓即是舊本商略之文今並回為引證文也故輔行云從漸與不定去廣引證圓先且簡二次正引證今但引於簡二之文反顯正引證於圓頓以證大意唯在一頓即是序中圓頓止觀故也人不見下次結斥謬解之失三破僻解安心文末三一結數之文為二初正申文意止觀云若就三番止觀則有三百八十四又一心上觀復有六十四合五百一十二輔行解釋具如前引次不見下結斥謬解之失四破僻解發心文末三一結成之文為二初正申文意又為二初明三一結文有無不定如六即文六文皆一者輔行又云如六即中理及名字皆止觀結然止觀中理及名字觀行相似則有結文分真究竟但有會於異名之文而無結文由是而知今云六即六文皆一及輔行云理及名字皆止觀結俱恐誤也如前所引者即前所傳部別例中云故用三一收束結撮也又恐指於上文所引安心文末三一之文是故謂之如前所引也故輔行云空假中三不異頓漸不定之三又云只約不可思議一中之三以為三番三中之一以為一心三一共論亦有五百一十二也如常行等者應云如常坐等也又恐常坐意止觀中繫緣是止一念是觀亦是結文所以且云如常行等其實須云常坐等也次又若下明三一結文不出通別通別之義亦如所傳部別例中具足引之始從三藏終至圓頓皆悉有於漸頓不定具如第三偏圓文中者偏圓文中自有五科第四漸頓文中先明四種止觀入圓不定即是四教各論理教行證四種發毒之義次乃明於四種止觀當分圓漸又引大經四種五味證於四教當分圓漸復引大經置毒乳中遍於五味皆能殺人以證不定然後結云今約漸頓作如此料簡輔行云四教各以因位為漸各以極果名之為圓及玄文第十等者藏等不同名之為別頓等遍該名之為通即是頓漸不定三種通於一化始終故也既通一代豈隔四教是故四教皆有頓等故釋籤云此三種義若教若觀該通一化語頓則始終俱有語漸又三種不同不定復寄諸門涉於四教此第一文不歷四教一一三結等者即此止觀第一發心文中不歷四教之別一一通用三種結之但總以四教共為三結以三對一三復為別一則是通故止觀云如是等種種還以三止觀結之又以一止觀結發菩提心是觀邪僻心息是止故上文云又若俱用三一結者只是通別不同所以知於總以四教共為三結者以上文所明感應四悉四隨等皆通四教是故用於三止觀結乃是總以四教共為三結不分教教各有頓漸不定之殊是故與下偏圓文異也以三對一三既名別故知一種則是於通通謂通三別謂各別通別即是總別故也入不見下次結斥謬解之失十一辨謬立兩頓次位同異之失文為三初問次答三喻名別義通者妙玄云次簡名別義通又為二初就三乘共位中菩薩別立忍名而義通通義如前說即三乘共十地位也別立者別為菩薩立伏忍順忍無生忍之名也何者乾慧地三人同伏見惑而菩薩更加伏忍之名以菩薩信因緣即空而於無生四諦降伏其心乃至無生忍云云是為通教共位別為菩薩立此忍名也次用別教名名別義通即是取別教之名準望通教菩薩位也別名者十住十行十向十地也何者別教十信位於通義即乾慧地伏忍乃至十地云云是為用別教名名別義通猶屬通教位也別人動經塵劫名賖地前未斷名伏圓人一生成辦名促極遲不出三生初住能破名斷如前破者即前破於漸頓住前四住先除頓頓登住五住俱斷十二辨謬分利鈍以立二頓之失文為三初問次答三喻言一圓家教法者恐多一個圓字或一一教中而分三根者即上中下三根也或信法二行分利鈍者法行內自觀法故利信行藉他聞故鈍又信行一聞即悟故利法行歷法觀察故鈍或俱利俱鈍信行聞慧利修慧鈍法行修慧利聞慧鈍言覆權者存行布故仍未開權言隱迹者存始成故尚未發迹此之二義文意之綱骨教法之心髓而華嚴不開不拂何得立為頓頓而欲勝於法華邪十三辨謬判兩四中圓皆是漸圓之失文為三初問次答三喻方等只是漸中之一者漸教有三方等但是漸中故也言開權者絶待妙也言獨顯者相待妙也故絶待約開相待約廢具如下文云云十四辨謬判涅槃中圓亦是漸圓之失文為三初問次答三喻光宅以法華已前為狹下短法華為廣高長今家於其一句設四句難四六乃成二十四難故云苦破也引昔通謾應作漫字者以光宅不知法華已前諸部中圓與法華圓妙無別遂乃一向輒判法華已前為狹下短故遭今家苦破之也涅槃雖四前三知圓者輔行云彼經四教皆知常住本意在圓權用三教以為蘇息實不保權以為究竟亢意知圓是故相即粗心若息還依頓觀方等雖四三不入實者別教須簡初中後心教證之異故金錍云即具唯圓及別後位漸中開四不殊方等者漸教既有三故方等中四但是漸中之所收耳涅槃圓伊者圓妙三德祕密之藏猶如伊字三點故也復有一行者即如來之行也三點一行諸文盛說此不煩示既謂涅槃亦是漸圓故三點等無用徒設矣十五辨謬判涅槃四教有不入圓常之失文為三初問次答三喻捃居運切者拾也拾者收斂也法華似秋成大穫涅槃如捃拾餘殘十仙者十仙外道也一闍提首那二婆私吒三先尼四迦葉五富那六淨梵志七犢子梵志八納衣梵志九弘廣十須跋陀羅三修者有邪三修即外道所計常樂我也有劣三修即小乘所證無常苦無我也有勝三修即大涅槃常樂我也今即大涅槃常樂我勝三修耳勝劣但言於三不言淨不淨者釋籤云勝劣相對成於六味故略不說淨不淨耳言初後者涅槃初明常樂及我勝三修義後明十仙得入真實若後十仙不入而初三修豈聞是則初後俱無入實中間寧得入真實邪世尊何故為其說常等者闍提首那以因果是無常為難佛即問云汝性常邪是無常乎首那答云我性是常佛問是性能作一切內外法之因邪答言如是佛問云何作因答言從性生大從大生慢乃至二十五法佛問是大等法常邪無常邪答言我法性常大等諸法悉是無常佛問如汝法中因常果無常然我法中因雖無常而果是常有何等過邪乃至陳如色常等者此陳如品對告陳如先明色是無常因滅是色獲得解脫常住之色受想行識亦復如是次明破於十仙外道今既先明破於十仙得入於常是故次文方明陳如色常等也故知乃至之言即是以後牒初之辭耳餘諸外道大意皆爾者如破第二婆私吒中彼乃問云如來為我說常無常云何為常云何無常佛言善男子色是無常解脫色常乃至識是無常解脫識常彼答佛言世尊我今已知常無常法十仙外道初二既爾乃至第十準例可知是故世尊為須跋說真實之想名為法界名畢竟智第一義諦第一義空且法界第一義諦等豈異圓常邪豈華嚴中所談法門超異於此邪若據清涼之意猶故謂之不及華嚴何以知之以清涼云淨名但顯作用不思議解脫蓋是一分之義未顯法界融通不思議故不同於華嚴也清涼既謂淨名解脫與華嚴異豈可不執涅槃法界與華嚴異嗚呼清凉作此苟且優劣諸經則令無智之人於諸經起慢矣此義不可信也仲尼尚云詩三百一言以蔽之學佛之人何得以一分多分抑揚諸教乎天子一言可非勑邪十六辨謬判止觀多種譬文為漸圓之失文為三初問次答㲉苦角切鳥卵也或作寇音恐非何者爾雅云生晡鷇苦候切注云鳥子須母食之生噣音雛任俱切注云能自食三喻文為二初總斥二失次別破兩非文為二初破不曉喻旨但約少分等者涅槃第五云面貌端正如盛滿月白象鮮潔猶如雪山滿月不可即同於面雪山不可即是白象不可以喻喻真解脫為衆生故作如是喻又下文明順喻逆喻現喻非喻先喻後喻先後喻遍喻八種喻後乃云凡所引喻不必盡取或取少分或取多分或復全取如言如來面如滿月是名少分今言舉扇者扇字恐誤須作面字或恐隨義轉用乃作扇字耳挂字誤也字應從木世云月中有桂樹恐是此意也具是諸法者是字應作足字未入海諸水不具等者此中存略止觀具云華嚴云娑伽羅龍車軸雨海餘地不堪為上根人說圓滿修多羅二乘如聾如啞淨名云入占蔔林不嗅餘香入此室者但聞諸佛功德之香首楞嚴云搗萬種香為丸若燒一塵具足衆氣大品云以一切種智知一切法當學般若法華云合掌以敬心欲聞具足道大經云譬如有人在大海浴當知是人已用諸河之水乃至下文云如迦陵頻伽鳥㲉中鳴聲已勝諸鳥輔行云如來龍王圓頓教雨不雨三教下類之地二乘不聞亦不能說淨名空室表常寂光十方諸佛常集其中是故入者唯嗅佛乘楞嚴意者理理性如丸觀行如燒諸法頓發名具衆氣大品法華云云大經意者理具諸法如海水也修觀行者如在浴也行攝一切名為已用有人云餘地不及遍雨唯嗅而隔餘香搗和不如本具一切不如即是海具不如河具當知此人不曉喻旨夫立喻者皆約現事故引於事喻最上法法必頓足何須難喻雪山喻象意亦如之迦陵頻伽者大論云此鳥㲉中聲未出時已勝諸鳥菩薩亦爾未出無明㲉法音過二乘今文又云餘藥雖合治病不遍者止觀又云譬如良醫有一祕方總攝諸方阿伽陀藥功兼諸藥以為頓喻者以為圓頓止觀之譬喻也肖者說文云骨法相似也不肖則骨法不相似也今清涼元稟天台後生異見乃是師資骨法不相似也故云養子不肖過也而難他喻者以喻望法喻則屬他以清涼難於海具不如河具等故也即其事者而難他喻即其不肖之事也次破違於自言者破其自言矛盾也此等喻文皆在大意者搗萬種為丸在大海中浴文在序中迦陵頻伽阿伽陀藥文在大意初發心中約四弘誓顯是文後清涼既自立於大意以為頓頓而今又謂迦陵喻等並是漸頓故今且從清涼違於自立大意以為頓頓所以乃云此等喻文皆在大意耳十七辨謬判實非父子兩謂路人以喻四教之失文為三初問次答三喻具如止觀記中釋者止觀云法性是所迷苦集是能迷能迷有輕重所迷有即離約界內外分別即有四種苦集約根性取理即有一二三四不同輔行云界內界外權實二理各二根性故四不同若界內鈍人迷真重故苦集亦重利人迷真輕故苦集亦輕界外利鈍輕重亦如是法性是所解道滅是能解所解有即離能解有巧拙界內鈍人所解離能解則拙利人所解即能解亦巧界外利鈍即離巧拙亦如是所以者何事理既殊昏惑亦甚譬如父子兩謂路人瞋打俱重瞋以譬集打以譬苦若謂煩惱即法性事理相即苦集則輕實非骨肉兩謂父子瞋打則薄輔行云通為界內界外作譬以路人為父子名即以父子為路人名離何者苦集之體本是法性猶如父子若謂法性異苦集者名為路人故謂苦集永異法性可譬藏別兩教人也體性雖同於事永異名非骨肉於異強親生父子想則謂苦集即是法性故譬通圓兩教人也十八辨謬判漸則開四別不開四之失文為三初問次答三喻文為三初總破謬判無益次今言下正明漸別皆應開四具如別教四弘之中約四諦境皆歷四教等者止觀第一卷云只觀根塵一念心起心起即假假名之心為迷解本謂四諦有無量相乃至云分別十六門道滅不同及一切恆沙佛法輔行云照知一心起無量心心無量故迷解無量迷即十界苦集解即四種道滅故云四諦有無量相然別四諦攝四四諦自他始終須遍學故所學既多故云無量言十六門道滅者四教四門門門四諦是故得有十六道滅及一切者及十方界一切佛法也又何但止觀明別教開四而妙玄明別教次第五行於慧聖行中亦開四種四諦釋籤云今此四四諦雖並在別教既約生滅等四豎判一教別教菩薩即此自行而用化他故十行中橫辨此四全為利物所以四相各附彼教而為相狀又妙玄第十料簡云問涅槃追說四方等正開四別教復有四若為分別答涅槃當四通入佛性別教次第後見佛性方等保證二不見性釋籤云別教復有四者別教十住修生無生十行修無量十向修無作登地證無作故云有四又十行中習諸佛法具足習於一十六門亦名為四問住已習八何故行中更習十六答前是自行隨用一門後為化他是故行中更習前八是故十六俱須廣習問別人豎行及以橫學四種四諦各附彼教而為相狀其如無作四諦為是但中之無作為是圓融之無作若謂但中之無作者玄籤那云道滅即苦集苦集即道滅四則非四實知真斷妙修理證故知豎行住行猶迷回向薄知登地少證迷解在人體恆相即體既相即雖復名四體實非四是故名為四則非四圓融四諦只是一實若謂圓融之無作者豈可別人豎行橫學圓融無作而又稱為別教之人如何消於輔行中云於中亦具四教滅位雖有無作滅位之名但是別人初地位耳答此應須知教證之意何者若約教道言之則豎行橫學無作四諦乃是初地但中之無作若約證道明之則此無作乃是圓融何者良由別人以無作在果果不通因居教道時但云地上若入初地自行親證方乃與圓無作不異由是玄籤附證道而言乃云四諦相即實知真斷妙修理證輔行約教道而言乃云雖有無作滅位之名但是別人初地位耳又復須知四諦相即若在回向則是別向圓修之義回向薄知即此意也故別向圓修即約行證道之實因而約行證道是別向圓修之妙果也讀文下三結斥謬判之失輕謂輕率輕易疏字平聲正作踈字即踈薄踈濫也十九辨謬判商略是挹流尋源等文之失文為三初問次答三喻文為二初總斥二失所言亦者前破謬判迦陵等喻既有二失故今乃云此亦二失也次別破不曉文意所以總斥二失別破但破不曉文意不破商略謬判祖承者以商略之文居祖承之後在文炳然不須別破是故但破不曉文意則知商略謬判祖承也又復次文重徵謬判祖承之文以為商略即是別破商略謬判祖承也輔行云舊第二本將序及正合為十章故文初云竊念述聞共為十意言竊念者謂私竊興念序有五意一商略二祖承三辨差四引證五示處言述聞者謂記其所受正說亦五意一開章二生起三分別四料簡五解釋今止觀中既存正說開章生起分別料簡解釋五名而今謂之述聞五章次第雖在亦沒章名恐是誤也以將己序及所聽聞合為十段意似未穩故再治定沒斯次第但成序正又於序中唯發起等無歸敬者推功於師述記而已於初序中加於所聞時處等事以為通序用舊祖承人法等事以為別序即再治定之正意也不得復用商略等五以為次第而分再治時處等文故再治定回舊商略以為圓證故下用此商略文云今依經更明圓頓言依經者正當引證證圓頓竟請證餘二即設問云餘三三昧願聞誠證第二本中闕此問也故第二本商略文云略引佛經粗彰圓意故知商略不異引證故再治定沒商略名回為引證若將前本商略等名次第屬對治定本文則使止觀明靜等文便為徒設況將商略以對祖承深為未可是故須廢舊章次第今再治定加通序者欲類結集傳述所聞法體等五故不同舊商略居初二十重徵謬判祖承以為商略之失文為三初問次答三喻儻更等者既將祖承以為商略或問祖承為是何文儻或更答指後辨差是則從始至終重重皆是妄說耳二十一辨謬立二頓具法不同之失文為三初問次答金錍破云子尚不知煩惱心遍安能了知生死色遍色何以遍色即心故何者依報共造正報別造豈信共遍不信別遍邪問清涼若信三處具法莫是清涼元立無情有正因佛性邪又復清涼既信心具荊溪何得又將心具而立無情有佛性理復斥清涼不知有情心性遍具邪答只為清涼不知心具便是無情有佛性理是故荊溪還將有情心性遍具以斥之耳所以謂之故達唯心了體具者焉有異同信唯心具復疑有無則疑己心之有無也謬效傳習無情之言反難己宗唯心之教且如心具一切諸法不隔草木何得信於唯心具法而執瓦石草木非性豈瓦石草木不是唯心具邪故知清涼不間佛性進否教部權實致令自語矛盾相違所以荊溪因其所執仍以破之使邪說氷融正塗不壅耳吾宗後學宜熟詳之不可失於荊溪破立之元意也三喻文為二初破謬立頓頓三處具法文為二初破謬用漸圓為頓頓又為二初總定次何者下釋出文為三初明四教中圓三處具法奚者何也嘗者曾也清涼以四教中圓為漸圓而四教中圓既明三處具法豈非却用漸圓為頓頓邪漸圓既成頓頓而輒分於兩頓具法之殊豈非大謬乎次引念處圓文證成唯識證於心具唯色證於有情色具及依報色具既云非但唯識亦乃唯色豈非三處具法乎孤山但約心具釋之此與清涼所立漸頓心具何異嗚呼清涼尚知三處具法而孤山但論心具一處可不悲哉淨名疏云一切法趣色即是色中具十界法如如意珠具一切寶宜熟思之無謂心具色不具也三結示三處具法正是四教中圓今謬判下次結斥謬判之失𮌎者膺也襟者領也𮌎襟之義出乎自己師心謬立無教可以準憑故也又漸圓下次破謬立漸頓心具餘二則無文為二初正破又為二初破心具又為二初以心具不隔於色破色攝入心下次以色心相即破若別教下次破色不具以清涼云餘二則無即是計於色不具也故今破云何獨色邪以別人初心色心皆不具何得獨執云餘二色不具別人初心者以別人後心即具與圓同故但舉初心耳漸頓回互下次結斥謬判之失前既破於謬用漸頓以成頓頓今又破於心具隔於色具是則清涼所立頓頓三處具法漸頓心具餘二則無乃成漸頓回惑差互無有定準矣冥者暗也二十二辨謬立二頓初心用觀同異之失文為三初問次答三喻言三處五處者一指玄文八教二指玄文第一結教相三指法華中諸聲聞從小來等此即三處也一指止觀第七破神通二指大意在一頓三指今依經更明圓頓四指安心文末五指第一結發心文此即五處也二十三辨謬判一心三觀與三觀一心以為空假更加雙非以對中觀之失文為三初問次答三喻文為二初通示觀法大旨又為二心敘意總標格者定也量也次隨釋三意文為三初明對境成觀次明覆芳福切反覆也輔行中作復踈字疏平聲通也收束止觀云非三而三三而不三非合非散而合而散非非合非非散不可一異而一異輔行云非三而三下復疏三諦還成三諦非三而三假也三而不三空也亦應更云非三非不三中也文無者略耳非合非散中道雙非也而合即空也而散即假也非非合非非散非上雙非即雙照也先明雙非復明雙照二文中間論二諦者以此圓文無前無後故也不可一異即中也而一空也而異假也如此三諦在於根塵如來藏者即當假也豈如來藏而無佛性聞此圓頓不宗重者良由近代習大乘者雜濫故也況像未情澆信心寡薄圓頓教法溢藏盈函不暫思惟便至冥目徒生浪死一何痛哉三明寄名義立止觀第一料簡中云即於文達文非文非文非不文文是其門於門得實相故文是其門門具一切法即門即非門即非門非不門輔行云文即俗諦非文即真諦雙非即中道第一義諦觀門為三例之可見如是觀時文門豈別俱名能通並是所至寄此門名義立三觀是故謂之寄名義立又第三偏圓權實之中明權明實非權非實例之可見此三觀一心下次別釋三觀一心等文又為二初正釋又為二初對前辨異都非此之三觀意者非今上文所明對境成觀等三種三觀意也次只是下正釋準前可見不煩再引止觀輔行人不見下次斥謬文為二初斥擅加以對三觀又文自云下次斥謬解步馬神通文為二初引止觀正文次彼師下敘彼謬解文為二初正敘次步馬元是下斥非又為二初斥謬將空假更破空假元者本也單空單假者以橫別空假各屬一人初心故得單名耳破於橫別下次斥別立頓頓一中具三文為二初敘止觀破於橫別正用圓具言一中具三者即是空一具三假一具三中一具三也故止觀云空即三觀假即三觀中即三觀也次何故下斥別立頓頓之非二十四辨謬分相待絶待以為二頓之失文為三初問次答三喻文為二初反質謬判待絶俱非頓頓文為三初正反質次何者下釋所以三若爾下斥非汝判華嚴為頓頓法華為漸頓又云頓頓是絶待漸頓是相待玄文既判唯法華經具有二義是則何處別有頓頓之絶在於華嚴邪次又依下正斥謬分之失又為三初總斥次何者下別破非漸者非法華已前之漸也唯頓者唯法華獨顯開會之頓也判為相待又判為漸者斥清涼謬判也凡言相待者諸文非一故云凡也彼此互形曰相以他望己為待是則若無粗漸何有妙頓故妙頓之名待粗漸而立也待前諸教等者正申相待之妙也頓居漸後兼所破說等者即廢權明實之義也三又亦下重斥不識絶待之意相待約破權明實故如上說絶待約開權顯實故今謂之絶於所待名絶待者方是妙頓也若不爾者妙外有粗何成妙頓邪清涼離於法華獨顯圓頓相待之外別立絶待之名以對華嚴故云彼乃離頓待別立絶名也且絶待之義既在法華是則華嚴將何以為頓頓絶待乎二十五以法華二妙重難謬分之失文為三初問判屬二塗者分對華嚴法華也次答三喻文為三初斥不達開會之意會入華嚴句下恐脫華嚴兩字餘文可見次今家下正判待絶並非華嚴絶彼華嚴者開彼華嚴兼別行布之粗也況彼二乘在座聾啞至今法華皆得作佛是則絶彼又更照然又何但未絶亦乃無待等者華嚴雖有圓教一妙以兼別故獨顯不成所以不得獨稱為妙其猶君子帶於小人則令君子不得獨顯法華不爾正直捨方便但說無上道既不兼粗獨顯乃彰所以經題稱之為妙此乃待於已前諸粗顯今法華純一之妙是故今經名相待妙華嚴既然二酥可解尚非相待絶何所寄者寄謂寄附寄託也彼將法華開權絶待寄託寄附在於華嚴故今破之華巖尚非相待絶待何所寄乎既無所寄當知華嚴未絶明矣若不者爾何故存於歷別行布二乘在座如聾如瞽三會竟下反斥相違會竟即是法華開顯是故謂之還歸法華若其然者絶待頓頓却屬法華何故判之云非頓頓邪二十六重徵謬判法華唯有相待之失文為三初問彼判法華但是漸頓名為相待故今問云豈有不會而無絶待邪次答三喻但得待前之言者以彼但云對前稱待故也斯乃但得待前諸粗之言耳此且與而言之故云但得待前之言若奪而言之還是未得待前之意若其已得何故謬判華嚴為頓頓絶待邪故云終成不曉所待之名乃至云還負己宗等也負者忘也背也二十七以觀例教重難謬分相待絶待之失文為三初問準所詮之義用能詮之文故云準義用文也因何對昔而分二塗者徵前謬判法華為漸頓華嚴為頓頓也又以法華為不會乃將華嚴為絶待者徵前謬判法華為不會也次答三喻其虗立二觀者虗者僞也妄也教既但一觀何得二故知其乃虗立二觀謬以絶待為華嚴也一觀無文者無教文可準也據下破於無教立觀以消今文亦應可解何者若以華嚴為頓頓之觀則漸頓一觀無文若以法華為漸頓之觀則頓頓一觀無文故但總云一觀無文也二十八辨無教謬立觀行之失文為三初問以清涼云觀二教一則是一觀無教可憑故今乃問無教如何立於觀行次答三喻文皆可解二十九辨謬立頓頓觀相之失文為三初問次答三喻文亦可解三十重辨謬立二頓自語相違之失文為二初引清涼不知法華六根清淨乃是見思先落遂乃謬說但云清淨不云先斷次喻應云法華意根清淨言無漏者如前所辨言因果者釋籤但云初後中間是則發心習因為初習果為中長別苦海既是報果是則初中習因習果皆是報因是故兩經因果有殊因果雖殊其義無別所以仁王發心別苦非無中間六根清淨法華六根清淨非無發心長別清涼不見義理是同便乃從於兩經之文而分漸頓頓頓二別深不可也三十一辨謬判一部止觀為兩頓之失文為二初引次喻文為四初以廣略相違斥又第五下次以解行相違斥如何以解為頓頓者且約大意一章而斥之耳目能導足以譬止解足能達目以譬止行膏者脂也膏堪續明以譬觀行明能然膏以譬觀解今目視東而足履西脂膏於南而明於北乃是斥其違於止觀解行也三又若下泛舉諸文不同斥清涼不知止觀下文雖有四教八教思議不思議相待絶待等皆為顯於圓頓一實故今泛舉諸文不同以斥之耳文既下四結斥三十二辨謬立兩頓修觀難分之失文為二初引次喻文為二初正明今意初入無生既須依教教必顯示理事始終何得謂之大難分別況復前五大章生解以導方便五科行始何得謂之大難分別若不分別如何生解若不生解如何進行次既云下斥彼謬說文為二初牒計正斥既無教目區判淺深則同暗證生增上慢不達無生真證之法謬說即名何異怪鼠作唧唧聲唧聲無旨濫擬生死即是涅槃亦如怪鳥作空空聲豈得濫同重空三昧謂空空三昧無相無相三昧無作無作三昧空是聖法復修於空擊前聖法故名為重而宣入證之言等者自說已入聖位證於妙道乃令他人生於聖想而歸敬也忽令領納說實句墜於過人者墜者墜也落也妄對人趣稱過人法前人知解犯重人不知者犯蘭若云天龍等來供養我欲向此說乃向彼說等皆重自言是佛天人師等犯蘭若對不能變形畜生說過人法者犯吉不犯者增上慢及業報得或笑說疾說屏說欲說此錯說彼等是也前人知解者即是令其領納說實也犯重者即是墜於過人也實得記尚招愆者愆者過也實得道而向白衣說過人法言我見是我知是等犯提違想故當重釁者釁者罪也瑕釁也即對人趣稱過人法前人知解犯重也實得聖道向白衣說尚招提愆違於情想妄稱過人故當重釁謂證真如大妄居首即此故也次又若下縱破實得他實未得今且縱之故云又若也於中為二初約假名五品定之言假名者即名字位也名字虗解未有實得故名為假故止觀云假名位中也與他何異者孰非名字所收是故與他不異也若五品位便同大師者天台大師靈山親承大蘇妙悟入定降魔位居圓教外凡五品而汝若乃謂得五品是則便同天台大師然汝實未同於天台智者大師若云同者何錯解止觀之法以此言實不同也次豫實下謙己誡他豫實不裁者謙己也願不欺聖無違自心者誡他也豫者我也荊溪自謂也豫實不裁者謂我實不能裁斷度量汝之所說入觀得知證者自了也言自入觀得知證了乃是欺聖違於自心願不欺聖無違自心即是誡他勿妄說於須自入觀方乃得知證者自了也三十三辨謬用章安十二部經觀心之文為頓頓之失文為二初引頂法師十二部經觀心之文者妙玄說法妙中缺觀心一科釋籤云應用觀心十二部經別有小卷流行者是也此即指於章安十二部經觀心之文耳故章安云經者由也心亦由也諸法由心造也直就觀心即空假中名修多羅復重觀之名祇夜觀心空假中能發心即空假中名修多羅復重觀之名祇夜觀心空假中能發三智名授記觀心即假空亦空名不重頌觀心空假中非前思後覺名無問自說觀心緣生如物生滅即空假中名譬喻觀心始末即空假中名本事觀心十界地獄乃至諸佛本生即空假中名本生觀心空假中防非止惡名因緣觀心空假中橫豎無不周遍名方廣觀心空假中非世所有名未曾有觀心何故空從緣生故何故假但名字故何故中非二邊故名論義已上略撮文之大綱耳次喻文為二初通示今家觀法又為二初總示次別釋文為三初明從行觀唯於萬境觀一心者此如前文又亦先了萬法唯心方可觀心也萬境雖殊妙觀理等者所觀萬境雖則有異若能觀觀無非一心所顯之理無非三諦也如觀陰等即其意也者證於萬境雖殊妙觀理等也此觀正是從行而立不因法相事相而明是故謂之從行觀也故此正指摩訶止觀十境十乘次明約法相觀四諦五行本是教門法相名數但恐行人數他珍寶於己無益是故約之入一念心以為圓觀文句記云凡附文作觀多分在圓即此意也不捨法相別有觀行是故名為約法相觀約者束也也亦名附法相觀也故此正指玄義之中境妙四諦行妙五行也應知玄義非無託事故釋籤云託事附法云云三明託事相觀如王舍耆闍名從事立者從於事境之相而立非法相之事也借事為觀以導執情者以恐學者滯於事境不能開悟是故借之而為妙觀以開導於學者滯情也故此正指法華文句託者寄也故文句云王即心王舍即五陰心王造此舍若析五陰舍空為涅槃城此觀既淺如見土木如像法決疑云或見此處山林地土沙石也若體五陰舍即空空為涅槃城即通教也若觀五陰舍因滅是色獲得常色受想行識亦復如是云云若觀五陰即法性法性無受想行識一切衆生即是涅槃云云觀心山者若觀色陰無知如山識陰如靈三陰如鷲觀此靈鷲無常即析觀也即空體觀也觀靈即智性了因智慧莊嚴也鷲即聚集緣因福德莊嚴也山即法性正因不動三法名祕密藏文句記云先解王舍中初立觀境言心王造舍者識陰為王造業諸心必有心所今欲消王且以善惡心王以對無記之舍故云王造此示觀解異於他經應知止觀十乘十境下去皆爾具如止觀不可即具約山作觀亦先立觀境正當觀陰具如止觀第五去文別圓觀中既云山即法性正因餘之二德準諸文說故知此觀不同他見所以又約山為觀者山城雖殊同是依報是故約之以觀正報又諸觀境不出五陰今此山等約陰便故以諸文中直云境智亦應於此以辨二觀同異之相方便正修簡境及心并對前二以辨權實等乃至四觀亦須開顯等託事既爾附法彌然是則託事附法二觀皆須得於摩訶止觀方便正修十境十乘方可隨聞一句攝事以成理觀此即不待觀境方名修觀者也言不待者現開玄義正談法相但須懸敘止觀方便正修之義來此示之決通觀道即令行人修附法觀不須更待講彼止觀從行觀境是故謂之不待觀境方名修觀若不爾者文句託事山城之觀記中何故令依止觀方便正修十境孤山不解乃云附法託事二觀無十境十乘不許人修之所以乃所四明破之余固無黨敢謂四明破之甚當具如金錍寓言記中委詳斯義即如方等普賢其例可識者即如止觀半行半坐三昧中約方等普賢歷事修觀即是其例故託事觀則可識也方等者止觀云以此空慧歷一切事無不成觀方等者或言廣平今言方者法也般若有四種方法謂四門入清涼池即方也所契之理平等大慧即等也令求夢王即二觀前方便也道場者即清淨境界也治五住糖顯實相米亦是定慧用莊嚴法身也云云普賢者止觀云今歷文修觀六牙白象者菩薩無漏六神通也牙有利用如通之捷疾象有大力表法身荷負無漏無染稱之為白云云是則止觀非但明於從行之觀亦乃示於託事之觀況四三昧唯除常坐不許誦經故常行等非無附法且如修於法華三昧誦經之時於法相事而得開悟豈非修於附法觀邪故十二部下次別斥謬用之愆又為二初明章安十二部經觀法簡略未備言寄事立名者如前所謂託事興觀義立觀心也雖有三觀之名者以十二部觀心之文但言即空假中故也十境十乘不列者且如妙玄亦明十乘釋籤尚云或辨十觀列名而已況十二部觀都不列之乎一部名下唯施一者以十二部觀心之文每一部經名目之下唯施即空假中一句故也然則清涼若以止觀方便正修十境十乘決通開拓十二部觀以明修相有何不可可但為清涼自在𮌎臆謬判止觀十境十乘以為漸頓別用章安十二部觀以為頓頓是荊溪作此斥之耳故不可執此便謂妙玄文句託事附法之觀不通人修以記主令用止觀方便正修決開故也豈此一句下次明大師境觀周足以斥謬用之非文為二初斥謬用一句而棄十境十乘煩字正作繁字芿者草不翦也謂繁多繁長也次故知下結斥謬用一句兩句之失一句兩句者略牒清涼用十二部觀也餘如前辨三十四辨謬立漸圓觀但中非即實相之失文為三初問次答三喻文為二初明今家正意一家諸文皆說別教名為但中圓教乃是不但中耳言但中者教權故但不具諸法理實故中體是覺性而今文云實相但中實即俱實約教釋文但中在別良由於此權即但權恐指通教但有中名名為但中故此但中及以實相俱名為權修觀次第仍居後心此約教道十向後心觀但中耳不得濫於別向圓修融攝不二以由別教回向位中含於多義或在於假或約但中或約受接或約圓修是故應須細分四義云云他謂漸圓觀於但中乃是錯將四教中圓作別教說故今破云約教釋文但中在別四教中圓一切諸文並皆初心圓三觀奚嘗謂之觀於但中邪彼將此觀下次斥謬分二頓無文之失又為二初正斥謬分彼將此觀屬頓頓者斥彼濫用四教中圓並皆初心圓修三觀以為頓頓也故前喻云據此答文却用漸圓以為頓頓即此故也別為圓人立但中者斥彼錯將別教回向後心觀於但中別為圓人立但中觀也圓別回互顛倒之甚況復無憑豈非𮌎臆乎唯煩惱下次斥拾失為得不住調伏等者止觀云復有行人聞不住調伏不住不調伏怖畏二邊深自兢持欲修中智斷破二邊是人不能即貪欲是道斷貪欲已方云是道此乃住調伏心非不住也輔行云復有行人下重辨第四句人同第二句失不住調與不調望求中道雖求中道此但住於第二句故是故名失也言四句者淨名經云有疾菩薩應如是調伏其心不住其中亦復不住不調伏心所以者何若住不調伏心是愚人法若住調伏心是聲聞法是故菩薩不當住於調伏不調伏心離此二法是菩薩行止觀引此句法次第與經大同三十五辨謬立但中非即實相乃是但中之失文為三初問次答三喻文為四初示名通大小次初心下正斥謬立即是從初常觀涅槃者即是釋論云菩薩從初發心常觀涅槃行道也妙玄文句並引此文證安樂行三若從下正約教門分判言小涅槃通別菩薩偏是一往通塗說者以別初心十住入空與通真諦涅槃無異故也若別論者則不然矣何者通教七地即已辦地恐墮涅槃即是真諦偏空涅槃如三惡道即淨名經訶須菩提其施汝者不名福田供養汝者墮三惡道如者似也同也菩薩同於二乘滯空故也此借淨名折挫之言彼經挫其同於悲境是故聲聞應供義偏故止觀輔行引大品經說若入七地已墮二乘故為諸佛菩薩所訶是故今云通教菩薩至第七地恐墮涅槃如三惡道既至七地恐墮涅槃沈空滯寂故知出假不必在於七地下根故在凡位出假名上根也斷見惑已出假名中根也別教初心但名真諦仍不得立涅槃之名者此約因果別而論之十住入空真諦在因故不得立果上斷德涅槃之號四故知下結斥無憑三十六重辨謬立有觀但中涅槃之失文為三初問次答三喻不見少判等者不見少判初心觀於但中名為涅槃而清涼云有者灼然妄指也三十七辨妄指諸文立二頓之失文為三初問次答或字應作惑字三喻文為二初斥謬用大意等文如前已破次斥妄指章安涅槃疏文自為四段初對檢無文次應是下斥妄指之由三又大師下舉大師諸文不載以斥別引章安之文豈可大師諸文判教都無其文而章安輒立兩頓有斷不斷之異邪故知大師判教無文不須更指章安之說也四況復下結斥妄指立義不成章安若乃有文則可既乃無文何得妄指然涅槃玄明經用中具列四句第四雖即謂之頓頓仍指前文明經宗中復有一行是如來行大般涅槃及常住等清涼不知妄立頓頓異於圓頓故今斥云況不次第五行正是四教中圓何得謬判斷與不斷而為兩頓乎三十八辨數據八教以立二頓之失文為二初引次喻彼準八教立於二頓前文已斥今但破其數數常云耳彼既數數常云今亦頻頻而斥耳三十九辨謬立二頓同異混和之失文為二初引次喻竅苦吊切者穴也空也此非文意應作字謂旁擊也故不可將此雖異而同雖同而異質難旁擊他人不許漸圓即是頓頓也四十辨謬判色香中道為漸頓之失文為三初問次答三喻止觀引華嚴云游心法界如虗空又云無明明者即畢竟空是舉空為言端空即不空亦即非空非不空又云一微塵中有大千經卷心中具一切佛法是舉有為言端四明學者請思此文有即不有亦即非有非不有又云一色一香無非中道是舉中為言端即中而邊即非邊非不邊具足無減勿守語害圓誣罔聖意如此說者方見舉一即三非前非後也而四明謂空假中三諦皆有十界三千世間依正之法還合大師之意否悲哉不可救濟矣輔行云文偏意圓不應偏難勿守語等者誡勸也勿守偏語以害圓融玉篇云加言曰誣亦掩也欺也網義大同言或具者如涅槃明三德祕藏或偏即是言偏意圓也自語相違者止觀序中明圓頓止觀及大意中既乃皆云一色一香無非中道而清涼前判大意為頓頓今又判於色香中道為漸頓豈非豫盾乎四十一重辨謬立初心觀但中之失文為三初問次默三喻不言勝說者既乖聖道說則過彰所以默然乃勝於說凡修觀下乃至無言重破於默其文可見四十二辨謬立二頓有分不分之失文為二初引次喻言文二者斥其據文須分也言觀一者斥其實難分別也謗法之苦罪流長劫故云曠纍多生曠者遠也心既邪僻故使未來不逢善友開通正義由是而知依師學法不可人情人情雖則一期相於誣網之愆長劫誰受敬請後德思之慎之四十三辨謬判雙亡雙照方便之失文為三初問次答三喻失緒者失其端由也參差者回互不齊也具如止觀等者止觀云中道第一義觀者前觀假空是空生死後觀空空是空涅槃雙遮二邊是名二空觀為方便道得會中道故言心心寂滅入薩婆若海又初觀用空後觀用假是為雙存方便入中道時能雙照二諦故經云心若在定能知世間生滅法相前之兩觀為二種方便意在此也輔行云瓔珞經中釋前二觀竟即云因是二空觀為方便道得入中道雙照二諦心心寂滅自然進入初地今初釋方便者有二種一者雙亡二者雙照初言二空者空假空空空即是遮遮即是亡由前異時雙亡方便今入中道任運雙亡亡即是中故云心心寂滅又初觀下次釋雙照初二觀時用空用假由前異時雙用方便用即是照照即是中故引經云心在定等生即是俗滅即是真故住中道能知生滅知即是照意在於此以皆中故故得任運此之任運由前作意更互亡照而為方便故入中時乃能爾也四十四辨謬敗通修別修之失文為三初問止觀第一云四三昧是通修念佛是別修蓋通別之異耳次答清涼意云章安結集有失故云頂法師誤耳三喻輔行云以四三昧收諸行盡故名為通念佛三昧諸行中一故名為別通別雖殊莫非妙行又四三昧通皆念佛故名為通但語念佛偏舉一行故名為別故四念處云四皆念佛但隨教別所念不同故名為別前之三教各念一身謂生應報圓念法身諸身具足又四三昧通於四教故復名通有人改云四三昧別念佛通者未失大意何假違文以章安結集止觀云四三昧是通修念佛是別修未曾失於大師之意亦是未失通別大意又是未失十章之初止觀大意也何假者假者至也何假違文者斥於清涼何假至此違止觀文而輒改云四三昧是別修念佛是通修邪四十五辨謬判三賢十聖之失文為二初引次喻圓教四位者開示悟入四十位也此師但見下敘彼謬分二教也賢聖之稱乃借別名圓等者明今家正意也故今家判仁王經云三賢十聖住果報乃是借於別教三賢十聖之名以名於圓開示悟入四十位住於實報無障礙土耳即借別名圓正明圓位也清涼不曉輒分賢聖對於兩教一何可笑若言別教賢聖位不合生彼者別教三賢伏而未斷何得生彼實報之土十地聖位破無明生實報土者證道同圓則非屬別況約說教道實無別人生故別教賢聖不合生彼也而判十地屬別者牒清涼謬判十聖是別也圓四十位俱破無明等者既四十位俱破無明因何乃將三賢是圓而分十地之聖屬於別教人邪又約證道同圓初地即是初住住何須分於十地屬別縱存約說教道則十地已今文作以字誤也含兩教何者證道同圓教道是別是故亦無分開十地屬於別義故止觀第十云若別圓能破無明直開苦道如實之法從實法得實報直於行有具足諸行感得依正無有罣礙根利福深不同中下若三賢十聖住於果報悉成就十二因緣等覺餘有一生因緣在輔行云若別圓下更明別圓福勝前教此即聖位不與前同證道同圓是故合說仍隨教道立本別名若三賢下證聖因位始終皆勝是故前文明別教位但在行向初地已上攝在此中三賢位內以約證道同圓初地即是初住所以攝在三賢住果報位內是故約證不分別圓之異但語三賢十聖之位耳四十六辨謬判法華自語相違之失文為二初問又為二初騰彼問次舉彼答次喻文皆易見三自此下總結文為二初正結前文雖則亦論教失但是因於觀失兼而言之耳故今結云略明觀失教失不論也次歸命下明破立之意故今立喻為曉彼疑他非若遣此是亦亡其猶對華說空空無名字故歸命諸賢聖願捨是非之心也然前但為建立所傳止觀妙行以為無上涅槃之因非順我心固欲貶量抑挫他得以為失也願諸後德體此意焉
