body:
  text: 永嘉沙門釋從義撰次明發心為二初標次釋為四初明所託之境心不孤發必託境生故云先思所託之境如十種發心等者此指第一卷明五略中第一發大心之文也言十種者一推理二覩佛相三見神通四聞法五遊土六見衆七見修行八見法滅九見過十見他苦各四解不同者即十種發心一一皆生四教之解不同也以發心僻越萬行徒施是故須以四解定之使大小甄分偏圓不濫故輔行云託境發心隨推隨發若論修行初門不同故章安云聲聞以苦諦為首緣覺以集諦為首菩薩以道諦為首此約三藏教而説通教菩薩以界內滅諦為首別教菩薩以界外道諦為首圓教菩薩以界外滅諦為首乃至當分跨節不同者如上所明四解不同即當分也前三發心意在圓頓一實發心即跨節也故前文中觀教例云隨教雖復若四若八本意唯為顯一佛乘又前所傳部別例云下文雖有四教八教相待絶待皆為顯於圓頓一實即此意也釋籤云當分乃成今經相待義邊跨節乃成今經開權義邊又云兩義即與待絶二妙不殊若依施權即當分義以施權竟權實相對故有四教當分不同若據佛意即跨節義跨越節次不説四教之殊但明圓頓一實耳當分通於一代於今便成相待跨節唯在今經佛意非適今也雖則施權意本在實實即今經開粗顯妙施權之時其意既乃便在今經是故佛意非適今也問今此既是十乘之中第二發心何得指前五略之中第一發心十種不同答前依正消釋例詳究文相例中第五廣略有無云如發心中顯數則廣而文相略後十法中文相則廣而顯數略乃至云雖互略無義心通具今從通具而説故得指前十種況輔行云又此四弘更互相資一念具足無前無後具如第一及下諸文故今第一指前十種第二指下總別行願也次明具足四弘言念念具足四弘誓者顯於剎那相續無間不離四弘故也故下句云遍於多念也以總冠別一一行願從茲而立者止觀第八知次位中云二乘生盡故不須願菩薩生生化物須總願別願四弘是總願法藏華嚴所説一一善行陀羅尼皆有別願輔行云一切諸願四弘攝盡故名為總法藏華嚴等者觀經悲華並云彌陀因名法藏發四十八願新華嚴經第十四明歷事別願等故知一切菩薩凡見諸佛無不發於總願別願今十乘中第二發心既明四弘誓願之總故須以總而冠於別故得指下知次位文於義無妨也無作四諦只一念心者輔行云苦集二諦俱名為苦義攝十界只在一念故云一苦一切苦不明妙境一念三千如何可識一攝一切三千不出一念無明是故唯有苦因苦果由知無明只是法性是故起悲道滅二諦俱名為樂義攝四教只在一念故云一樂一切樂不説妙境一念三千如何可識一攝一切三千不出一念法性是故唯有樂因樂果由知法性只是無明是故起慈為依此境者即妙境也故止觀序中明無作四諦云陰入皆如無苦可捨無明塵勞即是菩提無集可斷邊邪皆中正無道可修生死即涅槃無滅可證無苦無集故無世間無道無滅故無出世間純一實相輔行引四念處云一念心具十界苦名為苦諦三土二死具十界惑名為集諦五住三惑苦即涅槃名為滅諦惑即菩提名為道諦妙玄云無作者迷中輕故從理得名以迷理故菩提是煩惱名集諦涅槃是生死名苦諦以能解故煩惱即菩提名道諦生死即涅槃名滅諦即事而中無思無念無誰誰者我也即無我也造作故名無作大經云世諦即第一義諦有善方便隨順衆生説有二諦出世人知即第一義諦釋籤云世諦即苦集第一義諦即道滅欲令衆生於苦集中而見道滅故云即耳其實無有二法相即故總結中四諦只是一實一實只是三德四德是故雖有四名四實無四一尚無一豈有四邪法華文句云一切解脫即無作滅諦無上道即無作道諦用三諦破無作苦集四明學者皆謂無作苦集不破者灼然違於祖訓也昔欲説此而衆生不堪障既已除故還説此也然無作之名從理而立四諦之言從事而論故妙玄云解惑因緣而成於四豈非約事道滅即苦集苦集即道滅四則非四豈非約理釋籤云迷解在人體恆相即相即是理迷解是事又無作四諦亦理亦事亦事即是淨名疏云説無作四諦即果報土也亦理即是止觀中以無作四諦對寂光也淨名記云有果報邊須云苦集以有苦集須具四諦於果報中分論寂光須從理説故唯一實義亦當於寂光説法疏云説一實諦即常寂光也輔行問云寂光既極何須用教橫豎二對皆用無作以止觀中用教對土有橫有豎故橫豎中皆以寂光對於無作答教被中下不被究竟初住已上名下寂光等覺為中妙覺名上出淨名疏故淨名疏約果報明常寂光者即分論寂光也於分論中復種即無作四諦屬果報土一實諦是寂光土也故知從於果報事説必以道滅破於苦集豈得專執苦集性具便謂無作苦集不破況輔行云但觀理具俱破俱立俱是法界即於百界生死之身達常住理心慳若破則是遍捨一念十界百界依正云云三明一心能所妙境為所弘誓為能思惟彼我鯁痛自他是故名為能所己他四弘不出上求下化自己一心具足能所既乃如此而他一心上求下化亦復如然所以謂之他一念心生佛理等言理等者其理與我無別故也是故菩薩依斯起誓者總結示也斯者此也此謂己他能所生佛也四明遍立遍破止觀第一引文殊問經云破一切發名發菩提心常隨菩提相而發菩提心又無發而發無隨而隨又過一切破過一切隨雙照破隨名發菩提心如此三種不一不異如理如事如非理非事故名為是輔行云經云佛告文殊菩提相者出過三界過諸名字言語道斷過一切發滅諸發故是名發菩提心住是故菩薩過一切發是發菩提心住無障礙發如法性發無發是發不著一切不破實際不移不益不異不一如鏡中像一一句下皆云是發菩提心住住是所依初句是即破而立從法性下是非破非立而論破立如是皆名依境發心故云發菩提心住立即是隨法性即是雙非雙照今文但是附彼經意文兼義釋故小不同如淨名云言菩提者不可以身得不可以心得先廣破竟次即立云寂滅是菩提等又隨即是假破即是空雙非雙照即是中道此約法界無緣大慈而發心也又約事理以對破隨空假等義並應可解故知今文圓發仍須遍破遍立等即是法界無緣發心耳三明安心為二初標次釋為四初明行相多番六十四者信法二行各有八番即一十六言八番者止觀各有四悉故也又信行轉為法行及法行轉為信行亦各有八番成一十六并前乃有三十二番化他既爾自行亦然是故乃有六十四番況此但是一向根性六十四番更有信法相資根性六十四番乃成一百二十八番又就三番止觀三番則是次第三觀即是以次顯不次也説之則有三百八十四番又有一心止觀六十四番乃成五百一十二番是故不立如此多番逗會根性法門則闕次明能所總別定慧止觀名之為能無作諦境名之為所能所相稱方成安心故安心中有總有別總則但以寂照止觀而為能安法性妙境以為所安別則開為法等異應知總是別家之總別是總家之別是故名為離總出別別皆有總雖異而同雖同而異故輔行云故知此中此中即總別而不別下文別中不別而別總別俱是依於妙境以隨人故總別不同惑重觀微應須隨事故使行相若信若法四悉回轉人不見之便於別安而生異計則失大師逐宜之能三明寂照相即如文可見故止觀序中明圓頓止觀云初後不二如通者騰空輔行云近地之空與萬仞同體故云不二通譬行人騰譬修行觀理空譬頓理不二又涅槃云發心畢竟二不別等即初後不二之教也四明凡師為他止觀云已説前人根性利鈍竟云何安心師應問言汝於定慧為志何等故云仍須問彼也不審根性有於信法相資回轉止觀四悉安心之相但以一法遍逗衆機他無所利故云同設一位未見益方也故止觀云譬如養生或飲或食適身立命養法身亦爾以止為飲以觀為食藥法亦兩或丸或散以除冷熱治無明病以止為丸以觀為散如陰陽法陽則風日陰則雲雨雨多則爛日多則焦陰如定陽如慧慧定偏者皆不見佛性乃至云若一向作解者佛何故種種説邪天不常晴醫不專散食不恆飯世間尚不爾況出世邪縱轉弄好異等者皆斥他之辭耳所以同宗枝派乖各等者如輔行釋常坐三昧中云故信禪師元用此經此經即文殊問及文殊説兩般若經也以為心要人承用情見不同致使江表京河禪宗乖互亦如賢首命家判教及乎修行禪觀之相全指天台止觀明之又如清涼教宗賢首觀用天台至於圭峯又自謂之禪遇南宗教逢圓覺仍斥天台所談止觀師資如此矛盾相反可不悲哉言矛盾者輔行云楚有賣矛及賣盾者有來買矛者語買者言此矛壞千盾有來買盾者語買者言此盾壞千矛買矛者猶在買盾者復至買矛者語賣者言還與汝矛而壞汝盾為得幾盾賣者無答自相違故矛者戈矛也説文云酋疾流切矛也建於兵車長二丈象形盾者于櫓郎古切説文云大盾也之屬説文云瞂扶發切也所以扞音輪衛也身蔽目也象形滋者多也今家辨辨字誤也當為辨字師先分凡聖等者止觀云教他為二一聖師二凡師輔行云若通論者六根五品皆屬凡師未破無明通皆具縛若別論者五品位也六根清淨離二縛故見思塵沙相似聖師普賢觀經既以五品在十信內故知智者亦得名為相似聖師具如大部補法中辨準第一卷料簡文中通取六根以為凡師前指聖師在初住故六根尚稱為病導師況三藏菩薩一切未斷問他設教依病方即是總舉法喻之相四悉隨其便去聲宜用之信法二行互相資益何須固執終朝守株者如止觀中斥他人云一種禪師不許作觀唯專用止引偈云思思徒自思思思徒自苦息思即是道有思終不覩又一禪師不許作止專在於觀引偈云止止徒自止昏暗無所以止止即是道觀觀得會理此兩師各從一門而入以己益教他學者則不見意一向服乳漿猶難得況復醍醐言守株者輔行云宋有耕者於野有兔觸株而死後遂廢耕恆守此株冀復有兔傍人喻之而不肯止故俗相傳以執迷者名為守株四明破遍為二初標次釋為四初明無生門意初無生心橫豎雖遍者無生心即無生門也故止觀云一無生門從始至終盡其源底豎破法遍輔行云盡源故橫周盡底故豎窮標中探説章中之意故云盡其源底也即三惑各遍名為橫周通至實相名為深窮也又橫攝一切名為橫周一一至極名為豎深也復須後位六即豎窮者以初無生橫豎破遍位在初住無生法忍是故謂之無生忍心初住既爾二住已去乃至妙覺後位可知是故謂之復須後位更兼住前相似等四故云六即而此六位從始至終名為豎窮此約事異故分六位若約理同是則不然所以謂之若橫若豎無不即理即理乃是非橫非豎橫豎不二此約無生一門豎論自具於橫及非橫豎故作是説若論橫門亦乃如然所以謂之橫門一一無不具豎及非橫豎故知豎中具足有橫及以不二餘二類之餘二即是橫及一心故止觀云二歷諸法門當門從始至終盡其源底橫破法遍三橫豎不二從始至終盡其源底非橫非豎破法遍今且明橫豎一心在下明之故下文云又以一念心該冠兩門等也止觀又云無生一門是豎無量諸門望無生門餘門是橫橫門者如中論云不生不滅不常不斷不一不異不來不去次明他門理等無生一門望於餘門則無生為自餘門名他自他雖異其趣無別是故謂之他門理等三明度入他門即是將於無生門中十境十乘轉度遍入無滅及以不常不斷不一不異不來不去無量諸門使彼諸門皆有十境十乘故云度入他門諸法無差也若用一門諸門融入者即是隨用一門而諸門會通也以由門門無不即理故得融攝等無差降故輔行云又今豎門三諦義足度入橫門門門三諦故使橫門無橫不豎以豎望橫無豎不橫從始至終並有橫故如一無生一切無生乃至不出即不去也亦復如是攝此橫豎皆入一心具如後説此八既爾諸門例然是故今文度入諸門具如中論初二入六是故今文先以諸法悉入無生餘七展轉更互相入乃至一切其意亦然是故且明無生度入況涅槃釋義等者止觀云無生教門豎攝因果其義已彰橫攝之意今當説大品云若聞無生門則解一切義初阿字攝四十一字四十一字攝初阿字中間亦然此意難見更引佛藏示其相次引涅槃釋其義後説無生門破法遍佛藏云劫火起時菩薩一唾火即滅一吹世界即成非是先滅後成只一唾中即滅即成彼經明外用內合無生門即破遍即立遍破立不須二念若內無是德則外無大用寄外顯內其相如是涅槃釋義者不聞聞一句有種種義初云不生生不生不生生不生生生按此四句説無生門攝自行因果化他能所等法皆遍云云又楞伽云我從得道夜至涅槃夜不説一字佛因二法作如此説謂緣自法及本住法自法即是證聖真諦實性也本住法謂古先聖道法界常住此義與大經四不可説意同云云地持有四種成熟謂聲聞種性緣覺種性佛種性菩薩種性無此四性以善趣熟之佛種性即此圓機菩薩種性即此別機聲聞種性有別異善根即三藏機退大取小種性即通機彼四成熟即此四種機緣故今謂之地持對教咸隨法相度入諸門者若在無生門中如此諸義皆順無生若度入諸門如此等義亦稱無滅不常不斷不一不異不來不去等也又以一念心該冠兩門者即是第三橫豎不二一心止觀非橫非豎而又具攝橫之與豎故云該冠兩門也止觀之文已如向引輔行云不二門中具攝諸橫名為橫周無不圓極名為豎深即此意也高廣大車不動而運者止觀引經云其車高廣橫豎不二則非橫非豎故云是法平等無有高下也即體之用故云不動而運云云四明約位簡辨止觀中明從空入假破法遍後云二明入假利益者菩薩本不貴空而修空本為衆生故修空不貴空故不住為益衆生故須出故有從真起應法眼稱機應以佛身得度即現佛身説法乃至天龍八部等輔行云欲明出假真實利益必在別圓初地初住此是第四示文妙旨六處示妙前已具引故知明益正示文意文云真應復云法眼故此法眼必非地前乃是不思議假而為法眼耳驗知此益定在法身止觀又明十信六根清淨即遍見聞十法界事若是入空尚無一物既言六根互用即是入假位也此與不二門云照分十界各具灼然其意一揆近代傳習四明學者請詳止觀之文休更謬説空中自有三千也若不信者止觀那云入空無一物入假六根互用邪莫是大師不解圓妙但事分別乎以此而言三千世間定是妙假若即空中一法叵存更何所惑是故名為入住應遍方名假遍也不二門云分真垂迹十界亦然良由於此及以真遍者即第三中觀破法遍文也故止觀明修中觀有五意第四意云四學大方便者即是如來無謀善權無方大用住首楞嚴種種示現不可思議巧方便力乃至云初住破一分無明此是語略亦得謂之無量品此位能遍法界作佛事不可限量如首楞嚴中廣説故此假遍及以真遍辭異意同良由內證中道真實方能外應遍於法界如此真遍即是顯於性具假遍初住之前故云爾前觀行相似約位仍在若俗若真者止觀云如相似位人六根淨時猶未發真見於中道雖觀三諦約位往明但破四住及塵沙惑既證方便但束為二諦若入初住破無明見佛性雙照二諦方稱為智亦具三諦但束為中道第一義諦情智合論即是隨自他意語也輔行云如相似下約位以判故分真俗以屬於情位在六根讓於中道以屬於智位在初住則七信已前為真所攝即止觀云入空尚無一物也八信已去為俗所攝即止觀云六根互用是入假位也是則初住已上亦有同體真俗六根清淨亦有相似中道故下章安作與奪釋即是六根奪其相似中道與其相似真俗也住後尚須節節離愛等者此非離於相似法愛乃是離於真位法愛也法愛既離無明即淨三德乃明方登上位以至究竟也五明通塞為二初標次釋為四初明節節撿校此即一心通塞之文也止觀之中既用法華有一導師善知通塞是故仍須了於開權諸法無外唯在一心節節檢之亦無能檢之觀亦無能著之心能所寂然乃名通耳次明無非法界止觀云良以一心即空假中觸處諸塞皆通無礙能過五百由旬到於寶所是名為通通本對塞既觸處如空則無復有塞無塞則無通若於無塞無通起苦集無明障蔽者皆即空假中具諦緣度是名無通無塞雙照通塞輔行云一心不當橫竪通塞於此一心復起塞著而生苦集無明蔽等應須檢此一心通塞須知苦集無明蔽等即是一心之塞無非法界成於無作諦緣度等即是一心之通也三明六即甄分故止觀中明一心通塞已乃結判云是為初心過五百由旬應明六即義輔行云是為下結判也如此釋者一切衆生理性五百乃至諸佛究竟五百不同舊義令凡望崖故得毫善皆成佛因者如金錍云法華會中一切不隔草木與地四微何殊舉足修途皆趣寶渚彈指合掌咸成佛因與一許三無乖先志寓言記中具解此義學者尋之四明能轉為所止觀云若同外道愛著觀空智慧宜以四句遍破能破如所破令衆塞得通若不執觀空智慧則能破不如所破但破塞存通如除膜養珠破賊護將輔行云於能生著同彼外道宜用通塞四句遍破故知前破遍中但用能破破於所破猶未悟者必於能所心生塞著於能生著觀法雖正著心同邪是故須破故云愛著觀空智慧是故須以三假四句破能著心使無立處破能著智如所破惑故云能破如所破也雖不愛著能破之觀而猶愛著所破之惑故云若不愛若觀空智慧則能破不如所破是故但用破遍破惑次舉譬中先譬除膜養珠但成分喻若破賊護將便成遍喻分喻遍喻即是大經八喻之中兩種喻也具如釋籤中引何者除膜養珠不可珠復為膜是故更喻破賊護將將若為賊此賊亦破賊若為將此將亦護如是展轉將皆為賊節節破之是故今云須了能破轉為所破謂賊為將此喻可知也乃成菩薩旃陀羅者止觀禪境約因緣禪明十乘觀法至知次位中云若人不知如上諸位謬生取著成增上慢即菩薩旃陀羅輔行云若人下結斥菩薩旃陀羅者旃陀羅此翻殺者自濫上位殺常住命若為他説害他慧命以此而推斯困者衆淨名疏云不得聞觀心即是而便混濫生增上慢作菩薩旃陀羅若不受此語即是不信諸大乘經了義之説疏中上文具明六即故有此云今文既明善知通塞是故亦用此意結斥不見説觀者自不見於通塞諸意妄生取著謬説觀行而教於他也然成或過者然者是也然成即謂是成觀也或過即是生增上慢也自行教他並皆傷害法身慧命是故乃成菩薩旃陀羅也六明道品為二初標次釋為四初明大小俱用言聞觀者聞謂聞教觀謂修觀也大小俱須者止觀中明四種道品一當分二相攝三約位四相生輔行云此四通論俱通大小別而言之第三唯小餘三在大雖有四文亦但二義前三為成第四故也講者唯約小位辨之者斥也但約小乘次位對於道品此則只是約位道品耳是故斥云尚失小乘相生相攝況復得於衍門餘之三教道品邪大乘等者濫學大乘之觀便謂四念處等是小乘之行非大乘之法是則大小俱皆棄之將何以為所行之軌如來遺囑令依念處行道他既不遵則無所行之軌範矣次明諸品調停此即第四相生道品調適也故止觀云如修念處能生正勤正勤發四如意足如意足生五根五根生五力五力生七覺七覺入八正道是為相生亦是調適也諸家縱修者與而言之也唯云念處者偏用七科中一也且後六科三十三品有何妨礙而不用之邪三明品後之門圓道品後明三空門者止觀中明無作道諦三十七品成於一心三觀之後乃云復次行三十七道品將到無漏城城有三門若入此門即得發真謂空無相無作門亦名三解脫門亦名三三昧他既不明等者斥他也道品尚闕能通豈存如世行道至無門可入以喻斥失其意昭然四明名異體同具如攝法文中廣明者此指第七對治助開中攝法之文耳以彼明六度攝法中最初乃是攝諸道品故也故止觀云今明六度助道攝諸法盡略明攝諸道品調伏諸根十力四無所畏乃至三十二相八十種好等況復標中雖云六度攝於諸法至下釋中乃約道品攝於十力四無所畏十八不共四無礙智六神通四攝陀羅尼三十二相八十種好等皆是道品所攝故知道品與一切行名異體同以體同故所以相攝也七明正助為二初標次釋為四初明助開三脫止觀中明根利無遮根利有遮根鈍無遮不須助道根鈍遮重乃用於助以根鈍故不能即開三解脫門以遮重故牽破觀心為是義故應須治道對破遮障入三脫門近代修者得語為證者即一家諸文所斥暗證之流也南山所謂學大乘語者也但是聞得大乘空寂之語便乃以為與佛無殊然則約理雖無高下約事乃有迷悟不同何容下凡妄齊極聖既非上慢定結夷愆故釋籤云謂證真如大妄居首如此之人豈論助治邪次明助有事理即止觀中以三雙六句料簡六度道品之文也輔行云次以六句料簡事理者先問意者事度屬三藏道品是無作本以無作正行道品通至無作三三昧門今此乃云不修事度無作三昧不成就者事度應勝無作道品次答意者度之與品俱有事理況復度品更互相攝是故勝劣亦互受名乃至云釋中先別次通所言別者三對不同且以事度對理道品生滅道品對圓六度以明相破相修相即是故須知相破相修約判權實而成助道相即約於開權顯實而成合行若且一往為無作故修事為治則如向所説若以四教遞為助者應以通教對事六度別教對事圓教對事別教對通圓教對通圓教對別總合六重度品不同助道之説既通四教是故用於別教為助仍名為事乃至用圓猶名理助也此約偏圓而説若約大小分之用三藏助則為小用通別圓助則為大也桉位勝進者此有二義一者既用三教為助是故助成圓理發時乃有桉位勝進兩益二者既用圓教為助則於圓教自論桉位勝進之義但據當位及以增進二義自顯故輔行云財施助法法施融財正助合行斯之謂也乃至云作此觀時名為觀行六根若淨名相似位具如法華六根清淨若入銅輪具如華嚴十種六根又復桉位則在住前勝進則至初住三明須用對等止觀云若用對治得去是病所宜若對治不除當依四隨回轉助道如治一慳或樂修檀或不樂修或善心生或不生或修檀慳破或不破或修檀助開或不開或對或轉或兼或第一義輔行云所言轉者或轉用尸乃至般若所言兼者藥一兩乃至三四至五名具是故但四今文無具者但是文略耳第八卷有之云云於一病中轉用藏教五及以三教六成二十三度六蔽合有一百三十八治兼具等相思之可知若見其意方了此文是故今文斥他人云他無一番況復諸句四明事理合行六度攝於一切諸法文中自列一十二條初攝道品乃至第十二攝八十種好如前具引又云成道等者此文出止觀第十約因緣禪明十乘觀正助中文也事理之言通於大小偏圓之義即以小助大用偏助圓偏小為事大圓為理也八明次位為二初標次釋為四初明須用六即始終不二等者謂圓教位約理融攝始終雖則無二無別然而約事仍須用於六即甄分故弘傳教法及以修觀皆須委知六即之義方免濫同他人將於華嚴初住初發心時便成正覺分證之果稱為究竟妙覺之果故止觀中明初住位破無明見佛性引華嚴云初發心時便成正覺真實之性不由他悟即此意也如是次第四十二位究竟妙覺無有叨濫是名知次位也又禪境十乘知次位中備明六即即其意也次斥他宗之失五品六根唯天台宗依法華經約於住前立之以為內凡外凡故止觀中明知次位乃約法華明於五品六根十信故今斥於他人不立是則法華經中之文便成無用矣三明約境辨位止觀云復次今此一章是觀陰界入境須約陰入而判次位所謂黑陰入界即三惡道位白陰入界即三善道位善方便陰入界即小乘似位無漏陰入界即二乘真位變易陰入界即五種人位法性常色受想行識陰入界即佛位輔行云復次下約陰入界以明次位前雖約教以明圓位今復約凡聖明五陰位言五種人者果地二乘及後三教斷惑菩薩生界外者此位之後既對四德以為佛位故知降佛皆是二種菩薩所攝是故次品而明其位四明入位方便止觀云若四種三昧修習方便通如上説唯法華別約六時五悔重作方便乃至云今於道場日夜六時勤行五悔助開觀門一心三諦豁爾開明圓解成就正信堅固此即初隨喜品位也乃至第五品及六根十信等輔行云先明五悔為入位之方他人圓修都無此意將何以為造行之始但云一念即是如來空談舉心無非法界委檢心行全無毫微九明安忍為二初標次釋為四初明即位未深止觀云始觀陰界入至識次位八法障轉慧開或未入品或入初品因生違順者輔行云違即是惡順即是善文舉片禪少惡為違順之端故止觀云那得薄證片禪即以為喜才見少惡即以憂為又名譽利養眷屬是軟賊即順也煩惱見慢等是強賊即違也今既辨此違順之相則今行人䇿於五品而進六根他不明之為此牽引遂破觀心或未入品或入初品不至第五又障不入六根清淨次明煩惱全在非但無明煩惱未除亦乃見思煩惱全在粗心暫息此非初品但是薄得斥禪即以為喜耳故下句云初品檢量他己無分是以止觀禪境中明未到定已乃斥他云無所知人若得此定謂是無生忍性障猶在未入初禪豈得謬稱無生忍邪極果最高喻之如頭故云果頭若乃讚歎以為果頭則自懷慚無於光明相好莊嚴復無四衆八部圍繞是故不敢受此讚歎若乃毀黜降同凡下仍復鄙耻不與為儔凡聖中間復無所召是故謂之兩楹以成切中間無所名也楹者柱也禮記檀弓檀姓也弓名也篇云孔子曰夏后氏殯於東階之上殷人殯於兩楹之間而丘也殷人也豫疇昔之夜夢坐奠於兩楹之間豫殆將死也輔行云曾聞有人自謂成佛待天不曉謂為魔障曉已不見梵王請説自知非佛仍又謂之是阿羅漢他人罵之心生異念自知非是阿羅漢果又乃謂是第三那含見女起欲知非聖人故知習教薄知次位縱生逾濫亦易開解與夫暗證之流霄壤不同矣輔行又云比見無慙者或稱無礙或説理融乃至云若謂此身即是佛者釋迦已滅慈氏未降又復非是他方佛來若非魔賊謂是誰乎汝若不信有十方佛自稱為佛逆之甚矣自滅道心破他善種若大權逆化復不自稱我行無礙云云三明內外俱安內即煩惱等是違是所忍空假中三觀是能忍外即名譽利養眷屬等是順是所忍莫受莫著縮德露玭一舉萬里是能忍四明進入後位三術之言有內有外已如向説既安忍已即令自入進於後位即是內凡六根淨也十明離愛為二初標次釋三界愛斷即見思已亡也仍受愛名是滯相似之法也頂墮等者輔行云今論圓教至十信時若生愛心不入初住而六根淨位定不墮小但以住頂名之為墮非謂退墮以六根中無退義故況復更有造重逆邪故此頂墮異前藏通受此等者且約外用妙假而説其實須該智慧功德法性等三此即著於相似三德之法也此位等者離愛有二一似二真真位法愛尚不應著況復著於相似法愛今明離於相似入真真位法愛復更須離方乃入於二住以至妙覺位也第五心境釋疑例為三初牒名次略為下標數三問下解釋為二十番料簡初料簡起對法界為二初問止觀第一卷明發大心約四諦四弘六即顯是今即四弘中文也故止觀明無作弘誓四諦之體只是一心三諦文畢乃云若得此解根塵一念心起根即八萬四千法藏塵亦爾一念心起亦八萬四千法藏佛法界對法界起法界無非佛法生死即涅槃是名苦諦云云輔行云若得此下明四諦八萬四千不出一心八萬四千其數不殊但以所治及以能治所治滅等得四諦名初云佛法界等者佛法界根也對法界塵也起法界識也仍本迷説故云根等同名法界更無差別故知八萬無非生死咸即涅槃集道亦然故皆法界前之二教巧拙雖殊皆為滅心以為極果別人乃為迷解之本圓人即知心是法界緣此發心宛然可見世人何事固執一途今文所引仍略佛法界三字輔行既云仍本迷説故云根等同名法界更無差別故知今問如何法界有起有對乃是以理而難迷事也法界者本理也起對者迷事也既是法界之理如何有於起對之事邪次答為二初指前已明此指前文發心四中第二意云無作四諦只一念心第三意云於一念心以辨能所以此能所悲己悲他他一念心生佛理等是故謂之如前分別其義已顯次若欲下更論所以文又為二初約三義明所以初義中言心佛等者即輔行云八萬四千不出一心佛法界者根也心佛之事雖則有界法界之性則無差別故雖起對奚嘗非理奚者何也嘗者曾也次義中言夫念起等者初義約理心佛無殊則是性德今約修德達事即理故云念起依理體達等也第三義云稱理等者向論修德故云念起依理體達今約證悟故云稱理無非法界何者由前修德體達之功故今證悟起對稱理稱者相應也若非證悟曷稱於理智與體冥良由此也次今此下約六即結成義通三種者有性有修有證故也意在前二者以發心顯是正約全性起修以修照性故也故以六即結成三義炳然可解次料簡十界四運已未如何觀察文為二初問止觀明第四三昧中有四科一約諸經二約諸善三約諸惡四約諸無記約諸善中文自有二先分別四運次歷諸善約諸惡中亦明四運約諸無記中但以無記對於善惡四句推之無記對記記即善惡故以無記對記而推初明四運者夫心識無形不可見約四相分別謂未念欲念念念已未念名心未起欲念名心欲起念名正緣境住念已名緣境謝若能了達此四即入一相無相輔行云運者動也從未至欲從欲至正從正至已故云動也攝九四運入佛四運觀佛四運不出九運九界四相皆不可得名為一相一相自無名為無相今云已起未起者未起即未念已起即念已也如何觀察者然止觀中亦自料簡故止觀云問未念未起已念已謝此二皆無心無心則無相云何可觀答未念雖未起非畢竟無因未念故得有欲念若無未念何有欲念是故未念雖則未有非畢竟無念已雖滅亦非永滅若永滅者則是斷是是故念已雖滅亦可得觀輔行云問意者正斥他人但觀正起故先問云此二無心云何可觀次答意者但是未起名之為無既非永無是故須觀望事為己心不可無又云如人防火一切俱防若但防發不防未發必為未發之火所燒觀已未心實為防於欲生正生無生觀人但知觀於正起之心令心不起不知觀於未起之心心體本無無既本無起亦非起今文所問準於止觀意亦可解次答中言雖即不專的在一境者此明已未之境通於十界故也然須形於正起之心等者此明已未之心望於正起之念則別在一界所收也何者凡起一念必須別屬一界所攝形者猶舉也即相形待對之義也欲知已起須舉正起故今但舉正起之心則知已起為屬何界也望前為已者望前正起故今為已也望後為未者望後欲起故此為未也是故已未望於欲正而得修觀者總結示也輔行云此前貪欲雖復暫息名貪欲已對餘境時復名為未已未雖即同是不起對境時別相待成異初息名已息已名未故此未心通對十界輔行又云若知隨起十中一心一必通十後若別起此未屬別恐屬別故故亦須對起已觀之修觀辭句具在止觀今不煩引三料簡未起望後似濫欲起文為二初問可解次答為二初正明未起與欲起不同文亦可解次觀此下仍示能觀觀法文又為二初別明未起一運之觀觀此一運者未起一運也何以知之以初問中將於欲起問於未起故今一運則是未起也望後欲起一界之心則知未起必屬一界若屬一界觀此一界必具十界百界千如三千世間不思議假不二門云照故三千恆具即此意也然必約假以立空中是故又云即空即中不二門云遮故法爾空中良由於此故此應云能了妄念九界四運通名妄念今且別論未起一運無一異相故止觀云若能了達此四即入一相無相達此無相具一切心三千具足方能照於一多相即理具三千即是妙假仍達理具即空即中具既是假故達理具即空即中方成一心三觀之義也次故知下通示四運之觀文為三初正示亡界亡運者即是能了妄念無一異相也唯觀三千者即是達此無相具一切心三千具足也即空即中者即是乃達理具即空即中也無三名字者上明三千妙假即空即中乃是非三而三假立之耳今云無三名字乃是三而不三三無形相俱不可見也能所㳷荒內切青黑貌非今文意字應作䐇武盡切合也合者能謂能觀三觀所謂所觀三諦能觀三觀既乃三而不三所觀三諦亦乃三而不三故大意云三諦三觀三非三三一一三無所寄諦觀名別體復同是故能所二非二二既非二即是䐇合也問諸文皆云三千世間即空假中此文何故但云三千即空即中答此文單明三觀之義是故但云三千空中何者理具三千全是妙假是故謂之即具十界百界千如然必約假以立空中是故謂之即空即中不二門云照故三千恆具遮故法爾空中即此意也應知今文唯觀三千及以上文觀此一運即具十界百界千如不可但約變造三千以明事觀良以並由理具三千方有變造三千故也諸文兼明所觀之境故於三觀之上復云一念三千耳不二門云一期縱橫不出一念三千世間即空假中良由於此所以然者能觀既是即空假中所觀亦是一心三諦故普門玄義云百界千如皆是因緣所生之法是諸生法即是三諦故此即是大事因緣非餘感應若無因緣何殊外計故不可聞一念三千是因緣生法便乃驚疑自貽伊戚問輔行云三千即空性了因也三千即假性緣因也三千即中性正因也四明據此乃謂三諦皆有三千今何故云理具三千但是妙假答只為四明不曉一家所談理具三千妙假致使訛説三諦三觀皆有三千以至諸文所談三身四土等義悉皆謬作有相而説不許空中亡泯寂滅如解實相云三千皆實相相宛然及理體有差別等其徒乃遞相推尊自立為祖繼祖為宗反經非聖昧者不覺悲哉悲哉余為此懼間先聖之道乃力排斯謬使邪説不行正塗昭顯具如金錍寓言記及不二門圓通記中委辨今既臨文不能默已更略言之何者輔行第八云此下凡指卷數並據現行印本問一心既具但觀於心何須觀具答一家觀門永異諸説該攝一切十方佛法良由觀具他宗雖談理體寂滅不説本具事用宛然具即是假本具事用即是妙假故今文云即具十界百界千如假即空中豈非今文即空即中問若不觀具為屬何教答中乃約藏通別三不觀於具尚不識具況識空中理具三千若不屬假何故謂之尚不識具況識空中故知不可將理具立法濫於空中蕩相也思之又云又此理具變為修具一一修具無非理具金云一家所立不思議境於一念中理具三千故曰念中具有因果凡聖依正等故所變處無非三千即今理具修具之義也所以將理對修料簡令識修具全是理具乃達理具即空即中若謂理具便是空中非妙假者何故謂之乃達理具即空即中故妙境初章安料簡云法性自爾非作所成空中之性本具妙假其猶明鏡元具萬象故知章安深領玄旨又輔行第三釋大品一切法趣一法云大論兩文共釋此句初云云何菩薩為世間趣故發菩提心菩薩為衆生説色趣空乃至種智為衆生故説色非趣非不趣乃至種智次文云為衆生故説一切法趣空無相願是趣不過何以故是空無相中趣不趣不可得故初文以能趣為假具歷色心乃至種智故知具一切法即是假也明文若此可不信乎何得將理具妙假立法之義濫同空中蕩相之義邪所趣為空非趣非不趣為中次文以能從所為空是趣不過為假趣不趣不可得為中此下諸文用語稍異者中假二意全依論文次但況出故云一切法趣色色尚不可得云何當有趣非趣等何以故一切法趣色能所皆假一切法為能趣色為所趣既皆是假而理具三千如天珠網互相涉入何得謂之是空中邪色不可得一切法亦不可得能所皆空何得云三千即空是真諦有三千邪止觀云若是入空尚無一物可不信乎趣不趣不可得即不住二邊正顯中道非空非假名為中道且入空尚無一物豈可中道第一義諦相相宛然邪若定執此則成誹謗矣若中道雙照則照假故三千宛然照空故一法叵得而中道之體豈當有無者哉思之又若不信輔行之文者且釋籤云若以心性觀彼界如豈非百界千如是因緣所生法邪界如皆空豈非三千即空性了因是亡泯三千邪常具諸法豈非三千即假性緣因是雖亡而存邪非空非具豈非三千即中性正因是心性不動邪而空而具豈非中道雙照二邊邪然上句云非空非具即是中道雙遮空有也非遮非照不二門云照故三千恆具遮故法爾空中故今非遮空中叵得非照即妙假不存即大意云三諦三觀三非三也又若不信釋籤之文者且文句記云境據假邊且存其數妙境若約二邊辨之則屬假邊是故乃存百界千如之數也空中尚無其數安有三觀圓融非前非後文何之中空中亡絶尚自無文其如妙境假觀之數安得有之而云百界千如邪然必約假以立空中文句之中既有百界千如之假然必約此千如妙假以立空中妙境妙假既名為數當知約假以立空中乃是數即非數也又若不信文句記中之文者且金錍云若不許心具圓頓之理乃成徒施他若不許一家所立不思議境於一念中理具百界三千妙假是則圓頓空中妙理乃成虗設其猶明境不能現像翻成偏小斷無之空矣又云汝無始來唯有煩惱業苦而已即此全是理性三因由未發心未曾加行故性緣了同名正因故云衆生皆有正性既信己心有此性已次示此性非內外遍虗空同諸佛等法界既信遍已次示遍具既同諸佛等法界故此遍性具諸佛之身一身一切身如諸佛之感土一土一切土身土相即身説土説大小一多亦復如是今此示有是示種性示遍是示體量示具是示體德若謂心具便是空中者何故次文示體德中方談性具邪以由性具體德是假性量體遍是空種性正因是中故也若不爾者如何消文故知金錍云若不許心具圓頓之理乃成徒施者圓頓之理理謂空中空中乃是實相寂滅心具乃是諸法宛然是故空中理本無相無相而相理必具事文句記云十界為事實相為理理謂空中事即是假良由此也故知他人若乃不許心具三千不思議假是則圓頓空中之理乃成徒施卻同偏空不具諸法猶如頗黎不能雨寶也若許心具三千妙假方顯圓頓空中之理具於妙假不思議事猶如明鏡萬像炳然也鏡像喻假也鏡明喻空也鏡體喻中也是則心具及以性具但是妙假耳何得濫作空中説之若謂不然如上所引輔行釋籤文句記等皆判心具屬於妙假豈可金錍郤將心具屬於空中邪又若不信荊溪之文者何故章安觀心論疏云心空而常假故有百界千如此與輔行云雖亡而存假立假號不亦同邪假而常空雖百界千如寂而無相此與輔行云亡泯三千假立空稱不亦同邪空假常中無空假相豈非心性不動假立中名雙遮二邊邪雖無二相不失雙照豈非中道照空故一相叵得照假故三千宛然邪又若不信章安之文者且智者云若知地具桃李即識中實有權解無差別即是差別實謂實相如是權謂諸法相性體力等十既云地具桃李是實中有權解無差即差豈非三千是性具妙假實相即諸法邪故金明三千云實相必諸法諸法必十如十如必十界十界必身土又依大經及以大論立三世界故有三千也若謂性具三千不是即實之權者何故云實相必諸法等故有三千而不云諸法即實相故有三千邪且諸法即實相乃是相即無相假即空中亡泯寂滅一法尚不可得三千之數寧存故知性具三千定是即實之權空中具假無差即差耳不可濫作即權之實假即空中差即無差而説之也若知桃李堅相即識權中有實解差別即是無差別權中有實差即無差乃是諸法即實相亡泯寂滅假即空中一法叵得何故輒云三千皆實相相宛然邪何得謂之假即空中三千宛然邪文句云諸法實相標權實章也諸法權也實相實也所謂諸法如是相等即是解釋權實章也金云以諸法故故有相等以實相故相等皆是實相無相相等皆如如者空也是者中也他人不許空中之理具諸法事為性具三千豈非對面違戾祖宗乎又若不信智者之文者且南嶽止觀及馬鳴起信論皆立二種如來藏一者空如來藏亦云如實空也二者不空如來藏亦云如實不空也空如來藏則諸相咸亡無有差別不空如來藏則具諸色像世出世間河沙功德若謂性具百界千如三千世間便是空中者何故空如來藏則諸相咸亡無有差別不空如來藏方具色像河沙功德邪以此驗知空如來藏是遮故法爾空中不空如來藏是照故三千恆具耳事理權實體用真俗等例之可知又若不信南嶽馬鳴之文者且龍樹大論云世諦有相第一義諦無相可不信乎若引金光明玄義云第一義諦有名有實義者何故不引妙玄釋籤云第一義中名實俱無世諦乃有名實邪又何不引止觀云第一義中一法尚不可得何況三千邪世諦中尚有無量法何但三千邪又莫是止觀玄籤諦斷無之理頑空之性乎哀哉世人但見其一不知其二須知玄籤止觀所談第一義諦無名無相一法叵得乃是空如來藏義亦是中道之雙遮也光明玄義所談第一義諦有名有實義乃是不空如來藏義亦是中道之雙照也地具桃李斯言有徵寄言學者勿負自心抑挫聖旨文句記云性本無名即玄籤云真諦無名也具足諸名即光明玄義云第一義諦有名也故無説而説説即成教無名相中假名相説不其然哉宜熟思之又若不信龍樹之文者且法華經云深達罪福相遍照於十方文句云持經得解妙玄云報身辭異意同以由持經得解解即是智故屬報身也微妙淨法身若準文句乃是真身亦是法身而妙玄中乃云法身也具相三十二若準文句乃是應身亦是生身而妙玄中乃云應身也以八十種好應身生身也用莊嚴法身真身法身也既以具相名為應身生身豈非具相乃是妙假不思議俗諦乎若不爾者三身三觀如何類通邪若不約於二身三身如何消於妙玄文句邪嗟乎世人不讀妙玄文句若聞具相三十二是生身應身便乃驚怖而不信受豈非正法難解訛説易傳且摩訶止觀引法華云微妙淨法身具相三十二乃釋之曰若證中道豈非法身中道即具此相豈非中道照假故具三十二相邪如法華中二乘開示悟入妙會中道即與八相佛記豈非生身應身譬如得鏡喻中道也萬像必形喻生身應身也大乘得中靡所不不現合法也法身相者名為真相此語簡略應云微妙淨法身具相三十二者名為真相也法身具於應身之相乃名真相者例如光明玄義云第一義諦有名有實義也是故法身具應身相名為真相乃是對破世間輪王魔羅虗妄之相故也若不爾者如何消於下文淨名云已捨世間所有相好輪王魔羅世相嚴身皆是虗妄故言已捨淨名疏文準此可知中道明鏡本無諸相微妙淨法身也無相而相者具相三十二也妍醜由彼多少任緣普現色身即真相也普現色身既是妙用復異世間輪王虗妄乃名真相也嗚呼列聖範溢藏未淪安可順於一期之情見自貽永劫之重報邪幸冀後德一為思之儻有所長願無壅蔽也問金剛藏四句初空有句即是真諦妙玄釋云空非斷無故言空有若謂空中無三千者莫不違金剛藏之旨而背妙玄之義乎答人不曉此其亦多矣夫空中寂滅者談其本體也空中具有者語其體德也空中之理體雖本來寂滅而恆具於事用之森羅何得認於所具森羅玄籤中以三千為森羅也而棄能具之寂滅邪法華云諸法寂滅相即諸法實相也以實相無相乃是寂滅故也且離有而談空容在小典即空而具有攝屬大乘所以空號真空有名妙有譬如明鑑普現殊形喻似摩尼具彰衆色欲顯真空而具有故曰空非斷無焉然則真空雖具妙有而具有是假可不信乎若謂不然且妙有既有而真空復有是則有上復有空何不空邪若謂空有俱皆有者何故空有俱不空邪如斯建立誠可悲哉且始終心要云中諦者統一切法也真諦者泯一切法也俗諦者立一切法也舉一即三非前後也又荊溪臨終喻衆以道云夫一念無相謂之空無法不備謂之假不一不異謂之中若謂空中自有三千者豈非但是無法不備謂之假俗諦立法之義何關空中亡泯無相邪應知即空真諦泯法若不亡泯三千世間則蕩相不盡真空之外猶有諸法間差也即假俗諦立一切法若不立於三千世間則立法不備俗假之外更有一切諸法森羅也即中雙遮若不統二邊則統法不遍中道之外猶有二邊待對不亡也是以談乎三千世間即空無相即假建立即中雙遮復能雙照文理明白人自不思耳問舉一即三非前非後何故空中一向寂滅亡泯無相而不存立三千世間答言舉一者趣舉其一也或舉真諦空觀之一而真空亡泯三千叵得便點真空雖亡而存百界宛然即是俗假又點真空之亡泯俗假之立法二俱不可得即是中道第一義諦非有非無舉其真空之一即三既爾舉其俗假及以中道即三亦然世人迷名而不思義但聞舉一即三之言便謂空中之體自有三千世間不許空中之體本自寂滅而恆具於俗假百界如他人云三千不離實相實相不離三千遂立三諦皆有三千故解實相云三千皆實相相宛然嗚呼哀哉謬之甚矣且三諦相即理事融通凡習天台教者其誰曰不然邪雖三諦相即而中邊不混雖真俗不離而理事彌分故二邊之有無中道之絶待理體之無相事用之森羅皆祖宗之格言豈今之好異邪教文談於空中寂滅何得翻作森羅説之空中若乃十界宛然未審俗假如何説邪是故須知若存三諦空中定無相俗假定有相若其相即俱相俱無相若但從理非相非無相事理相對無相即相即相無相情通妙契諍論咸失人不見之乃云若約分別空中乃是亡泯寂滅俗假則是森羅宛然若約圓融空中不妨自有三千今問等是圓融何不無相而但有相圓融空中若是有相圓融俗假如何説之莫是圓融三諦皆是有相乎嗚呼此義非圓非別兩楹中間既無所名乃是率爾虗妄之説耳請有識者試與詳之且輔行云點空論界豈非空不定空空必具假乎又云界無界相豈非假不定假假必即空乎是則性空中恆具十界假十界三千假常即性空中理事之融通中邊之相即豈可不然哉又釋籤明有不定有故云言有則一念都無況有十界質像邪請詳此文何得云三千即空是真諦有三千邪又明無不定無故云言無復起三千慮想況一界念慮邪豈非雖亡而存是假立假號乎不可以此有無思故則一念心中道冷然可見矣尚非是空何況是有何得云三千即中是中道有三千邪又文句記云鏡明性十界像生修十界鏡明之性豈非空中之寂滅乎若不爾者止觀那云中道明鏡本無諸相邪十界豈非俗假之森羅乎若不爾者止觀那云無相而相邪故知鏡明性十界即是境據假邊且存其數耳由鏡明性本具十界方有像生修十界矣豈鏡明之性自有妍醜邪若不爾者止觀那云妍醜由彼邪又止觀中復舉喻云明喻即空像喻即假鏡喻即中遍明是體像遍像是明體遍體是像明於一見三於三了一輔行云夫以事喻法皆是分喻於中鏡喻其意最親異乎伊字三點首羅三目故也既以鏡像喻於即假豈非三千森羅是不思議俗諦乎若不爾者豈可鏡體鏡明喻於空中是萬象森羅邪顛之倒之誠可悲矣又妙玄中引仁王經法性五陰及涅槃經因滅是色獲得常色受想行識亦復如是即俗諦也引淨名云衆生如彌勒如一如無二如及大品云五陰空等是真諦也引涅槃云佛性中道是中諦也請觀妙玄引諸經明三諦之義何得輒引仁王經中法性五陰以證中道法身寂光是有相邪文句記云況常寂光端醜斯亡寂光所對咸有淨穢何不思之輒生異見問淨名經云但除其病不除其法況荊溪云理性三千一向不除他人準此乃謂三千即空其三千之法不泯而輔行云亡泯三千及心要云真諦泯法者但是亡其情病泯其計著而已非謂亡泯三千之法也以三千是不思議之法故也人皆信受今何不然答不二門云亡淨穢故以空以中淨穢不出六凡四聖仍由空中轉染為淨染體即是通別二惑淨體即是真中二理故知只一空中之觀非但轉於無明染體以為真中法性淨體亦乃亡於十界淨穢三千妙假俗諦之事何得偏執轉染為淨而棄亡泯淨穢三千且淨名經云但除其病豈非但除迷情之病乎而不除法豈非不除十界之法乎此但約於藥病過德以明除病不除法耳今云空中寂滅妙假森羅自是圓融之三諦耳且非迷情之病也何得引彼但除其病而不除法以立三千即空是不亡泯邪若謂輔行亡泯三千及心要云真諦泯法但是亡情而不泯法者灼然對面負心違戾何者心要既云真諦泯法驗知輔行乃是亡於三千之法何得謂之不泯法邪法若不泯情何由亡法尚應捨何況非法又復真諦若但泯情而不泯法是則俗諦應須立情而不立法若其然者何但乖於真諦泯法亦乃違於俗諦立法嗚呼膠手易著寱夢難醒一至於此可不悲哉妙玄云學妙有者自稱至極聞畢竟空而生誹謗不受其法不耐其人學畢竟空者自類朋聚引正向己推邪與他此皆不識天主千名聞帝釋則喜聞舍夫則瞋將恐其福不補其失實相亦爾同是一法豈可謗一而信一邪輔行云實相之體三諦具足實相既爾諸法亦然若具三諦三諦必須真空亡泯三千世間俗假存立百界依正中道雙非空有叵得斯皆舉一即三之義故云實相之體三諦具足非謂實相之體三諦具足便是空中自有三千森羅差別也問淨名經云但除其病而不除法未審此法於三觀中攝屬何邪答善哉問也能破羣疑應知經中正明假觀俗諦立法故但除病而不除法若乃除法則乖俗假立法之義是故疏云一切衆生具十界法具即是假不其然乎若點具假即空即中乃是界無界相耳別非俗假立法之義也無明不了觸處病生若有智慧即無礙自在悉為佛事人不見之輒將經文假觀俗諦立法之義以難空中寂滅之旨是可忍也孰不可忍也故此應知理性三千一向不除乃是不思議之假耳與夫鏡明性十界等厥意元同也委如前説宜審思之次是故下簡偽者輔行云一家教門藏通即約六道論假用觀乃有即不即異其法即是藏通八門別圓假觀必約十界但以次第不次第別一心異心明境粗妙比必至切近也者頻聞觀柱緣生即今文云賴緣之假也言賴緣者輔行云四教之中俱有賴緣施權二假其相各別空中亦然今此虗假賴衆緣成非從空出設權利物然今文云是故不同賴緣之假者由上文云觀此一運即具十界百界千如唯觀三千不思議假是故此假不同他人觀柱緣生賴緣之假以圓頓教不思議假乃是化他三千赴物不動此念遍應無方故也緣生即空即今文云無自性空今圓頓教三千妙假即空亡泯不同觀柱緣生無自性空名為即空也空假不二名為三觀即今文云空假不二名之為中而輔行中言三觀者仍前空假名為三耳其實應如今文中云空假不二名之為中今圓頓教三千即中心性不動雙遮雙照不同空假不二名之為中也作此説者尚未成通通須四句成性相空若有中名異通教者通教何曾無中道名況復通教仍須四門門門十乘方名通觀人不見此何殊暗空釋籤破藏法師説法界無自性云何故但云無自性邪而不云無他性乃至無無因性邪三故借下舉喻借子夜切者假借也諸色心現時者色心即是前文十界百界三千也故色心不二門云總在一念別分色心現者顯也以由能了四運妄念無一異相空中之理非一異也達此無相具一切心三千具足方能照於一多相即不思議假帝網重重也乃是全於理體變現而成事用故也故舉喻云如金銀喻空中之理也隱起喻空中之理具不思議假故而起三千事用也起者生也謂隱金銀之體而生瓶盆之號如隱空中之理而生三千之事猶全水作波隱於水名而稱為波耳金處異名生者合法乃是空中理處而三千事用異名生也與金無前後者金法乃是三千事用異名生時與空中之理無前無後也斯乃理事無前後體用不異時耳況復又達理具十界三千色心即空即中是則非但全理成事無前無後亦乃達事即理無有異時也亦如官路土者理體虗通而無私局是故喻之如官路土也私人掘衢物切為像者事用隨緣而有分限以由事用差降不同故也故喻私人掘土作為萬物形像也智者知路土者知此形像元是路土而作合法乃是曉於事用本是理體而成故也故金錍云果地依正融通並依衆生理本此乃事理相對而説耳凡愚謂像生者凡常愚迷不知私人掘官路土以作形像乃謂實有此形像生合法乃是迷者不知全理成事但謂實有諸法形生故金錍云若唯從迷説則波無水名西失東稱也以由迷東為西故西失東稱也後時官欲行還將像填路者合法乃是乃達理具十界百界三千事用即是空中之理寂然故也像本不生滅者以喻事用無起沒也路亦無新故者以喻理體非今古也是則三諦及以三觀乃是天然之性德耳含生本具非造作之所得也第四料簡外色異心如何具於三德文為二初問外無情色者依報國土也此約依正分於內外耳不與心俱者從迷情故分於依正故謂依報外色不與正報心俱也如何復能具足三德者此以迷情分於依正色心永隔而難理智身土體同心外無境也而云三德遍一切處者止觀諸文皆作是説而迷情分別者聞之惑耳驚心故今寄彼而興問也次答文為三初以內色無情反斥若如汝難是則何但外無情色無有覺知不與心俱而其內身亦與心異是故猶如草木瓦礫他既執迷而難故今亦且以此反斥耳故輔行云若論有情何獨衆生一切唯心若論無情何獨外色內色亦然故淨名云是身無知如草木瓦礫疏引百論云外曰若身中無我者焉知四時內曰如草木瓦礫亦由陰陽逐時轉變似有所知而非神知今身雖有知知無自性如草木瓦礫外曰身內有神神使知知內曰若神使知誰復使神遂無使神何須神使若無神使即無知者若無知者如草木瓦礫此約識種破我作如是説若約內觀識種者三事成身命暖無知知即是識若謂識知過去識滅滅故不知現識不住亦復不知未來未有斯亦不知三世求知而不可得若離三世無別有知故云是身無知如草木瓦礫也次若論下明色心咸具若論具德不獨內心者意明外色亦具三德也然須了知外色具德含於二義一者衆生內心體遍不隔草木則是外色具有佛性二者內外色心依正同一真如是故趣舉一色一心若依若正咸皆具德但為世人卒難開曉故須依經點示衆生心性體遍不隔草木以明外色具足有於佛性三德耳由心變故謂內心外色者心隨物變遂分內外即輔行云迷謂內外也心非內外故句色無內外者即輔行云悟唯一心也心外無境是故唯心則無內外之殊唯心既爾唯色亦然故云色無內外也輔行云苟順凡情生內外見應照理體本無四性無內故無自性無外故無他性無內外兩中間故無共性無常自有故無無內性心佛衆生三無差別能知此者依俙識心今此亦然從迷情心隨物變故則分內外從理智故四性叵得故非內外雖非內外而亦內外雙遮雙照任運常然是故名為而內而外也而內故心具三德而外故色是法界故涅槃第三十一云衆生佛性非內非外猶如虗空非內非外如其虗空有內外者虗空不名為一為常亦不得言一切處有虗空雖復非內非外而諸衆生悉皆有之衆生佛性亦復如是金云請觀有之一字虗空何所不收故知經文不許唯內專外故云非內外等及云如空至第三十二迦葉問云若言五陰是佛性者云何説言衆生佛性非內非外佛答迦葉我先不説衆生佛性是中道邪乃至云我為衆生得開解故説言佛性非內非外何以故凡夫衆生或言佛性住五陰中如器有果或言離陰而有猶如虗空是故如來説於中道衆生佛性非內六入非外六入內外合故名為中道是故如來宣説佛性即是中道非內非外故名中道乃至云遮此二邊説言佛性非內非外亦名內外是名中道荊溪治定涅槃疏文乃私謂云言雙非者不唯雙非復應雙是故下文云亦內亦外若無雙是云何言遍故文斥云凡夫衆生或言佛性在五陰中如器中果及如虗空世言佛性唯在有情如器果耳尚未能計猶如虗空安能曉了非內非外況經自釋根塵合故乃名中道根塵合者豈非體一豈非相即豈非性遍豈同器果今問牆壁為是根邪為是塵邪為二合邪為雙非邪若雙非者亦非五陰何但牆壁哀哉世人苦哉講者經文如此分明顯説而清涼觀師尚不信受輒便難云若以涅槃第一義空談通心境失情無情壞於性相儻無文憑據而清涼豈信邪故知今文而內而外即涅槃云亦名內外也隨其心淨則佛土淨等者文出維摩經中今所引者意明心具不隔草木以明外色不異於心耳若不爾者下文那謂何得獨云外色非心故知外色不異於心乃是唯心心外無境所以得引隨其心淨則佛土淨等以明其義也三是故下指文證成破法遍中以識例色者即破遍文末云前來所説但觀識陰作如此説餘四陰亦如是十二入十八界亦如是輔行云欲融諸法示觀境遍是故更例餘陰入界若示境體觀心即足以心遍故攝餘法故心遍不隔草木外色不異於心又非但心攝一切亦乃一切攝心心遍不隔既爾色遍不隔亦然故四念處云非但唯識亦乃唯色唯聲唯香唯味唯觸第七卷末現行印本文在第八若心若色無非大車者即端坐觀陰入界明十乘竟歷緣對境中明十乘之文也緣謂六作即行住等境謂六塵即色聲等塵必對根然而根塵不出色心既於根塵皆修十乘十乘必以大車為喻是故謂之若心若色無非大車若心若色既是大車豈可外色不具三德故輔行云當知根塵無非法界法界乃是三德異名引四念處唯識唯色具如向云五料簡青黃赤白如何即是真如法界文為二初問若解上文色不異心若心若色無非大車何須此問但為惑者觸途生滯故今更作如此問之以生下文情理等答也次答文為二初約分別答文為三初約情理剖判輔行云然此真性遍於法界迷謂內外悟唯一心是故四眼二智萬象森然佛眼種智真空冥寂今雖初觀即是初觀不思議境豈令順迷制心從理無非心性又金錍云教分大小其言碩乖若云無情即不應云有性若云有性即不合云無情故小教中明於凡常執情所見乃云青黃赤白等色何得將此以難大乘圓融法界真如之理邪故金錍云若唯從理只可云水本無波必不得云波中無水又云衆生以我執取之即無佛唯生初心能信教仰理則唯佛無生也又青等下次約二諦三諦區分青黃赤白世俗間差法界圓常真空湛寂世諦之言具含萬象是故青等但屬少分法界之理中邊無缺是故名為三諦全分故輔行云言法界者法謂諸法界謂界分相不同故一切諸法皆以三諦而為界分他謂三諦皆有三千不許分於空有雙非等別豈非彰灼違於別行法界相分不同之義莫是荊溪合作此分別解釋迷於圓妙邪言法性者亦是諸法具三諦性性亦性分不可改故三諦性冥始終無變亦可界法性法即是實相實相之體三諦具足中道實相雙照二邊是故當知法界法性名義雖異其體無殊言真如者無偽曰真不異名如此與法界名異體同故金錍云法佛與真如體一名異又云然雖體同不無小別凡有性名多在凡在理如云佛性理性真性等無性名者多通凡聖因果事理如云法界實相等如三昧波羅蜜等則唯在於果三約肉天佛眼簡示肉眼見粗色天眼見細色粗細之色形顯不同若干差異故青黃等但是肉天二眼所見顯色少分耳慧眼觀空空則無相法眼觀俗俗是出假故此二眼不須明之故四眼為用佛眼為體故法界是佛眼所見言全分者佛眼種智中道法界任運雙遮雙照故也一眼具五眼下次約圓具答文為二初正明圓具前約用異分別而言故分情理真俗等異今約體同圓具而説故舉一眼即具五眼及以青等皆具諸法一諦三諦圓具亦然既體同圓具故不可以青等難於法界也次引棄蓋文證言棄蓋中云者誤也應云呵欲中云也故止觀觀心呵欲中云又呵色二邊如大品云色中無味相凡夫不應著即今文云凡夫自昧也色中無離相二乘不應離即今文云二乘自離也破色無明有無等見是呵其味破其沈空是呵其離若定有味不應有離若定有離不應有味味不定故非味離不定故非離不著二邊即是非味非離顯色中道實相即今文云色非味非離色體本來法界常住也應知此中料簡青等如何即是真如法界乃至色體本來常住準例妙經云世間相常住亦應作此料簡問答何者亦須問云現見世間人有生死物有雕變如何經云世間相常住亦應答云世間之相生死雕變者乃是肉天二眼迷情所見之世諦耳常住者佛眼所見真如法界之理也故一眼具五眼世間相常住一諦三諦亦復如是故不得以世間之相生死雕變以難真如之常住也是故當知生死之體雕變之性本來常住不曾還流故文句釋是法住法位世間相常住云衆生正覺一如無一如皆如法為位也出世正覺以如為位亦以如為相位相常住世間衆生亦以如為位亦以如為相豈不常住世間之相既乃常住豈非理一又世間者陰界入也常住者正因也正因常故緣了亦常故云世間相常住也文句記云衆生止覺是能住法染淨一如是所住位衆生理是佛已證是故名為住如位一故故名為位衆生正覺相位無二顯迷即理理即常住佛已契常衆生理是故正覺衆生相位常住染淨相位既同一如是故相位其理須等佛依世間修成極理驗知世間本有斯理故云常住乃至云今且從悟顯迷以淨顯染則淨悟得於常事迷染但名常理次重釋者向釋雖然事理通總未的示其理境所在故以陰入對正因説九界陰入位本常住當知陰入只是常住又妙玄釋若聞是經不老不死云於老死中識於實相以老死是果報之法識實相故則不老死既不老死則是常住常住實相則是無相無於生死俗諦之相無於涅槃真諦之相唯有中道如實之相尚非涅槃真諦之無何況生死俗諦之有何得乃以世間虗妄人之生死物之雕變執情所見果報之法以難實相常住之理不遷不變邪嗟乎近代習四明者不思祖教唯尚𮌎襟兢説萬物生死雕變便是世間相常住義詰其所以乃云實相相相宛然是故世間生死雕變無妨常住嗚呼哀哉斯乃錯將執情所見生死遷流濫同真如實相無相不變之理他既不達陰入之事即是實相常住之理將何以顯世間之相青黃赤白生死雕變即是法界實相無相真如常住不遷不變邪余昔亦遭四明所惑今乃省察故於此中特述其意也六料簡佛菩提心從大悲起文為二初問依四諦境發四弘誓此四不出上求下化下化是悲即初二誓上求是慈即後二誓若從名便應先慈次悲今從行便故先悲次慈心先離苦方與樂故理無先後文且附事故四弘誓名菩提心而今問云發菩提心求於極果果地自然能應一切何須必假大悲居先者此即但以後二慈誓上求之義而難初二悲誓下化也而云佛菩提心從大悲起者止觀第一約四弘明發心顯是中云譬如金剛從金性生佛菩提心從大悲起是諸行先如服阿娑羅藥先用清水諸行中最如諸根中命根為最佛正法中此心為最輔行云一切金剛皆金剛輪而為自性故金剛座從金剛際自性而起故佛菩提大悲為性從大悲起欲發菩提心必先運大悲也次答文為二初正答意明必假初二下化大悲拔苦方有後二上求佛果大慈與樂輔行云依境生解依解起願境為所緣誓為能緣以無緣慈悲緣不思議境境名無緣誓名無念運此慈悲遍覆法界故能任運拔苦自然與樂故四弘願皆熏法性法性即是不思議境一苦一切苦一樂一切樂今既正答佛菩提心從大悲起是故但云若無大悲熏於法性理藏性法無由得開藏若不開尚無初住隨分之果何況得於妙覺極果是故據行因中不以初二弘誓大悲居先後時至果則無能利拔苦之法大悲既爾大慈準知法性名義如前已解理藏性法無由得開者即是理性藏性之法也故理性藏性亦與法性名異體同故金錍云有性名者多在凡在理如云佛性理性真性藏性所以因名佛性等者衆生實未成佛得理證真開藏以煩惱生死是佛等性示令修習名佛等性故今同中發菩提心先以大悲熏於法性理藏性等修行填願至於初住理藏等性方乃分開以至極果究竟開明大悲既爾大慈準知問理藏與性同異云何答此三雖體一亦可暫分之理惑合名藏不論惑名理不可改名性又包含名藏具含三千及四德故此則不同諸論含藏種子之義但是圓頓諸法具足含攝一切義同於藏耳地人解云惑覆於理故名為藏論師解云佛果在當即時未有故名為藏如此説者非不一邊但是不與大經意合他謂惑與理異故惑能覆理今謂一切諸法中悉有安樂性何得無性之惑覆於無惑之性應知非但惑性相即一切何法不收涅槃何法不在一切衆生即涅槃相一切國土即涅槃相又如來藏性亦祕密藏性若約昔教隱故名祕覆故名藏所謂無常而覆於常若約今教開敝顯露微妙難思衆生不解故名祕密法界包含用不可盡故名為藏是故祕密須有二義一者昔所不説名祕唯佛自知名密二者舉一即三名祕舉三即一名密若讀文句祕妙方便須知今文三一相即祕密之義密即是妙故云祕妙也次並難文為二初並並者比也以十法成乘中妙境居初比並五略中發心大悲為首是故云並若爾等也次答意者十乘生起通塗次第是故理境乃居其初以由十乘初觀心是不思議境是真如觀理故唯達法性名為理境耳又初乘妙境雖義開為三理境修境化他境若望下九乘此三但名一理境耳故云理境居初也非謂理境是理即也若發心中大悲為首如上已明第七料簡安心初云本來寂滅文為二初問然安心初文亦不云本來寂滅文初但云無明癡惑本是法性法界俱寂本來皆空今但撮乎文意為問是故乃云本來寂滅耳次答中言約理約修等者準前料簡起對法界通具三種今從別説是故但在前二種耳亦是修性合説者據性恆開對修方合即是合為修二性一也良以能安一心止觀名為修二所安法性名為性一故止觀云無明癡惑本是法性以癡迷故法性變作無明顛倒今當體諸顛倒即是法性乃至云法界俱寂是名為止本來皆空名之為觀輔行云初總安中只是止觀法體妙境以為所安能安止觀安於法性又修性合説亦可約於初住已去具如文句記中云云第八料簡安心總別如何相冠文為二初問總安心中止觀圓修者即向所引體諸顛倒即是法性法界俱寂名之為止觀察無明本來皆空名之為觀不偏修一故名為圓若別安中則與此異故名為偏何者以別安中分於信法根性不同或用於止或用於觀止觀各有四悉之異故名為偏耳是則偏圓既異如何得云以總冠別邪次答意者暫適根性或止或觀且云偏耳其實此偏亦非永異何者蓋言此止是觀家之止此止豈隔於觀觀是止家之觀此觀豈礙於止以由止觀其體是同雖云偏修亦非永別以隨機有殊其用則異且云偏修故也暫適行宜雅合如此故知即總俱時而異者以是故知下文別安乃是即前總安俱時而為信法止觀四悉之別異耳故知此別乃是即總之別也總總於別別別於總良由於此隨用故分順理故合者此明別安乃是隨機暫用故分止觀之殊若論體同則非永異是故名為順理故合也若其離成三諦次第之別此則止觀不可俱時具如諸教分別相狀者此簡次第三止三觀前後定別不得俱時異今別安隨用暫分順理故合也故次第三諦具如諸大乘教分別相狀前後不同隔歷差異也故輔行云別安乃是望總名別不得以為次第之別若望下文結會數中別仍成總總即是圓下之一心即指此圓也以於法性分於信法及四悉檀回轉相資故別還用總中一止一觀對法對信自他並然故止觀下文結會數云若就三番止觀則三百八十四又一心止觀復有六十四合五百一十二止觀各有四悉成八信法各有八乃成一十六更加信轉為法法轉為信一十六成三十二又自行化他各有三十二成六十四此約一向根性論六十四更加相資根性六十四成一百二十八故三番止觀則有三百八十四一心止觀六十四者此含兩番六十四也故一心止觀一百二十八并三番止觀三百八十四合成五百一十二也輔行云言若就者別立之辭即今所謂若其離成等也文雖唯頓若更別約次第三觀則一一各有百二十八故著若就之言即今所謂離成三諦次第之別此則止觀不可俱時也次第三合故立一心依前重舉故云又耳人見三番之後更云一心便謂頓等三止觀外更立一心謂此一心不關前頓今安心者依前妙境及前妙願故前文云須行填願則願行相稱故向安心若總若別並是圓頓填圓頓願故前別安隨機暫用並是圓妙異於次第止觀永殊也應知三番及一心者乃是以次顯不次耳若圓安者如總安初云不動止只是不動智等者彼止觀中上文先云止只是智智只是止下文又云不動智照於法性即是觀智得安亦是止安不動於法性相應即是止安亦是觀安無二無別輔行云止觀體一不二而二寂照無殊故云止只是智為令下文別安可識故今預辨止觀別相故知此中別而不別下文別中不別而別並由法性故無二無別輔行又問圓人那得三觀別論有此信法相資等別答如後第六云多入空少入假中等既許偏入亦可偏觀故知偏觀即是偏修而此偏修不得濫同次第三觀之偏修也第九料簡安心初云但信法性不信其諸文為二初問安心初云但信法性不信其諸者止觀中云體諸顛倒即是法性不一不異雖顛倒起滅不信顛倒起滅唯信此心但是法性起是法性起滅是法性滅體其實不起滅妄謂起滅只指妄想悉是法性輔行云但指無明即是法性但觀法性不觀無明又云觀前無明只是法性如融氷成水覺無明眠又止觀第一約六即顯是中於名字即中云若未聞時處處馳求既得聞已攀緣心息名之為止但信法性不信其諸名之為觀故知不信其諸即是不信無明也今所問者為復獨唯信於法性無復其諸若謂都無者現今所見青黃赤白等一切諸法何得謂之無復其諸然此所問還是將於肉天二眼世諦情見以難真如法性之理本自寂然諸法叵得耳是故唯信法性不信其諸與今現見一切諸法情理既分何須興問但為世人深迷此義是故重更料簡點示耳復云法性具一切法者此舉妙境中云理具三千也此以法性具一切法難於法性無復其諸也應知法性具一切法乃是理具三千妙假與夫法性無復其諸不可同日而語也以但信法性無復其諸乃是理體本自寂滅非但轉染為淨亦泯淨穢之法異於性具事用故也故知若乃曉此問意則下答文如觀掌果人不見之誠可悲哉次答中言衆生久劫但著諸法不信法性者此先明於從無始來背覺合塵但著色聲唯貪香味不知諸法本性空寂即向所謂現見諸法乃全法性而作無明也故止觀云無明癡惑本是法性以癡迷故法性變作無明起諸顛倒善不善等如寒來結水變作堅冰又如眠來變心有種種夢也破昔計故約對治説令於諸法純見法性者此乃申於但信法性不信其諸也何者止觀既云今當體諸顛倒即是法性故知乃是破於昔日久劫計著故以止觀為能治藥以顛倒為所治之病達諸顛倒即是法性其猶融冰以成於水是則冰外無別有水所以謂之令於諸法純見法性既信法性豈復更信昔日顛倒是故名為但信法性不信其諸故前文云今所觀者違情觀理不可更令違理順情其若然者何得難云若都無者現見諸法以情難理深不可也若見法性即見法性純是諸法者此乃申於復云法性具一切法即無相而相也何者上句謂之令於諸法純見法性乃是能了妄念無一異相也理非一異故云無相今文謂之若見法性即見法性純是諸法乃是達此無相具一切心三千具足也遍於鏡明皆是形像不其然乎言純是者全理是事也亦名即實而權即真而俗即中而邊不二門云二與一性如水為波良由於此今恐惑者執愚未信復更引文證成斯義輔行云既云諸法故實相即十既云實相故十即實相且實相即十名為諸法豈非今文即見法性純是諸法邪然今文云令於諸法純見法性乃是於其迷妄諸法而見法性空中之理即是自行唯在空中轉染為淨也若輔行云十即實相乃是約於理具三千不思議假以立空中耳故迷妄諸法與妙假諸法亦不可同日而語也思之思之人不見之便準今文即見法性純是諸法以救實相相相宛然豈非大錯何者空中實相理體若乃相相宛然將何以明性具妙假事用森羅邪若依四明所立之義是則三諦皆有形容真俗理事並存質像不知何事偏嫌寂滅一相叵存獨愛建立諸法宛爾此非一家圓妙之道亦非偏小體析之門但是久劫著相之徒而今忽聞蕩相袪滯便乃驚怖如刀傷心嗚呼哀哉楞嚴所謂如來説為可憐愍者是知他人非但不識空中亡泯淨穢之法亦乃不知空中轉染為淨若言知者何故談於空中實相相相宛然邪須知實相空中之理非但亡於迷染轉染為淨也亦乃泯於淨穢三千叵得也能知此者方可與論心性佛理自行唯在空中化他三千赴物良以一心三觀三諦不出自行化他故也是諸法性本無名字等者例如佛本無身無壽無量之義也性既空矣相亦亡焉是故當知法性名字本不可得若乃隨緣亦可於其無名相中假名相説所以謂之約破立説名性名法是則為破衆生久劫但著諸法乃立法性無相之名有相若亡無相亦泯故下文云對華説空空無名字以此細推諸法皆爾故輔行云三諦無形俱不可見若乃不見而見無得而得乃是隨緣假立三諳之名耳是故向云令於諸法純見法性即是假立空中之法性也即見法性純是諸法即是假立俗諦之法性也總此三諦法性不出理事法性理法性者空中也事法性者俗諦也故輔行云心性不動假立中名亡泯三千假立空稱雖亡而存假立假號第十料簡色心不二如何觀察文為二初問諸文中云色心不二者約理融通也觀內觀外者約事立行也今此乃是以理難事故云色心不二如何立觀即是問於色心既乃無二無別如何立觀觀於色心為是約理故色心不二俱皆觀之為是約事故獨觀於色單觀於心邪然諸文中明所觀境有內有外乃是約事而分別耳今此亦是恐人不曉是故乃引色心不二約理融通以難如何立於觀行也次答文為二初明從理故色心體一心色一體者內外理同也理體既同故無前後以由心色皆是法界故也修觀下次明從事故觀心則易文為二初明事理二觀又為二初先明妙觀又為二初總示事理二觀先觀內心此如止觀去丈就尺去尺就寸之義也輔行云從廣之狹正示境體陰界入三並可為境寬漫難示故促指的略二就陰如去丈就尺略四從識如去尺就寸即唯觀心王也是故當知約理雖則色心不二約事須分內外有殊內外雖殊皆可用觀雖皆用觀不無難易何者色既在外觀之且難心既在內照之甚易是故修觀於色心境置難從易必先內心此明從易故先內心非謂外色不得觀察何者心色相對一往分別雖有難易若隨宜樂則不可局故涅槃云能觀心性名為上定淨名經有觀衆生品以至下文觀身實相觀佛亦然十六觀經觀於西方依正三輩豈非心佛衆生三法內外依正皆可觀之乎然今文中但云修觀次第先內次外第數合然必先內心何以得知此是總示事理二觀先觀內心下文云夫觀心法有事有理驗知今文修觀次第必先內心乃是總示事理二觀先觀內心也然內外之義具如內外不二門説但近故諸師所解不同或云佛界為內九界為外引經己事他事為證或云己心名內生佛名外或云總在一念為內別分色心為外乃引止觀妙境文中法性為內無明為外及文句記釋佛入定履歷法緣履歷即是歷事對境法緣即是內緣真理遂立內境是占察經真如觀理外境乃是唯識歷事又謂止觀初觀陰入是真如觀理下去九境是唯識歷事或云生佛及以依報名之為外自己心法名之為內引觀音玄云他謂衆生諸佛自者即心而具云云今謂諸文所觀內外雖復多塗不出三種一約色心二約依正三約三法初約色心分內外者識心為內正報之色及依報色皆名為外此如今文及四念處約有情心并有情色及外依報三處明於色心內外也二約依正分內外者正報五陰色心名內即以依報名之為外此如前文第四料簡中云外無情色內身內心是也外無情色者依報也內身內心者正報也三約三法分內外者己心三千名之為內彼彼三千名之為外當知三千不出十界十界不出衆生諸佛是則己心三千即己心生佛彼彼三千即他生他佛故知心法若未對於彼彼三千則但約於色心依正而分內外若乃對於彼彼三千是則自己色心依正皆名為內他生他佛彼彼依正皆名為外故輔行云縱知內心具三千法不知我心遍彼三千彼彼三千互遍亦爾苟順凡情生內外見故觀音玄云他謂衆生諸佛自者即心而具故約三法分於內外具含色心依正內外也然內外不二門既乃標云凡所觀境不出內外其實從前色心門中心佛衆生己他而立但色心門約於即理故三法無差而內外門約於事用故分己他耳故三法相望不出己他己他即是內外故也所以內外各含色心依正之法是故謂之外謂説彼依正色心及一念無念唯內體三千也且色心門云他生他佛彼彼境法而內外門云外謂託彼依正色心外既託彼依正色心內豈不具依正能所故彼內外不二門名不可約於自己生佛心之色心以分內外也況復所觀內外之境望於能觀不思議觀全是無明陰入所收何得引於法性為內無明為外而證之邪斯乃偶見內外之語便將類例所觀內外不知止觀自約四性破內外見而欲引例其可得乎且如內境圓修三觀豈可單破法性自生內見之計外境三觀豈可單破無明他生外見之計引此以證內外既非所據諸文亦皆訛錯不能具破云云今此下文既云觀心有事有理何得謂之內境乃是占察經中真如觀理內心既乃有事有理外境例之豈不然乎何得謂之外境乃是占察經中唯識歷事若謂止觀初觀陰入是真如觀下之九境是唯識觀者常坐三昧陰境十乘那破四性既歷四性推檢方悟豈非事觀下之九境若乃從理唯達法性豈非理觀他謂理觀觀理造三千事觀觀事造三千且常坐十乘初觀陰入顯於本性三千三諦遂引華嚴心造文證輔行乃云心造有二一者約理造即是具乃達理具即空即中方成三諦二者約事則論三世云云並由理具方有事用那忽分割理具妙假變造事用以為真如唯識二觀是故須知理事二觀皆顯理造及以事用即空即中良由二觀發軫投足雖於諸法有檢不檢理觀不推檢事觀則推檢至於悟理無非三諦故事理二造與事理二觀又不可同日而語也以此而知正名解義其實難矣具如十不二門圓通記中委辨
