body:
  text: 永嘉沙門釋從義撰二為示極理異後乘故者即止觀中約三義讀十法界三字以成三諦之文也輔行云初以十字獨呼法界兩字合呼此約真諦作所依釋十數是假所依是空以能從所十法皆空故此十以空法為界名十法界次以十法兩字合呼此約俗諦作隔異釋十法差別名之為界是故十法各有界分名十法界後以十法界三字合呼此約中道作法界釋十法無非真如法界名十法界依此三番讀十法界隨語思之三諦義顯於一念心不約三諦攝理不周斯之謂也言極理者三諦乃是極妙之理故也異後乘者妙境是理簡異後之九乘屬修故也故輔行云稱本修九方堪入位云云應知初番讀十法界約於真諦作所依釋乃是下文三千即空亡泯三千假立空稱了因佛性也次番讀十法界約於俗諦作隔異釋即下文云三千即假雖亡而存假立假號緣因佛性也後番讀十法界約中道作法界釋即下文云三千即中心性不動假立中名正因佛性也此三皆言假立者即非三而三隨順世間假立三諦之名號耳若乃三而不三即三諦無形俱不可見也何以明之然即假法可寄事辨即假之法可以寄於三千俗諦之事以辨故也即此假法即空即中點事明於空中之理故云假法即空即中假法既乃即空即中此即俗諦不可得也空中二體二無二也體即是理空中二法即是理體所以謂之空中二體俗假既亡空中亦泯是故名為二無二也三諦無形俱不可見其義如是三為欲開顯思議境故者即止觀云一觀心是不可思議境者此境難説先明思議境令不思議境易顯也輔行云先明可思議者意令不思議易解故也言易解者已聞思議十界歷別示此十界同在一心則一心中十界可識人不見之便棄思議別求不思議者遠矣如為實施權權是實權開權顯實實是權實相待絶待次與不次悉亦如是若棄思議當知是人二法俱失四為利根者開悟理故者利根即上根也輔行云故此十觀文十義十根三意二分遠近故近期初住遠在極果言根三者不思議境正被上根發心已去乃至正助被於中根次位已去乃至離愛被於下根故病患境明不思議境中引金光明除病品云直聞是言病即除愈即初觀意初觀即是今文利根開悟理故也復有深重難除差者至長者所為合衆藥病乃得差即後九觀意後九觀即下九乘觀法被於中下二種根性故也故今下文第六行解相資例中具引彼文三根之説云云五為下九法作所依故者前明妙境三諦極理異於後乘今明妙境三諦為下九法作於所依此俱舉前異後舉上為下作於所依故分兩別耳即輔行云又為知妙境為九乘本也故知後乘不異下九下九只是後乘故也下者後也良由於此故發心去九乘觀法文中皆悉先舉妙境以為所依尋文可見不煩具引次明發心五中言一為解理者仍須願故者輔行釋止觀文中明慈悲誓願與不可思議境智非前非後同時俱起慈悲即智慧智慧即慈悲云智只是解依境生解依解起願境為所緣誓為能緣故解理者仍須於願蓋指此也二為明發心攝法遍故者止觀云一苦一切苦輔行云先總牒前妙境故云一苦一切苦苦集二諦俱名為苦義攝十界只在一念故云一苦一切苦不明妙境一念三千如何可識一攝一切三千不出一念無明由知無明只是法性是故起悲又釋一樂一切樂云道滅二諦俱名為樂義攝四一教只在一念故云一樂一切樂不説妙境一念三千如何可識一攝一切三千不出一念法性由知法性只是無明是故起慈三為欲辨辨字誤也當為辨字異諸偏小故者止觀云非偽非毒非空非見愛名為真正發心輔行云此中圓教真正發心應約三教以簡毒偽所謂非空及非愛見三教菩薩未證中道通名為毒兩教二乘及九非心一地獄二畜生三餓鬼四修羅五人六欲天七魔羅八尼犍九色無色界名為九非并二乘即是十非具如止觀第一發心簡非中説通名為偽兩教二乘及以通別入空菩薩俱名為空三教出假通名愛見從初發心常觀中道故永不同毒偽空假四為明中根發方悟故者中根已如前辨發方悟故者輔行云今發重為成觀即是悟也故止觀云衆生雖如虗空誓度如空之衆生雖知煩惱無所有誓斷無所有之煩惱即空觀也雖知衆生數甚多而度甚多之衆生雖知煩惱無邊底而斷無邊底之煩惱即假觀也雖知衆生如如佛如而度如佛如之衆生雖知煩惱如實相而斷如實相之煩惱即中觀也五為下八法作行始故者輔行云從安心去乃至正助通得填願次位下三雖非觀法并由觀力相從名觀觀即是行故下八法皆以發心而為行始不先發心如何立行故下立行只是為填上之發願是故發心乃是為於下之八法作行始也三明安心五中云一為明有願仍須行故者止觀云上深達不思議境淵奧微密博運慈悲亘蓋若此須行填願行即止觀也輔行云正境是理理深也慈悲是事事廣也具如前説故云若此雖有事理但是空願從須行下即是生後若不安心無所剋獲故次正願而明安心二為辨中根難安故者止觀云夫心地難安違苦順樂今隨其所願逐而安之輔行云夫心地下結安心意以總安中唯止唯觀今以四悉等故云逐願三為示法同隨人異故者輔行云大文有二先明總安次明別安總別俱是依於妙境以隨人故總別不同惑重觀微應須隨事故使行相若信若法四悉回轉人不見之便於別安而生異計則失大師逐宜之能今謂總別俱依妙境即是法同也以隨人故總別不同即是隨人異也四為示凡夫自他安故者凡夫即是凡師也自他即是自行教他也止觀云安心為兩一教他二自行云云今不論聖師正説凡師教他安心他有二種一信行二法行乃至下文總結數云有三十二番安心云云自行安心乃至結數中亦云有三十二番安心自行教他合為六十四番安心也輔行云菩薩運懷利他為本故先他後自聖師位在初住凡師位在十信五品五為示開總出別安故者止觀總安心文末別安心文初云若俱不安當復云何輔行云若俱不安下欲明別安先序別意俱謂止觀俱不得安則總非其宜雖以法性自安其心彌增暗散既俱不安當復云何者問生後別也四明破法遍五中言一為辨辨字誤也當為辨字此門偏用慧故者止觀云上善巧安心則定慧開發不俟更破若未相應應用有定之慧而盡淨之故言破耳輔行云安心破遍並是絶待咸具定慧今據初心欲入未入隨事調熟用與不同或宜有慧之定如前安心或宜有定之慧如今破遍故從行立名名不虗設又前安中先推法性以多從定是故云安今此破中先準教門義多從慧是故云破二為隨用一門橫豎遍故者隨用一門者即止觀云圓教四門皆能破遍所謂有門無門亦有亦無門非有非無門橫豎皆遍者豎即止觀云豎攝因果始從初住終至妙覺言橫攝者初阿字門攝四十一字四十一字攝初阿字中間亦然橫豎備攝文略如此輔行云此亦非橫非豎而論橫豎耳攝即遍攝也三為初心者依教門故者止觀云然破法須依門經説門不同謂教門行門智門理門三門置之今但説教門教門復通四教今但説圓教之門耳輔行云四門次第教既居初故今依教復為令知教有功能能通至於觀智理等教中復簡藏等三教正用圓門而論破遍云云今謂第三初心依教合在第二科位列之何者以第二科隨用一門橫豎遍故乃是於其圓教四門之中隨用一門橫豎皆遍故也四示初心者依無生故者止觀云今置三門且依空無生門輔行云今於圓門復論去取理雖相即理體同故所以相即初心從易及隨便宜多用無生故於圓門去三存一事異故常分所以去三存一也五三諦圓融破方遍故者以三觀相即顯三諦圓融破三惑方遍故也此中五意後之三意別在今文者今文即今破遍文也前之二意通在初後者初即始自觀於妙境後即終至離於法愛莫不皆用有定之慧一心三觀及隨用一門橫豎遍攝故也若不爾者豈有上根觀於妙境及以下根離於法愛而非一心三觀橫豎遍攝邪五明通塞五中言一為示撿校非一節故者即多番檢校之義也輔行云一橫通塞止觀橫約三法謂苦集無明十二因緣生六蔽為塞道滅無明十二因緣滅六度為通二豎通塞止觀云見思塵沙無明為塞空觀假觀中觀為通三橫別通塞止觀引小品云有菩薩初發心與空相應又云有菩薩初發心遊戲神通又云有菩薩初發心坐道場輔行云同初發心故名為橫分屬三人故名為別四一心通塞止觀云若於一一法一一能一一所皆即空假中具諦緣度是名無通無塞雙照通塞輔行云心謂能緣之心法謂所緣之法若觀若境俱有心法咸順檢校文四義二前三為成一心故也一一皆須四句檢校若於四通而起塞著皆須破塞以存於通如是展轉以破為期故舉喻云將若為賊此賊亦破賊若為將此將亦護如是展轉將皆為賊節節破之即是此文之正意也二為示橫豎通仍塞故者止觀云若豎論三觀兩觀當地為通望上為塞若後一觀勝下為通隔小為塞若橫論三觀即橫別三觀也當分為通不相收為塞法相淺深任有通塞況復於中起苦集無明蔽等輔行云初斥橫豎中先重列出通相通塞所破為塞能破為通故名通相次法相下況出今文橫豎別相通中之塞橫豎法相已有通塞況復於通起著成塞別相則以於能起著為塞破塞無著為通三為示一心仍有塞故者止觀云若於無塞無通起苦集無明障蔽者非但失於神通亦失馬步神通馬步即止觀引大論文也具如第七喻疑顯正例中引之能破如所破云云輔行云一心不當橫豎通塞於此一心復起塞著而生苦集無明蔽等此苦集等即是見思見思既生即空尚失豈復更有去邊求中故云非但失於中道亦失空假步馬此是一心別相之塞尚須檢校令塞得通云云四為示寶渚是為所通故者寶渚之言出彼大經寶所之説在今法華其名雖異況喻無別故大經云譬如商人欲至寶渚不知道路有人示之隨語即至多獲諸珍衆生亦然欲求法寶不知其路菩薩示之即得至於大涅槃處此法華云過五百由旬至珍寶所實相佛慧即是寶所而此寶所在於五百由旬之外故也爾雅云水中可居曰洲小洲曰渚渚者丘也水中之高者也渚者沚也遮也遮水使旁回也今以陸極水際為渚也大涅槃處即是寶渚也五兼消經文過五百故者止觀明通塞來意中舉喻文後合喻文云若爾即大導師善知通塞將導衆人能過五百由旬乃至云今明五百由旬有三義一約生死處謂三界為三百方便土為四百實報土為五百二約煩惱謂見惑為一百五下分為二百五上分為三百塵沙為四百無明為五百三約觀智空觀智知三百假觀智知四百中觀智知五百輔行云若爾下合譬若能如是方能導人至於寶所於中先正合譬次通五百由旬義即通塞之正意也破塞存通至寶所故是故路經五百由旬經云導師善知通塞故用法華將導譬也初約生死者五百皆是生死故也是故不以寂光對於五百乃至云以此三釋即是一念能所無著方名善知也六明道品五中言一為示須用道品調故者止觀云所以須此者上來雖破法遍識通塞若不調停道品何能疾與真法相應真法名無漏道品是有漏有漏能作無漏方便方便失所真理難會又大論云道品是行道法涅槃城有三門三門是近因道品是遠因為是義故應須道品調停也然當分相攝約位相生四種之中調停但是相生道品耳二為示調停異偏小故者止觀云諸道諦三十七品今不具記但明無作道諦三十七品成於一心三觀義也三為示念處是陰境故者止觀云今一念心起不思議即一切種十界陰入不相妨礙輔行云今一念去正釋念處先更牒前不思議境為念處境既一一界各具十界故不相妨前總立陰名觀既不悟故離為四而調停之故知前來境等五法并依於陰乃至覺道亦復如是又云為約法相令具足故及示識心以為境首故先於破法遍後例於餘陰以為通塞道品之本若欲顯於不可思議還須約於一念心辨則具觀於陰入界等一切皆然四為示道品攝諸行故者若通以三十七道品攝諸行者即止觀引大經云三十七品是涅槃因非大涅槃因無量阿僧祇助菩提法是大涅槃因者道品之外無別有道品云云直明一三十七品是涅槃因復有無量三十七助道品名大涅槃因云何無量有四種道諦故有十六門故又引淨名示道品善知識由是成正覺道品是道場亦是摩訶衍云云若別以念處為道品攝諸行者即止觀云念處是法界攝一切法乃至云如是念處力用廣博義兼大小俱破八倒雙顯枯榮雙非枯榮即於中間入般涅槃亦名坐道場亦名摩訶衍云云又若通以三十七道品互相兼攝為攝諸行者即止觀明相攝道品云如念處一法既攝餘品當知餘品亦攝念處但非調停之義耳又止觀明五根中云進者以信攝於諸法信諸法故倍䇿精進念者但念正助之道不令邪妄得入又此法者為精進所修是法不忘故名念根定者一心寂定而行精進又此法為念所攝是法不忘不動故名定根輔行云釋此五法一一具二一釋根當體二攝後歸前云云五為示品後必有門故者止觀明三十七道品後云復次行三十七道品將到無漏城城有三門若入此門即得發真謂空無相無作門亦名三解脫門亦名三三昧輔行云次明三脫門者明道品功能也七明正助五中言一為示重蔽者必須助故者重謂遮重蔽謂六蔽遮重即是六蔽耳止觀云根利無遮易入清涼池不須對治根利有遮但專三脫門遮不能障亦不須助根鈍無遮但用道品調適即能轉鈍為利亦不須助根鈍遮重者以根鈍故不能即開三解脫門以遮重故牽破觀心為是義故應須治道對破遮障則得安隱入三脫門二為示事度能冶蔽故者止觀云助道無量前通塞意中約六蔽明遮宜用六度為治以論助道輔行云助道無量但用六者為對六弊故且立六以示治相此科正為治於重弊是故且立事六為治重必對輕輕重即是遮有厚薄厚重若去輕薄寧存三為示助道攝法遍故者止觀云今明六度助道攝諸法盡略明攝諸道品調伏六根十力四無所畏十八不共法六通三明四攝四辨陀羅尼三十二相八十隨形好等及一切法輔行云次明攝法者正示合行故能攝法若不達於一切諸法皆入此之對治門中如何對治攝一切法四為示正助合行相故者止觀云若全無理觀又無事懺輒望佛印希利規名若佛印者無有是處若理觀無間借事破蔽真實心懺印有是處乃至明於道品六度相破相修相即六句輔行云若全無下明合行之意先斥失次明得言佛印者印謂印可可謂稱可事理相稱故可聖心為聖冥印障去理顯既具衆失又迷理觀印無是處次以六句料簡事理三對不同且以事度對理道品生滅道品對圓六度以明相破相修相即生滅是事圓是理也五為示三教俱是助故者止觀明事六度中一一皆列藏通別等故知三教俱是助也輔行云若以四教展轉為治以前助後者還以前六轉望後教六蔽之相為對轉等如通教人用三藏六別人則用藏通兩六圓人用三並有轉等又云若以四教遞為助者應以通教對事六度別教對事圓教對事別教對通圓教對通圓教對別總合六重度品不同八明次位五中言一為示妙位使不濫故者止觀之中借明四教次位不同今文之中既云妙位當知即是圓教次位始自五品終至妙覺故止觀中明五品十信初住位已仍略示於後去諸位云如是次第四十二位究竟妙覺無有叨濫是名知次位即此意也二為示妙位德難思故者德謂功德如五品位初隨喜品經文自云其有衆生聞佛壽長遠乃至能生一念信解所得功德不可限量何況讀誦等乃至第四品云況復有人能持是經兼行六度其德最勝無量無邊譬如虗空第五品云當知是人已趣道場近三菩提止觀明十信位中云十善菩薩發大心長別三界苦輪海又明初住位中云初發心時便成正覺真實之性不由他悟等初住既爾乃至妙覺功德轉深如此等位功德不可思議故云德難思也三為示慕果令思齊故者謂明圓教次位蓋為示於衆生慕樂聖果庶令思齊上位耳思齊之言出乎論語故論語云見賢思齊焉今且用於思齊之言而不用於見賢之説四為斥增上慢知非聖故者謂明圓教次位有凡有聖有因有果蓋為增上慢者知自己非是聖人故也故止觀明三藏次位畢乃斥濫云此教初淺尚有次位豈有凡夫造心即言上位此非增上慢推與誰乎五為逗衆生宜樂者故者止觀明別教次位中云但別義多途赴機異説橫則四門不同豎則階降深淺不可定執一經而相是非上文一往望攝論華嚴所明地位即是別義又菩薩或造通論釋經或造別論釋經如龍樹作千部論天親及諸菩薩論復何量度此者少那得若專一意非撥餘門若苟且抑揚失佛方便自招毀損欲望通途翻成哽塞輔行云那得等者破執也論申當門為引偏好晚人不達抑有揚無失有方便毀無讚有失無通途三四二門亦復如是雖欲引進翻為哽塞九明安忍五中言一為示內外障須安忍故者輔行云外障是軟賊謂名譽等故止觀云若被名譽罥等也內障是強賊謂煩惱等故止觀云若煩惱見慢等從內來破者也二為斥鄙夫檀師位故者止觀云那得薄證片禪即以為喜才見少惡即以為憂輔行云文舉片禪少惡為違順之端故知違順未堪不應領衆止觀又云始觀陰入至識次位八法障轉慧開或未入品或入初品神智爽利云云但錐不處囊難覆易露或見講者不稱理或見行道者不當轍慈悲示語即被圍繞云云初謂有益益他蓋微廢損自行非唯品秩不進障道還興毗婆沙云破敗菩薩也昔鄴洛禪師名播河海住則四方雲仰去則千百成群隱隱轟轟亦有何利益臨終皆悔云云言鄙夫者即鄙陋之夫也如論語云有鄙夫問於我空空如也我叩其兩端而竭焉三為示行者內外術故者內三術者謂即空假中三觀治於內障也外三術者初術謂莫受莫著治於外障名譽利養眷屬等也次術謂縮德露玼治於外障名譽等黏繫也三術謂一舉萬里治於外障名譽等遁迹不脫也術者法也四為示先賢安忍軌故者止觀引南嶽云武津歎曰一生望入銅輪領衆太早所求不剋著願文云擇擇擇擇高勝垂軌可以鏡焉輔行云引四擇意者用誡後學善須決擇勤勤不已四度言之故天台指南嶽為高勝之人垂於深誡以為後軌後代學者可以為鏡鏡可以照不整之形今言先賢即南嶽也以南嶽是內凡十信即賢位耳南嶽願文云四擇大部補注中引之五為令䇿進相似位故者止觀云修行至此審自斟酌智力強盛須廣利益若其不然且當安忍深修三昧行成力著為他未晚若至六根清淨名初依人有所説法亦可信受一音遍滿聞者歡喜是化他位乃至云為辨大事彌須安忍若得此意不須九境云云輔行云若能於此陰境安忍必得入於六根清淨尚離二乘菩薩兩境況煩惱等七故約此人不須更明下九以不忍違順故九境生智者遺書與晉王云貧道初遇勝緣發心之始上期無生法忍下求六根清淨三業殷勤一生望獲不謂宿罪殃深致諸留難內無實德外虗名譽學徒強集檀越自來既不能絶域遠避而復依違順彼自招惱亂道退行虧應得不得憂悔何補上負三寶下愧本心此一恨也云云十明離法愛五中言一為令離於頂墮位故者止觀云行上九事過內外障應得入真而不入者以法愛住著而不得前乃至云譬如同帆一去一停停即住著又雖不著沙亦不著岸風息故住不著喻無內障岸喻外障而生法愛無住風息不進不退名為頂墮若破法愛入三解脫發真中道云云二為示大小乘頂墮別故者止觀引毗曇云暖法猶退五根若立上忍發真則不論退頂法若生愛心應入不入退為四重五逆通別皆有頂墮之義既不入位又不墮二乘大論云三三昧是似道位未發真時喜有法愛名為頂墮輔行云應歷四教明頂墮義初文且寄三教頂墮次從既不入下正明今文頂墮之義初三藏文中先簡非頂墮位謂暖一向退不名頂墮忍位過頂復不名墮於二位間住頂名墮何者五根忍位不復出觀上忍發真是故不墮於頂位中多生愛心則應入頂而不得入由退頂故造於重逆故名為墮通教頂墮例此可知別教頂位在十行中故無墮義於行向中縱起著心但未入地名為頂墮終無造過次大論下明圓似位有愛今論圓教至十信時若生愛心不入初住而六根淨位定不墮小則以住頂名之為墮非謂退墮以六根中無退義故況復更有造重逆邪故此頂墮異前藏通故大論明頂墮有二一者頂退名之為墮二者住頂名之為墮小乘教中雖具二義住頂多退故今圓位見思已落但有住頂一墮義耳故大論問云頂不應墮云何言墮答垂近應得而便失者名之為墮若得頂者智慧安隱則不畏墮此約初義以退為墮若第二義但以住頂不進不退名之為墮是則十信初心猶名為暖菩薩戒疏云舊云法才王子六心中退即云十住第六心難云十住云性地性以不改為義云何退作二乘其猶一答性是不作闡提不妨退大向小終是難通止觀師説是十法信中六心退耳北釋論師及金剛般若論師皆作此解是信習十心中六心耳七心已上永離二乘爾時設為利弘經不無輕漏而度物心不失恆有菩薩之名也法華文句明通教位不退云若六心已前輕毛菩薩信根未立其位猶退七心已上從初地至六地不退為凡夫二乘名位不退文句記云次通教位引六心者通教地前無位可論借別位名以通其位即指別教七信已上入乾慧也故云初地至六地方名位不退或指地前假立七賢即以忍位為第六心依小乘位雖云忍位名位不退望菩薩乘猶名為退請以此文詳菩薩戒疏方曉身子六心猶退是別教十信中六心退耳七信已上則不退也又文句記云六心退者準瓔珞意身子於十住中第六心退恐是爾前見思俱斷至六心時見猶未盡六心時見猶未盡六心尚退又輔行釋先世已斷通惑文云或是斷見或侵少思若見思都盡亦不生此既分斷見思當知起見不同凡下又云以用拙智分斷通惑盡處分名不調故輔行引瓔珞經云第六住菩薩止觀現前值佛菩薩及善知識之所護故入第七住已得不退人無我畢竟不生若不爾者一劫乃至退菩提心如我初會八萬人退謂淨目天子法才王子舍利弗等欲入七住值惡知識退入凡夫乃至千劫作大邪見及五逆罪無惡不造云云三為示似愛非真愛故者著於十信功德則非著於初地也故止觀禪境明十禪第八因緣禪明十乘中第十無法愛云無順道法愛者一似二真菩薩從初伏忍入柔順忍發似解功德不染三法謂相似智慧功德法性以智慧有無明愛取故以功德有行有業故以法性有名色生死故皆不應著若於三法生愛不入菩薩位云何起愛如入瞻蔔林不嗅餘香菩薩唯愛諸佛功德不念二乘及餘方便道是名為愛愛故不能變無明愛取為真明不能變行有為妙行不能顯識色為法身若不著相似三法無順道法愛則無量衆罪除云云入理般若名為住即是初發心時便成正覺云云從此已去心心寂滅云云輔行云無法愛中言真似者初泛標二位次釋似位先列相似三法次以智下誡勿於似法生愛妨入真位次若於下示頂墮相次云何下示起愛相次若不下示無法愛得入真位真尚不著況著相似次入理下正示真位離愛之相次從此下明入位也於真法起愛名為法愛愛名雖同真似義別四為示功用異偏小故者今止觀中正明圓教離相似愛故此功用異於偏小之離愛也五為令䇿進入初住故者既離十信相似法愛即得入於初住之實也此一一下第三結示傍正其文可見然前破遍五中前之二意既云通於初後須知別在破遍故偏用於慧即破遍之正意也次明與他所立永異釋文為二初敘意分章言所立者即是所立十乘之意也異於諸家者即智者已前諸師也故章安序云止觀明靜前代未聞也若以荊溪時世言之則指賢首慈恩等為諸家也及今學者讀文昧旨等者此斥清涼澄觀師也文句記云比竊讀者即此故也具如下文第七例中辨之不知所立唯順圓融若不了之修習無分等者既讀文昧旨故不知止觀所立唯順法華待絶微妙輒便斥為漸圓謬立華嚴是頓頓當知若乃不曉今家所立之旨是則修習法華妙行止觀明靜於己無分此即敘意也於中又二先總次別者即分章也次所言下依章解釋文為二初釋總義略列十條一須知乘體無發無到者止觀引十二門論十二門者一觀因緣二觀有果無果三觀緣四觀相五觀有相無相六觀一異七觀有無八觀性九觀因果十觀作十一觀三時十二觀生空名大乘普賢文殊大人所乘故名大乘大品云是乘不動不出若人欲使法性實際出者是乘亦不動不出輔行云法性實際本不動出設使能令法性動出而此大乘亦不動出法性即是大乘之理還以其體而為設況故今文中不動出義獨在於圓若通論者共菩薩中動謂柔順忍出謂無生忍若共聲聞乘動謂學人出謂無學若別菩薩動謂出假出謂登地故今圓人不斷煩惱為不動不破生死為不出是故動出通於諸教不動不出唯在於圓故不動出即是今文無發無到無發故不動無到故不出故妙玄明圓教以真性軌為乘體乃引大論云是乘不動不出又云若取真性不動不出則非運非不運若取觀照資成能動能出則名為運只動出即不動出即不動出是動出即用而論體動出是不動出即體而論用不動出是動出二須知乘體通因通果者釋籤云圓乘體者皆須從初因以至於果所取名為乘體前之二教雖即同有真性觀照能照所照但依權理別教教道又以地前緣修方便而為乘體故前三教所明乘體皆不至極未極息教是故索車圓教乘體從始至終即今所謂通因通果而非始終即向所謂無發無到是故達到乘義猶在故以真性始終不動而為車體故此車體非運而運云云然此四教各具三軌藏別兩教咸以智慧為體通圓兩教咸以真性為體者良以體為所乘未可暫廢以藏別真性果滿方成儻指體在當以何為運若用觀照則從始至終故通圓居因即事論性果位乃窮是故兩教真為乘體又前之兩教通雖稍優并不知常置而不説別雖同證教道全權圓雖理極尚有始終問若謂乘體通因果者而妙玄中亦引古人解於乘體通因通果果以萬德為體因以萬善為體章安何以斥古為非邪答今文所明乘體通因通果者乃是法性實相理體通於初因後果所乘耳章安斥於古人明乘體通因果者以古人將因果為乘體不以法性實相為乘體故須破之也故今文云乘體通因果與古人解乘體通因果其語雖同其義永別也三須知圓乘具於十法者圓乘具於真性觀照資成三軌若具三軌即具十法何者真性既是車體豈非妙境觀照資成既是具度白牛豈非發心乃至道品等邪文句記云性種正行為了助開為緣又妙玄引方便品云佛目住大乘豈非真性乘體不思議境邪如其所得法定慧力莊嚴以度衆生豈非觀照資成發心等邪然法説周但談三軌妙法上根開悟即具十法若不爾者將何以為譬説周中大車譬本邪故止觀云積劫勤求道場證得身子三請法譬三説正在茲乎故法説周上根人聞妙智妙境即得開悟故諸佛智慧其智慧門即妙智也諸法實相即妙境也妙境妙智豈異十法故輔行云被上根人名為法説中根未解猶希譬喻下根器劣復待因緣佛意聯綿在茲十法故十法文末皆譬大車是故當知圓乘十法且須約於法説而明未可便濫大車之譬以大車譬喻於十法即是次文方明故也四須知大車唯喻十法者以諸境十乘之後皆引大車為喻故也何者其車高廣喻妙境也幰蓋慈悲寶繩交絡喻發心也安置丹枕枕有內外若車內枕休息衆行即喻安心若車外枕或動或靜動靜只是喻通塞也破塞存通即塞而通其疾如風即破無明喻破遍也大品云法愛難斷故處處説破無明三昧始自白牛終至平正喻道品也又多僕從喻正助也頌中云儐從禮云導也又云侍邊也遊於四方喻次位也安忍離愛在次位初安忍只是忍於五品違順二境令入六根離愛只是離六根中相似法愛又次位者只是行之所階恐行者生濫故於次位中別出五品六根清淨勸勵行者令離障離愛故知前七正明車體及以具度後三只是乘之所涉若無所涉運義不成是故十法通名乘也今習大乘者自量己心如何得與大車文合若一句即是為是何句一句即足何須諸句豈佛謬説強騁文詞煩列車儀衒惑迦葉此大羅漢久為僧首四十餘年不受真化才聞方便通歎二智略開顯已動執生疑情方猶豫殷勤三請廣聞五佛十番開權又覩身子三業領解八部引例四衆酬恩如來述成分明與記經斯重疊宿種未開才聞大車便堪記莂故知此乘觀法具足仍存翦略粗點十觀若廣張行相何由可備不別解釋即悟生生望上稱中比下仍利若此車譬一句徒設則顯佛有綺語之辜或舉集人添糅之咎及責譯者混雜之愆若屬對有由則行儀可軌豈學大觀頓爾全棄既失大檢小徑莫從大小咸亡恐隨邪濟乘壞驢車為向何方五須知諸法皆具十乘者文句記釋賜車中云所賜不二是故云等但點所習無非妙乘只緣性同賜義則等既云車等何以各賜昔習不同諸位不一至此所説無非一乘若一人不遍不名子等且云子等應遍諸法一物不與不名賜等所謂色心逆順依正行理因果自他解惑小大慧福故知等賜只是開彼三乘六道無非一如故一一如無不遍攝遍具遍入一切衆生誰無四方道場之分誰不理有大車具度待時待緣是故爾耳故至今日方云各賜故止觀中觀陰入界歷緣對境及煩惱等皆明十乘即是色心依正因果等一切諸法皆具十乘也六須知諸教門門具十者此如妙玄第八卷中明實相門示入門觀約於四教門門明於十乘之行然雖辨於十乘但是列名而已若今止觀正明妙行故置前之三教十乘也七須知開顯唯妙十法者前明諸教門門具十對偏説圓乃是相待判粗妙耳今明開顯唯妙十法則是絶待開於四味三教四門門門十法即是圓頓醍醐妙乘也八須知簡體與具度別者文句中引世人明乘體不同光宅以佛果究盡無生二智為車體云云莊嚴取因總萬行為乘體云云乃至云大乘以實慧方便為車體云云章安私謂云諸師釋佛乘之體而競指具度何異衆盲觸象諍其尾牙依天台智者明諸法實相正是車體一切衆寶莊校皆莊嚴具耳文句記云牙等雖象通別不同通則無非象身別則身非耳等準譬破義意亦可知故亡體者通別俱迷具如玄文顯體中辨故妙玄中引於古人明乘體畢章安斥云悉非今經乘體並是莊校儐從耳那忽於皮毛枝葉而興諍論邪喧怒如此孰能別之今家簡出正體者如三軌成乘不縱不橫不即不離顯示義便須簡觀照資成唯指真性三軌既然餘法例爾故云三德不縱不橫名為大乘於大乘中別指真性以為經體釋籤委簡今不具録輔行又解攝法文云實體止觀以為能攝事理等六以為所攝所從於能故云攝法雖辨偏圓次不次等但明實體所攝法遍豈所攝差降令體分張輔行又簡不思議境所明四聖六道之法乃是為知不思議境所攝法耳諸祖格言如此明了而四明云不思議三諦皆是經體又云實相理體差別相相宛然豈非違祖背宗傷教損理之甚乎哀哉哀哉世人迷醉望聲傳習都不醒悟具如光明玄義順正記及十六觀經疏往生記中辨之九須知觀心立十法義者止觀云觀心具十法門輔行云觀法非十對根有殊十乘對三根不同又次位下三雖非觀法並由觀力相從名觀故名十觀又備此十令觀可成故名成觀亦名成乘思之可見又下文云若無十法名壞驢車問前第五條既云諸法皆具十乘今文何故又云觀心立十法義答前文約通故諸法皆十今文從別故云觀心立十耳十須知白牛異黑牛故者黑牛即是三車之內第三牛車也經文之中雖無黑字而各賜諸子等一大車中既云白牛驗知三車之內第三牛車但是黑牛耳所言白者文句云白是色本即與本淨無漏相應故故前文云無漏妙觀以為白牛若爾黑牛反顯黑非色本不與本淨相應名為黑牛也故偏小菩薩空假二智全是無明黑染不與佛智白色相應故不可以大白牛車濫同三車中第三黑牛車也慈恩云大白牛車即三車內第三牛車以慈恩宗明菩薩大乘不分小衍偏圓之異遂説法華只開二乘不會菩薩此與今家大意相反廣如文句引古諸師明二乘索車菩薩不索車作十難難之章安私以總別駁之駮謂班駮不純之狀亦雜也破彼如駮正釋如純觀其詭纍三藏詭者詐也纍者重疊也古人十義多是詐纍藏通也故設十難古人十難具如文句管見一班都非大體若爾慈恩但是拾古之失以為已得耳非是慈恩自立義宗也古人既謬慈恩寧是所以今文乃云須知白牛異於黑牛故也然此十條皆云須知者囑後學輩意之所解心之所行當明了無濫故云須知耳近人學法混沌不明誠堪憐愍是故若能知此十條則聞衆怪説情慮坦然法華妙行投心有地云云所言別下次釋別義十乘各四文為二初與前附文對辨縱有一兩似前附文者至下隨文具為點出為欲辨異他所立者即前所謂次明所立異於諸家及今學者讀文昧旨不知所立唯順圓融也次妙境下正釋別義文為十初妙境中為三初標次一於下釋文為四初明無情有佛乘義者即是無情有佛性義也此意淵奧卒難開悟今先述大旨次消今現文初述大旨者金剛錍云曾於靜夜久而思之思之未已恍焉如睡不覺寱云無情有性金剛中下文又云余患世迷恆思點示是故寱言無情有性何謂點示一者示迷元從性變二者示性令其改迷是故且云無情有性若分文示則大教談於佛性而不説於無情小教言於無情則不説於有性而今謂之無情有性者斯蓋發揮涅槃大教圓伊金以決四時三教遍小四眼無明之膜令見一切之處悉是圓頓毗盧遮那法身正報衆生佛性猶如虗空非內非外一切處有不隔牆壁瓦石草木則是無情有佛性也豈非無情有佛性義乃是開小成大決粗令妙示權即實點事明理乎是故當知從迷就事區而別之心有緣想名為有情色無覺知名為無情若乃從悟就理而説則有情性遍不隔瓦石乃名無情有佛性耳故止觀云一色一香無非中道輔行解云山家教門所明中道唯有二義一離斷常屬前二教二者佛性屬後二教於佛性中教分權實故有即離今從即義故云色香無非中道此色香等世人咸謂以為無情然亦共許色香中道無情佛性惑耳驚心由是約於十義辨之十義具如下文引示須知無情即是色香佛性便是中道他人迷於佛性中道體同名異却許色香中道之教不信無情有性之説他人意謂佛性但在有情之內法性中道通於色香故也他人若知衆生佛性有情體遍終不分張佛性中道情無情別以迷此故遂分兩派荊溪於是依經立義點示衆生有情性遍不隔瓦石以明無情有佛性理以申色香中道之教且有情之性既遍無情何得非性邪如此豈非開粗即妙點事明理故云今從即義色香無非中道故釋籤云故知今即即彼別教次第三諦次第即已方成今即何者彼若未即猶同小空及隨事假今若即已三俱圓妙尚即於別豈不即於通及三藏故知無情有性乃是開前三教有情性遍不隔瓦石即事明理耳若不爾者今文謂之無情有性下文乃立有情性遍如何會通邪故知有情性遍不隔瓦石便是無情有佛性矣故止觀明不思議境約於中道讀十法界三字合呼輔行謂之心性不動假立中名三千即中性正因者乃是無情有於中道遮那佛性也何哉以止觀中去丈就尺去尺就寸觀於陰心以成妙境百界千如復俗差別同二真諦中道雙非故在剎那也故前所明妙境五中第三為欲聞顯思議境故及以第一為示三千在一念故即是無情有佛性義若不爾者今文謂之於無情境立佛乘故法身體遍如何領解邪然即三而一故云三千即中性正因耳若即一而三乃是三千即空性了因三千即假性緣因也亡泯三千假立空稱雖亡而存假立假號良由於此故知三一九三但是修性離合之異耳所以金下文謂之諸問且令識十乘初妙境而已餘乘諸境不暇論之以金上文立四十六問明於無情有佛性理三一融妙正是約於摩訶止觀觀於陰心以成妙境一念三千即空假中三諦之理有情性遍方得一念具足三千不隔草木牆壁瓦石以明無情有性故也是故金下文乃云一家所立不思議境於一念中理具三千故曰念中具有因果凡聖大小依正自他故所變處無非三千而此三千性是中理不當有無有無自爾何以故俱實相故實相法爾具足諸法諸法法爾性本無生故雖三千有而不有共而不雜離亦不分雖一一遍亦無所在是故今文妙境四中第一謂之於無情境立佛乘故須知此明佛乘之體法身周遍是即三而一若即一而三則三佛之性無不周遍今且從於即三而一所以謂之於無情境立佛乘故即金云無情有性也若乃即一而三自屬次文衆生性德具三因耳三一雖則體同相即今從存於三一之意故茲區別後學思之不須驚怪也仍於睡夢忽見一人云僕野客也容儀粗獷進退不恆逼前平立謂余曰向來忽聞無情有性仁所述邪余曰然客曰僕忝尋釋教薄究根源盛演斯宗豈過雙林最後極唱究竟之談而云佛性非謂無情仁何獨言無情有邪荊溪假夢寄客立以賓主耳應知寄於野客乃是斥於清涼觀師耳故涅槃經云為非涅槃名為涅槃為非如來名為如來為非佛性名為佛性云何名為非涅槃邪所謂一切煩惱有為之法為破如是有為煩惱是名涅槃非如來者謂一闡提至辟支佛為破如是一闡提等至辟支佛是名如來非佛性者所謂一切牆壁瓦石無情之物離如是等無情之物是名佛性清涼觀師執此經云離如是等無情之物是名佛性以難荊溪所以謂之而云佛性非謂無情仁何獨言無情有邪故清涼觀師華嚴疏云如遍非情則有少分非是覺悟況復涅槃佛性除於瓦石大論中云在非情中名為法性在有情中名為佛性明知非情非有覺性又賢首藏師起信論疏亦引大論云真如在有情中名為佛性在無情中名為法性賢首清涼既皆謂之在無情中但名法性豈非共許色香中道無情佛性惑耳驚心若謂不然何故清涼專執涅槃經文佛性除於瓦石邪是知金之作正為破於清涼觀師傍兼斥於賢首藏師耳金既然輔行十義意亦如是今家學者解釋金及以輔行都不知此豈非探討之不廣論議之畢淺乎是故須知涅槃經云離如是等無情之物名為佛性乃是權教帶方便説所以謂之依迷示迷云能造是附權立性云所造非若不爾者今問瓦石若乃一向永非佛性二乘煩惱豈亦一向永非如來及涅槃邪只此一問衆滯自消而欲苟執牆壁瓦石無情非性權教之文其可得乎故知經文寄方便教説三對治暫説三有以斥三非故云煩惱二乘瓦石非是涅槃如來佛性耳若頓教實説則本有三種三理元遍達性成修修三亦遍所以經中於三非文後便即結云一切世間無非虗空對於虗空故知經以衆生佛性正因結難何所不攝豈隔煩惱及二乘乎虗空之言何所不該安棄牆壁瓦石等邪由是言之清涼乃是執權難實則權實俱亡緣了難正則三因咸失也哀哉傷哉所引大論真如在無情中但名法性在有情內方名佛性者荊溪親曾委檢大論都無此文或恐謬引章疏之言輒便分為兩派而説諒是曾覩小乘無情之名又見大乘佛性之語亡其所引融通之談而棄涅槃虗空之喻不達修性三因離合不思生佛無差之旨謬效傳習無情之言反難己宗唯心之教專引涅槃瓦石非性不測部時出沒之意如福德子而無壽命弱喪徒歸猶迷本族如受貴位不識祖宗亦如死人而著瓔珞用是福為用瓔珞為法相徒施全迷其本云云余曰古人尚云一闡提無云無情無未足可怪一闡提輩乃是有情古人尚乃言其無性而清涼賢首執涅槃大論云無情無佛性未足可以嫌而怪之也秦時六卷泥洹經先至京師涅槃大部未流華夏于時竺道生法師剖柝六泥洹經旨洞入幽微乃説闡提悉有佛性皆當成佛孤明先發獨見忤衆由是關中舊學以為邪説譏憤滋甚遂顯大衆擯而遣之時生法師於大衆中正容誓曰若我所説反於經義請於現身即彰癘疾若與實相不相違背願捨壽時據師子座發斯誓已拂衣而去初投虎丘次往廬山其後涅槃大部乃傳此方經文果云一闡提人悉有佛性生公既覩涅槃誠教乃登法座論議數番麈尾於是紛然而墜遂隱几順化是知生公昔日未死有待故也而今乃死待竟故也大唐三藏玄奘法師遊至西域以華析請觀音像曰若一切衆生實有佛性者惟所散華桂菩薩頸既散華已乃如其願有人評云若使奘公有生公之知則不應有祝也儻祝之不吉將不信乎夫卜者決猶豫定嫌疑不疑何卜易曰中心疑者其辭枝奘公非其枝乎向無生公落詮之知則昭昭佛性隱於無知之輩矣又奘公弟子大慈恩寺窺基法師解法華經謂之玄贊引楞伽經説五種性一聲聞性二辟支佛性三如來性四不定性五無性闡提又引法華論四種聲聞一退大二應化三上慢四定性趣寂前二佛與授記作佛上慢一種不輕記之皆當作佛令其發心修大行故定性趣寂元無大性佛不與記然而論中上慢定性合一處説所以謂之根未熟耳定性趣寂元無大性何得論其熟與未熟正理應云其定性者根不熟故佛不與記若定性者後亦作佛違涅槃等處處文故故瑜伽云其趣寂者雖蒙諸佛種種方便終不能令成三菩提又引深密勝鬘維摩諸經證之今不具録西京崇福寺神楷法師維摩疏中廣破慈恩所立之義具如大部補注中引學者尋之今家意者五性之宗三無二有是法華前方便之説故深密等維摩諸經並是法華已前所説瑜伽唯識攝大乘等諸論正申法華已前諸經意耳若至法華三乘五性咸皆開顯但有在於此會及以餘國之不同耳法華論中約於當座是故乃云佛不與記經文約於通塗開顯所以乃云彼土得聞此彼雖殊悟理無別故大佛頂首楞嚴云如來今日宣説勝義令汝會中定性二乘及餘一切皆獲一乘寂滅場地若爾定性亦有在於此土開悟也原夫五性之宗三無二有祖於彌勒述於天親折薪于玄弉克荷於慈恩立言垂範自為極致以今觀之但是權説非為究竟也慈恩尚計定性二乘元無大性不得成佛何獨闡提無佛性邪涅槃經云一切聲聞及辟支佛未來皆歸大般涅槃如一闡提究竟不移犯重禁者不成佛道無有是處何以故是人若於佛正法中心得淨信爾時即便滅一闡提則得成佛若復不移不得成佛無有是處經中又云迦葉菩薩白世尊言衆生於佛滅後作如是説如來畢竟入於涅槃或不畢竟入於涅槃乃至云或有説言須陀洹人至阿羅漢皆得佛道或言不得如是問已佛皆答云不解我意乃至結云如是諍訟是佛境界非諸聲聞緣覺所知所以皆云不解我意者以對昔教責於迷者二俱不解若識化意則二俱解在昔須云不成執者望今成過在今須云必成望後逗小成過以大小教開與不開並通三世慈恩不曉唯引不成以證定性輒便難云若定性者後亦作佛違涅槃等處處文故今問慈恩成與不成既皆謂之不解我意何得唯引不成以證定性趣寂既俱有過何得偏引雙引各執尚違教旨何況偏引以證趣寂何得責云違涅槃等處處文邪餘如大部補注中示以此觀之古人所計定性二乘無性闡提元無大性不得成佛皆是執權迷於真實也賢首清涼雖信闡提有於佛性定性二乘皆當成佛而不信於無情之物有佛性理專執涅槃瓦石非性權教之文不見衆生佛性體遍之説謬引大論在無情中但名法性見則還成執權迷實雖信闡提有性之説而迷衆生佛性之義還成不了闡提有性何者若知闡提衆生性遍不隔瓦石何故忽聞無情有性惑耳驚心故知賢首清涼未解闡提衆生性遍遂執權教無情非性以抗圓妙無情有性耳若夫發揮無情有性以申有情衆生性遍其唯吾宗荊溪禪師矣方今天下之人競學慈恩賢首清涼是則衆生性遍圓妙之説而彼不遇可不悲哉可不悲哉今若不作如此委説將何以申次明所立異於諸家及今學者讀文昧旨邪然以教分大小其言碩乖若云無情即不應云有性若云有性即不合云無情客曰涅槃部大云何並列余曰以子不間佛性進否教部權實故使同於常人疑之今且為子委引經文使後代好引此文證佛性非無情者善得經旨不昧理性知余所立善符經宗今立衆生正因體遍經文亦以虗空譬之故三十一迦葉品云衆生佛性猶如虗空非內非外若內外者云何得名一切處有請觀有之一字虗空何所不收故知經文不許唯內專外故云非內外等及云如空既云衆生佛性豈非理性正因此下具引經文今不煩録下文又云今搜求現未建立圓融不斃性無但困理壅故於性中點示體遍他不見之空論無情性之有無不曉一家立義大旨故達唯心了體具者焉有異同乃至下文設四十六問竟野客領解云今亦粗知仁所立理只是一一有情心遍性遍心具性具猶如虗空彼彼無礙彼彼各遍身土因果無所增減故法華云世間相常住世間之言凡聖因果依正攝盡故知無情有佛性理乃是約於有情性遍不隔牆壁瓦石草木即是無情有佛性耳若不爾者何故初云無情有性次云今立衆生正因佛性體遍後領解云只是有情心遍性遍荊溪專憑涅槃經文圓實之教衆生佛性猶如虗空非內非外一切處有明有情性遍不隔瓦石以申無情有佛性理而清涼觀師尚不信受猶自固執涅槃經文偏權之教離無情物名為佛性如其不依經文實教以立義宗但準天台智者之説是則清涼如何順伏何以得知清涼不信以清涼自撰演義鈔解華嚴疏云然此段疏彼華嚴疏其辭如前注中引之為遮妄執一切無情有佛性義就計此義自有淺深一謂精神化為草木情變非情二謂無情同一性故此釋太過失情無情壞於性相若以涅槃第一義空該通心境者涅槃何以揀去瓦石言無情邪準此驗知清涼不信涅槃經文圓妙實教衆生佛性有情體遍不隔草木所以專執偏權之文離無情物名為佛性今問清涼若乃不許荊溪用於涅槃經中衆生佛性有情體遍該通心境以申無情有佛性者而汝華嚴疏中何故又云若二性互融無非覺悟邪彼疏又云以性從緣則情非情異為性亦殊如涅槃等之所説也泯緣從性則非覺非不覺本絶百非言亡四句今問清涼既云二性互融無非覺悟何故又執佛性除於瓦石邪既執權而難實故自語乖違是則將何以為準的而與荊溪抗論邪嗚呼清涼不得天台教部權實故迷佛性進否之説所以反背天台稟承賢首自立以性從緣泯緣從性及二性互融豈非空論無情性之有無不曉天台立義大旨此且略點關節大綱委如金錍寓言記説又輔行中約於十義評無情有性一者約身言佛性者應具三身不可獨云有應身性若具三身法身許遍何隔無情既云約身豈非正報即三而一故云正因遮那佛性即一而三故云佛性應具三身世人見於涅槃經云一切衆生皆有佛性乃謂但有應身之性故今遮云應具三身不可獨云有應身性若具三身普賢觀經明許法身遍一切處且一切處何曾隔於瓦石草木請觀此文豈非亦是衆生佛性正因體遍不隔草木即是無情有佛性理一義既然九義可解若謂不然金錍題下何故注云圓伊金錍以決四眼無明之膜令一切處悉見遮那佛性之指豈可注文解釋題目異於下文立義符宗衆生佛性有情性遍豈可異於今文中云法身許遍何隔無情學四明者不見斯旨妄謂古師之立無情有於法身正因佛性而無報應緣了佛性由是荊溪乃作金錍及以輔行點示法身正因佛性必具報應緣了佛性即一而三以明無情有佛性理所以謂之不覺寱云無情有性今立衆生正因體遍言佛性者應具三身不可獨云有應身性若具三身法身許遍何隔無情今謂此説一往則可畢竟不然何者若謂古師之立無情有於法身正因佛性但無報應緣了佛性金輔行乃就古師之許法身正因佛性體遍義中點示法身正因佛性必具報應緣了佛性所以謂之無情有性法身許遍者是則輔行文中合云言佛性者應具三身不可獨云有法身性何故謂之不可獨云有應身性若其然者豈非古師不曾知於法身體遍何得妄説古師之立法身佛性正因體遍若復苟執古師之立無情有於法身佛性金錍那云故知世人局我遮那唯陰質內直云諸法是無情邪由是而知學四明者皆是無稽妄偽之説所以乖文失旨之甚不詳法義唯順人情謗法之罪他豈受之況金錍輔行立無情有性正寄野客而斥清涼專執涅槃權教之文離無情物名為佛性荊溪乃準涅槃實教之文立衆生佛性正因體遍不隔瓦石明無情有性野客方乃信一切法皆正因性次方疑於正中三因種修果遍荊溪乃立四十六問野客方解即一而三三德體遍金錍之意既乃如此輔行之義豈不然乎何得謂之古師之立無情有於法身正性而無報應緣了佛性何得謂之金錍輔行首初乃令古師信於法身正因必具報應緣了佛性而彼首初尚自未信無情有於法身正性那忽便令信於法身正性必具報應緣了佛性且金錍云今立衆生正因體遍及輔行云法身許遍何隔無情正是今文於無情境立佛乘義若無佛乘佛法身體為遍不遍何得謂之古師元立無情有於法身佛性古師若乃已立無情有法身性今文何煩首初示云於無情境立佛乘義若無佛乘佛法身體為遍不遍若謂今文首初示云於無情境立佛乘義即是法身正因必具報應緣了此與次文衆生性德具於三因及金錍云正中三因種修果遍并輔行中第二義云二者從體三身俱遍如何區辨嗚呼哀哉不知何處濫習妄説一至於此金錍明説故知世人局我遮那唯陰質內直云諸法但是無情驗知他云古師之立無情有於法身佛性而無法身具報應性灼然虗妄矣二者從體三身相即無暫離時既許法身遍一切處報應未嘗離於法身況法身處二身常在故知三身遍於諸法何獨法身法身若遍尚具三身何獨法身所言從體三身相即無暫離時者體同故相即用異故常分一家諸文莫不皆爾人不見之誠堪愍矣文句記云近代翻譯法報不分三二莫辨自古經論許有三身若言毗盧與舍那不別則法身即是報身若即是者一切衆生無不圓滿若法身有説衆生亦然若果滿方説滿從報立若言不離三身俱然何獨法報生佛無二豈唯三身故存三身法定不説報通二義應化定説若其相即俱説俱不説若但從理非説非不説事理相對無説即説無説情通妙契諍論咸失由是而知今文且從體同不離所以謂之二者從體三身相即無暫離時不可執此便乃不許用異常分若不爾者法報不分三二莫辨若存三身法定不説報通二義應化定説如何領解豈可一向執於體同三身相即而責用異三身宛然是故當知體同用異二義兼舉方乃無失寄語後德宜熟思之既許法身遍一切處等者普賢觀經既許法身遍一切處然而報應豈離法身此約合為修二性一故報應修二不雜法身性一也況法身處二身常在此約法身一性恆具報應二修也此與金正中三因及今次文衆生性德具於三因宛如符契矣故知三身遍於諸法何獨法身者結示上文法及報應皆遍一切是則經中何獨單許法身周遍故知經意亦許報應遍於一切所以經云釋迦名為毗盧遮那遍一切處舍那釋迦亦遍一切三佛具足無有缺減三佛相即無有一異也良由若有一異即乖法體體即實相無有分別故一異咸亡也法身若遍尚具三身何獨法身者結示上文況法身處二身常在性具三身亦皆周遍是則經中何獨但許法身遍邪然須了知法報周遍境智一如應用周遍差降不同以由帝綱依正終日炳然故也三約事理從事則分情與無情從理則無情非情別是故情具無情亦然從事則是偏權之教分於有情無情不同離理説事斯之謂也從理則是圓實之教不分情與無情之異即事明理不其然乎從理既乃不分兩殊是故有情體遍既具當知無情亦復如是良以有情性遍體具不隔草木是故謂之情具無情亦然也若不爾者金何故初云無情有性次云有情體遍邪體同故不分所以恆遍具故知不約理依正曷融通文句記云塵剎重重相入相有重重事等重重説等為未了者以事顯理耳若不了此一旨誰曉十方法界唯有一佛亦許他佛他亦身土重重互現互入互融當知只是約於一理周遍所以事用重重耳四者約土從迷情故分於依正從理智故依即是正如常寂光即法身土身土相稱何隔無情三土九界從於迷情故分依正寂光佛界從於理智故融身土此亦約於偏圓對辨五約教證教道説有情與非情證道説故不可分二藏通二教教證俱權圓教教證俱皆是實但別教中教權證實意稍難曉人多迷之故今文中教證之義定是別教不可謂之圓家教證良以圓家教證俱實別家教權證實故也六約真俗真故體一俗分有無二而不二思之可知真故體一亦約圓實俗分有無亦約偏權二而不二豈非點粗即是於妙故前文云今從即義色香中道良由於此七約攝屬一切萬法攝屬於心心外無餘豈復甄隔但云有情心體皆遍豈隔草木獨稱無情有情體遍不隔瓦石便是無情有佛性理此文最顯可不信哉可不信哉清涼不達如斯妙義輒便破云若以外境而例於心令有覺知修行成佛乃是邪見外道之法嗚呼哀哉清涼之言駟不及矣今問清涼若如是者何故自云二性互融無非覺悟邪矛盾之談清涼有矣八者約因果從因從迷執異成隔從果從悟佛性恆同準前約土及以事理思之可見文句記釋相對種云言相對者即事理因果迷悟縛脫等當體敵相翻對也故知今文迷情因事并是偏權之教道耳故偏權之有差即圓實之無差即事而理全波是水方之可知清涼不曉輒便斥云非謂無情亦有覺性同情成佛若許此成則能修因無情變情又自立云無情成佛是約性相相融而説以情之性融無情相以無情相隨性融同有情之相故説無情有成佛義若以無情不成佛義融情之相亦得説言諸佛衆生不成佛也以成不成情與無情無二性故乃至云一成一切成也以此觀之故知清涼空論無情性之有無不曉一家立義大旨迷於法相一體異名不間佛性權實進否須知果地依正融通并依衆生理性之本此乃事理相對以説若唯從理只可謂之水本無波必不可云波中無水若唯從迷説則波無水名情性合譬思之可知無情有無例之可見云云九者隨宜四句分別隨順悉檀且分二別金剛云又復經中闡提善人四句辨性子云衆生有性為何衆生有何等性瓦石為復無四句邪然經文云或有佛性一闡提有善根人無或有佛性善根人有一闡提無或有佛性二人俱有或有佛性二人俱無我諸弟子若解如是四句義者不應難言一闡提人定有佛性定無佛性章安云或有佛性下四句分別先正約四句次我諸下勸分別荊溪云闡提善人俱有性德而闡提無修善善根人有闡提有修惡善根人無二人俱無無不退性以未入於似位故也且分二別者其實佛性善人闡提性本融遍奚嘗隔於草木瓦石有情之性性既遍不隔當知瓦石不可謂之無四句矣十者隨教三教云無圓説遍有然此十義第一第二正明圓實以斥權隔於無情第三第四先且對辨偏圓不同次乃點示權即是實仍斥計權隔於無情第五教證第六真俗如前區別其意可解第七準前第一第二亦乃可知第八準於三四思之第九如前豈非圓實第十謂之三教云無圓説遍有驗知前九即是別判第十隨教乃當總判前之九義不出三教云無情無圓説有情體遍不隔是故瓦石草木有性以前三教教道但云無情而已不言有性故也今點粗是妙故云無情有佛性耳是故無情有性即是有情體遍不隔牆壁瓦石草木焉此蓋破於清涼觀師固執涅槃偏權之文離無情物名為佛性是以荊溪乃點涅槃圓實之文有情體遍不隔瓦石以明無情有佛性理欲令清涼信順妙教不生誹謗耳然則對破清涼雖爾而一家諸文非必一向獨明有情體遍不隔亦乃兼示無情性融何者四念處云若圓説者非但唯識亦乃唯色唯聲唯香唯味唯觸以至諸文凖此應知不煩具引又輔行中引淨名云衆生如故一切法如如無佛性理小教權教權理實亦非今意彼經維摩彈訶彌勒其文有五初總定次正彈三結過四為説五得益次正彈中文自有二初約生門次約無生門又有二段初約無生理次約無生行文自為四初雙定次雙破三雙并四雙結雙并又二初以四如為并端云一切衆生皆如也一切法亦如也衆聖賢亦如也至於彌勒亦如也疏釋此云前三是順并從初至後故後一是逆并從後至初故釋此逆順皆約衍中通別圓三疏中但約通教委釋次以別圓準通類之初約通教釋者衆生即假人假人如與彌勒如一如無二若衆生如不得受記彌勒亦然何得獨記彌勒乎次一切法如者通情無情情謂五陰實法無情即是外國土等今但以無情替於衆生句句悉同須類説之何者無情之法佛不授記故大經云若尼拘陀樹能修戒定慧我亦授三菩提記以其無心修道故不與授記故以為并異有情也三衆聖賢者即藏通二乘賢聖皆悉是如并亦例前思之可見何者自法華已前二乘賢聖皆無受記故以為并四約彌勒如逆并前三亦思之可見此逆順并四段之文既皆約於三教釋之故通教如如無佛性理小教權別教之如如雖佛性教權理實亦非今明圓教教理俱實之意然疏中釋一切法如既通三教故知文云無情之法佛不授記不可謂之但是通教亦須約於別圓説之是故當知疏文中云無情之法佛不授記通於三教雖通三教須知此約破記義中一法尚不可得誰論情與無情得受記乎世諦中尚有無量法豈可不論受記者哉故有情得記而體遍不隔故三千果成咸稱常樂一佛成道法界無非佛之依正一佛既爾諸佛咸然故不可引淨名疏中約破記云無情之法佛不授記以難立記三千果成又不可謂淨名疏云無情之法佛不授記局在通教也又若論無情何獨外色內色亦然故淨名云是身無知如草木瓦礫若論有情何獨衆生一切唯心是則一塵具足一切衆生佛性亦具十方諸佛佛性應知此文亦是約於有情性遍不隔草木所以謂之一切唯心是則一塵具足一切生佛之性此與金錍一念具足一塵不虧文意符合良以有情心性體遍具足一切不隔草木是故名為一念具足一塵不虧若不爾者輔行中云一切唯心是則一塵如何消釋故知一切唯心不隔草木乃是一念具足及一塵不虧耳故金錍云生佛亦同法身力無畏等使一塵一心無非三身三德之性種皆是此意也又止觀中思益淨名普賢觀等明遮那周遍輔行釋云煩惱體淨衆德悉備身土相稱遍一切處顯前兩經衆生理遍不了之者尚隔無情豈非無情有性乃是有情體遍乎昔孤山撰顯性録解金剛專約有情體遍明無情有性而四明直論外色有性破於孤山約有情體遍自昔至今七十餘載天下學者皆宗四明之説以黜孤山之義余昔亦然近方許究金錍初云無情有性次云今立衆生體遍後云只是一一有情心遍性遍乃知金錍正是約於有情體遍以明無情有佛性耳自是歷觀輔行十義莫不皆然仍又博考他人章疏則知金錍輔行所斥野客執於離無情物名為佛性乃是正破清涼觀師傍破賢首藏法師耳復慮近日末學膚受罔測端由但循偽妄於是乃出寓言記四卷以申金錍建立之旨今既解於妙境四中第一意云於無情境立佛乘義專約法身體遍而説故與金錍輔行相關所以如向委敘綱格幸希後德試為詳之是故當知金錍輔行依經明文立義破於清涼賢首而孤山云有情體遍即是無情有佛性義其意甚當四明直論外色之性不許有情體遍之義良恐不然又復孤山專執金錍輔行依經立於有情體遍不許外色無情性融斯又違於四念處云若圓説者非但唯識亦乃唯色唯香味等四明雖得非但唯識亦乃唯色唯香等意而又失於金錍輔行依經立於有情體遍即是無情有佛性義是則孤山四明所見既乃不同撰述不無得失況復孤山及以四明並皆不知金錍輔行立有情體遍明無情有性正為破於清涼傍為斥於賢首執涅槃權文并謬引大論又復孤山及以霅川以天台四教會賢首五教失旨尤甚具如金錍寓言記及大部補注中辨今略不明學者知之已上略述大旨竟次消今現文者所言一於無情境立佛乘故者標示所立也若無佛乘佛法身體為遍不遍者正以今家所立妙義反質他人之所執也何者他人若謂無情之境無佛乘者今問他人佛法身體為遍一切為不遍邪若云不遍豈非對面違普賢觀毗盧遮那遍一切處若云遍者且一切處何隔草木獨稱無情而非性邪亦不應云佛法身體同於無情及以不同者又遮他人之所執也何者他人見於經云法身遍一切處乃曲解云佛法身體同於無情及以不同所言同者佛法身體雖遍一切瓦石草木此但遍同無情而已非謂遍同便有覺性言同者能依之身與所依土各別不同故佛法身正報不同依報無情金錍斥云故知世人局我遮那唯陰質內直云諸法但是無情又云空論無情性之有無不曉一家立義大旨故達唯心了體具者焉有異同即此之謂也所言異者即不同也由是言之輔行云法身許遍許之一字正指經文已如前説文句記云自古經論許有三身即斯例也又復許字亦可謂之指斥於他輔行謂之然亦共許色香中道亦斯例也何者汝許經文法身周遍何故隔於瓦石而獨謂之無情邪作此斥已他必救云經文所説法身遍者誰不許之須知但是法身遍同無情而已非謂法身遍同無情即令無情有覺性也故清涼云身土約相則有差別故唯衆生得有覺性以由衆生有智慧故牆壁瓦石無有智慧故無佛性若以相從是則身土隨所依性則無差別以色性即智故名智身智性即色故名法身遍一切處以此驗知清涼不達毗盧身土即是如如法界之理離身無土離土無身便約事相差別而解又以事相從性説之豈非空論無情性之有無且第一義空既名智慧其性又遍何得謂之牆壁瓦石無有智慧豈非全同凡情所解肉眼所見何須評論佛眼佛智所知所見世相常住不變之理故今文中為遮清涼如此之許是故謂之亦不應云佛法身體同於無情及以不同寓言記中消釋許字仍闕今文第二義也學四明者不曉所以乃謂古師元立無情有於正因法身佛性而無正因法身具於緣了報應之佛性者不亦謬乎是故應云法名不覺佛名為覺佛即是法法即是衆豈可條然者正示三寶體同相即以斥他人所計法身同於無情與佛性異又復清涼及以賢首并皆謬引大論中云真如在於無情但名法性在於有情方名佛性遂執普賢觀經法身遍一切處但是同於無情名為法性非是佛性以由他人共迷法相名異體一便謂法身中道真如法性異於佛性此是學釋教者之大患也輔行斥云然亦共許色香中道無情佛性惑耳驚心良由於此維摩經云佛法與衆不可猶如枝條之然各各差別也涅槃經中迦葉難云涅槃佛性決定如來是一義者云何説言有三歸依佛言有法名一義異名義俱異佛常法常比丘僧常涅槃虗空皆亦如是是名名一義異名義俱異者佛名為覺法名不覺僧名和合涅槃名解脫空空名非善亦名無礙如來或時説三為一説一為三如是之義是佛境界非二乘所知今文意者若説一為三則名義俱異是會之彌分也若説三為一則名義體同是派之彌合也既名義體同故三寶相即若不爾者如何消於佛即是法法即是衆故金錍中亦乃謂之法名不覺佛名為覺又云衆生雖本有不覺之理而未曾有覺不覺智故且分之且分無情名為法性有情名為佛性也令覺不覺豈覺不覺不覺猶不覺邪反謂所覺離能覺邪法名不覺者法是性德不動也佛名為覺者佛是修成智契也然則法身遍一切處即是遮那法佛性遍何得謂之法身體遍但同無情而非佛性邪何得謂之無情法性非有情佛性邪須知不覺無覺法性不成覺無不覺佛性寧立是則無佛性之法性容在小宗即法性之佛性方曰大教故佛之一字即法佛也故諸經中謂之毗盧遮那佛即此故也次明衆生性具三因者上約即三而一故云法身體遍今約即一而三故云性具三因故金錍云汝無始來唯有煩惱業苦而已即是全是理性三因故此即是衆生性德具三因也性指三障是故具三斯之謂矣若無三因則緣了始有始有無常如何無常而立常果者輔行釋妙境文中引普門玄義云了是顯了智慧莊嚴緣是資助福德莊嚴由二為因佛具二果元此因果本是性德性德緣了本自有之今三千即空性了因也三千即假性緣因也三千即中性正因也乃至云能知此者方可與論性德三因故此即是金剛錍云正中三因種修果遍及輔行中第二義云二者從體三身皆遍也性德既乃本具緣了則非今日發心加行方始有之若始有之則是無常如何以此無常之因而立常住智斷之果大經破外用別教意非此所論者妙玄云藏通信法真似橫豎諸行以傍實相為體傍謂偏真體行俱粗別教信法真似橫豎諸行雖依別門用正實相為體中道為正因無常故而果是常行粗體妙又妙玄明別教云教融行證未融亦粗釋籤云別教若準上下諸文應云證融教行不融以從初地證道同故此之玄文凡判別義未開顯邊多順教道今此亦然教談中理是故名融行證次第故名不融若作證道同應如前説云云圓教信法真似橫豎依圓門正體體行俱妙又云涅槃有十六門十二門粗四門為妙所通俱妙何者前來諸門法華涅槃已前粗妙各通猶存權理涅槃不爾一切諸法中悉有安樂性是諸衆生皆有佛性無復權理但一妙理而更存粗門為妙理方便皆明入實如梵志問云因無常故果云何常佛反質答云云如百川總海諸門會實實理要急是故須融接引鈍根存粗方便法華折伏破權門理如金砂大河無復回曲涅槃攝受更許權門各為因緣存廢有異然金沙百川歸海不別釋籤引涅槃三十五陳如品云闍提一來至佛所難佛云因無常故果亦無常佛反質答汝因是常而果無常何妨我因無常而果是常今引此文以證因門無常而得常果故大經意通以三教而為因門悉歸常果委如涅槃經疏中説今文謂之別教意者以別教中教權證實以教權故因則無常以證實故果則是常故大經云因滅是色獲得常色受想行識亦復如是別教教道因尚無常豈前兩教非無常邪故知經意通以三教而為因門悉歸證道同圓常果用別教意雖則如此單就圓教意則不然是故今云始有無常如何無常而立常果以由圓教始終俱妙是故因果皆名常住然須了知圓頓大乘不當謂之常與無常雙亦雙非並皆不可若有因緣亦可作於四句而説是故當知定性四句名為戲論無異羣邪假名四句乃得為門方能見道囑爾後學當以此意闡揚開化普結妙因若不然者何異魔外六師之徒余今豈可自誇矜伐但患近世傳習吾宗率多迷此故以好心點示學者正修行路實相之門耳三明依正二報唯在一念此即前來附文初云為示三千在一念故何者以三千中生陰二千名為正報國土一千名為依報三千既在一念依正則居一心故輔行云當知身土一念三千故成道時稱此本理一身一念遍於法界他人咸知一切唯識者即指古來諸師及慈恩賢首清涼等也故賢首等雖宗起信有時亦用唯識之説言唯識者唯遮外境識表自心故云唯識則一切法唯是於識也不知身土居乎一心者一切不出身土唯識即是一心他人雖知一切唯識不知身土居乎一心斯乃迷於一切唯識若夫身土居乎一心辭異意同亦如共許色香中道無情佛性惑耳驚心他人若知一切唯識即是身土居乎一心慈恩何故許於闡提定性二乘元無大性永不成佛賢首清涼何故謬引大論之文分為兩派謂之真如在無情中名為法性在有情中名為佛性清涼何故專執涅槃佛性離於瓦石偏權之文以難衆生正因體遍一切處有圓實之義是故須知一切唯識即是身土居乎一心心體既遍何隔瓦石既乃不隔豈非無情有佛性乎故天台明圓教四念處文畢乃云欲重説此義更引天親唯識論唯是一識復有有分別識無分別識分別識者是識識也無分別識者即似塵識也一切法界所有瓶衣車乘等皆是無分別識如彼具説龍樹云四念處即摩訶衍即四念處一切法趣身念處即是一性色一性之色即是空中之一性具不思議假之色也得有分別色無分別色分別色者如言光明即是智慧出涅槃經具如輔行第十卷引之無分別色者即是法界四大所成色心不二彼既得作兩識之説此亦得作兩色之説若色心相對離色無心離心無色輔行第十二卷中引乃云色心相對則有色有心論其體性則離色無心離心無色又復加於色心相即句云若色心相即二則俱二一則俱一良由既有相對必有相即故也若不得作兩色云何得作兩識邪若圓説者亦得唯色唯聲唯香唯味唯觸唯識若合論一一法皆是法界云云衆生有兩種輔行云若從末説者末對本立名也本則理性融攝末則事用差分一者多著外色少著內識少著外色如上界多著內識下界著外色多內識少欲色為下二界乃至云若色若識皆是唯識若色若識皆是唯色雖説色心兩名其實只是一念無明法性十法界即是不可思議云云故知心體即常寂光者此乃結示身土居乎一心之所以也所以者何即是心體常寂光也是則若無心體寂光融攝不二何得身土依正報在於一念須知此文乃以空中為常寂光即自行唯在空中之義也故自受用報冥於法身即是空中為常寂光故淨名疏云前二是應即應佛所居第三亦應亦報即報佛所居後一但是真淨非報非應即法身所居既以法身居常寂光必須兼於自受用報以自受用報常冥法身乃是理體亡泯無相故也第三亦應亦報即報佛所居者此即他受用報也以他受用報亦名報身亦名應身故也然雖亦名應身既是稱實感報所以但名報身故云第三亦應亦報即報佛所居也故不可以自報之無相居實報之有相以下三土皆是有相事用故也釋籤化他三千赴物即此意也故知今文明心體寂光與止觀輔行明土體雙非之義不同也然雖不同而中邊真俗理事體用但是離合之異耳寂光諸土者非一曰諸即三土也無二無別者此明四土體同也若非體同何得寂光與夫三土無二無別文句記問無二無異此兩何別答重以不異復於不二以無異故方名不二今亦例然重以無別復於無二是故謂之無二無別又無二者寂光諸土理事之二其體是一也體既是一則非差異故云無別也遮那之身與土相稱法與報應一體無差者上句但明四土體同無二無別故今乃明身土相稱即依正不二能所無別也淨名疏云真如佛性非身非土而説身土離身無土離土無身言身土者一法二義耳遮那法身既與寂光相冥相稱而報應二身與實報等三土相冥相稱準例可解更不煩文所以便云法與報應一體無差以上句云寂光諸土無二無別故今乃云法與報應一體無差驗知中間遮那之身與土相稱亦須更云報應二身與三土相應故知但是文之略耳然須了知體同故雖則無差用異故豈可混濫釋籤云依正既居一心一心豈分能所雖無能所依正宛然法華文句云體即實相無有分別用即立法差降不同諸文舉用明體故説諸法互融若乃舉體説用須知差降炳然故輔行云一一界果各各具十不相混濫又釋籤云理體無差差約事用請細研詳方曉其旨四明不知空中理體本自無差而具俗假事用有差輒判理體及以事用二俱有差誤之甚矣失之大矣原其誤失良由錯解一家諸文理具之義故也悲夫悲夫是故須知若存三身四土則法身自報寂光定無相輔行云常寂光土清淨法身無能莊嚴所莊嚴釋籤云諸佛寂理神無方所所依寂境號常寂光文句記云況常寂光端醜斯亡觀經疏云法身無像實不假地所居法界次第云法身虗寂豈有形聲之可見聞金光明云佛真法身猶若虗空華嚴云一切法無相則是真佛體若能如是觀諸法甚深義則見一切佛法身真實相等皆是此意也故不可引法華法身具於應身相好謬立法身寂光名為有相也他報應化三土定有相若其相即俱相俱無相以法身自報寂光即他報應化三土故俱相他報應化三土即法身自報寂光故俱無相若但從理非相非無相以理性寂滅有無叵得故非他報應化三土之有相非法身自報寂光之無相若事理相對無相即相即相無相以法身自報寂光空中理體之無相對他報應化三土俗假事用之有相故無相即相他報應化三土俗假事用之有相對法身自報寂光空中理體之無相故即相無相情通妙契諍論咸失四明不知一向唯談三身四土皆是有相以彼自立法身寂光實相理體相相宛然故也余嘗歷考諸祖格言都無此意斯蓋四明妄自建立耳亦如報應尊特生身體同故相即用異故常分四明不知便自妄立界內分段劣應生身不須現勝即是界外法性尊特遂將法華佛身卑小及以彌陀生身高大濫同尊特相好無邊余昔遭於四明所惑嘗習斯義近方省察於是廢之具如十不二門圓通記及十六觀經疏往生記中所辨嗟乎近人率皆稱傳天台祖教及究其旨趣乃專依四明若聞智者章安荊溪綱要之言而耳不欲聞口不欲談心不欲思以至皓首出語無稽由是妄説文外之旨以誘愚叢嗚呼正教陸遲一至於此哀哉傷哉四明諸佛不斷性惡輔行釋不思議境中問云於不思議中但明四聖何法不攝何必須明六道法邪答為實施權從實開出今欲示實何得不論總約一化有五意説一者為示人天路故二者為令厭輪回故三者為知菩薩自誓悲化境相故四者為知不可思議境所攝法故五者為欲令知性惡法門遍故今文正在第四第五兼用第二第三此以六道而為性惡若通而言之須該九界言性惡者謂性具諸惡也性惡既有二義性善反此思之可知應知性謂空中之理惡謂妙假之事於妙假中或別以六道為惡或通以九界為惡通別雖異莫不皆是性具諸惡故云性惡具即是假不其然哉又涅槃玄以四趣為惡人天為善三界是惡二乘是善二乘是惡菩薩是善又止觀以諸弊為惡事度為善事度為惡二乘為善二乘為惡六度菩薩為善乃至云別教為惡圓教為善如此善惡其義則通云云性惡若斷普現色身從何而立者法華經云皆得普現色身三昧此有三義一者內現如法華中身根清淨十界依正於身中現如淨明鏡諸色像二者外現亦如法華普門示現隨機不同十界色異三者內外現如大集中觀於己身衆生身諸佛身悉於己身中現又見己身衆生身現佛身中衆生身中亦如是現釋籤云真如鏡淨任運能照以能照外現十界像是故外像現於內也有此二用故分內外論其實體內外不二是故謂之普現色身普現色身既該十界當知諸佛乃是三千理滿垂應不二門云衆生由理具三千故能感諸佛由三千理滿故能應應遍機遍欣赴不差良由於此通論不斷十界善惡普現色身其義雖爾別論不斷性惡則普現色身或約四趣或約六凡或約九界云云但使分得常住法身不動而動遍應身土者初住已去是分證即常住法身體雖不動遍應身土用即而動也初住已去分果尚然妙覺滿果則可知矣然初住位雖證無生必須界內分段身滅生於界外實報土中方能不動而動遍應身土於同居中八相成道五時施化十界利生故不可以分段生身便作遍應身土而説也具如觀音玄文及第五記者輔行第八云現行印本即止觀第四記舊本即止觀第五記若見觀音玄文意者則事理凡聖自他始終修性等意一切可見彼文料簡緣了中云如來不斷性惡闡提不斷性善點此一意衆滯自消以不斷性善故緣因本有彼文云了是顯了智慧莊嚴緣是資助福德莊嚴由二為因佛具二果元此因果本是性德性德緣了本自有之是故他解唯知闡提不斷正因不知不斷性德緣了故知善惡不出三千彼又問云既有性德善亦有性德惡不答具有問闡提與佛斷何等善惡答闡提斷修善但有性善在如來斷修惡但有性惡在問性德善惡何以不斷答性德但是善惡法門故不可斷一切世間無能毀者如魔燒經卷豈能令於性法門盡縱燒惡譜亦不能令惡法門盡問闡提不斷性善故後時還起善如來不斷性惡故應當後時還起惡答闡提不達性惡故後時還起於修惡不了於性善故後時還為修善染是故修善還得起即以修善治修惡則令修惡不得起佛雖不斷於性惡而能了達於性惡而於惡法得自在不為修惡之所染是故修惡不得起故佛永無於修惡自在用於惡法門闡提若能達修惡則與如來無差別故知於善於惡善達修性於修照性以性了修能知此者方可與論性德三因生死涅槃煩惱菩提十二因緣即是三德如是無量理無不通彼文又問闡提斷善盡為梨邪所持一切諸種子為內外所熏更能起善者此識既無記與真如何別又此種子住在何處而不早熏故知權説非為了義若有説言佛起神通現惡化物此作意通同彼外道及二乘通不同明鏡任運現像若大經云或有佛性闡提人有善根人無古師謂是惡境界性或有佛性善根人有闡提人無古師謂為緣因性也或有佛性二人俱有古師謂為正因性也或有佛性二人俱無古師謂為了因性也如此釋者亦別教意不了義説若了義者如前明無情境立佛乘義中具引之四明但知性具之惡普現色身相相宛然不曉具惡之性普現之本空中理體亡泯寂滅致使所談一念三千即空假中三身四土理事體用皆是有相請詳諸祖法言方驗四明之失問文句記云忽都未聞性惡之名安能信有性德之行人多異説今意如何答若解今文不斷性惡則知性德之行由聞性惡之名何者方便藥草法喻雖分亦權之義則無殊軌記中為消差與無差故明性德之行須聞性惡之名豈非無差即差亦權之義乎又上句云對此終窮安得昧實豈非差即無差亦實之義乎所以亦權是性德之行由聞性惡者以諸經地前尚自違理未開權故今經彈指無非佛因以顯實故誰知法華佛以惡行亦得名為善權方便故邪見嚴王及惡逆調達等內祕外現莫不皆是亦權善巧并由理具不斷性惡是故有茲性德之行所以性德與夫理具及以性惡蓋同出而異名耳具如金錍體德中説然須了知實相空中無差之理其實本具諸法妙假三千世間差別之事但別教中既無性德本具九界自他皆斷故今乃明圓頓之理性具九界不斷性惡有性德行自行不斷乃是理具化他不斷乃是普現并名亦權顯於亦實若不爾者則徒開浪會虗説漫行空列一乘之名終無一乘之旨自昔人師既不曉此乃以三觀十乘消性德之行為能治之藥三障四魔消性惡之名為所治之病由是乃説破同體之惑亦是斷於性惡之義斯乃過德雷同望聲謬説耳何由能解方便藥草無差即差亦權之意乎文句及記明同體惑終須永破究竟清淨如燈生暗滅雖無前後暗定是障既定是障亦須定斷豈得濫同不斷性惡妙假亦權乎故不可以理惑而混於性惡矣
