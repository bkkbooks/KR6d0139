body:
  text: 永嘉沙門釋從義撰次明消釋體勢文為二初分科次一者下解釋文為二初明文體勢為十初明法喻廣略中云若法略喻廣等者如文句記釋譬說周初願為四衆說其因緣文云問前法說中亦前三後一聞既不悟今還請於前三後一與前何別答言因緣者即是前三後一始末根由故云因緣四佛章略釋迦稍廣雖以五濁用釋於權始末未明故使中根於茲不曉譬說委明輪回之相具列三車出宅之由兼示索三與一之意廣敘等賜等子等心此乃方酬因緣之請故此即是法說周略譬說周廣故須展於法說周文與譬說周文相相稱是故不可專守略法而壅廣喻之文也然以譬望法既分廣略若以譬望合豈不然乎故文句記又云然譬與合互有廣略若譬略合廣先攝合文來對譬竟至合更須委悉消之若譬廣合略世尊豈可徒施悠言須委消譬合但略對又法略喻廣既爾法廣喻略準知何者是邪如五佛章開權顯實豈非法廣譬如優曇華豈非喻略若止觀中法略喻廣如第一卷發心文後舉十種喻以譬滅惡生善德等恐是喻廣故云譬如金剛從金性生等云云又如第二卷料簡第四三昧無勸修文後舉西施等喻亦恐是喻廣之文也然止觀中法略喻廣其文甚少更請檢之云云法廣喻略其文稍多今且舉一文以示之如止觀約餘門破法遍中云上約無生一門豎修三觀徹照三諦破法遍無量諸門望無生門餘門是橫法廣譬如徑直重門此則名豎齊並邐迆故稱為橫喻略攢字準文選張衡南都賦注中作左官切故彼文云攢立叢駢注云言林木攢布也若準玉篇韻集中從手是去聲訓聚也從木是平聲謂木叢也今依文選故取平聲亦取訓聚之義謂攢聚上文之廣法以對斯文之略喻也或開喻對法如如意珠等者止觀陰境十乘之初觀不思議境文末舉喻云如如意珠天上勝寶狀如芥粟有大功能淨妙五欲七寶琳琅非內畜非外入不謀前後不擇多少不作粗妙稱意豐儉降雨穰穰不添不盡蓋是色法尚能如此況心神靈妙寧不具一切法邪輔行云如意珠下正譬妙境即總譬於前來理性自他橫豎及結成等故今謂之開喻對法也即是開於如意珠喻以對前來理性自他橫豎結成等不思議境之法也如意珠者第一義天天然理體即勝寶也性無雜染名之為淨無非佛法故名為妙在一剎那故云芥粟能滿自他菩提妙果名大功能生一切願故名為欲欲不出五寶不出七即譬無作道品總持真寶名琳似寶名琅非自性故非內非他性故非外既非自他即無共離非縱故不謀前後非橫故不擇多少非權非實故云不作粗妙觸境斯現故云稱意豐儉益物不窮故云降雨穰穰非本無今有故不添非本有今無故不盡或法別喻總如以大車喻於十法等者止觀陰境十乘文後舉經文大車喻之輔行云且順經文次第不依十法次第今以十法隨對整足大車高廣不思議境也幰蓋慈悲寶繩交絡即發心也安置丹枕枕有內外若車內枕休息衆行即安心也若車外枕或動或靜動靜只是通塞義也破塞存通即塞而通其疾如風即破無明是破遍義也始自白牛終至平正道品義也又多僕從即正助也遊於四方即次位也安忍離愛在次位之初安忍只是忍於五品違順令入六根離愛只是離六根中相似法愛故知前七正明車體及以具度後三只是乘之所涉若無所涉運義不成是故十法通名大乘也故今謂之開彼總喻以對十法也若以善畫勝堂為喻不須開對但略合而已者止觀第四生起十乘文後舉喻云譬如毗首羯磨造得勝堂不疏不密間隙容綖巍巍昂昂峙於上天非拙匠所能揆則又如善畫圖其匡郭寫像逼真骨法精靈生氣飛動豈填彩人所能點綴次合譬云此十重觀法橫豎收束微妙精巧初則簡境真僞中則正助相添後則安忍無著意圓法巧該括周備規矩初心將送行者到彼薩雲非暗證禪師誦文法師所能知也輔行云以此一合通合兩譬最後結中同結二人然此合說文約意廣初合勝堂者橫豎等合不疏不密等從初則下合巍巍等意圓下合非拙匠等次合後譬者橫豎等合匡郭逼真微妙等合圖寫等從初則下合生氣等非誦文者合填彩人委消譬合之文具在輔行今不煩録若法喻俱總如以虗空喻於法界者止觀第一輔行第二引華嚴云遊心法界如虗空是人則知佛境界法界妙理非相無形故喻虗空也若法喻俱別則隨文對消等者如止觀第一云漸則初淺後深如彼梯隥不定前後更互如金剛寶置之日中圓頓初後不二如通者騰空為三根性說三法門引三譬喻隨文對消具如輔行可以意得故不煩引次明法等有無中云法喻合三互有互無者若但有法而無譬合其文甚多若但有法譬而無合者如向所引漸則初淺後深如彼梯隥等是也是故須知但可有法無譬及有法譬無合終不可云有合無法譬也隨宜設用存沒適時者意明法若易解則不須舉喻法若難明必假喻而顯有合無合準思可見故文句記解舉譬文下注云云字者以易解故不復合喻即此意也三明開合自他中云有對自開合如五略對十廣者五略但是十大章中第一大意自開為五耳而止觀云生起五略顯於十廣者即是對自而論開合也輔行云生起五略顯於十廣者對顯也生起五略彰十次第五十不出自行因果化他能所有對他開合如以十廣對五重玄義者輔行第四云又此廣文亦與五重玄義意同五重則玄談教旨今此則依經起行所以彼為釋經此為成觀是故次第稍異於彼初釋名者即標名也次體相者即顯體也攝法只明體所攝法方便下三即是明宗起教是用偏圓判教彼釋法華理須分別一代教門故教居後分別前四此為成觀觀由解生名體偏圓並屬於解由解立行故次解後方便正觀行始為因行終為果故次正觀以明果報宗是自行用是益他由自行滿故能起教旨歸只是自他所契故彼玄文引神力品約教次第故名用體宗若引序品約行次第故名體宗用今文正當約行次第但以教相在於宗前前後之意如向所說有相攝開合如開上合下者止觀第一云若心若道其非甚多略言十耳或開上合下或開下合上令十數方足而已輔行云舉略顯廣以要攝多一道之內非相無邊故云甚多言數方者方猶法也如華嚴中凡諸法門以十為數或開上合下等者明開合也上謂二乘下謂修羅文合二乘是故開下謂開修羅從鬼畜出開上合下準說可知法華云六趣淨名云五道以由修羅開合故也有義立開合如攝法等開六開四等不出自他因果及文四義二意唯在一者開六即是攝一切理攝一切惑攝一切智攝一切行攝一切位攝一切教開四即是六中一一皆開為四即是四教理惑等也若就現六開四即自他因果耳不出自他因果者止觀云事理解行因果自他等皆止觀攝盡也輔行云實體止觀以為能攝事理等六以為所攝所從於能故云攝法雖辨偏圓次不次等但明實體所攝法遍豈所攝差降令體分張學四明者請讀斯文不須固執理體差別相相宛然從事理下略示向列六章攝相略以事等攝於六章事即攝五理但是理解即是智位通因果因復攝於理惑智行教他但教餘並是自自行化他因果攝盡此之六章文六義二各有次第及不次第意唯在一同是圓頓止觀攝故而今文云文四義二者四字恐誤當為六字或恐開四即是文四也文相盈縮者即是開合也後數必使至十者後字誤也當為從字十數如前十廣等也言賖促者即遠近也遠近即是長短長短即是開合故也四明注文云云者輔行云注云云者未盡之㒵云者言也說文云象雲氣在天回轉之形言之在口如雲潤物廣雅云云者有也下文尚有如雲之言也如生起五略顯於十廣文下注云云者即以生起五略顯於十廣次第而五略十廣生起次第上文已具今若重展則成文繁是故文下但注云云耳此即上文已具也或餘部廣存者如止觀第一以四種四諦橫豎對土文下注云云者即四土之義廣如淨名疏及一家諸部今但略對而已餘如諸部具存故但注云云也或廣文非要者如止觀中略列十種發心廣說下注云云者以今所列始從推理終至受苦發菩提心大綱略足若更廣說於今非要是故乃注云云字耳若消釋者須委的處所者謂上文雖則已具及餘部廣存而消釋者必須委悉的辨上文餘部處所豈可通漫不知向方邪撮略指示者謂雖重展成繁及廣文非要亦須撮略指示大綱故輔行釋對土橫豎文畢乃云出淨名疏也又釋發心中云應知經論多少不同如十住婆沙但有七種發心無量壽觀報恩等經亦有多發優婆塞戒經有十種發心等故法華文句凡注云云兩字而文句記多委的處所撮略指示即此之例也若傳寫有闕須填者亦如法華文句約觀心解一時文下闕注云云兩字記中乃云觀心下應注云云文無者闕也五明破立存沒中云如破古師及破邪僻等者破古可解破邪僻者如陰境十乘大車文後云今人只謂捨惡取空是大乘此空尚不免六十二見單復之惡何得動出為乘設借為乘只一禿乘無法門具度乃至云乘邪見乘入險惡道是壞驢車耳若破偏破小破己必立等者別教教道已還並皆違於圓妙之理故須破之是故謂之為成一家不思議理即是破於皆墮性計迷於圓理也性計若亡妙理方顯天台一宗異於南北地攝等師蓋由得於龍樹無生理趣故也故絶待止觀及不思議境中廣破教道令成圓極即此意也為逗一代不思議化者即是破己必立如化他不思議境等是也故妙玄云如來初出便欲說實為不堪者先以無常遣倒次用空淨蕩著次用歷別起心然後方明常樂我淨龍樹作論申佛此意故以不可得空洗蕩封著習應一切法空是名與般若相應此空豈不空於無明無明若空種子安在淨諸法已點空說法結四句相此語虗玄亦無住著如病除已乃可進食食亦消化云云六明長短不同者文有長短耳非義長短也若義隨於文斯亦可矣故下文云別釋義長也研五堅切磨也核下革切考實事也俟狀史切待也如不思議境等者輔行云文異義一意非一異以三諦法不出修性自他故也故不思議境文自有七一理性境二修德境三化他境四結自他以成三諦五舉喻六明功能七收攝諸法以成觀境所言等者如輔行釋前六重依修多羅以開妙解之文是也及破法遍者始從第五卷終至第七卷現行印本故不思議境及破法遍其文甚長是以釋者必須觀歷初後尋求中間也或結長就短者如輔行云不思議境文異義一意非一異等是也演短令長者即是開向三諦修性自他之義也破法遍中結長就短不出橫豎及以一心也演短令長亦是開向橫豎一心耳或總別二釋等者如破法遍文初云今欲借別顯總舉次而論不次故先三義解釋三義者先空次假後中也輔行云一家釋義前總次別後還結撮歸於元意意雖若是為顯不二還依章門橫豎解釋則於一中橫豎甄分淺深不亂七明法喻隱顯中云若法隱喻顯則求喻意以消法者如止觀云初釋大意囊括始終冠戴初後輔行云囊有括結收於一囊章有大意擊於始末釋名為始旨歸為末故知大意如囊有括盛持結束十章之法又復大意冠十章音冠初如冠冠於身戴後如身戴於冠大意有發心故冠初大意有旨歸故戴後若法顯喻隱則求法意以消喻者如止觀第一發心文末喻於結束顯示文云故知明月神珠在九重淵內驪龍頷下有志有德方乃致之輔行云言九重者陽數之極是故舉之以喻最深亦不須以此文配九九但顯深不勞別對如其對者數則不便又如止觀第四云如豬揩金山衆流入海薪熾於火風益求羅輔行云傳聞絶塵解云豬揩譬止解衆流譬止行薪熾譬觀解風益譬觀行一往似得仍乖文旨前以膏明譬解行竟此但譬行即昏而散即照而寂但依二譬各對止觀此解為正故豬揩等但譬止行薪熾火等但譬觀行耳此則求法意以消喻也喻望於合隱顯例然者即喻顯而合隱喻隱而合顯也如止觀中善畫勝堂譬合之文輔行既云然此合語文約意廣當知即是喻顯合隱也止觀輔行具引如前如止觀第一舉父子路人瞋打之喻而今下文第七例中既云文中自合瞋以譬集打以譬苦當知乃是喻隱合顯也云云八明問答迷解中云若迷問而不迷答等者如止觀第一問云問前簡非併言非今顯是何故併言是答所言併是者皆非縛非脫故言併是通皆上求故輔行云有人云此中問答問前判是屬非文者不然若準彼為問應云前既是非俱非今那是非俱是準今答意意都不爾答意但答取三菩薩何曾復云是非俱是是故問中通云併非不云具非併非答中但云菩薩俱是不云九非俱是若準他意九非亦須俱是故也此即迷問而不迷答則求答意以設問也又如止觀第五破見假明位文末云問何不直明別圓入空破假而明三藏通教等入空位為輔行云此是止觀正文讀者尚暗或消文者唯云次第或修觀者別求圓融但觀答文義理自顯此亦求答意以設問也若迷答而不迷問等者如止觀序中問云教境名同相頓爾異此問可解易為消釋是故名為而不迷問次答云然同而不同不同而同漸次中六善惡各三無漏總中三凡十二不同從多為言故名不定此答難見故名迷合委細消釋具如輔行云云則研問文以成答者以由問中將同問異是故答中乃答十二不同也云云或問從答生者亦如序中問云此章同大乘同實相同名止觀何故名為辨差輔行云由前答異將異問同是故結云何故名為辨差故知此問從前答生也或孤然釋妨者如止觀第七破遍文末料簡云問瓔珞云第三觀初地現前今云何說或在八地或在初住答借義相成或借高成下故言八地或借下成高故言初住瓔珞明別教故言初地輔行云次問答者重釋妨也乃至云此一門答拾遺故來文亦非次或因答作並者如不思議境文初章安約十六番私料簡中云若爾煩惱亦是諸法之本元為治惑亦是觀初病身四大亦是事本元為治病亦是觀初何意不得亦通亦別今謂文中雖無並字此即因答作並名辭也又如妙玄第一云問用是化他亦不須自行權實答欲以自利利他故並宗亦應然欲以自行化他因果是故應取他也答化他因果不能致佛菩提是故不取並用他權實亦不能令他至極亦不應取答他宜須此是故取也此則文中顯有並字也或從答設難者如止觀第一問小乘亦是佛說何意言非若言非者不應言漸答既分大小小非所論今言漸者從微至著之漸耳小乘初後俱不知實相故非今漸也輔行云問小乘亦是等者重難前答以前問云初後俱淺是何觀相答小乘意非三止觀相也故今乃重難前答故云從答設難也或答順於問或答違於問者如止觀第九魔事境後料簡云問魔動竟好法後起為是法爾寒過春來邪答未必併然自有過難好法亦不發魔是惡緣所感善是心力所致釋論云釋迦往昔在惡世世無佛求法精進了不能得魔作婆羅門詭言有佛偈云云輔行次料簡中初問如文次答意者先違問答故云未必併然善惡緣別次引釋論即順問答雖順問答此成不定故不同於寒去春來魔若去已好法來者不必全爾是故不同又如止觀第一問集既有四苦果何二答惑隨於解集則有四解隨於惑但感二死此亦順問而答也又如止觀第二問云過去已去未來未至現在不住若離三世則無別心觀何等心答汝問非也若過去永滅未來未起現在不住云何諸聖人知三世心鬼神尚知自他三世云何佛法行人起斷滅見此亦違問而答也或答杜於問或答開問端者違即不順於問杜則蔽塞於問不通來難也如止觀第二問初觀破用合受名第二觀亦破用亦應言二諦邪答前觀已受二諦名後雖破用更從勝者受平等名也此答乃是開下問端也問第三觀亦破用何不更從勝受名答前兩觀有滯故更破更用第三觀無滯但從用受名不得一例此答乃是杜塞來向也九明舉例消文中云如六度之文或語勢兼含應以教定之者如止觀明隨自意三昧歷諸善中明六度及對治助開中明六度為治又明六度攝法等其間或有語勢兼含是故應以四教定之使夫六度之文各成一教之類即三藏一類乃至圓教一類也故輔行云圓教亡三語似於通須簡同異使教相別通教但以能所財物為三別教約三亡於十界藥病授藥等三圓教約三亡於空假中三又若以能所財物之三而為所亡三教能亡觀行別者義亦可然通教即空而為能亡別雖緣中用空不別圓教即用不思議空即此正是亡於三諦乃至無著智慧亦須料簡六度既爾諦緣亦然故止觀第一約四諦顯是中明四教四諦又云總說名四諦別說名十二因緣亦開四種十二因緣又止觀禪定境中亦明因緣發相云云十明以教定法中云隨其教體以立義宗者體謂四教之體格也亦體式也又體相也即當體之體耳或名偏意圓從體以定者即所依體也故止觀第二云諸經赴緣偏舉一法以示義端如首楞嚴偏舉止邊止具一切法不減少亦名祕密藏智度法華偏舉觀邊觀具一切法不減少涅槃舉三法具足法亦不多亦名祕密藏輔行釋云名偏意圓云云則是經論名雖偏舉於一意乃圓具一切體具融攝斯之謂矣輔行釋偏圓中大小俱名方便云豈以方便名同而令大小理一況復大中仍須簡擇乃至權實亦復如是是故方便種種不同如三藏教一向是小全是方便況三藏教復有初入名為方便故有體外體內等別具如疏文釋方便品不與淨名報恩方便品同如華嚴經有壽量品不與法華壽量品同故此即是隨其教體以立義宗也宗者本也要也又輔行云又婆沙中處處皆云法性實相及法身等如是等名與大乘同是故應須以義判屬所以四教俱空假中而隨教門所詮各別云云次明義體勢文為二初標科次解釋文為十初明部體本意中云如法華玄雖諸義之下皆立觀心等者通則七番共解五章第六謂之觀心即聞即行起精進心釋籤云隨聞一句攝事成理不待觀境方名修觀別則五重各釋之中如初釋名迹門十妙初境妙中十如十二因緣及四諦境皆列四科初正釋次判粗妙三開顯四觀心二諦三諦一諦無諦略而不說境妙既爾智妙已去存沒可知故釋籤云觀心乃是教行樞機仍且略點寄在諸說或存或沒非部正意故縱有施設託事附法或辨十觀列名而已又云今此正意論於教門是故觀法文相稍略又云意在教相故觀法存略耳是故今云然文本意明五重玄義出諸教上則教正觀傍也然今文云託事興觀義立觀心釋籤乃云託事附法如何會通應知託事名有通別通則或託事境之事或託法相之事今文從通是故但云託事興觀釋籤從別故分事法兩種之殊若託感應神通等事即是託於事境之事若託四諦五行等事即是託於法相之事或辨十觀乃是泛示約行之名耳三種觀法事理二觀下文當辨義立觀心者妙玄云隨諸事釋一一向心為觀觀慧彌成於事無乖如火益薪事理無失法相差別名之為事觀心冥寂名之為理即文字無文字不捨文字別有觀行須知此皆於其教門事相之上酙酌所以明其觀行故云義立耳以非從行唯於萬境觀一心故名為義立也教中則以權實本迹為主等者前十四品以權實為主故以五味八教以簡於權若不約於五味八教以簡焉知四味七教為權為粗醍醐圓頓為實為妙故釋籤云今文諸義凡一一科皆先約四教以判則三教為粗後一為妙次約五味以判則四味為粗化儀四教在四味攝醍醐為妙又釋籤解種種道云兩教因人別教教道五時八教故云種種又輔行云五時八教一期始終今皆開顯束入一乘輔行又解種種道云四時七教盈縮不同云云並以世界塵數以簡於迹者前十四品為迹門後十四品為本門迹門化城喻品但舉一三千大千世界塵數為喻本門壽量品乃舉五百千萬億那由他阿僧祇三千大千世界塵數為喻故玄文中凡論久近並以此等世界塵數以簡方知大通乃是近迹壽量久成名為遠本若本迹交互參雜不分權實疏平聲呼遠遺失莫辨是則無由以顯本迹二門待絶二妙今經既然昔教可解約教約部兼但對帶以此之類尋求可知矣若今止觀縱用諸教者即前所謂散引諸文該乎一代也意在十法以成妙觀者即前所謂雖有四教八教皆為顯於圓頓一實也為顯實理者即觀正也傍通諸教者即教傍也止觀約眼智顯體文後云如此解釋本於觀心實非讀經安置次比為避人嫌疑為增長信幸與修多羅合故引為證耳故云復為生信傍引諸經也又如偏圓文中云觀心往推法相應爾而人多不信今用涅槃五譬釋成此意云云次明觀教同異中云既約法華應須八教者以無四時八教不能顯於醍醐圓妙故也文句記云若消諸教諸經其文稍通若釋法華無頓等八舉止失措又云今經於八為屬何邪若非超八之如是安為此經之所聞又云比竊讀者尚云天台唯藏等四一何昧哉一何昧哉清涼觀師華嚴疏中以天台在古來約於四教例中之所攝屬頓等四教是佛化儀者化物之儀式也藏等四教是佛化法者化物之法門也文句記云頓等是此宗判教之大綱藏等是一家釋義之綱目輔行云又此八教用各有意藏等四教是教門法式法門體式頓等四教是敷置引入即是儀式如來權巧善達物機頒宣藏等以為頓等由說圓別等法門乃成頓漸等儀式或開或合開漸為四等如第七例中宜盈宜縮多少隨宜故華嚴宜圓別乃至般若宜通別圓又盈縮者如下文引妙玄約於十二部九部明之名雖有八用必不俱結示開合盈縮等意依法起觀觀則有四者止觀偏圓中云為一實施三權權實相對則有四種止觀也止觀正行既有四種方便亦然故方便文初云若依漸次即有四種方便云云故二十五方便十乘觀行並通四種也漸既異別更加不定故觀則有六者輔行云頓人行解俱頓漸人解頓行漸不定解頓行或漸頓有人云是別者都不見文旨又云復應思擇漸初雖復知圓不同但中及十行中時長行遠略知此二已異別教故知此三知圓理同而行相小別開權顯實會藏等三者止觀偏圓中云諸佛即一大事出世元為圓頓一實止觀而施三權止觀權非本意意亦不在權外只開三權止觀而顯圓頓一實止觀故佛本意唯佛乘是者佛乘即是圓頓止觀事不獲已為實施權今既開三權顯於一實漸及不定元又知圓故佛本意唯一妙乘今方通暢吾祖既乃親承妙悟故說摩訶止觀妙行所以謂之今文隨教雖復若八若四本意唯為成一佛乘也諸家迷此將何以明一佛乘邪三明觀門準則準者均也平也則者體也法也隨機逗物雖立四門教法體度體謂體式度謂法度無生為首者輔行云初依教門途轍大體一切且以無生為首故止觀破法遍初云然破法遍須依門經論說門不同或文字為門如大品明四十二字是也或觀行為門如釋論明修三三昧緣諸法實相是也或智慧為門如法華明其智慧門是也或理為門如大品明無生法無來無去是也依教門通觀依觀門通智依智門通理理若為門復通何處應知教等悉依於理能依既乃是門所依何得非門雖無所通遍通一切乃是妙門也餘三門置之今但說教門前三教四門破法不遍則不須說今說圓教四門皆能破遍復置三門且明空無生門無生門能通止觀到因到果又能顯無生使門光揚何者止觀是行無生門是教依教修行通至無生法忍因位具足淨名三十二菩薩各說入不二門皆是菩薩從門入位而無生為首維摩經云會中有菩薩名法自在說言諸仁者生滅為二法本不生今則無滅得此無生法忍是為入不二法門大品明阿字門所謂諸法初不生此證無生門通止觀到因其義可見無生門通果今不具録亦如文句記釋阿若憍陳如中云所以釋陳如中教相約觀其義廣者以最初故若聞阿字解一切義下去諸聖雖隨事別論其觀行不出無生如頭陀抖擻乃至密行亦何出於智斷無生故下去文準此可知故止觀破遍中亦以無生為首故今略示大綱若於阿若權實始終不迷欲以圓觀消今經中五佛三周本迹流通無非無生之大體也則能兼識一代觀境故於名下略示方隅只如世人為子立號尚有所表況諸聖者豈應徒然若不爾者則唐設無生之名永無無生之旨大小混濫權實杳冥此一既然餘例準此若消法相為成行解等者意令學者臨文不可忘於圓頓佛乘正行之大體耳思之可見四明會異考同會者通也考者校也若一切異名皆入一實名為通會者通謂通塗通總不分種種殊異故也如止觀第二云衆名皆圓諸義亦圓輔行云既開前來一切名義圓外無法故云皆圓文云開前諸名同一實相云云此即通塗開會一切異名別說皆入實相妙理名為通會也如會隨入悉者止觀第一發心中云然四隨四悉名異義同今說之四隨是大悲應益四悉是憐愍遍施蓋左右之異耳隨樂欲偏語修因所尚世界偏語受報間隔蓋因果之異耳便宜者選法以擬人為人者觀人以逗法蓋欣赴不同耳輔行云然四隨去別會通也此且重舉通名耳今說之下正會通名以大悲故隨順物機得四隨名以憐愍故遍施法藥得悉檀號大悲憐愍一體異名隨樂欲下次會別名樂欲是欣慕故云從因世界是陰入故云從果世界以間隔為義樂欲即所好不同因果雖殊其義是一便宜是辨能赴之法宜被何人為人是觀所被之人人欣何法觀人必擇所宜選法必擬堪被能欣所赴共成一義餘二名同不須別會言異耳者會義已同文猶異耳止觀異名等者止觀第二釋名中有四科第三會異中云諸餘經論或名遠離或名不住不著無為寂滅不分別禪定棄除捨等如是一切皆是止之異名或名知見明識眼覺智慧照了鑒達等如是一切皆是觀之異名所以者何般若是一法佛說種種名解脫亦爾多諸名字亦如虗空無所有不動無礙又止觀自相會者止亦名觀亦名不止觀亦名止亦名不觀輔行云會諸經論皆成止觀故諸經論所有異名並是寂照之異名耳初般若下是觀異名即般若德解脫下即止異名是解脫德如虗空下是止觀不二異名即法身德故知諸經雖復多名不出止觀及以不二故知只是三德異名耳名為別會者別會諸名皆是異號也罄盡者罄即盡也準諸文中應云罄無不盡所謂罄盡無不盡者乃至法門亦具通別二會之意者即是三德四德等一切法門也如止觀釋名四科中第四通三德文後料簡云問三德四德其意云何答通論三德一一皆常樂我淨大經云諸佛所師所謂法也以法常故諸佛亦常法即法身佛即般若解脫故作通解也大經云因滅是色獲得常色受想行識亦復如是則法身皆常樂我淨二德亦然若依一種轉色成法身法身常樂轉識想成般若般若即淨轉受行成解脫解脫則我文依念處轉識成常轉受成樂轉想行成我轉色成淨是則通別各有二解輔行云初問意者三德四德俱在涅槃云何同異次答意者三四似別俱在涅槃涅槃不殊三四不別是故會通令識不二於中復有通別二會初通會者三德一一皆具四德故名為通通復二解次若依下復轉五陰及四念處以成四德別別相對故名為別是則別對亦有二解又如十乘名十法門亦有通別如下第五以一例諸文中引之云云又如止觀歸大處中云旨歸三德寂靜若此有何名字而可說示不知何以名之強名中道實相法身非止非觀等亦復強名一切種智平等大慧般若波羅蜜觀等亦復強名首楞嚴定大涅槃不可思議解脫止等當知種種相種種說種種神力一一皆入祕密藏中輔行云旨歸三德下會異名也三德既得遍收諸法是故須會一切異名當知下結也相即法身說即般若力即解脫三德皆言種種者一一德中具一切法更互相收故云種種雖云種種不出三德一祕密藏何但法門三德攝盡化儀所表亦不出三如華嚴中遮那即法身舍那即般若釋迦即解脫乃至涅槃雙樹四枯即般若四榮即解脫雙非即法身云云文如輔行釋煩惱境十乘文末會異名中云亦名等者會前煩惱十乘觀法異名令同前觀煩惱即是法界亦名行於非道乃至不斷而入涅槃等即是會前十觀異名廣說異名總有三番三十六句即是涅槃般若法身三番各有三十六句也又如破偏度入名為通會者偏字誤也當為遍字止觀云以無生門如上等法度入餘門輔行云豎門三諦度入橫門門門三諦故使橫門無橫不豎以豎望橫無豎不橫是故今文度入諸門要而言之即是以無生門中觀陰界入十法成乘度入餘門也當教當門名為別會者止觀云問無生一門申一切佛法復何用餘門答法相如此二義相須人人不同各各自行應須餘門如華嚴云我唯知此一門即是各說入門門則無量此則諸門各各不同名之為別也如大小經論凡所立名等者亦如釋籤引中含云諸比丘歎身子所說妙中之妙然舍利弗但說事中行忍方便不損他境名妙中之妙耳又云佛告比丘莫求欲樂極下賤法為凡夫行亦莫自苦苦非聖行離此二邊則有中道成於眼智又云歷一切法皆云不空豈以如是妙中之妙中道不空等名能定法體是故須以名下之義而簡別之今尚不取別教教道通教含中況三藏教離斷常中及阿含中離苦樂中等邪又約部者尚不取帶二對三兼一之中況但空偏假而為妙邪釋籤云況但空偏假寧是經體準此可知故釋籤第五云不同通教但空偏假袠直一切正作帙書帙也亦謂之書衣也槩古代切平斗斛木也甄居延切察也辨也分也尚不可以偏教小乘濫於圓妙豈可以邪外世典齊於內教真常邪如諸外人尚為大自在天立三身等者輔行第四云塗灰外道亦計大自在天具足三德云法身充滿法界報身居自在天三目八臂即摩醯首羅是也化身隨形六道豈可以此邪外妄計三身三德之名體同內教真常宗極三身三德邪西方既爾此土準知如老子所計玄中之玄妙中之妙我有三寶等豈可便同佛理邪莊生計於自然等委如止觀輔行辨之云云故云不可尋通名等者止觀第二明體相中有四科初教相中云夫止觀名教通於凡聖不可尋通名求於別體故用相簡之輔行云名即是教故云教相但前釋名名通凡聖大小偏圓不能尋之求於別體別體不顯欲捨偏從圓無由能致今明此章分其相別教家之相故云教相言通別者如大經云佛言須陀洹者名為逆流迦葉難言若如是者阿羅漢乃至佛亦得名為須陀洹邪佛乃至須陀洹亦名佛邪迦葉正以通名難於別體以逆流名通一切故若言所斷三結名須陀洹乃至三十四心名為佛者則名體俱別前止觀名其名既通今以別體甄於通名故不必須名體俱別又如成論止觀異時薩婆多宗止觀同時雖有同時異時之言豈可以彼同時為圓異時為別是故須以教相簡之是以考同出異者結考同也會異令同者結會異也若異若同同入一極者對異言同今既會異同亦叵得故得異同同入一極一極尚無同異寧立五明以一例諸者止觀第十云復次言不念不同世人取著一異定相一念乃是非一非異而論一耳輔行云復次下定前一念以成觀境又有二義一者以禪為境不同世心二者即此境心復須離著乃至云此中一文即今文云不同世人取著一念及第一卷佛法界屬可思議一字恐誤當為五字現行印本在第四卷十乘之初先明思議境始從地獄終至佛界云觀此法能度所度皆是中道實相之法畢竟清淨誰善誰惡誰有誰無誰度誰不度一切法悉如是是佛法因果乃至云猶是思議之境非今止觀所觀輔行云已聞思議十界歷別示此十界同在一心則一心中十界可識故可思議中此是地獄乃至佛界無說而已說必次第十界歷歷粗細不違人見注云非今所用便棄思議別求不思議者遠矣故下諸文釋思議境或至九界而止或時至佛法界佛界實是不可思議在九界後亦云思議如此文中思議境後明佛界云觀能度所度等究竟圓極豈過於此而言思議者意如向說此即今文云思議境立佛法界也第三卷初地即是初住止觀云別教因中有教行證人若就果者但有其教無行證人何以故若破無明登初地時即是圓家初住位非復別家初地位也初地尚爾何況後地輔行云初地入住此為正文於教道文不須疑也此即今文云如教證二道也第四卷以思議釋不思議止觀明二十五方便棄五蓋中引大品云一切法趣欲事等仍釋之曰趣即是有有能趣所趣故即辨俗諦欲事不可得即是明空空中無能趣所趣故即辨真諦云何當有趣非趣即是辨中道當知三諦只在一欲事耳今更廣釋令義易解云云輔行云故大品下引經示相次釋經意中上略次廣初文略者只是三諦三諦只是趣等三耳略即不可思議不可思議難見故從今更下廣約思議以示不可思議相下去諸文皆先明思議次撮思議成不思議上來諸文皆先次第次明不次唯此一文後以思議釋不思議故知前後廣略相顯但在通理文相何恆人不見之隨文生想逐語迷文便於此部而欲簡擇此文可修彼非修者未見今家始終大體識大體已簡與不簡旨在其中故於略文善須曉意然今文云前明可思議後明不可思議者恐誤應云前明不可思議後明可思議即是以思議釋不思議也第五卷不思議明一心任運具於三千止觀問云一念具十法界為作念具為任運具答法性自爾非作所成輔行云一念具十為復任運恆具十界為待遇緣作意現起名具十邪法性自爾者凡聖法性皆悉自爾自爾只是自然異名云云乃至下文正釋不思議境中仍指前文云故妙境初文章安料簡云法性自爾非作所成故知章安深領玄旨言玄旨者即了修具全是性具乃違性具即空即中一家觀門永異諸說良由觀具具即是假假即空中別教教道從初心來但云次第生於十界斷亦次第故不觀具或稟通教即空但理或稟三藏寂滅真空如此等人何須觀具尚不識具況識空中是故輔行前文謂之故知具一切法即是於假良由於此又何但輔行諸文皆然人不見之便將具法俗假之義濫作空中理體而說遂立三諦皆有十界三千世間播在筆舌以誘愚叢哀哉傷哉然今文云一心具法者即輔行云一心任運具於三千也及下約十禪修觀中云行人觀法極至正助止觀第十觀禪定境明十乘中第七對治助開文後作如是說然彼但云極至於此於此即是正助故也彼文又云若不悟者是大鈍根大遮障罪更造過失故重明下三種意耳輔行云始從觀境終至助治觀法已足下之三番意如文說又次位者正為防濫餘之二法䇿淺令深當知並非正觀之體餘文準望陰入亦應可見及魔境後明陰入十乘度曲入別入止觀云復次通用一意為觀者行人根鈍先解通意度曲入別中論品品別意而俱會無生通別互舉得意相成也輔行云復次通用下結觀通別十乘觀法有通別二意一以陰境十法冠下九境名之為通只是一法不思議觀人根鈍故開對十法先了通意節節入別境境皆然觀法易了故引中論通別為例言度曲者曲謂音曲以通入別如世絃管絃管不殊而曲各異如是七文今文但列於五即以等字等於第六第七也檢驗諸部唯一處出若尋文者請以例諸故今謂之部內唯有一文說之以此一文而均上下使處處文義通徹昭然所謂一文既然他皆準此故也六明名義通局中云如置毒譬經中唯譬五道不同等者止觀第三偏圓文中引大經云置毒乳中遍於五味皆能殺人此譬豈不譬於不定輔行云經師子吼難云衆生之身六道差別云何而言佛性是一佛言譬如有人置毒乳中乃至醍醐皆悉有毒乳不名酪乃至醍醐名字雖變毒味不失若服醍醐亦能殺人實不置毒於醍醐中佛性亦爾雖遍五道受別異身而是佛性常一不變問經譬五道今譬五味云何得同答人必約法大經約人遍五道身宿種不斷於五道中毒發不定今以五道聞法歷味義不相違既約聞教必歷五味即諸經初八部等是方等亦有地獄衆來故經以一五以譬二五於理無傷五味唯喻一代五時濃淡濃淡雖殊皆從牛出者恐誤也應云五味唯喻一代五時相生相生雖殊皆從牛出故釋籤云此五味教相生之文在涅槃第十三聖行品末佛印無垢藏王菩薩竟云譬如從牛出乳乃至醍醐譬從佛出十二部經乃至涅槃又云下文義立五味譬從佛出妙玄第七云若依涅槃初後兩昧從牛而出若從牛出乳已如向引若從牛出醍醐者輔行引涅槃第八云雪山有草名曰肥膩牛若食者純出醍醐妙玄云若以義推中間三昧亦應從牛而出何者凡犢噉凡草但能出乳不噉忍草故不出四味良犢調善不高不濕酒糟麥五味圓滿具足在牛但聽飲噉隨𤚲而出若噉凡草𤚲即出乳噉下忍草𤚲即出酪噉中忍草即出生酥噉上忍草即出熟酥噉上上忍草即𤚲出醍醐妙玄第十判教中云初頓未必純教法身菩薩亦有凡夫大根性者即有兩義當體圓頓得悟者即是醍醐初心之人雖聞大教始入十信最是初味初能生後復是於乳何者雖言是頓或乘戒俱急或戒緩乘急如此業生無由自致必須應生引入七處八會大機扣佛譬忍辱草圓應頓說譬出醍醐又頓教最初始入內凡仍呼為乳呼為乳者意不在淡以初故本故云云又約行者大機稟頓即破無明得無生忍行如醍醐又雖稟此頓未能悟入始初立行故其行如乳若望小根性人行又如乳何者大教擬小如聾如啞非己智分行在凡地全生如乳以此義故頓教在初亦名醍醐亦名為乳釋籤云一從所證理極得醍醐名二得乳名復從二義一大行之始二小機未轉先列二義次何者下釋小未轉之相次開漸者佛本以大乘擬度衆生其不堪者尋思方便趣波羅奈於一乘道分別說三云云故涅槃云從佛出十二部經從十二部出修多羅正與此義相應譬如從牛出乳從乳出酪其譬不違漸機於頓未轉全生如乳三藏中轉革凡成聖喻變乳為酪即是次第相生為第二時教不取濃淡優劣為喻釋籤云言不取濃淡者只是小機於華嚴如乳非酪濃於乳次就益不益料簡云若華嚴為乳三藏為酪此則方便味濃大乘味薄釋此為三一取用益為論如貴藥非病治賤藥是病宜貴藥非宜徒服無益初說華嚴於初心未深益於漸機亦未轉於二緣如乳若漸機稟三藏能斷見思三毒稍盡即轉凡成聖如變乳為酪不可以用益謂賤勝不用益謂貴劣華嚴亦如是於小如乳於大如醍醐少分譬喻不可全求釋籤云以華嚴為乳但取機生未堪入大復在五味最初而說是故華嚴分喻初味二如良醫有一祕方具十二藥三種最貴善占病相盈縮所宜終不乖候謬有所治佛亦如是圓方妙治具十二部無問廣記最為甚深菩薩智利具足全服二乘病重以九為劑此若不縮於病無益於不縮為乳於縮為酪此取相生次第為譬不取濃淡淺深釋籤云不以味濃為乳味淡為酪故知自約次第相生為譬全用在初故如乳縮用居次故如酪三約行人心者說華嚴時凡夫見思不轉故言如乳說三藏時斷見思惑故言如酪至方等時被挫耻伏不言真極故如生酥至般若時領教識法如熟酥至法華時破無明開佛知見授記作佛心已清淨故如醍醐云云請詳玄籤之文豈非但有五味喻於一代五時相生而無五味喻於五時濃淡高麗所録四教儀云問將五味對五時教其意如何答有二一取相生所謂牛譬於佛五味譬教乳從牛出酪從乳生二酥醍醐次第不亂故譬五時相生次第二取濃淡所謂二乘根性在華嚴座不信不解不變凡情故譬其乳次至鹿苑聞三藏教二乘根性依教修行轉凡成聖故譬轉乳成酪次至方等聞彈斥聲聞慕大耻小得通教益如轉酪成生酥次至般若奉勑轉教心漸通泰得別教益如轉生酥成熟酥次至法華聞三周說法得記作佛如轉熟酥成醍醐云云此則高麗誤以相生謂之濃淡也余昔集於諸文解釋高麗所録四教之文亦未曉此今因消通義例之文遂詳究玄籤故辨之如上耳今文從義處處遍入或定不定等者止觀偏圓文中又引大經第六明五昧證三藏教引三十二明五味證通教引第九明五味證別教引二十七明醍醐證圓教故引五味以證四教即是定也若證不定即向所引置毒乳中遍於五味皆能殺人止觀又云一切衆生心性正因譬之於乳聞了因法名為置毒正因不斷如乳四微五味雖變四微恆在是故毒隨四味味味殺人衆生心性亦復如是正因不壞了因之毒隨正奢促處處得發或理或教或行或證乃至具約華嚴時等圓及前三論理教等四種發毒皆名不定輔行云譬昔聞了因隨味能發言五味者泛云味變仍能殺人非謂法華名第五味法華名定非不定故此是法華已前約行五味今此文中但約機緣有不定相故非全約法華前文衆生下合言奢促者理教行證遞論奢促約時約行兩種五味隨其近遠遞論奢促乃至云若佛未出若聞華嚴總名不定總得名乳何者凡夫全生道理如乳華嚴約時復名為乳於華嚴中四法復判五味發者聞教如乳發觀行如酪發相似如二酥增道如醍醐問增道是定何名不定答次第增道名之為定若超證者名為不定亦可聞教及觀俱名乳發相似位中兼於三味則七信已前名之為酪八信已上名為二酥又妙玄位妙中引大經五味證四教已又引大經云譬如有人置毒乳中則能殺人乃至醍醐亦能殺人此譬兩用一通約漸頓明不定教處處皆得見佛性也二約行不定行人心行譬之如乳實相智慧譬之以毒毒有殞命之能智有破無明之力久遠劫來說實相毒殞於凡夫心乳毒慧開發不可為定或於初味或於後味發不得次第往判故言置毒乳中乃至醍醐遍五味中悉有殺義釋籤云教行兩意相須而釋歷頓漸教義之如教一一教中隨行淺深毒發不定復名約行故今文云故用置毒則有兩種醍醐殺人若用五味則有兩種乳不等教之與行名置毒兩種定與不定名五味兩種又置毒兩種或行或人等云云然置毒兩種非無乳等五味兩種非無醍醐綺文互現是故置毒但言醍醐五味兩種但言乳耳七明開拓句法者拓字手承物也袥字開也或四如四種三昧等或六如破遍中引大經不生生等六句或三十六如觀煩惱境中明三德各有三十句乃至百千如從空入假破法遍中明見思重數有百千萬品等八明束散前從文相非一故曰凡諸結亦是束散不異開或前或後乃逐意便耳如止觀不思議境中明三種世間十如是法結歸一心以成三千輔行云如前所釋本在一心圓融三諦前結既已開釋後開恐人生迷故重結之令入一念後束自餘文相束散前後準此思之不煩具示九明行理交映交者互也映者顯也於中為四初正明交映理有權實者藏通二教明界內真諦權理也別圓二教明界外中道實理也行有親疏者巧拙不同也權實二理之行各有巧拙親疏故也故三藏教生滅是界內疏拙之行通教無生是界內親巧之行別教無量是界外疏拙之行圓教無作是界外親巧之行而界內外巧拙親疏復名傍正是故名為親正疏傍也廢權入實者上明理有權實蓋約真中而辨今明廢權入實乃約偏圓而言即捨偏歸圓名廢權入實也理無種種者廢已更無前三偏真但中種種不同也故止觀第一明發大心約四諦顯是中料簡云問法性是所迷何故二何故四答法性隨權實是故二法性隨根緣是故四輔行云開權顯實唯一法性為實施權故分權實於權實中取解根別故使權實各具利鈍應知權實各具利鈍故有親疏巧拙傍正然輔行云開權顯實唯一法性而今乃云廢權入實理無種種對喻雖分開廢前後約法開廢亦非異時故得互舉以彰圓妙行有淺深者約圓理之行自論六即淺深也又止觀序中明三種止觀前淺後深是漸次止觀淺深前後更互是不定止觀若爾初後俱深豈非圓頓止觀說理則泯彼階差者理性寂滅一法叵存是故說理則亡泯於淺深階差也談行必積功方達者住前之行歷內外凡名為積功入於初住到清涼池名為方達此約似因分果而說若約真因滿果而言則以初住已上乃至等覺名為積功入於妙覺名為方達止觀妙行近期初住遠期妙覺即此意也故釋籤云故久研此因因顯名果久研豈非是積功乎故此久研積功不可濫作別教次第經歷塵劫而說也然今止觀正以住前為積功初住為方達耳以住上功德自然流入非今止觀所被故也以理融行者行若無理未免差殊故以理融通方乃相攝一行一切行一切行一行即此意也以行綜理者理若無行不能顯明故以行錯綜方乃識理易繫辭云錯綜其數陸德明釋文云綜宗統切正義云錯謂交錯綜謂綜聚今謂一行一切行交錯綜聚方能顯於妙理周遍也諸位無濫方可免失者六即之位簡辨方免叨濫之愆也豈可尚深偏求一句者斥於清涼觀師但乃庶幾頓頓之深偏求止觀文中一句而棄妙行始終大體也故下斥云偏指文中一句兩句以為頓頓義同頑境體心踏心況以二十五法而為前導十乘十境以為正修者輔行云用前諸解方堪進行復以此解導於方便事理融即乃名妙解依此妙解以立正行如此解行取於妙理尚猶難當況欲偏指部內一文何由可階圓真妙位當知未見融通之意故須善曉前諸大章鉤鎖冠帶收攝文旨攬入一心仍須十法和合成乘一一調試境境研核借使未悟可為妙因云云故知行理相融方有所至者結示交映也故第五云現行印本文在第四照潤導達等者輔行云照潤下續舉四譬以譬相資解如日照行如雨潤照潤均等萬物可成行解無偏衆德可備解如商主導行若商人達有導有達寶所可期行解具足實相非遙解淨於行行則無瑕義之如瑩行嚴於解解則可喜義之如飾彼此互資故云交絡一體下重以此譬譬前三譬雖曰互嚴不二而二恐疑行解如照潤等猶是異體故約一實而論行解互相匠導還顯於實如體二手只是一體不二而二還能淨體二而不二然義解下次勸預了文旨必須出沒開合先令妙境周圓者妙境即是不思議境理具十界十如三千世間也出沒即是盈縮興廢也開合即是與因緣等諸境開合也先令即是預了文旨也周圓即是具足無減也然第四卷初明觀陰成不思議境文中雖則但舉十界三種世間十如是法以成三千而十如境必與因緣四諦境等而論出沒開合故也若不爾者豈十界十如妙境與十二因緣境等有異邪此非消釋文相之時欲出理具十界三千十如文旨必須預了諸境有出有沒有開有合先令十界三千十如妙境周圓具足無減也故妙玄明諸境開合中云先用十如為首何者此經命章絶言稱歎十如今更說五境云何同異邪十二因緣與十如論開合者名異故言開義同故言合如是相合行有兩支如是性合無明愛取三支如是體合識名色乃至老死七支如是力還是無明等三支如是作還是行有二支為苦作業如是因還是行有二支為苦作因如是緣還是無明等三支能潤業取苦如是果還是行有之習果如是報還是行有之業招名色等報云云此用思議十二因緣合六道十如耳其次用不思議十二因緣合四聖十如及四種四諦七種二諦五種三諦一諦無諦等開合之相廣如玄文卒難筆録又此止觀禪定境中用十二因緣妙境文中亦以十如對十二因緣既許對於十二因緣豈不得對四諦等邪故知並是開合之義也言出沒者妙玄問云諸境理既融會何意紛葩更相拘入邪答如來觀知十界性相有成熟者未成熟者大機未熟不令起謗小機若熟不令失時隨其所宜應單應復偏圓相入而成熟之聞即得益華嚴雖具鑑十界兩界熟故別圓二種而成熟之鹿苑亦鑑十界二乘性相熟故用生滅而成熟之方等亦鑑十界四界熟故用四種相入而成熟之般若亦鑑十界亦四界熟故用三種相入而成熟之法華亦鑑十界一性相熟但用一圓諦而成熟之若無善巧方便出沒即是盈縮調熟云何境智而得融妙邪譬如𦘕師尚能淡入五彩作種種像況佛法王於法自在而不能種種間入調伏衆生邪故此出沒開合方乃顯於妙境周圓矣又如大章第二體相四科之中第三境界二諦三諦有離合等即今所謂出沒開合也可以斥偏邪者偏邪即是別教教道已還也故迦葉菩薩云我等未聞涅槃四德之前悉名邪見之人即此意也可以顯異意者如下文云次明所立異於諸家是也可以立宗徒者徒字恐誤應作途字如金錍云若不善余一家宗途未可委究行門始末宗者旨也途者道也宗旨途道不出依解立行方便正修也作此徒字即金口祖承今師祖承之人耳是故不斥偏邪無以進於圓行不顯異於諸家無由立於本宗途道也若消文下三示消文格式言鉤鎖者相連接續也一道豎進者即十乘文勢生起次第鉤鎖相連不料亂也洮土刀切水名又清汰也字應作濤徒刀切濤汰也鍊即甸切治金也前後以顯行相者即是十乘始終互相映顯以成衆寶之車也文從以一觀境已去即洮鍊前後之相也輔行云觀法非十對根有殊雖復根殊但是一不思議觀觀不思議境乃至離愛不離境故又云妙境為九乘本稱本修九方堪入位是故名為以一觀境冠於下九冠去聲者束也依前妙境發菩提心起四弘誓復依弘誓安心破遍乃至正助故輔行釋安心文云若不安心無所剋獲故次正願而明安心初妙境中一念具足無作四諦故四弘中依無作諦而發弘誓今以能安安於所安能所相稱名為妙行既安心已廣能利物填初誓也欲利衆生先須斷惑填次誓也欲利衆生復須習法填第三誓也分分證實填第四誓也至究竟位四誓方滿若其然者從此安心乃至正助通名填願是故今云以一弘誓通及諸行也以一安心遍該始末者良以依願而立安心然而所安即初妙境能安即是寂照止觀止觀之言通於破遍及通塞等是故名為遍該始末也止觀云上善巧安心則定慧開發不俟更破若未相應應用有定之慧而盡淨之故言破遍耳輔行云上善巧下約上安心對辨破否若已安於諦定慧已發彼即是破何須至今更須論破次若未下正明破意由未安故若未破故今更論破又云前以定慧處於法性故名為安今以準教四句推責不安之心故名為破止觀又云今不思議一境一切境一心一切心橫豎諸法悉趣於心破心故一切皆破故言破遍輔行云一境一切境指前不思議境一心一切心指前發心安心依此論破故名破遍故云破遍只是安心加行也新譯經論乃以方便名為加行今云加行意則不然但是於前正觀之上增加其行名為加行耳輔行云所以立此通塞一門檢彼破遍令塞得通使彼破門於通無塞云云既檢破遍然而破遍復是第三安心加行故檢破遍即兼安心是故通塞只是上之二法細門細必對粗若唯用破遍恐於通起塞則於塞無通故名為粗今乃檢彼令塞得通故名為細於茲入理故名為門以一道品調停陰入者道品有四一當分二相攝三約位四相生前三雖是道品而非調停第四一種乃名調適故止觀云上來雖破法遍識通塞若不調停道品何能疾與真法相應輔行云於上破遍及以通塞若不悟者由無調停止觀又云今一念心起不思議即一切種十界陰入不相妨礙若觀法性因緣生故一種一切種則一色一切色若法性空故一切色一色則一空一切空法性假故一色一切色一假一切假法性中故非一非一切雙照一切亦名非空非假雙照空假則一切非空非假雙照空假觀受觀心觀法以至八正文廣不録輔行云今一念去正釋念處先更牒前不思議境為念處境既一一界各具十界故不相妨前總立陰名觀既不悟故離為四而調停之法性因緣去正示念處觀四文皆以一念百界千如三千世間攝成三諦方得名為無作念處故知前來境等五法並依於陰乃至覺道亦復如是說之則四法先後觀之則不出一念於一念中有總有別又為約法相令具足故及示識心以為境首故先於破法遍後例於餘陰以為通塞道品之本若欲顯於不可思議還須約於一念心辨則具觀於陰界入等一切皆然正助只是助開前四者止觀引釋論云三三昧為一切三昧作本輔行云先剋出所助之體故云為一切三昧作本故四種三昧必依圓教不思議三三昧為本此即前六名為正行正行不顯良由有遮今云前四者且置妙境及以發心耳若通而言之應云助開前六也次位通為上之七門以除濫過者輔行云既用前七以為所修二世善發入位不定或未入位未得謂得恐極下根生重罪故故須明位令行者識之免於上慢之過故知次位正為簡濫也安忍離愛上八功能者輔行云安忍只是忍於五品違順二境令入六根離愛只是離六根中相似法愛又次位者只是行之所階恐行者生濫故於次位中別出五品六根清淨勸勵行者令離障離愛耳入初住時轉名十大者輔行云今依菩薩戒疏以十法成乘豎對十信復以十法橫入十信言豎對者今文初信以對於境次修慈悲以對念心善修寂照以對進心善修破遍即入慧心善修通塞即入定心善修道品入不退心善修正助入回向心善修諸位入護法心善修不動即入戒心善修安忍即入願心言橫入者一一信心各具十法故瓔珞云一信有十十信有百又四念處云五品各有十法成觀五品尚爾十信可知所以十信各具十法故至初住轉名十大初住尚爾乃至妙覺則可知矣言十大者謂理大願大莊嚴大智斷大遍知大道大用大權實大利益大無住大次第以對十法成乘釋名對義亦應可解良者文選注云實也四若不下斥失意之者文皆可見十明教觀折攝文為三初標次釋文為二初釋教折攝止觀第十明諸見境中云夫佛法兩說一攝二折如安樂行不稱長短是攝義大經執持刀仗乃至斬首是折義雖與奪殊塗俱令利益若諸見流轉須斷令盡若助練神明回心入正皆可攝受輔行云攝謂養見研心折謂破無遺芥故引二經以證折攝云云一切經論不出此二見心亦爾如前進退二種解者亦是折伏攝受二義止觀前文引淨名經斥聲聞人同諸外道文中自云進退解之不可一向輔行解云進退解者引證二乘不可一向名之為見挫同諸見為進依本二乘為退二乘被斥同諸見者取其不見中道理邊外見尚以為侍何況二乘若撥若取乃是抑揚之言是故不可一向名見又一切聖教不出四悉故四悉中世界為人即攝受意對治即是折伏意也藥珠二身破法立法二種方便如是等例即此二義如是等例者即今文中所列權實理事因果四門四悉隨教隨機約人約部等是也或攝權折實者如止觀第七明助道中云又佛初欲大化諸佛不印若思方便即稱善哉如富家子病應用黃龍湯父母豈惜好藥宜強服之耳服已病差佛有本願令衆如我豈惜大乘事不獲已逗機對治助道開門義亦如是此約未堪用大名為折實宜先施小名為攝權耳攝權折實既爾歎實折權反此可知即如淨名挫同外道豈非折權褒美於大豈非歎實方等既爾般若準知若法華中前文所引且明攝受非無折伏故云頭破作七分也大經折伏非無攝受故云住一子地也委如法華文句中說次釋觀折攝中言觀一境歷一心者對色名心望觀名境心即是境但綺文互舉耳故下文云以心為境云云或折為無常或融為理性者如輔行釋偏圓中云先觀於色既皆無常觀心亦爾過去剎那感今剎那況今剎那復對外境因緣故有是故念念皆悉無常如是推時何但識於色心無常進推心念本來非有乃見法性真如常住如前所明不定教相若觀無常又觀無常即見佛性即此意也若觀幻化及以假等亦復如是是故前文不定觀中若觀因緣又觀因緣即是佛性須知此文自有兩意一者現在習圓成不定人謂元知圓理或時且觀因緣生法次復重觀因緣生法成即中觀即見佛性如三止觀中云或指世界為第一義或事或理即其相也二者發圓宿習如於現在但觀生滅後復數數觀於緣生即見佛性又如法華文句云觀住於境或住無常境或住即空假中等境又觀靈鷲無常復觀靈鷲是三德云云又淨名玄云修中觀時以二觀為方便得入中道是以權智折伏以實智攝受若觀中道而發二乘是以實智折伏權智攝受若觀二諦還發二觀即以權折伏以權攝受若觀中道還發中道即以實折伏以實舉受又若善將四隨用心如止觀中三十六番即是觀心折攝意也三故此下結以理觀之者理謂道理也使元意有在者元者本也在者存也不失本意是故云也如前教中逆化是折順化是攝又如觀中折為無常是折融為理性是攝宜即是攝治即是折樂即是攝厭即是折餘準思之可以意得此四十條下第三結略例廣大槩者猶大綱也即粗略也餘不盡者如輔行解色香中道乃約十義評無情有佛性及第十卷明先用小其意有十等即其例也第四大章總別例文為三初牒名大章總別前已辨之十章十境下次略列謂十章之總別十境之離合十乘之立意也同異即是總別離合之同異也然十境離合十乘立意只是大章之中第七正修耳故牒名中但言大章總別任運收得十境離合十乘立意也初十立大章下三廣釋文為三初釋十章總別文為二初通指十門準分別中十門不同者止觀第一卷分別十章云今十章幾真幾俗幾非真非俗一門幾聖說聖默非說非默二門乃至第九門云幾廣略非廣略第十門云幾橫豎非橫豎輔行云始從真俗終至橫豎略以十門分別十章若無十門分別十章恐人不知十章豐富云云具如大意與九而辨皮變切周時冠名耳此非今文之意也應作辨字皮免切別也判也同異者即指止觀解釋十章真俗等同異也故初七章及第九章是即俗而真第八果報是即真而俗第十旨歸是非真非俗乃至第九云大意一章是略餘八章是廣旨歸一章是非廣非略云云次初釋下別明廣略文為二初正明初釋大意既云五略等者即止觀中解釋十章之初文也故止觀云解釋者釋十章也初釋大意囊括始終冠戴初後意緩難見今撮為五謂發大心等乃至云生起五略顯於十廣輔行云撮下九廣以為五略示九章旨故云大意又九章皆大略述彼意故云大意故此五略皆大為名云云次若爾下就廣更開文為二初總示又為二初明準例更開又為二初總示若如上以大意五略對下九廣以為二門準此為例故今亦可從於第二釋名已去乃至第九起教等更開為十章也次如法華下例同玄文今既從於釋名已去更開十章故得引於玄義十妙而為類例以十妙之文亦是釋名一章開之為十故也然此引例且從一往以彼釋名十妙例今釋名已去更開十章耳今此為對下次辨本文十章所以文為二初正辨以大意是略餘八是廣旨歸是非廣非略故以大意共為十章也禪門下次例禪門亦然者以禪門中亦以大意共為十章故也言禪門者以禪為門故云禪門即禪波羅蜜次第禪門也又止觀云禪是門戶詮次云云故次第禪門亦開為十章一大意二釋名三明門四詮次五法心六方便七修證八果報九起教十歸趣故彼十章亦但至於修證餘三略無於修證中說亦未盡云云若欲下次別明文為二初正明中間八章更開為十即向所謂釋名已去更開十章也止觀第三體相中云粗寄四意顯體一教相二眼智三境界四得失輔行云體是所顯眼智教相即是能顯云云故開第三顯體文中出於眼智教相二章則是中間八章自離為十也如五重玄義下次引合為例文為二初明合八為五輔行云又此廣文亦與五重玄義意同五重則玄談教旨今此則依經起行所以彼為釋經此為成觀是故次第稍異於彼初釋名者廣中之初故云初耳即標名也次體相者即顯體也攝法只明體所攝法是故今云合攝法入體相中義當顯體也方便下三即是明宗是故今云合方便正觀果報共為一宗也起教是用偏圓判教是則宗體二章有合耳名用教三章無合也彼釋法華理須分別一代教門故教居後分別前四此為成觀觀由解生名體偏圓並屬於解由解立行故次解後方便正觀行始為因行終為果故次正觀以明果報宗是自行用是益他由自行滿故能起教故彼玄文引神力品約教次第是故謂之名用體宗若引序品約行次第是故乃云名體宗用今文正當約行次第但以教相在於宗前前後之意如向所說次今存下明存本十數今存十數者存於止觀本文十章之數也故離五為八者離於向來合八章為五重玄義而仍本為八也更加初後者初謂大意後謂旨歸也則數整足者十章之數無減也次釋十境離合文為二初標次互發下釋文為二初通示開合又為二初明十數正是離開互發至九雙十數者止觀云互發有十謂次不次雜不雜具不具作意不作意成不成益不益久不久難不難更不更三障四魔九雙七隻云云應知此是十境互發九雙七隻之十數耳止觀既云七隻今文乃云三障四魔一雙者輔行云前九相對故云九雙後二不對但云七隻七隻只是三四一雙十中一一皆遍十境又前之九隻正辨互發後一但是收攝十境判屬魔障耳故此十境若非三障即是四魔者止觀云陰入病患是報障煩惱見慢是煩惱障業魔禪二乘菩薩是業障云云陰入正是陰魔業禪二乘菩薩等是行陰名為陰魔煩惱見慢等是煩惱魔病患是死因名死魔魔事是天子魔云云又十境者亦是為成十數故具示爾者應知此是單論十境之數耳與向互發十雙之數乃單復有異也故下章安問云等者今從大師正明十境互發之文故得指後章安料簡謂之下也然此但引章安問文不引答詞故彼答云譬如大地一能生種種芽數方不廣略令義易明了是故言十耳輔行云私料簡中都有十六番問答初一問答總問諸境何故但十如陰入境諸陰不同煩惱種別亦復無量諸病諸業乃至兩教二乘方便正行三教菩薩諸位不同故云法若塵沙境何定十次答意者實如所問法性如地種子如境觀行如雨發如抽芽略以數法且至於十耳今於下次明展轉相合二乘菩薩但合為一方便境則但有九者止觀云此十種境始自凡夫正報終至聖人方便輔行云此十下判境位也前八在凡可見後二言在聖人方便者既是圓教實道方便故方便望實名實為聖圓是聖法令成極聖人得聖法故云聖人故知十境位並在凡又云後二借使未觀已成方便云云二乘菩薩既乃合為一方便境并前八境則是但有九境也若以煩惱入於六蔽習因相中則但有八者業相境中明業相發明善相發則約六度明惡相發則約六蔽然而所發若見諸相乃名報果由昔因故亦名報因若不見相但是起心名為習因又能牽果亦名習果六蔽習因既約心說煩惱復是昏煩之法惱亂心神故以煩惱境入於業相境中六蔽習因則合煩惱境入業相境故於前九境則但有八也若以煩惱及業并陰入境為三道境則但有七者於前九境若以煩惱及業并陰但合為一三道境者而更兼於病患為二魔事為三禪定為四諸見為五上慢為六方便為七以二乘菩薩先已合為一方便故則但有七境也或依前八復以慢入煩惱境中亦但成七者止觀云慢為法界者還是煩惱耳觀慢無慢慢大慢非慢非不慢成祕密藏入大涅槃輔行云還是煩惱者略判同異別說則慢有於八種此屬增上煩惱中利鈍不專增上今從通說亦屬煩惱是故云也然則前八已合煩惱入於業相今云或依前八復以慢入煩惱境中者謂以慢入於已合之煩惱耳故此煩惱已合在於業相境中六蔽習因然雖已合且從本受名故不妨云煩惱境也亦如向七乃以煩惱及業并陰合為三道亦是已合之煩惱耳若以見慢入世禪攝則但有六者亦依前八又以見慢二境入於世禪攝之是則但有六耳然禪境中開為十門今但語其根本世禪耳以得根本世禪多起見慢故以見慢入世禪攝何者禪有觀支因生邪慧逸觀於法僻起諸倒邪辨猛利則生諸見又計四禪以為四果未得謂得復生上慢見慢既乃因禪而生故以見慢入世禪攝也又以病患入陰入攝則但有五者良以有於陰入界身乃生病患是故病患全是損害陰入界身故以病患入陰入攝則但有五也四魔三障者如前已引之若但以發不發相對則但成二者止觀云陰入境常自現前若發不發恆得為觀餘九境發可為觀不發何所觀若但以一所觀為言則但有一者發與不發雖然有二若乃望於能觀妙觀是則但名一所觀耳開合雖爾下次明隨相必開文為二初結前生後開合雖爾者結前也開即為十前文既云今於十內豈非是開又云若更合等故今乃云開合雖爾也又前乃是於開論合故云開合也今明發相等者即生後也今明發相氣類不同是故為十者將所發九境對陰入而論故為十耳此即於合論開也言氣類者借喻以顯境法也氣謂氣候類謂種類如陰陽等六氣及二十四氣之不同種類之差別也次以陰下正明開相以陰對九陰非發得是故別立者以陰對九乃是存十即前所謂今於十內也非謂以陰對九是前發不發之二也文中雖云陰非發得此但辨其陰境在於九境之初是故別立為一耳二乘菩薩雖同方便發心異故者此明於前所合二乘菩薩兩境為一方便今則仍舊開之以為兩境也二乘但期出苦菩薩乃兼濟群生是故名為發心異也煩惱起重習因輕微者此乃約於輕重開前所合煩惱入於六蔽習因仍舊為二也煩惱起重者止觀云今觀發作隆盛起重貪瞋何者生來雖瞋諫曉則息今所發者咆勃可畏生來倒想乍起乍滅今所發者然不去生來欲色抑制可停今所發者不簡死馬況其匹類此惑內發強梁熾盛若見外境心狂眼暗習因輕微者止觀云內心苦痛是殺習內心沈重是盜習內心煩躁是淫習故知六蔽習因輕微也展轉互通故名為道此諸發得三皆現起者此是開前所合煩惱及業并陰入境為三道一境今仍舊為三境也展轉互通故名為道者如輔行解成論十不善業道品云業必以煩惱為能通必以當苦為所通文雖舉業義已具三今謂業道具三既爾煩惱與苦具三準知此諸發得三皆現起者現即發也既三皆現起故須開為三矣慢與煩惱濫別者此是開前所合慢入煩惱境中仍舊為二也前文合於慢入煩惱既從通說故今約開須從別言若但約合則是濫別故云慢與煩惱濫別反顯今開則無所混也禪中未必一向發見者此即開前合於見慢入世禪攝仍舊為三也既云未必一向發見慢則準知故不煩文何者止觀云通論見發或因禪發或因聞發見發既乃所因不定是故今云禪中未必一向發見發見既爾發慢準知何者以上慢一境未必因禪故也故止觀明十境生起次第云若識見為非息其妄著貪瞋利鈍二俱不起無智之者謂證涅槃輔行云若識下明見後生慢乃至云此但通舉上慢之相既從見後生慢故知上慢未必因禪也又止觀云小乘亦有橫計四禪為四果大乘亦有魔來與記並是未得謂得增上慢人輔行云從小乘下別出大小各有其相又輔行釋諸見境後云增上慢者如得未到謂無生忍四禪比丘等乃至遍於大小諸位未得謂得並名增上以此明之上慢一境未必獨因世禪而生也病雖是陰陰不必病者此是開前所合病患入陰入攝仍舊為二也何者良以病必病於陰身而其陰身不必有病故也以自有人生來無病是故前以病患合入陰境所攝且從病必病於陰身而說耳今從陰身不必有病故開之為二也病雖有業非業相現病雖有魔已屬魔境者此但因便辨於病患境中有業有魔之相耳不涉開前所合之義也又此亦是釋疑之文何者或有疑云病有業病莫是業相境邪故茲釋之云耳又有疑云病有魔病亦是魔境邪故又釋之云耳故病患境明病起因緣有六一四大不順二飲食不節三坐禪不調四鬼神得便五魔為六業起言魔為者止觀云與鬼病亦不異然鬼但病身殺身魔則破觀心破法身慧命起邪念想奪人功德故與鬼為異亦由行者於坐禪中邪念利養魔現種種衣服飲食七珍雜物即領受歡喜入心成病言業病者止觀云或是先世業或今世破戒動先世業業力成病若鬼魔二病此須深觀行力及大神呪力乃得差耳若業病者當內用觀力外加懺悔乃得差耳病雖有業非業相現者以業相境因修止觀能動諸業是故善惡業相乃現此與病中業病或是先世業或今世破戒動先世業業力成病所由不同發相復異是故謂之病雖有業非業相現也病雖有魔已屬魔境者以魔境中云若邪想坐禪多著時媚又云復次內射不入當扇檀越師僧父母同學弟子放十八箭十八箭如止觀輔行明之不應受著著則成病又云強軟等箭初射五根有三過患一令人病二失觀心三得邪法病有種種相從眼入者病肝餘根可知身遭病苦心則迷荒喪禪致死云云此與病患境中第五魔病大意是同故今謂之病雖有魔已屬魔境也二及三四發相頗分者頗者偏也此恐誤也應作叵字不可也然今文意但取訓不耳何者若但為二及以三四則成所發之相不分煩惱病患業魔禪見上慢二乘菩薩等別是故不可但合為二及以三四也況但為一最為通漫者況者擬也合之以為二及三四尚乃所發之相不分況但合之為一豈非混沌者乎故云最為通漫也是故隨相必須開十者總結上文合必隨其相貌不同開之為十矣又前文云此諸發得三皆現起者煩惱及業屬發可知陰亦發得者輔行云下之九境不發無修何故十境皆云修發答此須分別若觀陰發陰是通修通發觀陰發九是通修別發若觀煩惱發下八境是別修別發若觀煩惱而生陰解是別修通發云云次明下三釋十乘立意文為二初敘意分科言下文云橫豎該羅十觀具足者今釋十境離合文畢即明十乘立意之相準文次第合云上文以由橫豎該羅十觀具足之文乃是二十五方便之初故也輔行云橫豎下明觀境功能十境橫豎如第五卷初十雙互發由境發故觀法縱橫復名橫豎至第五卷當更委明觀橫豎相今探文意者探者取也遠取謂之探也亦以從於十境離合文畢即明十乘立意之相故得謂之今探文意也次總別下隨科釋義文為二初指記中具明前三總別二釋橫豎四句具如記中者輔行云言橫豎者此之十法有通有別別者如不思議境窮實相底名豎包十法界名橫發心上求名豎下化衆生名橫又上求下化名豎依境發誓名橫安心徹理名豎六十四番名橫破遍惑窮名豎諸門相望名橫通至寶所名豎檢校塞著名橫道品至後名豎品品相望為橫無著入住為豎離似三法為橫此即今文第二別釋也此單約圓乘為解若望偏乘名橫名豎亦如橫豎顯非橫豎若不思議非橫非豎能作橫豎而云橫豎此即今文第三橫豎四句釋也又總論者在一一位十自相望為橫一一至極當法漸深為豎又亦可云前之七法名橫次位去名豎此即今文第一總釋也附文下次明今文委釋後二文為二初明附文來意法相釋文為三初總明來意仍指本文十法生起又名為豎生起如文者如止觀之文也故云既自達妙境即起誓悲他次作行填願願行既巧破無不遍遍破之中精識通塞令道品進行又用助開道道中之位己他皆識安忍內外榮辱莫著中道法愛故得疾入菩薩位此即生起如文又名為豎也一一法中各含多意又名為橫具如本文隨義別釋者如十乘本文隨義別釋中初釋不思議境有七一明性德境二明修德境三明化他境四結自他事理以成三諦五舉如意珠等為喻六明功能七明收入一心總為觀境發心已去乃至離愛本文之中各有多意尋文可知不煩具録次今搜下別釋附文各為五例文為二初總明搜者索也求也言覽略者即今文中所立十乘各為五例也言知廣者即知止觀十乘之廣文也言雖有小小多少不同者反顯無於大大多少之異也何者文雖廣略意實該收是故云爾次別示文為十初明妙境五中言一為示三千在一念故者止觀云夫一心具十法界一法界又具十法界百法界一界具三千種世間百法界即具三千種世間此三千在一念心若無心而已介爾有心即具三千輔行云夫一心下結成理境如前所釋本在一心圓融三諦即止觀前文約三義讀十法界以成三諦之義而輔行中消文畢已乃云心性不動假立中名亡泯三千假立空稱雖亡而存假立假號即此之謂也既已開釋即止觀約三義讀十法界文後遂乃開釋十種五陰十種衆生十種國土三十種世間各具十如等輔行云次釋境中所攝法相先明三種世間次明一一世間皆具十如等即此之謂也恐人生疑故重結之令入一念即輔行云夫一心下結成理境即止觀云夫一心具十法界等文也當知身土一念三千故成道時稱此本理一身一念遍於法界乃至云故至止觀正明觀法並以三千而為指南乃是終窮究竟極說故序中云說己心中所行法門良有以也請尋讀者心無異緣云云今謂妙境五中一為示三千在一念故者即釋籤云俗則百界千如真則同居一念也何者色心不二門云攝別入總一切諸法無非心性一性無性三千宛然且總在一念別分色心色心不出十界百界三千世間既知色心別已故攝別入總則曉十界三千之別不出一念剎那之總須知此總即是圓心此別即是三千世間圓心三千總別只是不思議假妙假相攝良由空中真性真性是理妙假是事又此真性亦名中道妙假亦是復俗之義故此事理真俗兩意收束諸文罄無不盡文句記云若非圓心不攝三千若非三千攝則不遍記文自指具如止觀第五文中故三千總別咸空假中一文既然他皆準此是知一念與夫三千相即融攝良由空中真性若非空中真性而一念心及以三千何能融攝猶如帝網重重無盡邪故輔行云能了妄念無一異相空中真性也達此無相具一切心三千具足方能照於一多相即不思議假也又如南嶽止觀問云體用無二只可二諦相攝何得世諦還攝世事答曰今云體用無二者非如攬衆塵之別用成泥團之一體但以世諦之中一一事相即是真諦全體以是義故若真諦攝世諦中一切事相得盡即世諦中一一事相亦攝世諦中一切事相皆盡又淨名疏問云何得小室容諸大座答世諦有二一者思議則小不容大二者不思議小則容大如尺面之鏡大像亦現當知此與色心不二門中妙假總別互相融攝厥意元同故釋籤云俗則百界千如真則同居一念良由於此是則百界千如之俗若非同一真如之性如何攝之同在一念以由同一真性之故方得千如之俗同居一念之中一念不少三千不多一多相即不其然哉復須了知今之真俗即是復俗單真之義故釋籤云但云相即言濫於通應從意說意以一切趣中為真與百界千如及千如本空為俗而論相即故知單真復俗之義乃是約於中邊明之以合二邊名為復俗中道名為單真故也故止觀中釋於五陰假名世間具明十界假實之異國土世間始自地獄依赤鐵住終至如來依寂光住若如釋籤自他不二門云自行唯在空中利他三千赴物此乃約於事理而明故自行唯在空中屬於寂光之理化他三千赴物乃是三土之事今止觀中與彼則異何者十界假實所依國土既乃始自地獄赤鐵終至如來依常寂光當知三土假實依正即釋籤云百界千如也如來依於常寂光住即釋籤云及千如本空也故此乃是復俗之義若乃雙非三土寂光方是釋籤云一切趣中為真耳故輔行釋十界假實國土依正十如文畢乃引淨名疏中四土相望十種差別以消天器飯色不同前九正當今文世間之義也即今止觀三種世間之文也一同居自異二同居與方便不同三方便自異四方便與實報不同五實報自異六實報與下品寂光不同七與中品寂光不同八與上品寂光不同九諸土總對寂光不同十諸土非垢寂光非淨第十即是雙非三土常寂光也故中道之真諦雙非四土如天器三土寂光之復俗如飯色有異若將寂光如天器三土如飯色有異即釋籤云自行唯在空中利他三千赴物故知三千義有單復單則三土復兼寂光而止觀妙境中三千世間既該四土當知即是復俗三千也前九正明諸土不同不同即是復俗差別也第十但明諸土體耳土體即是中道非三土非寂光也土雖差別不異寂光寂光雖寂不異諸土非三土外別有寂光非寂光外別有三土今文不論諸土體者止觀文中不明中道非三土非寂光也此指止觀開釋十種假實國土三種世間十如是等復俗之文耳非謂指於止觀約三義讀十法界以成三諦之文也何者以約三義讀十法界成於三諦而三諦中心性不動假立中名之德中道之真即能攝之體與淨名疏第十明諸土非垢寂光非淨是同故也若前九種諸土差別乃空假之復俗是所攝之三法即亡泯三千假立空稱雖亡而存假立假號也故亡泯三千文具二義二者寂光之理亡泯三土之事名亡泯三千即亡泯三千假立空稱也二者中道之真亡泯四土之復俗名亡泯三千即淨名疏中第十明諸土非垢寂光非淨也為成世間差別義故為成百界千如之三土及千如本空之寂光復俗間差之義故也故輔行云凡言俗者隔別為義含於有無義攝凡小有此之異故名為俗若不爾者如何解於止觀中明三種世間該攝十界及以四土是世俗間差之義邪況復輔行解釋三種世間文初乃云次明境中所攝法相故知所攝即是復俗能攝乃是中道之真也是則今文妙境五中一者為示三千世間在一念故乃是為示三千世間復俗差別同一中道之真故方乃在於一念之總也是知三千復俗差別若非同一中道之真何能在於一念之總輔行謂之夫一心下結成理境良由於此又金錍中野客問云如何能攝依正因果百界三千依正只是因果之法耳故輔行云十如只是因果之法相至因緣以屬於因果報屬果荊溪答曰一家所立不思議境於一念中理具三千既云一念理具三千豈非三千復俗同一中道之真故在於一念邪故知一念理具三千即今文云為示三千在一念也由是明之輔行中云故至止觀正明觀法並以三千而為指南乃是終窮究竟極說故序中云說己心中所行法門者正是以三千復俗差別同一中道之真在於一念之總而為指南極說耳何者以金錍云一家所立不思議境於一念中理具三千而能遍攝依正因果全依法華實相之理必具諸法以成三千結示經旨正在於斯是則法華諸法實相於四句中言四句者一權二實三亦權亦實四非權非實乃是第三亦權亦實耳諸法亦權也實相亦實也而方便品但是第三亦權半句之所收耳何者良由非實無以立權非權無以顯實權既有於顯實之功所以如來稱歎方便故三種方便中祕妙方便乃是亦權諸法相性等耳亦權諸法相性等十若約事理分之則是三千三土之事若約真俗分之則是百界千如及千如本空四土之復俗今正取四土三千之復俗以明止觀三千世間為指南耳故為實施權意在於實開權顯實意在於權輔行問於不思議中但明四聖何法不攝何必須明六道法邪答為實施權從實開出今欲示實何得不論總約一化有五意說一者為示人天路故二者為令厭輪邊故三者為知菩薩自誓悲他境相故四者為知不可思議境所攝法故五者為欲令知性惡法門遍故今文正在第四第五兼用第二第三今謂輔行且以四聖對於六道而為料簡若約真俗明之應以十界四土而為不可思議境所攝之諸法耳而祕妙方便既是即實之權輔行云既云諸法故實相即十既云實相故十即實相今取實相即十為即實之權耳故不談三千則攝法不遍輔行云於一念心不約十界收事不遍不約三諦攝理不周不語十如因果不備無三世間依正不盡今取十界四土三種世間復俗之義以明所攝之法顯於止觀以三千為指南極說耳法華經旨既在於斯是故吾祖靈鷲親承大蘇妙悟還以此旨而為觀境故文句記釋方便品乃是第三亦權半句即實之權而為今經方便品竟又復示云若見此意常默常說言行無違還以此旨而為觀境使彼觀境昭然可觀又云境據假顯且存其數思之思之欲令妙境攝法周遍照然可觀故說止觀不思議境十界四土三千世間復俗差別同一中道真諦雙非故在剎那所以名為於一念中理具三千而能遍攝依正因果故今謂之為示三千在一念也而輔行云並以三千而為指南乃是終窮究竟極說者斯蓋荊溪深達吾祖用於法華開顯之旨以即實之權而為三千妙境耳故引章安序中文云說己心中所行法門良有以也是則吾祖最後終窮究竟極說王泉寺說止觀乃是最後故也一念三千而為指南正約中道雙非之單真具於四土之復俗耳如來最後開顯既明即實之權而為祕妙方便吾祖終窮極說亦談性具之俗而為妙境三千章安既乃深領幽旨於是序云說己心中所行法門荊溪又復洞曉玄關所以記云並以三千而為指南驗知吾祖靈鷲親承理無差惑而章安荊溪善順傳弘自荊溪之後失斯妙義者多矣余昔嘗學四明之說遭其惑亂乃謂三諦皆有三千名為指南究竟極說今方始解即實之權性具之俗是妙境三千為指南極說耳四明自昔不間吾祖用法華經旨以即實之權性具之俗為不思議境一念三千輒便破云若謂止觀不思議境一念三千是俗諦者豈可大師以俗諦為極說荊溪以假法為指南邪敬請四方青眼之人觀此破辭則知四明失於一家所傳之道矣悲哉悲哉
